<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Ball Bounce Trap</title>
<style>
  html, body { margin: 0; padding: 0; background: #00B140; }
  #root {
    position: relative;
    width: 1080px;
    height: 1920px;
    background: #00B140;
    overflow: hidden;
    font-family: "Montserrat", sans-serif;
  }
  #root .stage {
    position: absolute;
    inset: 0;
  }

  /* Centered 600x600 box at (240, 660) - (840, 1260).
     Walls share the ball's orange rubber lighting:
       solid Trendify orange + inset highlight on the "lit" face
       + inset shadow on the "shaded" face + outer warm glow + drop shadow. */
  #root .wall {
    position: absolute;
    background: #F28129;
    border-radius: 6px;
    opacity: 0;
  }
  #root .wall.top {
    left: 240px; top: 660px;
    width: 600px; height: 14px;
    transform-origin: left center;
    box-shadow:
      inset 0 4px 6px rgba(255, 255, 255, 0.55),
      inset 0 -4px 6px rgba(0, 0, 0, 0.30),
      0 0 22px rgba(242, 129, 41, 0.55),
      0 6px 14px rgba(0, 0, 0, 0.25);
  }
  #root .wall.bottom {
    left: 240px; top: 1246px;
    width: 600px; height: 14px;
    transform-origin: right center;
    box-shadow:
      inset 0 4px 6px rgba(255, 255, 255, 0.55),
      inset 0 -4px 6px rgba(0, 0, 0, 0.30),
      0 0 22px rgba(242, 129, 41, 0.55),
      0 6px 14px rgba(0, 0, 0, 0.25);
  }
  #root .wall.right {
    left: 826px; top: 660px;
    width: 14px; height: 600px;
    transform-origin: center top;
    box-shadow:
      inset 4px 0 6px rgba(255, 255, 255, 0.55),
      inset -4px 0 6px rgba(0, 0, 0, 0.30),
      0 0 22px rgba(242, 129, 41, 0.55),
      6px 0 14px rgba(0, 0, 0, 0.25);
  }
  #root .wall.left {
    left: 240px; top: 660px;
    width: 14px; height: 600px;
    transform-origin: center bottom;
    box-shadow:
      inset 4px 0 6px rgba(255, 255, 255, 0.55),
      inset -4px 0 6px rgba(0, 0, 0, 0.30),
      0 0 22px rgba(242, 129, 41, 0.55),
      6px 0 14px rgba(0, 0, 0, 0.25);
  }

  /* Bouncy ball — orange Trendify rubber with radial highlight, same palette as walls. */
  #root .ball {
    position: absolute;
    left: 0; top: 0;
    width: 100px; height: 100px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 35% 32%,
        #ffd9b0 0%,
        #f7a554 18%,
        #F28129 48%,
        #c75c12 100%);
    box-shadow:
      inset -10px -14px 22px rgba(0, 0, 0, 0.25),
      inset 8px 10px 14px rgba(255, 255, 255, 0.35),
      0 8px 18px rgba(0, 0, 0, 0.25),
      0 0 18px rgba(242, 129, 41, 0.40);
    will-change: transform;
  }
  #root .ball::after {
    content: "";
    position: absolute;
    left: 22%; top: 18%;
    width: 22%; height: 14%;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.55);
    filter: blur(2px);
  }
</style>
</head>
<body>
<div id="root" data-composition-id="main" data-start="0" data-duration="5" data-width="1080" data-height="1920">
  <div class="stage">
    <div class="wall top"    id="wall-top"></div>
    <div class="wall right"  id="wall-right"></div>
    <div class="wall bottom" id="wall-bottom"></div>
    <div class="wall left"   id="wall-left"></div>
    <div class="ball" id="ball"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });

  /* Coordinates are ball top-left in canvas space. Ball is 100x100.
     Inner play area for ball top-left (walls are 14px thick):
       x ∈ [254, 726],  y ∈ [674, 1146]
     "On bottom wall"  => y = 1146
     "On top wall"     => y = 674
     "On left wall"    => x = 254
     "On right wall"   => x = 726                                           */

  gsap.set("#ball", { x: 80, y: -160, scaleX: 1, scaleY: 1 });
  gsap.set(["#wall-top", "#wall-right", "#wall-bottom", "#wall-left"], { opacity: 0 });

  /* ---------- Walls draw in, one by one, as the ball converges on center ---------- */
  // Bottom wall (right→left), visible just before first landing
  tl.set("#wall-bottom", { opacity: 1, scaleX: 0 }, 0.40);
  tl.to ("#wall-bottom", { scaleX: 1, duration: 0.30, ease: "power3.out" }, 0.40);

  // Right wall (top→bottom), draws while ball arcs across
  tl.set("#wall-right", { opacity: 1, scaleY: 0 }, 0.90);
  tl.to ("#wall-right", { scaleY: 1, duration: 0.30, ease: "power3.out" }, 0.90);

  // Top wall (left→right), closes the ceiling
  tl.set("#wall-top", { opacity: 1, scaleX: 0 }, 1.25);
  tl.to ("#wall-top", { scaleX: 1, duration: 0.30, ease: "power3.out" }, 1.25);

  // Left wall (bottom→top), final trap closes
  tl.set("#wall-left", { opacity: 1, scaleY: 0 }, 1.55);
  tl.to ("#wall-left", { scaleY: 1, duration: 0.30, ease: "power3.out" }, 1.55);

  /* ---------- ENTRY: ball falls in, bounces along the floor ----------
     x is linear ('none'), y is power2.in falling / power2.out rising.        */

  // Fall from (80, -160) → first impact (320, 1146) at t=0.65
  tl.to("#ball", { x: 320, duration: 0.45, ease: "none" },     0.20);
  tl.to("#ball", { y: 1146, duration: 0.45, ease: "power2.in" }, 0.20);
  // Squash on bottom (vertical compress)
  tl.to("#ball", { scaleY: 0.72, scaleX: 1.22, duration: 0.05, ease: "power2.out" }, 0.65);
  tl.to("#ball", { scaleY: 1.00, scaleX: 1.00, duration: 0.08, ease: "power2.out", overwrite: "auto" }, 0.70);

  // Bounce → second impact (520, 1146) at t=1.10
  tl.to("#ball", { x: 520, duration: 0.40, ease: "none" },        0.70);
  tl.to("#ball", { y: 940, duration: 0.20, ease: "power2.out" },  0.70);
  tl.to("#ball", { y: 1146, duration: 0.20, ease: "power2.in" },  0.90);
  tl.to("#ball", { scaleY: 0.74, scaleX: 1.20, duration: 0.05, ease: "power2.out" }, 1.10);
  tl.to("#ball", { scaleY: 1.00, scaleX: 1.00, duration: 0.08, ease: "power2.out", overwrite: "auto" }, 1.15);

  // Bounce → third impact (640, 1146) at t=1.50 (smaller arc, losing energy)
  tl.to("#ball", { x: 640, duration: 0.35, ease: "none" },        1.15);
  tl.to("#ball", { y: 1020, duration: 0.18, ease: "power2.out" }, 1.15);
  tl.to("#ball", { y: 1146, duration: 0.17, ease: "power2.in" },  1.33);
  tl.to("#ball", { scaleY: 0.76, scaleX: 1.18, duration: 0.05, ease: "power2.out" }, 1.50);
  tl.to("#ball", { scaleY: 1.00, scaleX: 1.00, duration: 0.08, ease: "power2.out", overwrite: "auto" }, 1.55);

  /* ---------- TRAPPED: ball ricochets off every wall ----------
     Sequence: BOTTOM (entry done) → TOP → LEFT → BOTTOM → RIGHT → BOTTOM    */

  // → TOP wall hit at (500, 674) at t=1.95
  tl.to("#ball", { x: 500, duration: 0.40, ease: "none" },        1.55);
  tl.to("#ball", { y: 674, duration: 0.40, ease: "power2.out" },  1.55);
  // Top-wall squash (vertical compress)
  tl.to("#ball", { scaleY: 0.78, scaleX: 1.18, duration: 0.05, ease: "power2.out" }, 1.95);
  tl.to("#ball", { scaleY: 1.00, scaleX: 1.00, duration: 0.08, ease: "power2.out", overwrite: "auto" }, 2.00);

  // → LEFT wall hit at (254, 900) at t=2.40
  tl.to("#ball", { x: 254, duration: 0.45, ease: "none" },        2.00);
  tl.to("#ball", { y: 900, duration: 0.45, ease: "power2.in" },   2.00);
  // Left-wall squash (horizontal compress)
  tl.to("#ball", { scaleX: 0.78, scaleY: 1.18, duration: 0.05, ease: "power2.out" }, 2.40);
  tl.to("#ball", { scaleX: 1.00, scaleY: 1.00, duration: 0.08, ease: "power2.out", overwrite: "auto" }, 2.45);

  // → BOTTOM wall hit at (470, 1146) at t=2.85
  tl.to("#ball", { x: 470, duration: 0.40, ease: "none" },        2.45);
  tl.to("#ball", { y: 1146, duration: 0.40, ease: "power2.in" },  2.45);
  tl.to("#ball", { scaleY: 0.80, scaleX: 1.16, duration: 0.05, ease: "power2.out" }, 2.85);
  tl.to("#ball", { scaleY: 1.00, scaleX: 1.00, duration: 0.08, ease: "power2.out", overwrite: "auto" }, 2.90);

  // → RIGHT wall hit at (726, 820) at t=3.35
  tl.to("#ball", { x: 726, duration: 0.45, ease: "none" },        2.90);
  tl.to("#ball", { y: 820, duration: 0.45, ease: "power2.out" }, 2.90);
  // Right-wall squash (horizontal compress)
  tl.to("#ball", { scaleX: 0.80, scaleY: 1.16, duration: 0.05, ease: "power2.out" }, 3.35);
  tl.to("#ball", { scaleX: 1.00, scaleY: 1.00, duration: 0.08, ease: "power2.out", overwrite: "auto" }, 3.40);

  // → BOTTOM wall hit at (430, 1146) at t=3.85
  tl.to("#ball", { x: 430, duration: 0.45, ease: "none" },        3.40);
  tl.to("#ball", { y: 1146, duration: 0.45, ease: "power2.in" }, 3.40);
  tl.to("#ball", { scaleY: 0.82, scaleX: 1.14, duration: 0.05, ease: "power2.out" }, 3.85);
  tl.to("#ball", { scaleY: 1.00, scaleX: 1.00, duration: 0.08, ease: "power2.out", overwrite: "auto" }, 3.90);

  // Small recovery bounce — heading toward TOP again but with less energy
  // → TOP wall hit at (580, 674) at t=4.35
  tl.to("#ball", { x: 580, duration: 0.45, ease: "none" },        3.90);
  tl.to("#ball", { y: 674, duration: 0.45, ease: "power2.out" }, 3.90);
  tl.to("#ball", { scaleY: 0.84, scaleX: 1.12, duration: 0.05, ease: "power2.out" }, 4.35);
  tl.to("#ball", { scaleY: 1.00, scaleX: 1.00, duration: 0.08, ease: "power2.out", overwrite: "auto" }, 4.40);

  // → BOTTOM wall hit at (520, 1146) at t=4.80
  tl.to("#ball", { x: 520, duration: 0.40, ease: "none" },        4.40);
  tl.to("#ball", { y: 1146, duration: 0.40, ease: "power2.in" }, 4.40);
  tl.to("#ball", { scaleY: 0.86, scaleX: 1.10, duration: 0.05, ease: "power2.out" }, 4.80);
  tl.to("#ball", { scaleY: 1.00, scaleX: 1.00, duration: 0.08, ease: "power2.out", overwrite: "auto" }, 4.85);

  // Tail: small lift, ride out the last 0.15s with kinetic continuity
  tl.to("#ball", { x: 545, duration: 0.15, ease: "none" },        4.85);
  tl.to("#ball", { y: 1080, duration: 0.15, ease: "power2.out" }, 4.85);

  window.__timelines["main"] = tl;
</script>
</body>
</html>
