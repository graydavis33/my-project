<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0E1016; }
  .tn { position:relative; width:1280px; height:720px; overflow:hidden; font-family:'Montserrat',sans-serif;
        background:radial-gradient(80% 90% at 70% 50%, #1c2029 0%, #14171f 55%, #0b0d13 100%); }

  /* ---- wheel ---- */
  .wheelwrap { position:absolute; right:-150px; top:50%; transform:translateY(-50%); width:660px; height:660px; z-index:2; }
  .wheel { position:absolute; inset:0; border-radius:50%;
           background:conic-gradient(from -18deg,
             #F28129 0 36deg, #353d4b 36deg 72deg, #2a313d 72deg 108deg, #3c4456 108deg 144deg,
             #2a313d 144deg 180deg, #353d4b 180deg 216deg, #2a313d 216deg 252deg, #3c4456 252deg 288deg,
             #2a313d 288deg 324deg, #353d4b 324deg 360deg);
           box-shadow:0 0 0 14px #11151d, 0 0 0 20px #444c5e, 0 20px 60px rgba(0,0,0,.6),
                      0 0 70px rgba(242,129,41,.35); }
  .wheel::after { content:""; position:absolute; inset:0; border-radius:50%;
                  background:repeating-conic-gradient(from -18deg, rgba(255,255,255,.08) 0 .6deg, transparent .6deg 36deg); }
  /* spin motion arcs */
  .spin { position:absolute; inset:-26px; border-radius:50%; z-index:3; pointer-events:none;
          background:conic-gradient(from 200deg, rgba(255,170,90,.0) 0deg, rgba(255,170,90,.55) 40deg, rgba(255,170,90,0) 70deg);
          mask:radial-gradient(circle, transparent 49%, #000 50%, #000 53%, transparent 54%); filter:blur(1px); }
  .hub { position:absolute; left:50%; top:50%; width:96px; height:96px; transform:translate(-50%,-50%); z-index:5;
         border-radius:50%; background:radial-gradient(circle at 40% 35%, #6b7488, #262d39);
         box-shadow:0 0 0 6px #11151d, inset 0 2px 6px rgba(255,255,255,.25); }
  .hub::after { content:""; position:absolute; left:50%; top:50%; width:26px; height:26px; transform:translate(-50%,-50%);
                border-radius:50%; background:#f28129; box-shadow:0 0 16px rgba(242,129,41,.9); }
  /* face tokens around the wheel */
  .tok { position:absolute; left:50%; top:50%; width:8px; height:8px; z-index:4; }
  .tok i { position:absolute; left:50%; width:48px; height:48px; margin-left:-24px; transform:translateY(-238px);
           border-radius:50%; background:linear-gradient(180deg,#5a6376,#2a313d); border:3px solid #1a1f29;
           box-shadow:0 4px 10px rgba(0,0,0,.5); }
  .tok i::after { content:""; position:absolute; left:50%; top:9px; width:18px; height:18px; margin-left:-9px;
                  border-radius:50%; background:#aab3c4; }
  .tok.win i { width:74px; height:74px; margin-left:-37px; transform:translateY(-250px);
               background:linear-gradient(180deg,#ffb163,#f28129); border:4px solid #fff;
               box-shadow:0 0 26px rgba(242,129,41,.95); }
  .tok.win i::after { top:14px; width:30px; height:30px; margin-left:-15px; background:#fff2e4; }

  /* pointer */
  .pointer { position:absolute; left:50%; top:-6px; transform:translateX(-50%); z-index:6;
             width:0; height:0; border-left:30px solid transparent; border-right:30px solid transparent;
             border-top:54px solid #fff; filter:drop-shadow(0 0 12px rgba(242,129,41,.9)); }

  /* landed callout */
  .landed { position:absolute; right:150px; top:18px; z-index:7; font-family:'Anton'; font-size:46px; color:#fff;
            background:#f28129; padding:6px 22px 4px; border-radius:12px; letter-spacing:1px;
            box-shadow:0 8px 20px rgba(0,0,0,.5), 0 0 26px rgba(242,129,41,.6); transform:rotate(-4deg); }

  /* ---- headline ---- */
  .head { position:absolute; left:56px; top:78px; z-index:8; font-family:'Anton',sans-serif;
          font-size:130px; line-height:.82; color:#fff; text-shadow:0 6px 20px rgba(0,0,0,.7); }
  .head .o { color:#FF9F45; text-shadow:0 0 28px rgba(242,129,41,.8); }
  .kicks { position:absolute; left:60px; top:330px; z-index:8; display:flex; gap:14px; align-items:center; }
  .chip { font-family:'Montserrat'; font-weight:900; font-size:26px; letter-spacing:3px; color:#0E1016;
          background:#f28129; padding:9px 18px; border-radius:10px; box-shadow:0 0 20px rgba(242,129,41,.5); }
  .chip.ghost { color:#fff; background:transparent; border:3px solid #444c5e; }

  /* Sai plate */
  .plate { position:absolute; left:27%; bottom:-10px; z-index:7; width:400px; height:430px; }
  .plate svg { width:100%; height:100%; filter:drop-shadow(0 16px 26px rgba(0,0,0,.6)); }
  .tag { position:absolute; left:34%; bottom:22px; z-index:9; font-family:'Montserrat'; font-weight:900;
         font-size:24px; letter-spacing:7px; color:#fff; background:rgba(14,16,22,.78); padding:7px 20px;
         border-radius:28px; border:2px solid rgba(242,129,41,.9); box-shadow:0 0 22px rgba(242,129,41,.45); }
</style>
</head>
<body>
<div class="tn">
  <div class="wheelwrap">
    <div class="wheel"></div>
    <div class="spin"></div>
    <div class="tok win" style="transform:rotate(0deg)"><i></i></div>
    <div class="tok" style="transform:rotate(36deg)"><i></i></div>
    <div class="tok" style="transform:rotate(72deg)"><i></i></div>
    <div class="tok" style="transform:rotate(108deg)"><i></i></div>
    <div class="tok" style="transform:rotate(144deg)"><i></i></div>
    <div class="tok" style="transform:rotate(180deg)"><i></i></div>
    <div class="tok" style="transform:rotate(216deg)"><i></i></div>
    <div class="tok" style="transform:rotate(252deg)"><i></i></div>
    <div class="tok" style="transform:rotate(288deg)"><i></i></div>
    <div class="tok" style="transform:rotate(324deg)"><i></i></div>
    <div class="hub"></div>
    <div class="pointer"></div>
  </div>

  <div class="landed">BEZOS</div>

  <div class="head">I <span class="o">DIDN'T</span><br>CHOOSE</div>
  <div class="kicks">
    <span class="chip">NO RE-SPINS</span>
    <span class="chip ghost">30 DAYS</span>
  </div>

  <div class="plate">
    <svg viewBox="0 0 200 240"><defs>
      <linearGradient id="pg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5a4a3380"/><stop offset="1" stop-color="#1c1812"/></linearGradient></defs>
      <path d="M22 250 C22 172 56 150 100 150 C144 150 178 172 178 250 Z" fill="url(#pg)" stroke="#f28129" stroke-width="3.5"/>
      <ellipse cx="100" cy="72" rx="47" ry="53" fill="url(#pg)" stroke="#f28129" stroke-width="3.5"/>
    </svg>
  </div>
  <div class="tag">SAI</div>
</div>
</body>
</html>
