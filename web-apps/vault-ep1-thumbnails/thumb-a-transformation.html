<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0E1016; }
  .tn { position:relative; width:1280px; height:720px; overflow:hidden;
        font-family:'Montserrat',sans-serif; background:#0E1016; }

  /* ---- left half: DAY 1, cold + chaotic ---- */
  .left { position:absolute; inset:0; width:56%;
          background:radial-gradient(120% 120% at 30% 40%, #313a47 0%, #1a1f29 60%, #11151d 100%);
          clip-path:polygon(0 0, 100% 0, 86% 100%, 0% 100%); }
  .left::after { content:""; position:absolute; inset:0;
                 background:linear-gradient(180deg, rgba(20,26,36,.1), rgba(10,13,19,.55)); }
  .scribble { position:absolute; left:4%; top:18%; width:48%; height:64%; opacity:.55; }

  /* ---- right half: DAY 30, warm + ordered ---- */
  .right { position:absolute; inset:0; left:44%; width:56%;
           background:radial-gradient(120% 120% at 72% 45%, #ff9f45 0%, #f28129 42%, #b9520f 100%);
           clip-path:polygon(14% 0, 100% 0, 100% 100%, 0% 100%); }
  .right::after { content:""; position:absolute; inset:0;
                  background:linear-gradient(180deg, rgba(255,180,110,.18), rgba(120,60,10,.45)); }
  .bars { position:absolute; right:8%; bottom:16%; display:flex; align-items:flex-end; gap:18px; opacity:.9; }
  .bars i { display:block; width:42px; border-radius:6px 6px 0 0;
            background:linear-gradient(180deg, #fff6ec, #ffd9b0); box-shadow:0 0 22px rgba(255,240,220,.5); }

  /* glowing seam */
  .seam { position:absolute; top:-40px; bottom:-40px; left:50%; width:10px; transform:translateX(-50%) rotate(7deg);
          background:linear-gradient(180deg, #ffd9a8, #ff8a2a); filter:blur(2px);
          box-shadow:0 0 40px 10px rgba(255,150,60,.65); z-index:3; }

  /* day badges */
  .badge { position:absolute; top:40px; z-index:6; font-family:'Anton',sans-serif;
           font-size:78px; line-height:.9; color:#fff; letter-spacing:1px;
           text-shadow:0 6px 18px rgba(0,0,0,.6); }
  .badge small { display:block; font-family:'Montserrat'; font-weight:800; font-size:22px;
                 letter-spacing:6px; color:#cfd6e2; margin-bottom:6px; }
  .badge.r small { color:#3a1c05; }
  .b-left { left:46px; text-align:left; }
  .b-right { right:46px; text-align:right; color:#1c0d02; }
  .b-right small { color:#3a1c05; }
  .uline { display:block; width:120px; height:10px; margin-top:8px; border-radius:5px;
           background:#f28129; box-shadow:0 0 18px rgba(242,129,41,.8); }
  .b-right .uline { margin-left:auto; background:#160c02; box-shadow:none; }

  /* center face plate */
  .plate { position:absolute; left:50%; bottom:-6px; transform:translateX(-50%); z-index:5;
           width:560px; height:660px; }
  .plate svg { width:100%; height:100%; filter:drop-shadow(0 18px 30px rgba(0,0,0,.55)); }
  .tag { position:absolute; left:50%; bottom:34px; transform:translateX(-50%); z-index:7;
         font-family:'Montserrat'; font-weight:900; font-size:26px; letter-spacing:8px;
         color:#fff; background:rgba(14,16,22,.72); padding:8px 22px; border-radius:30px;
         border:2px solid rgba(242,129,41,.9); box-shadow:0 0 26px rgba(242,129,41,.5); }
</style>
</head>
<body>
<div class="tn">
  <div class="left">
    <svg class="scribble" viewBox="0 0 200 200" fill="none" stroke="#8d3b3b" stroke-width="7" stroke-linecap="round">
      <path d="M10 40 C60 10 50 90 110 60 S150 130 190 80"/>
      <path d="M14 120 C70 150 60 70 120 110 S170 60 188 140" stroke="#5b6472"/>
      <path d="M20 180 C70 120 110 200 150 150 S180 190 196 170" stroke="#7a4040"/>
      <circle cx="40" cy="70" r="6" fill="#8d3b3b" stroke="none"/>
      <circle cx="150" cy="120" r="6" fill="#5b6472" stroke="none"/>
    </svg>
  </div>
  <div class="right">
    <div class="bars"><i style="height:120px"></i><i style="height:190px"></i><i style="height:270px"></i></div>
  </div>
  <div class="seam"></div>

  <div class="badge b-left"><small>DAY</small>01<span class="uline"></span></div>
  <div class="badge r b-right"><small>DAY</small>30<span class="uline"></span></div>

  <div class="plate">
    <svg viewBox="0 0 200 240">
      <defs>
        <linearGradient id="pg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#46506180"/><stop offset="1" stop-color="#1a1f29"/>
        </linearGradient>
      </defs>
      <g>
        <path d="M22 250 C22 172 56 150 100 150 C144 150 178 172 178 250 Z"
              fill="url(#pg)" stroke="#f28129" stroke-width="3"/>
        <ellipse cx="100" cy="72" rx="47" ry="53" fill="url(#pg)" stroke="#f28129" stroke-width="3"/>
      </g>
    </svg>
  </div>
  <div class="tag">SAI · TRENDIFY</div>
</div>
</body>
</html>
