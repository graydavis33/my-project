<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics — Graydient Media</title>
  <link rel="stylesheet" href="../styles/brand.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ── Light mode overrides ── */
    body.light-mode {
      background: #f2f4f7;
      --color-black:      #f2f4f7;
      --color-navy-deep:  #ffffff;
      --color-navy:       #f0f4f8;
      --color-navy-light: #e8edf4;
      --color-gray-dark:  #e2e8f0;
      --color-gray-mid:   #718096;
      --color-gray-light: #4a5568;
      --color-white:      #0d1b3e;
      --gradient-bg:      linear-gradient(180deg,#f0f4f8 0%,#e8edf4 100%);
      --gradient-radial:  none;
      --gradient-card:    linear-gradient(160deg,#ffffff 0%,#f8fafc 100%);
      --gradient-text:    linear-gradient(135deg,#0d1b3e 10%,#1a2d5a 100%);
      --border-card:      1px solid rgba(0,0,0,0.08);
      --border-subtle:    1px solid rgba(0,0,0,0.06);
      --shadow-card:      0 2px 12px rgba(0,0,0,0.07);
    }

    /* ── Base layout ── */
    body { padding: 0; }
    .dash-wrap { max-width: 1100px; margin: 0 auto; padding: 28px 24px 80px; }

    /* ── Header ── */
    .dash-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:22px; gap:12px; }
    .dash-title {
      font-size:22px; font-weight:800; letter-spacing:-0.5px;
      background:var(--gradient-text); -webkit-background-clip:text;
      -webkit-text-fill-color:transparent; background-clip:text;
    }
    .dash-updated { font-size:11px; color:var(--color-gray-light); margin-top:3px; }
    .theme-toggle {
      width:36px; height:36px; border-radius:var(--radius-full);
      border:var(--border-card); background:var(--gradient-card);
      color:var(--color-gray-light); cursor:pointer; font-size:16px;
      display:flex; align-items:center; justify-content:center;
      transition:border-color .15s;
    }
    .theme-toggle:hover { border-color:var(--color-yellow); }

    /* ── Platform tab bar ── */
    .platform-tabs {
      display:flex; gap:0; margin-bottom:22px;
      border-bottom:1px solid rgba(255,255,255,0.07); overflow-x:auto;
    }
    body.light-mode .platform-tabs { border-bottom-color:rgba(0,0,0,0.09); }
    .ptab {
      padding:10px 16px; border:none; background:transparent;
      color:var(--color-gray-mid); font-family:var(--font-base); font-size:13px;
      font-weight:600; cursor:pointer; border-bottom:2px solid transparent;
      margin-bottom:-1px; white-space:nowrap; transition:color .15s,border-color .15s;
      display:flex; align-items:center; gap:6px;
    }
    .ptab:hover { color:var(--color-white); }
    .ptab.active { color:var(--color-white); border-bottom-color:var(--color-yellow); }
    .ptab.active[data-tab="YouTube"]  { color:#ff4444; border-bottom-color:#ff4444; }
    .ptab.active[data-tab="TikTok"]   { color:#00f2ea; border-bottom-color:#00f2ea; }
    .ptab.active[data-tab="Instagram"]{ color:#e4405f; border-bottom-color:#e4405f; }
    .ptab.active[data-tab="Facebook"] { color:#1877f2; border-bottom-color:#1877f2; }
    .pdot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

    /* ── Controls row (date pills + simple/adv toggle) ── */
    .controls-row { display:flex; align-items:center; gap:6px; margin-bottom:18px; flex-wrap:wrap; }
    .ctrl-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--color-gray-light); margin-right:2px; }
    .dpill {
      padding:5px 13px; border-radius:var(--radius-full); border:var(--border-card);
      background:transparent; color:var(--color-gray-light);
      font-family:var(--font-base); font-size:12px; font-weight:600;
      cursor:pointer; transition:all .15s;
    }
    .dpill:hover { color:var(--color-white); }
    .dpill.active { background:rgba(232,184,75,.12); border-color:rgba(232,184,75,.3); color:var(--color-yellow); }
    .view-toggle {
      margin-left:auto; display:flex;
      background:rgba(13,27,62,.5); border:var(--border-subtle);
      border-radius:var(--radius-full); padding:3px; gap:2px;
    }
    body.light-mode .view-toggle { background:rgba(0,0,0,.05); }
    .vbtn {
      padding:4px 13px; border:none; border-radius:var(--radius-full);
      background:transparent; color:var(--color-gray-mid);
      font-family:var(--font-base); font-size:11px; font-weight:600;
      cursor:pointer; transition:all .15s;
    }
    .vbtn.active { background:rgba(232,184,75,.15); color:var(--color-yellow); }

    /* ── Metric cards ── */
    .metric-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:18px; }
    @media(max-width:600px){ .metric-grid { grid-template-columns:repeat(2,1fr); } }
    .mc { padding:16px; display:flex; flex-direction:column; gap:5px; }
    .mc-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--color-gray-light); }
    .mc-value { font-size:28px; font-weight:800; letter-spacing:-1px; line-height:1; color:var(--color-white); }
    .mc-na    { font-size:14px; color:var(--color-gray-mid); font-weight:500; }
    .mc-change{ font-size:12px; font-weight:600; display:flex; align-items:center; gap:3px; }
    .up   { color:var(--color-green); }
    .down { color:var(--color-red); }
    .neut { color:var(--color-gray-mid); }

    /* ── Chart ── */
    .chart-card { padding:18px; margin-bottom:18px; }
    .chart-hdr  { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
    .chart-lbl  { font-size:13px; font-weight:700; }
    .chart-sub  { font-size:11px; color:var(--color-gray-light); }
    .chart-wrap { position:relative; height:180px; }

    /* ── Post list ── */
    .post-card { padding:0; overflow:hidden; margin-bottom:18px; }
    .post-hdr {
      display:flex; justify-content:space-between; align-items:center;
      padding:13px 16px 10px; border-bottom:1px solid rgba(255,255,255,.05);
    }
    body.light-mode .post-hdr { border-bottom-color:rgba(0,0,0,.06); }
    .post-hdr-title { font-size:13px; font-weight:700; }
    .sort-pills { display:flex; gap:4px; }
    .spill {
      padding:4px 10px; border-radius:var(--radius-full); border:none;
      background:transparent; color:var(--color-gray-mid);
      font-family:var(--font-base); font-size:11px; font-weight:600; cursor:pointer;
      transition:all .15s;
    }
    .spill.active { background:rgba(255,255,255,.08); color:var(--color-white); }
    body.light-mode .spill.active { background:rgba(0,0,0,.07); }
    .pitem {
      display:flex; align-items:center; gap:12px; padding:10px 16px;
      border-bottom:1px solid rgba(255,255,255,.03); transition:background .1s; cursor:default;
    }
    body.light-mode .pitem { border-bottom-color:rgba(0,0,0,.04); }
    .pitem:last-child { border-bottom:none; }
    .pitem:hover { background:rgba(255,255,255,.02); }
    body.light-mode .pitem:hover { background:rgba(0,0,0,.02); }
    .pthumb {
      width:44px; height:44px; border-radius:var(--radius-sm); flex-shrink:0;
      display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:700;
    }
    .pinfo { flex:1; min-width:0; }
    .ptitle { font-size:13px; font-weight:500; color:var(--color-white); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:block; margin-bottom:2px; }
    .pdate  { font-size:11px; color:var(--color-gray-light); }
    .pstats { display:flex; gap:16px; flex-shrink:0; }
    .pstat  { text-align:right; }
    .psval  { font-size:13px; font-weight:700; color:var(--color-white); display:block; }
    .pslbl  { font-size:10px; color:var(--color-gray-light); text-transform:uppercase; letter-spacing:1px; }
    .plink  { font-size:13px; color:var(--color-yellow); text-decoration:none; flex-shrink:0; opacity:.7; }
    .plink:hover { opacity:1; }
    @media(max-width:600px){ .pstats .pstat:nth-child(n+4){ display:none; } .pstats{ gap:10px; } }

    /* ── Best / Worst ── */
    .bw-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:18px; }
    @media(max-width:700px){ .bw-grid { grid-template-columns:1fr; } }
    .bw-card { padding:18px; }
    .bw-hdr  { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
    .bw-icon { font-size:15px; }
    .bw-heading { font-size:13px; font-weight:700; }
    .bwp { margin-bottom:12px; padding-bottom:12px; border-bottom:1px solid rgba(255,255,255,.05); }
    body.light-mode .bwp { border-bottom-color:rgba(0,0,0,.06); }
    .bwp:last-child { margin-bottom:0; padding-bottom:0; border-bottom:none; }
    .bwp-title { font-size:12px; font-weight:600; color:var(--color-white); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
    .bwp-meta  { font-size:11px; color:var(--color-gray-light); margin-bottom:5px; }
    .bwr { font-size:11px; color:var(--color-white); line-height:1.55; padding-left:12px; position:relative; margin-bottom:3px; }
    .bwr::before { content:'•'; position:absolute; left:0; }
    .bwr.good::before { color:var(--color-green); }
    .bwr.bad::before  { color:var(--color-red); }
    .bwr.muted::before { color:var(--color-gray-mid); }

    /* ── AI Insights ── */
    .ins-card { padding:20px; margin-bottom:18px; }
    .ins-sub  { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--color-gray-light); margin-bottom:7px; }
    .ins-text { font-size:13px; line-height:1.7; color:var(--color-white); }
    .ins-bul  { font-size:12px; line-height:1.6; color:var(--color-white); padding-left:14px; position:relative; margin-bottom:5px; }
    .ins-bul::before { content:'•'; position:absolute; left:0; color:var(--color-yellow); }

    /* ── All tab ── */
    .all-sec { margin-bottom:26px; }
    .all-sec-hdr { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
    .all-sec-title { font-size:13px; font-weight:700; color:var(--color-white); }
    .all-sec-total { font-size:11px; color:var(--color-gray-light); }
    .plat-row { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
    @media(max-width:700px){ .plat-row { grid-template-columns:repeat(2,1fr); } }
    .pmc { padding:14px; border-radius:var(--radius-md); }
    .pmc-name  { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; display:flex; align-items:center; gap:5px; }
    .pmc-value { font-size:26px; font-weight:800; letter-spacing:-1px; line-height:1; color:var(--color-white); margin-bottom:4px; }
    .pmc-chg   { font-size:12px; font-weight:600; }
    .mini-chart-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:18px; }
    @media(max-width:600px){ .mini-chart-grid { grid-template-columns:1fr; } }
    .mini-chart-card { padding:14px; }
    .mini-chart-title { font-size:11px; font-weight:700; margin-bottom:10px; }
    .mini-chart-wrap  { position:relative; height:100px; }

    /* ── Trends ── */
    .trends-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    @media(max-width:700px){ .trends-grid { grid-template-columns:1fr; } }
    .trend-card  { padding:20px; }
    .trend-views { font-size:11px; font-weight:600; color:var(--color-gray-light); margin-bottom:4px; }
    .trend-title { font-size:15px; font-weight:700; color:var(--color-white); margin-bottom:3px; line-height:1.3; }
    .trend-chan  { font-size:12px; color:var(--color-yellow); margin-bottom:12px; }
    .trend-url {
      display:inline-block; font-size:11px; font-weight:600; color:var(--color-yellow);
      text-decoration:none; border:1px solid rgba(232,184,75,.3); border-radius:var(--radius-sm);
      padding:4px 10px; margin-bottom:14px; transition:background .15s;
    }
    .trend-url:hover { background:rgba(232,184,75,.1); }
    .trend-sub  { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--color-gray-light); margin:11px 0 5px; }
    .trend-text { font-size:12px; line-height:1.6; color:var(--color-white); }
    .trend-step { font-size:12px; line-height:1.6; color:var(--color-white); padding-left:20px; position:relative; margin-bottom:4px; }
    .trend-stepn{ position:absolute; left:0; font-size:10px; font-weight:700; color:var(--color-yellow); }

    /* ── Misc ── */
    .empty { text-align:center; padding:32px; color:var(--color-gray-mid); font-size:13px; }
    .adv-only { display:none; }
    .is-advanced .adv-only { display:block; }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }
    .sec-label {
      font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:2px;
      color:var(--color-gray-light); margin:0 0 10px;
      display:flex; align-items:center; justify-content:space-between;
    }
  </style>
</head>
<body>
<div class="dash-wrap">

  <!-- Header -->
  <div class="dash-header">
    <div>
      <div class="dash-title">Graydient Media Analytics</div>
      <div class="dash-updated" id="lastUpdated">Loading…</div>
    </div>
    <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">🌙</button>
  </div>

  <!-- Platform tabs -->
  <div class="platform-tabs">
    <button class="ptab active" data-tab="all">All Platforms</button>
    <button class="ptab" data-tab="YouTube"><span class="pdot" style="background:#ff4444"></span>YouTube</button>
    <button class="ptab" data-tab="TikTok"><span class="pdot" style="background:#00f2ea"></span>TikTok</button>
    <button class="ptab" data-tab="Instagram"><span class="pdot" style="background:#e4405f"></span>Instagram</button>
    <button class="ptab" data-tab="Facebook"><span class="pdot" style="background:#1877f2"></span>Facebook</button>
    <button class="ptab" data-tab="trends">Trends</button>
  </div>

  <!-- ALL TAB -->
  <div class="tab-panel active" id="panel-all">
    <div class="controls-row" id="allPills">
      <span class="ctrl-label">Range</span>
      <button class="dpill" data-d="7">7d</button>
      <button class="dpill" data-d="28">28d</button>
      <button class="dpill" data-d="30">30d</button>
      <button class="dpill" data-d="90">90d</button>
      <button class="dpill active" data-d="all">All</button>
    </div>
    <div id="allContent"></div>
  </div>

  <!-- YOUTUBE TAB -->
  <div class="tab-panel" id="panel-YouTube">
    <div class="controls-row" id="ytPills">
      <span class="ctrl-label">Range</span>
      <button class="dpill" data-d="7">7d</button>
      <button class="dpill" data-d="28">28d</button>
      <button class="dpill" data-d="30">30d</button>
      <button class="dpill" data-d="90">90d</button>
      <button class="dpill active" data-d="all">All</button>
      <div class="view-toggle">
        <button class="vbtn active" data-m="simple">Simple</button>
        <button class="vbtn" data-m="advanced">Advanced</button>
      </div>
    </div>
    <div id="ytContent"></div>
  </div>

  <!-- TIKTOK TAB -->
  <div class="tab-panel" id="panel-TikTok">
    <div class="controls-row" id="ttPills">
      <span class="ctrl-label">Range</span>
      <button class="dpill" data-d="7">7d</button>
      <button class="dpill" data-d="28">28d</button>
      <button class="dpill" data-d="30">30d</button>
      <button class="dpill" data-d="90">90d</button>
      <button class="dpill active" data-d="all">All</button>
      <div class="view-toggle">
        <button class="vbtn active" data-m="simple">Simple</button>
        <button class="vbtn" data-m="advanced">Advanced</button>
      </div>
    </div>
    <div id="ttContent"></div>
  </div>

  <!-- INSTAGRAM TAB -->
  <div class="tab-panel" id="panel-Instagram">
    <div class="controls-row" id="igPills">
      <span class="ctrl-label">Range</span>
      <button class="dpill" data-d="7">7d</button>
      <button class="dpill" data-d="28">28d</button>
      <button class="dpill" data-d="30">30d</button>
      <button class="dpill" data-d="90">90d</button>
      <button class="dpill active" data-d="all">All</button>
      <div class="view-toggle">
        <button class="vbtn active" data-m="simple">Simple</button>
        <button class="vbtn" data-m="advanced">Advanced</button>
      </div>
    </div>
    <div id="igContent"></div>
  </div>

  <!-- FACEBOOK TAB -->
  <div class="tab-panel" id="panel-Facebook">
    <div class="controls-row" id="fbPills">
      <span class="ctrl-label">Range</span>
      <button class="dpill" data-d="7">7d</button>
      <button class="dpill" data-d="28">28d</button>
      <button class="dpill" data-d="30">30d</button>
      <button class="dpill" data-d="90">90d</button>
      <button class="dpill active" data-d="all">All</button>
      <div class="view-toggle">
        <button class="vbtn active" data-m="simple">Simple</button>
        <button class="vbtn" data-m="advanced">Advanced</button>
      </div>
    </div>
    <div id="fbContent"></div>
  </div>

  <!-- TRENDS TAB -->
  <div class="tab-panel" id="panel-trends">
    <div id="trendsContent"></div>
  </div>

</div><!-- /dash-wrap -->

<script>
// ─── Config ────────────────────────────────────────────────
const PLATFORMS = ['YouTube','TikTok','Instagram','Facebook'];
const PC = { YouTube:'#ff4444', TikTok:'#00f2ea', Instagram:'#e4405f', Facebook:'#1877f2' };
const PE = { YouTube:'▶', TikTok:'♪', Instagram:'◉', Facebook:'f' };
const CONTENT_IDS = { YouTube:'ytContent', TikTok:'ttContent', Instagram:'igContent', Facebook:'fbContent' };
const PILL_IDS    = { YouTube:'ytPills',   TikTok:'ttPills',   Instagram:'igPills',   Facebook:'fbPills' };

// ─── State ─────────────────────────────────────────────────
let DATA = null;
let activePlatform = 'all';
const state = {
  days:     { all:'all', YouTube:'all', TikTok:'all', Instagram:'all', Facebook:'all' },
  advanced: { YouTube:false, TikTok:false, Instagram:false, Facebook:false },
  sort:     { YouTube:'views', TikTok:'views', Instagram:'views', Facebook:'views' },
};
const charts = {};

// ─── Helpers ───────────────────────────────────────────────
function fmt(n) {
  if (n == null || n === '') return '—';
  n = +n;
  if (n >= 1e6)  return (n/1e6).toFixed(1)+'M';
  if (n >= 10000)return (n/1000).toFixed(0)+'K';
  if (n >= 1000) return (n/1000).toFixed(1)+'K';
  return n.toLocaleString();
}

function fmtDate(d) {
  return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function fmtSec(s) {
  if (!s || s <= 0) return '—';
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m > 0 ? `${m}:${String(sec).padStart(2,'0')}` : `${sec}s`;
}

function filterDays(posts, days, ref) {
  if (days === 'all') return posts;
  const cutoff = new Date(new Date(ref).getTime() - (+days)*86400000);
  return posts.filter(p => new Date(p.published_date) >= cutoff);
}

function sortPosts(posts, mode) {
  const s = [...posts];
  if (mode === 'views')  return s.sort((a,b) => b.views - a.views);
  if (mode === 'likes')  return s.sort((a,b) => b.likes - a.likes);
  if (mode === 'latest') return s.sort((a,b) => new Date(b.published_date) - new Date(a.published_date));
  return s;
}

function totals(posts) {
  const n = posts.length || 1;
  return {
    posts:      posts.length,
    views:      posts.reduce((s,p)=>s+p.views,0),
    likes:      posts.reduce((s,p)=>s+p.likes,0),
    comments:   posts.reduce((s,p)=>s+p.comments,0),
    shares:     posts.reduce((s,p)=>s+p.shares,0),
    engagement: posts.reduce((s,p)=>s+p.engagement_rate,0)/n,
    ctr:        posts.reduce((s,p)=>s+p.ctr_pct,0)/n,
    viewPct:    posts.reduce((s,p)=>s+p.avg_view_pct,0)/n,
    watchTime:  posts.reduce((s,p)=>s+p.watch_time_minutes,0),
    impressions:posts.reduce((s,p)=>s+p.impressions,0),
    subs:       posts.reduce((s,p)=>s+p.subscribers_gained,0),
    gained:     posts.reduce((s,p)=>s+(p.views_gained||0),0),
  };
}

function thumb(platform) {
  const c = PC[platform]||'#888';
  return `<div class="pthumb" style="background:${c}22;color:${c}">${PE[platform]||'•'}</div>`;
}

function changeChip(gained) {
  if (!gained || gained <= 0) return `<span class="mc-change neut">— no change data</span>`;
  return `<span class="mc-change up">↑ +${fmt(gained)} new views</span>`;
}

function engColor(r) {
  return r >= 3 ? 'var(--color-green)' : r >= 1 ? 'var(--color-yellow)' : 'var(--color-red)';
}

function isLight() { return document.body.classList.contains('light-mode'); }

function chartTheme() {
  return isLight()
    ? { grid:'rgba(0,0,0,0.06)', tick:'#4a5568', tipBg:'#ffffff', tipBorder:'rgba(0,0,0,0.1)', tipTitle:'#0d1b3e', tipBody:'#718096' }
    : { grid:'rgba(255,255,255,0.04)', tick:'#8899aa', tipBg:'#0d1b3e', tipBorder:'rgba(255,255,255,0.1)', tipTitle:'#f0f4f8', tipBody:'#8899aa' };
}

function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

// ─── Chart renderers ───────────────────────────────────────
function drawLineChart(canvasId, posts, color, labelKey) {
  destroyChart(canvasId);
  const canvas = document.getElementById(canvasId);
  if (!canvas || !posts.length) return;

  const sorted = [...posts].sort((a,b)=>new Date(a.published_date)-new Date(b.published_date));
  const th = chartTheme();

  charts[canvasId] = new Chart(canvas, {
    type:'line',
    data:{
      labels: sorted.map(p => new Date(p.published_date).toLocaleDateString('en-US',{month:'short',day:'numeric'})),
      datasets:[{
        label: labelKey||'Views',
        data: sorted.map(p=>p.views),
        borderColor: color,
        backgroundColor: color+'1a',
        borderWidth:2, pointRadius:4, pointBackgroundColor:color, tension:0.3, fill:true,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:th.tipBg, borderColor:th.tipBorder, borderWidth:1,
          titleColor:th.tipTitle, bodyColor:th.tipBody,
          callbacks:{
            title: items => { const p=sorted[items[0].dataIndex]; return p.title.length>42?p.title.slice(0,42)+'…':p.title; },
            label: ctx => ' '+ctx.raw.toLocaleString()+' views'
          }
        }
      },
      scales:{
        x:{ grid:{color:th.grid}, ticks:{color:th.tick,font:{size:10}} },
        y:{ grid:{color:th.grid}, ticks:{color:th.tick,font:{size:10},callback:v=>fmt(v)} }
      }
    }
  });
}

// ─── Render: Metric cards ──────────────────────────────────
function renderMetricCards(t, platform) {
  const yt = platform === 'YouTube';
  const cards = [
    { label:'Total Views',    val:fmt(t.views),             change: changeChip(t.gained) },
    { label:'Total Likes',    val:fmt(t.likes),             change:'' },
    { label:'Comments',       val:fmt(t.comments),          change:'' },
    { label:'Shares',         val:fmt(t.shares),            change:'' },
    { label:'Avg Engagement', val:t.engagement.toFixed(1)+'%', change:'' },
    { label: yt?'Avg CTR':'Total Posts', val: yt?t.ctr.toFixed(1)+'%':t.posts.toString(), change:'' },
  ];
  return `<div class="metric-grid">${cards.map(c=>`
    <div class="gm-card mc">
      <div class="mc-label">${c.label}</div>
      <div class="mc-value">${c.val}</div>
      ${c.change}
    </div>`).join('')}</div>`;
}

function renderAdvMetricCards(t, platform) {
  const yt = platform === 'YouTube';
  const cards = [
    { label:'Impressions',     val: yt ? fmt(t.impressions) : null },
    { label:'Avg View %',      val: yt ? t.viewPct.toFixed(1)+'%' : null },
    { label:'Watch Time (min)',val: yt ? fmt(t.watchTime) : null },
    { label:'Subs Gained',     val: yt ? fmt(t.subs) : null },
  ];
  return `<div class="metric-grid">${cards.map(c=>`
    <div class="gm-card mc">
      <div class="mc-label">${c.label}</div>
      <div class="mc-value">${c.val != null ? c.val : '<span class="mc-na">N/A</span>'}</div>
    </div>`).join('')}</div>`;
}

// ─── Render: Post list ─────────────────────────────────────
function renderPostItems(posts, sortMode) {
  if (!posts.length) return `<div class="empty">No posts for this date range.</div>`;
  return sortPosts(posts, sortMode).map(p => `
    <div class="pitem">
      ${thumb(p.platform)}
      <div class="pinfo">
        <span class="ptitle">${p.title}</span>
        <span class="pdate">${fmtDate(p.published_date)}${p.duration?' · '+p.duration:''}</span>
      </div>
      <div class="pstats">
        <div class="pstat"><span class="psval">${fmt(p.views)}</span><span class="pslbl">Views</span></div>
        <div class="pstat"><span class="psval">${fmt(p.likes)}</span><span class="pslbl">Likes</span></div>
        <div class="pstat"><span class="psval" style="color:${engColor(p.engagement_rate)}">${p.engagement_rate.toFixed(1)}%</span><span class="pslbl">Eng</span></div>
        <div class="pstat"><span class="psval">${p.three_sec_view_rate > 0 ? p.three_sec_view_rate.toFixed(0)+'%' : '—'}</span><span class="pslbl">3s %</span></div>
        <div class="pstat"><span class="psval">${fmtSec(p.avg_view_duration_sec)}</span><span class="pslbl">Avg Hold</span></div>
      </div>
      <a href="${p.url}" target="_blank" class="plink" title="Open post">↗</a>
    </div>`).join('');
}

function renderPostListCard(posts, sortMode, platform) {
  return `
    <div class="gm-card post-card">
      <div class="post-hdr">
        <span class="post-hdr-title">Posts</span>
        <div class="sort-pills">
          <button class="spill${sortMode==='latest'?' active':''}" data-s="latest">Latest</button>
          <button class="spill${sortMode==='views'?' active':''}" data-s="views">Most Views</button>
          <button class="spill${sortMode==='likes'?' active':''}" data-s="likes">Most Likes</button>
        </div>
      </div>
      <div class="post-items-wrap">${renderPostItems(posts, sortMode)}</div>
    </div>`;
}

// ─── Render: Best / Worst ──────────────────────────────────
function renderBestWorst(posts, exps) {
  if (posts.length < 2) return '';
  const sorted = [...posts].sort((a,b)=>b.views-a.views);
  const half = Math.max(1, Math.floor(sorted.length/2));
  const best  = sorted.slice(0, Math.min(3, half));
  const worst = sorted.slice(-Math.min(3, half)).reverse();

  function postHtml(p, type) {
    const exp = exps && exps[p.url];
    const reasons = exp ? exp.reasons : [];
    const cls = type==='best'?'good':'bad';
    return `<div class="bwp">
      <div class="bwp-title">${p.title}</div>
      <div class="bwp-meta">${fmt(p.views)} views · ${p.engagement_rate.toFixed(1)}% eng</div>
      ${reasons.map(r=>`<div class="bwr ${cls}">${r}</div>`).join('')}
      ${!reasons.length?`<div class="bwr muted" style="color:var(--color-gray-mid)">Run python script to generate AI explanations.</div>`:''}
    </div>`;
  }

  return `<div class="bw-grid">
    <div class="gm-card bw-card">
      <div class="bw-hdr"><span class="bw-icon">🏆</span><span class="bw-heading">Top Performing</span></div>
      ${best.map(p=>postHtml(p,'best')).join('')}
    </div>
    <div class="gm-card bw-card">
      <div class="bw-hdr"><span class="bw-icon">📉</span><span class="bw-heading">Needs Improvement</span></div>
      ${worst.map(p=>postHtml(p,'worst')).join('')}
    </div>
  </div>`;
}

// ─── Render: AI Insights ───────────────────────────────────
function renderInsights(insights) {
  if (!insights || (!insights.dashboard && !insights.title)) return '';
  const bullets = (insights.title||'').split('\n').filter(l=>l.trim());
  return `<div class="gm-card ins-card">
    <div class="sec-label" style="margin-bottom:14px">AI Insights</div>
    ${insights.dashboard?`<div class="ins-sub">Channel Health</div><div class="ins-text">${insights.dashboard}</div>`:''}
    ${bullets.length?`<div class="gm-divider" style="margin:14px 0"></div>
      <div class="ins-sub">Title Patterns</div>
      ${bullets.map(b=>`<div class="ins-bul">${b.replace(/^[•\-]\s*/,'')}</div>`).join('')}`:''}
  </div>`;
}

// ─── Render: Platform tab ──────────────────────────────────
function renderPlatformTab(platform) {
  const days    = state.days[platform];
  const advanced= state.advanced[platform];
  const sortMode= state.sort[platform];
  const ref     = DATA.generated_at;
  const posts   = filterDays(DATA.posts.filter(p=>p.platform===platform), days, ref);
  const t       = totals(posts);
  const chartId = `chart-${platform.toLowerCase()}`;
  const color   = PC[platform];

  const el = document.getElementById(CONTENT_IDS[platform]);
  if (!el) return;

  if (advanced) el.classList.add('is-advanced');
  else          el.classList.remove('is-advanced');

  el.innerHTML = `
    ${renderMetricCards(t, platform)}
    <div class="adv-only">${renderAdvMetricCards(t, platform)}</div>

    <div class="gm-card chart-card">
      <div class="chart-hdr">
        <span class="chart-lbl" style="color:${color}">Views Over Time</span>
        <span class="chart-sub">${posts.length} post${posts.length!==1?'s':''}</span>
      </div>
      <div class="chart-wrap"><canvas id="${chartId}"></canvas></div>
    </div>

    ${renderPostListCard(posts, sortMode, platform)}

    <div class="adv-only">
      ${renderBestWorst(posts, DATA.post_explanations)}
      ${renderInsights(DATA.ai_insights)}
    </div>`;

  // Wire sort pills
  el.querySelectorAll('.spill').forEach(btn => {
    btn.addEventListener('click', () => {
      state.sort[platform] = btn.dataset.s;
      el.querySelectorAll('.spill').forEach(b=>b.classList.toggle('active', b.dataset.s===btn.dataset.s));
      const wrap = el.querySelector('.post-items-wrap');
      if (wrap) wrap.innerHTML = renderPostItems(posts, btn.dataset.s);
    });
  });

  // Draw chart
  requestAnimationFrame(() => drawLineChart(chartId, posts, color));
}

// ─── Render: All tab ───────────────────────────────────────
function renderAllTab() {
  const days = state.days.all;
  const ref  = DATA.generated_at;

  const pt = {};
  PLATFORMS.forEach(p => {
    pt[p] = totals(filterDays(DATA.posts.filter(x=>x.platform===p), days, ref));
  });
  const grand = totals(filterDays(DATA.posts, days, ref));

  function platCards(getVal, getChg) {
    return PLATFORMS.map(p => {
      const color = PC[p];
      const val   = getVal(pt[p]);
      const chg   = getChg ? getChg(pt[p]) : '';
      return `<div class="gm-card pmc" style="border-top:2px solid ${color}33">
        <div class="pmc-name" style="color:${color}">${PE[p]} ${p}</div>
        <div class="pmc-value">${val}</div>
        ${chg?`<div class="pmc-chg">${chg}</div>`:''}
      </div>`;
    }).join('');
  }

  document.getElementById('allContent').innerHTML = `
    <div class="all-sec">
      <div class="all-sec-hdr">
        <span class="all-sec-title">Views</span>
        <span class="all-sec-total">Total: ${fmt(grand.views)}</span>
      </div>
      <div class="plat-row">${platCards(
        t=>fmt(t.views),
        t=>t.gained>0?`<span class="up">↑ +${fmt(t.gained)} new</span>`:''
      )}</div>
    </div>

    <div class="all-sec">
      <div class="all-sec-hdr">
        <span class="all-sec-title">Likes</span>
        <span class="all-sec-total">Total: ${fmt(grand.likes)}</span>
      </div>
      <div class="plat-row">${platCards(t=>fmt(t.likes), null)}</div>
    </div>

    <div class="all-sec">
      <div class="all-sec-hdr">
        <span class="all-sec-title">Avg Engagement Rate</span>
        <span class="all-sec-total">Overall avg: ${grand.engagement.toFixed(1)}%</span>
      </div>
      <div class="plat-row">${platCards(
        t=>t.engagement.toFixed(1)+'%',
        t=>{const c=engColor(t.engagement);return `<span style="color:${c}">${t.engagement>=3?'● Good':t.engagement>=1?'● Average':'● Low'}</span>`;}
      )}</div>
    </div>

    <div class="all-sec">
      <div class="all-sec-hdr">
        <span class="all-sec-title">Posts by Platform</span>
        <span class="all-sec-total">Total: ${grand.posts} posts</span>
      </div>
      <div class="plat-row">${platCards(t=>t.posts.toString(), null)}</div>
    </div>

    <div class="mini-chart-grid">
      ${PLATFORMS.map(p=>`
        <div class="gm-card mini-chart-card">
          <div class="mini-chart-title" style="color:${PC[p]}">${PE[p]} ${p}</div>
          <div class="mini-chart-wrap"><canvas id="mini-chart-${p.toLowerCase()}"></canvas></div>
        </div>`).join('')}
    </div>`;

  // Draw mini charts
  requestAnimationFrame(() => {
    PLATFORMS.forEach(p => {
      const posts = filterDays(DATA.posts.filter(x=>x.platform===p), days, ref);
      drawLineChart(`mini-chart-${p.toLowerCase()}`, posts, PC[p]);
    });
  });
}

// ─── Render: Trends ────────────────────────────────────────
function renderTrends() {
  const trends = DATA.trends;
  if (!trends || !trends.length) {
    document.getElementById('trendsContent').innerHTML =
      `<div class="gm-card" style="padding:32px;text-align:center"><div class="empty">No trend data yet. Run the Python script to generate trends.</div></div>`;
    return;
  }
  document.getElementById('trendsContent').innerHTML = `<div class="trends-grid">${trends.map(t=>`
    <div class="gm-card trend-card">
      <div class="trend-views">${fmt(t.views)} views</div>
      <div class="trend-title">${t.title}</div>
      <div class="trend-chan">${t.channel}</div>
      <a href="${t.url}" target="_blank" class="trend-url">Watch on YouTube ↗</a>
      ${t.what_it_is?`<div class="trend-sub">What It Is</div><div class="trend-text">${t.what_it_is}</div>`:''}
      ${t.why_it_works?`<div class="trend-sub">Why It Works</div><div class="trend-text">${t.why_it_works}</div>`:''}
      ${t.how_to_implement?`<div class="trend-sub">How to Implement</div>${t.how_to_implement.map((s,i)=>`<div class="trend-step"><span class="trend-stepn">${i+1}.</span>${s}</div>`).join('')}`:''}
    </div>`).join('')}</div>`;
}

// ─── Main render dispatcher ────────────────────────────────
function render() {
  if (!DATA) return;
  const p = activePlatform;
  if (p === 'all')    { renderAllTab(); return; }
  if (p === 'trends') { renderTrends(); return; }
  renderPlatformTab(p);
}

// ─── Boot ──────────────────────────────────────────────────
async function init() {
  // Restore theme
  if (localStorage.getItem('gm-theme') === 'light') {
    document.body.classList.add('light-mode');
    document.getElementById('themeToggle').textContent = '☀️';
  }

  // Load data
  try {
    // To sell as a service later: swap this one line for your API URL
    const res = await fetch('analytics_data.json');
    DATA = await res.json();
    // Ensure new fields default to 0 for older JSON files
    DATA.posts.forEach(p => {
      if (p.three_sec_view_rate == null) p.three_sec_view_rate = 0;
      if (p.avg_view_duration_sec == null) p.avg_view_duration_sec = 0;
    });
    const d = new Date(DATA.generated_at);
    document.getElementById('lastUpdated').textContent =
      'Last updated ' + d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) +
      ' at ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    render();
  } catch(e) {
    document.getElementById('allContent').innerHTML =
      `<div class="gm-card" style="padding:32px;text-align:center">
        <div style="font-size:13px;color:var(--color-red)">Could not load analytics_data.json.<br>Run <code>python3 main.py</code> to generate data.</div>
      </div>`;
    document.getElementById('lastUpdated').textContent = 'Data not loaded';
  }

  // Platform tab clicks
  document.querySelectorAll('.ptab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.ptab').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      activePlatform = btn.dataset.tab;
      const panel = document.getElementById(`panel-${activePlatform}`);
      if (panel) panel.classList.add('active');
      render();
    });
  });

  // Date pill clicks
  const pillMap = { allPills:'all', ytPills:'YouTube', ttPills:'TikTok', igPills:'Instagram', fbPills:'Facebook' };
  Object.entries(pillMap).forEach(([pillsId, platform]) => {
    const el = document.getElementById(pillsId);
    if (!el) return;

    el.querySelectorAll('.dpill').forEach(pill => {
      pill.addEventListener('click', () => {
        el.querySelectorAll('.dpill').forEach(p=>p.classList.remove('active'));
        pill.classList.add('active');
        state.days[platform] = pill.dataset.d === 'all' ? 'all' : +pill.dataset.d;
        render();
      });
    });

    el.querySelectorAll('.vbtn').forEach(btn => {
      btn.addEventListener('click', () => {
        el.querySelectorAll('.vbtn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        if (platform !== 'all') {
          state.advanced[platform] = btn.dataset.m === 'advanced';
          render();
        }
      });
    });
  });

  // Theme toggle
  document.getElementById('themeToggle').addEventListener('click', () => {
    const light = document.body.classList.toggle('light-mode');
    document.getElementById('themeToggle').textContent = light ? '☀️' : '🌙';
    localStorage.setItem('gm-theme', light ? 'light' : 'dark');
    // Redraw charts for new theme colors
    PLATFORMS.forEach(p=>destroyChart(`chart-${p.toLowerCase()}`));
    PLATFORMS.forEach(p=>destroyChart(`mini-chart-${p.toLowerCase()}`));
    render();
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
