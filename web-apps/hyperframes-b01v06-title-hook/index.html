<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #00b140;
      }
      #root {
        width: 1080px;
        height: 1920px;
        position: relative;
        background: #00b140;
        overflow: hidden;
      }

      .eyebrow-line {
        position: absolute;
        top: 940px;
        left: 0;
        width: 100%;
        height: 100px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Montserrat', sans-serif;
        font-weight: 700;
        font-size: 58px;
        line-height: 1;
        letter-spacing: 0.18em;
        color: #ffffff;
        gap: 28px;
      }

      .headline-line {
        position: absolute;
        left: 0;
        width: 100%;
        height: 280px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Montserrat', sans-serif;
        font-weight: 900;
        font-size: 168px;
        line-height: 1;
        letter-spacing: -0.01em;
        white-space: nowrap;
        gap: 50px;
      }
      #line-1 { top: 1040px; }
      #line-2 { top: 1330px; }

      .head-text {
        background: linear-gradient(180deg, #FFCB7A 0%, #F28129 52%, #D86A0F 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow:
          0 4px 12px rgba(0, 0, 0, 0.14),
          0 12px 32px rgba(0, 0, 0, 0.11);
      }

      .w {
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="3"
      data-width="1080"
      data-height="1920"
    >
      <div class="eyebrow-line" data-layout-ignore>
        <span class="w">MY</span><span class="w">ONLY</span><span class="w">GOAL</span>
      </div>
      <div class="headline-line" id="line-1" data-layout-ignore>
        <span class="w head-text">MAKE</span><span class="w head-text">THE</span>
      </div>
      <div class="headline-line" id="line-2" data-layout-ignore>
        <span class="w head-text">TEAM</span>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Eyebrow words slide up first
      tl.from('.eyebrow-line .w',
        { yPercent: 100, opacity: 0, duration: 0.40, ease: 'power3.out', stagger: 0.10 },
        0.10
      );

      // Headline line 1: "MAKE THE"
      tl.from('#line-1 .w',
        { yPercent: 100, opacity: 0, duration: 0.45, ease: 'power3.out', stagger: 0.12 },
        0.50
      );

      // Headline line 2: "TEAM" pops with bounce
      tl.from('#line-2 .w',
        { yPercent: 100, opacity: 0, duration: 0.50, ease: 'back.out(1.7)' },
        0.85
      );

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
