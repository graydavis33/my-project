<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #00B140;
      }

      .net {
        position: absolute;
        inset: 0;
        width: 1920px;
        height: 1080px;
      }

      /* Camera wraps everything so we can shrink the whole diagram. */
      #camera { transform-origin: 960px 540px; }

      #brain-icon { opacity: 0; }       /* fades in via GSAP */

      .net line.branch-line,
      .net circle.topic-ring,
      .net circle.brain-ring {
        fill: none;
        stroke: #ffffff;
        stroke-linecap: round;
        opacity: 0;             /* hidden until each draw animation starts;
                                   prevents round-cap dot artifacts */
      }
      .net line.branch-line { stroke-width: 5; }
      .net circle.topic-ring { stroke-width: 5; }
      .net circle.brain-ring { stroke-width: 7; }

      .topic-icon { opacity: 0; }      /* fades in once its ring is drawn */

      .topic-label {
        font-family: "Montserrat", sans-serif;
        font-weight: 800;
        font-size: 38px;
        fill: #ffffff;
        text-anchor: middle;
        dominant-baseline: middle;
        letter-spacing: 3px;
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="9"
      data-width="1920"
      data-height="1080"
    >
      <svg class="net" viewBox="0 0 1920 1080" data-layout-ignore>
       <g id="camera">
        <!-- ──────────── 2D BRAIN INFOGRAPHIC ──────────── -->
        <g id="brain-icon" transform="translate(960 540) scale(1.7)">
          <path d="
            M 0 -135
            Q -30 -160, -65 -150
            Q -100 -160, -125 -130
            Q -160 -130, -170 -90
            Q -195 -75, -180 -35
            Q -200 -15, -185 25
            Q -195 60, -160 70
            Q -150 105, -110 110
            Q -90 135, -50 125
            Q -25 145, 0 130
            Q 25 145, 50 125
            Q 90 135, 110 110
            Q 150 105, 160 70
            Q 195 60, 185 25
            Q 200 -15, 180 -35
            Q 195 -75, 170 -90
            Q 160 -130, 125 -130
            Q 100 -160, 65 -150
            Q 30 -160, 0 -135
            Z" fill="#ffffff"/>
          <path d="M 0 -140 Q -10 -65, 0 0 Q 10 65, 0 132"
                fill="none" stroke="#00B140" stroke-width="6" stroke-linecap="round"/>
          <path d="M -150 -75 Q -118 -100, -85 -75 T -20 -65"
                fill="none" stroke="#00B140" stroke-width="4" stroke-linecap="round"/>
          <path d="M -170 -25 Q -130 -50, -90 -25 T -25 -15"
                fill="none" stroke="#00B140" stroke-width="4" stroke-linecap="round"/>
          <path d="M -170 25 Q -130 50, -90 25 T -25 35"
                fill="none" stroke="#00B140" stroke-width="4" stroke-linecap="round"/>
          <path d="M -140 75 Q -105 100, -70 75 T -15 85"
                fill="none" stroke="#00B140" stroke-width="4" stroke-linecap="round"/>
          <path d="M 150 -75 Q 118 -100, 85 -75 T 20 -65"
                fill="none" stroke="#00B140" stroke-width="4" stroke-linecap="round"/>
          <path d="M 170 -25 Q 130 -50, 90 -25 T 25 -15"
                fill="none" stroke="#00B140" stroke-width="4" stroke-linecap="round"/>
          <path d="M 170 25 Q 130 50, 90 25 T 25 35"
                fill="none" stroke="#00B140" stroke-width="4" stroke-linecap="round"/>
          <path d="M 140 75 Q 105 100, 70 75 T 15 85"
                fill="none" stroke="#00B140" stroke-width="4" stroke-linecap="round"/>
        </g>

        <!-- ──────────── BRAIN RING ──────────── -->
        <circle id="brain-ring" class="brain-ring"
                cx="960" cy="540" r="370"
                stroke-dasharray="2325" stroke-dashoffset="2325"
                transform="rotate(-90 960 540)"/>

        <!-- ──────────── BRANCHES — 6 directions ────────────
             Line: r=400 → r=540 (length 140).
             Topic ring: center at r=620, radius 70.
             Label: 100px below topic center.
             At full canvas scale these positions partially fall outside the
             1920×1080 frame — they scale into view as the camera shrinks. -->

        <!-- BRANCH 1 — top (-90°) — EMAIL -->
        <g id="b1">
          <line class="branch-line" x1="960" y1="140" x2="960" y2="0"
                stroke-dasharray="140" stroke-dashoffset="140"/>
          <circle class="topic-ring" cx="960" cy="-80" r="70"
                  stroke-dasharray="440" stroke-dashoffset="440"
                  transform="rotate(-90 960 -80)"/>
          <g class="topic-icon" transform="translate(960 -80)">
            <rect x="-32" y="-22" width="64" height="44" rx="4"
                  fill="none" stroke="#ffffff" stroke-width="4"
                  stroke-linejoin="round"/>
            <polyline points="-32,-16 0,6 32,-16"
                      fill="none" stroke="#ffffff" stroke-width="4"
                      stroke-linejoin="round" stroke-linecap="round"/>
          </g>
          <text class="topic-label" x="960" y="-180">EMAIL</text>
        </g>

        <!-- BRANCH 2 — upper-right (-30°) — MONEY -->
        <g id="b2">
          <line class="branch-line" x1="1306" y1="340" x2="1428" y2="270"
                stroke-dasharray="140" stroke-dashoffset="140"/>
          <circle class="topic-ring" cx="1497" cy="230" r="70"
                  stroke-dasharray="440" stroke-dashoffset="440"
                  transform="rotate(-90 1497 230)"/>
          <g class="topic-icon" transform="translate(1497 230)">
            <text x="0" y="0" text-anchor="middle" dominant-baseline="central"
                  fill="#ffffff" font-family="Montserrat, sans-serif"
                  font-weight="800" font-size="78">$</text>
          </g>
          <text class="topic-label" x="1497" y="330">MONEY</text>
        </g>

        <!-- BRANCH 3 — lower-right (30°) — CALLS -->
        <g id="b3">
          <line class="branch-line" x1="1306" y1="740" x2="1428" y2="810"
                stroke-dasharray="140" stroke-dashoffset="140"/>
          <circle class="topic-ring" cx="1497" cy="850" r="70"
                  stroke-dasharray="440" stroke-dashoffset="440"
                  transform="rotate(-90 1497 850)"/>
          <g class="topic-icon" transform="translate(1497 850)">
            <rect x="-22" y="-32" width="44" height="64" rx="6"
                  fill="none" stroke="#ffffff" stroke-width="4"/>
            <line x1="-8" y1="22" x2="8" y2="22"
                  stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
            <line x1="-12" y1="-22" x2="12" y2="-22"
                  stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
          </g>
          <text class="topic-label" x="1497" y="950">CALLS</text>
        </g>

        <!-- BRANCH 4 — bottom (90°) — SOCIAL -->
        <g id="b4">
          <line class="branch-line" x1="960" y1="940" x2="960" y2="1080"
                stroke-dasharray="140" stroke-dashoffset="140"/>
          <circle class="topic-ring" cx="960" cy="1160" r="70"
                  stroke-dasharray="440" stroke-dashoffset="440"
                  transform="rotate(-90 960 1160)"/>
          <g class="topic-icon" transform="translate(960 1160)">
            <path d="M -34 -22
                     Q -34 -30 -26 -30
                     L 26 -30
                     Q 34 -30 34 -22
                     L 34 8
                     Q 34 16 26 16
                     L 4 16
                     L -8 28
                     L -8 16
                     L -26 16
                     Q -34 16 -34 8 Z"
                  fill="#ffffff"/>
          </g>
          <text class="topic-label" x="960" y="1260">SOCIAL</text>
        </g>

        <!-- BRANCH 5 — lower-left (150°) — FAMILY -->
        <g id="b5">
          <line class="branch-line" x1="614" y1="740" x2="492" y2="810"
                stroke-dasharray="140" stroke-dashoffset="140"/>
          <circle class="topic-ring" cx="423" cy="850" r="70"
                  stroke-dasharray="440" stroke-dashoffset="440"
                  transform="rotate(-90 423 850)"/>
          <g class="topic-icon" transform="translate(423 850)">
            <path d="M -32 -2 L 0 -30 L 32 -2 L 32 28 L 10 28 L 10 8 L -10 8 L -10 28 L -32 28 Z"
                  fill="#ffffff"/>
          </g>
          <text class="topic-label" x="423" y="950">FAMILY</text>
        </g>

        <!-- BRANCH 6 — upper-left (210°) — WORK -->
        <g id="b6">
          <line class="branch-line" x1="614" y1="340" x2="492" y2="270"
                stroke-dasharray="140" stroke-dashoffset="140"/>
          <circle class="topic-ring" cx="423" cy="230" r="70"
                  stroke-dasharray="440" stroke-dashoffset="440"
                  transform="rotate(-90 423 230)"/>
          <g class="topic-icon" transform="translate(423 230)">
            <rect x="-30" y="-12" width="60" height="36" rx="4" fill="#ffffff"/>
            <path d="M -10 -12 L -10 -22 L 10 -22 L 10 -12"
                  fill="none" stroke="#ffffff" stroke-width="4"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </g>
          <text class="topic-label" x="423" y="330">WORK</text>
        </g>
       </g><!-- /#camera -->
      </svg>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // 0.3 → 1.3 s   Brain fades in, dead center, no movement.
      tl.to("#brain-icon",
        { opacity: 1, duration: 1.0, ease: "power1.inOut" },
        0.3
      );

      // 1.3 → 2.3 s   White ring draws clockwise around the brain.
      //                Snap opacity to 1 the moment the draw begins so the
      //                round-cap artifact doesn't show before then.
      tl.set("#brain-ring", { opacity: 1 }, 1.3);
      tl.to("#brain-ring",
        { strokeDashoffset: 0, duration: 1.0, ease: "power1.inOut" },
        1.3
      );

      // 2.5 → 7.0 s   Whole diagram shrinks from 1.0 → 0.62, anchored on
      //                the brain center (960, 540) via GSAP's svgOrigin.
      //                CSS transform-origin doesn't reliably apply to SVG
      //                <g> elements through GSAP, so svgOrigin is the fix.
      tl.fromTo("#camera",
        { scale: 1.0, svgOrigin: "960 540" },
        { scale: 0.62, svgOrigin: "960 540", duration: 4.5, ease: "power2.inOut" },
        2.5
      );

      // 3.0 → ~7.05 s  Six branches stagger out — line draws, then topic
      //                 ring draws, then icon fades, then label fades.
      const BR_START   = 3.0;
      const BR_STEP    = 0.60;
      const LINE_DUR   = 0.55;
      const RING_DUR   = 0.50;
      const ICON_DUR   = 0.30;
      const LABEL_DUR  = 0.25;

      for (let i = 1; i <= 6; i++) {
        const t0 = BR_START + (i - 1) * BR_STEP;

        // Snap each line/ring visible the instant its draw starts —
        // hides the round-cap dot that would otherwise sit at the start.
        tl.set(`#b${i} .branch-line`, { opacity: 1 }, t0);
        tl.to(`#b${i} .branch-line`,
          { strokeDashoffset: 0, duration: LINE_DUR, ease: "power2.out" },
          t0
        );
        tl.set(`#b${i} .topic-ring`, { opacity: 1 }, t0 + LINE_DUR);
        tl.to(`#b${i} .topic-ring`,
          { strokeDashoffset: 0, duration: RING_DUR, ease: "power2.inOut" },
          t0 + LINE_DUR
        );
        tl.to(`#b${i} .topic-icon`,
          { opacity: 1, duration: ICON_DUR, ease: "power1.out" },
          t0 + LINE_DUR + RING_DUR - 0.15
        );
        tl.to(`#b${i} .topic-label`,
          { opacity: 1, duration: LABEL_DUR, ease: "power1.out" },
          t0 + LINE_DUR + RING_DUR + 0.05
        );
      }

      // 7.0 → 9.0 s   Hold full diagram at 0.62× scale.

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
