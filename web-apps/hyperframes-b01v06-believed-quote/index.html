<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #00b140;
      }
      #root {
        width: 1080px;
        height: 1920px;
        position: relative;
        background: #00b140;
        overflow: hidden;
      }

      .headline-line {
        position: absolute;
        left: 0;
        width: 100%;
        height: 280px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Montserrat', sans-serif;
        font-weight: 900;
        font-size: 158px;
        line-height: 1;
        letter-spacing: -0.01em;
        white-space: nowrap;
        gap: 38px;
      }
      #line-1 { top: 1000px; }
      #line-2 { top: 1290px; }

      .head-text {
        background: linear-gradient(180deg, #FFCB7A 0%, #F28129 52%, #D86A0F 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow:
          0 4px 12px rgba(0, 0, 0, 0.14),
          0 12px 32px rgba(0, 0, 0, 0.11);
      }

      .white-text {
        color: #ffffff;
        text-shadow:
          0 4px 12px rgba(0, 0, 0, 0.16),
          0 12px 32px rgba(0, 0, 0, 0.13);
      }

      .w { display: inline-block; }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="4"
      data-width="1080"
      data-height="1920"
    >
      <div class="headline-line" id="line-1" data-layout-ignore>
        <span class="w head-text">BELIEVED</span><span class="w head-text">IN</span><span class="w head-text">ME</span>
      </div>
      <div class="headline-line" id="line-2" data-layout-ignore>
        <span class="w white-text">WHEN</span><span class="w white-text">I</span><span class="w white-text">DIDN&rsquo;T</span>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Line 1 — orange BELIEVED IN ME slides up word-by-word
      tl.from('#line-1 .w',
        { yPercent: 100, opacity: 0, duration: 0.45, ease: 'power3.out', stagger: 0.10 },
        0.15
      );

      // Line 2 — white WHEN I DIDN'T slides up
      tl.from('#line-2 .w',
        { yPercent: 100, opacity: 0, duration: 0.45, ease: 'power3.out', stagger: 0.10 },
        0.70
      );

      // Hold through 4.0s

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
