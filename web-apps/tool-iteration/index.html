<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tool Iteration — Graydient Media</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #05060a;
    --bg-1: #0a0c14;
    --bg-2: #0e1220;
    --panel: rgba(18, 22, 38, 0.55);
    --panel-hover: rgba(28, 34, 56, 0.7);
    --border: rgba(100, 160, 255, 0.12);
    --border-strong: rgba(100, 180, 255, 0.35);
    --text: #e7ecff;
    --text-dim: #8994b8;
    --text-faint: #4d5775;
    --accent: #4ea9ff;
    --accent-rgb: 78, 169, 255;
    --accent-glow: 0 0 40px rgba(78, 169, 255, 0.35);
    --success: #3ee089;
    --success-rgb: 62, 224, 137;
    --warn: #ffb347;
    --warn-rgb: 255, 179, 71;
    --muted: #485170;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg-0);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 400;
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 800px 500px at 15% 0%, rgba(78, 169, 255, 0.08), transparent 60%),
      radial-gradient(ellipse 600px 400px at 85% 100%, rgba(120, 90, 255, 0.06), transparent 60%),
      radial-gradient(ellipse 400px 300px at 50% 50%, rgba(62, 224, 137, 0.03), transparent 70%);
    z-index: -2;
    animation: driftBg 24s ease-in-out infinite alternate;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(100, 140, 200, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(100, 140, 200, 0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    z-index: -1;
    pointer-events: none;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  }

  @keyframes driftBg {
    0%   { transform: translate(0, 0); }
    100% { transform: translate(-30px, 30px); }
  }

  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 64px 32px 120px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 48px;
    flex-wrap: wrap;
    gap: 24px;
  }

  .header__title {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .header__title::before {
    content: '';
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent);
    animation: pulse 2.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.3); }
  }

  .header__subtitle {
    color: var(--text-dim);
    font-size: 15px;
    margin-top: 8px;
    font-weight: 400;
  }

  .header__meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-faint);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    text-align: right;
  }

  .header__meta strong {
    color: var(--text-dim);
    font-weight: 500;
  }

  /* Stats bar */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 48px;
  }

  .stat {
    background: var(--panel);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.3s;
  }

  .stat:hover {
    border-color: var(--border-strong);
    transform: translateY(-2px);
  }

  .stat__label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .stat__value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 44px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .stat--accent .stat__value { color: var(--accent); text-shadow: 0 0 24px rgba(var(--accent-rgb), 0.45); }
  .stat--success .stat__value { color: var(--success); text-shadow: 0 0 24px rgba(var(--success-rgb), 0.35); }
  .stat--warn .stat__value { color: var(--warn); text-shadow: 0 0 24px rgba(var(--warn-rgb), 0.35); }
  .stat--total .stat__value { color: var(--text); }

  /* Hero: currently iterating */
  .hero {
    background: var(--panel);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--border-strong);
    border-radius: 20px;
    padding: 36px;
    margin-bottom: 48px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 60px -20px rgba(0, 0, 0, 0.5), var(--accent-glow);
  }

  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(var(--accent-rgb), 0.08) 0%, transparent 60%);
    pointer-events: none;
  }

  .hero__top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 16px;
    position: relative;
  }

  .hero__eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .hero__eyebrow::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 1.8s ease-in-out infinite;
  }

  .hero__title {
    font-size: 40px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  .hero__approach {
    background: rgba(var(--accent-rgb), 0.1);
    border: 1px solid rgba(var(--accent-rgb), 0.3);
    color: var(--accent);
    padding: 8px 16px;
    border-radius: 100px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .hero__summary {
    color: var(--text-dim);
    font-size: 15px;
    max-width: 780px;
    margin-bottom: 32px;
    position: relative;
  }

  /* Steps */
  .steps {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    position: relative;
    margin-bottom: 24px;
  }

  .step {
    position: relative;
    padding-top: 40px;
    text-align: center;
  }

  .step::before {
    content: '';
    position: absolute;
    top: 13px;
    left: calc(50% + 18px);
    right: calc(-50% + 18px);
    height: 2px;
    background: var(--border);
  }

  .step:last-child::before { display: none; }

  .step__dot {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--bg-2);
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
    z-index: 1;
    transition: all 0.3s;
  }

  .step--complete .step__dot {
    background: var(--success);
    border-color: var(--success);
    color: var(--bg-0);
    box-shadow: 0 0 20px rgba(var(--success-rgb), 0.55);
  }

  .step--complete::before {
    background: var(--success);
  }

  .step--next .step__dot {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg-0);
    box-shadow: 0 0 24px rgba(var(--accent-rgb), 0.7);
    animation: pulseDot 1.8s ease-in-out infinite;
  }

  @keyframes pulseDot {
    0%, 100% { box-shadow: 0 0 24px rgba(var(--accent-rgb), 0.7); }
    50% { box-shadow: 0 0 40px rgba(var(--accent-rgb), 1); }
  }

  .step__name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-faint);
    font-weight: 500;
  }

  .step--complete .step__name { color: var(--success); }
  .step--next .step__name { color: var(--accent); }

  .hero__footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-faint);
    letter-spacing: 0.05em;
    position: relative;
    flex-wrap: wrap;
    gap: 12px;
  }

  .hero__footer a {
    color: var(--accent);
    text-decoration: none;
    transition: text-shadow 0.2s;
  }

  .hero__footer a:hover {
    text-shadow: 0 0 14px rgba(var(--accent-rgb), 0.7);
  }

  /* Section title */
  .section-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-faint);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Tool grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--panel);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    transition: all 0.25s;
    cursor: default;
    position: relative;
    overflow: hidden;
  }

  .card:hover {
    border-color: var(--border-strong);
    transform: translateY(-3px);
    background: var(--panel-hover);
  }

  .card--in-progress {
    border-color: rgba(var(--accent-rgb), 0.45);
    box-shadow: 0 0 0 1px rgba(var(--accent-rgb), 0.15), 0 12px 36px -8px rgba(var(--accent-rgb), 0.3);
  }

  .card--in-progress::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(var(--accent-rgb), 0.1) 0%, transparent 70%);
    pointer-events: none;
  }

  .card__head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
    gap: 10px;
    position: relative;
  }

  .card__id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.08em;
  }

  .card__name {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-top: 2px;
  }

  .card__status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-faint);
    font-weight: 500;
    white-space: nowrap;
  }

  .card__status::before {
    content: '';
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
  }

  .card__status--in-progress { color: var(--accent); }
  .card__status--in-progress::before {
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
    animation: pulse 1.6s ease-in-out infinite;
  }

  .card__status--done { color: var(--success); }
  .card__status--done::before {
    background: var(--success);
    box-shadow: 0 0 10px var(--success);
  }

  .card__meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    position: relative;
  }

  .card__approach {
    background: rgba(var(--accent-rgb), 0.12);
    color: var(--accent);
    padding: 3px 8px;
    border-radius: 100px;
    font-weight: 500;
    border: 1px solid rgba(var(--accent-rgb), 0.25);
  }

  .card__notes {
    color: var(--text-dim);
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    text-transform: none;
    letter-spacing: 0;
    margin-top: 10px;
    line-height: 1.45;
    position: relative;
  }

  .card__doc-link {
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-decoration: none;
    letter-spacing: 0.06em;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 8px;
    transition: text-shadow 0.2s;
    position: relative;
  }

  .card__doc-link:hover {
    text-shadow: 0 0 12px rgba(var(--accent-rgb), 0.7);
  }

  .card__doc-link::after {
    content: '→';
    transition: transform 0.2s;
  }

  .card__doc-link:hover::after {
    transform: translateX(3px);
  }

  /* Approach legend */
  .legend {
    margin-top: 48px;
    background: var(--panel);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px 28px;
  }

  .legend__title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 16px;
  }

  .legend__items {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
  }

  .legend__item {
    display: flex;
    gap: 12px;
  }

  .legend__badge {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: rgba(var(--accent-rgb), 0.12);
    border: 1px solid rgba(var(--accent-rgb), 0.3);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 13px;
  }

  .legend__text strong {
    font-size: 13px;
    font-weight: 600;
    display: block;
    margin-bottom: 2px;
  }

  .legend__text span {
    color: var(--text-dim);
    font-size: 12px;
  }

  /* Responsive */
  @media (max-width: 720px) {
    .container { padding: 32px 20px 80px; }
    .header__title { font-size: 28px; }
    .hero { padding: 24px; }
    .hero__title { font-size: 28px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .stat__value { font-size: 32px; }
    .steps { grid-template-columns: 1fr; gap: 8px; }
    .step { display: flex; align-items: center; text-align: left; padding-top: 0; padding-left: 40px; min-height: 28px; }
    .step::before { display: none; }
    .step__dot { top: 50%; transform: translate(0, -50%); left: 0; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <header class="header">
    <div>
      <h1 class="header__title">Tool Iteration</h1>
      <p class="header__subtitle">Applying the AI-workflow-video framework to 14 existing tools — one at a time.</p>
    </div>
    <div class="header__meta">
      <div>Graydient Media</div>
      <div><strong id="lastUpdated">—</strong></div>
    </div>
  </header>

  <!-- STATS -->
  <section class="stats">
    <div class="stat stat--accent">
      <div class="stat__label">In Progress</div>
      <div class="stat__value" id="statInProgress">0</div>
    </div>
    <div class="stat stat--success">
      <div class="stat__label">Complete</div>
      <div class="stat__value" id="statComplete">0</div>
    </div>
    <div class="stat stat--warn">
      <div class="stat__label">Pending</div>
      <div class="stat__value" id="statPending">0</div>
    </div>
    <div class="stat stat--total">
      <div class="stat__label">Total</div>
      <div class="stat__value" id="statTotal">0</div>
    </div>
  </section>

  <!-- HERO / currently iterating -->
  <section class="hero" id="hero" style="display:none;">
    <div class="hero__top">
      <div>
        <div class="hero__eyebrow">Currently Iterating</div>
        <h2 class="hero__title" id="heroTool">—</h2>
      </div>
      <div class="hero__approach" id="heroApproach">—</div>
    </div>
    <p class="hero__summary" id="heroSummary">—</p>

    <div class="steps" id="heroSteps"></div>

    <div class="hero__footer">
      <div>STARTED <span id="heroStarted">—</span></div>
      <div id="heroDocLinkWrap"></div>
    </div>
  </section>

  <!-- ALL TOOLS -->
  <div class="section-title">All Tools</div>
  <div class="grid" id="toolGrid"></div>

  <!-- LEGEND -->
  <section class="legend">
    <div class="legend__title">Approach Types</div>
    <div class="legend__items" id="legendItems"></div>
  </section>

</div>

<script>
async function load() {
  const data = await fetch('iteration-data.json').then(r => r.json());

  // Last updated
  document.getElementById('lastUpdated').textContent = data.lastUpdated || '—';

  // Stats
  const inProgress = data.tools.filter(t => t.status === 'in_progress').length;
  const complete = data.tools.filter(t => t.status === 'done').length;
  const pending = data.tools.filter(t => t.status === 'pending').length;
  document.getElementById('statInProgress').textContent = String(inProgress).padStart(2, '0');
  document.getElementById('statComplete').textContent = String(complete).padStart(2, '0');
  document.getElementById('statPending').textContent = String(pending).padStart(2, '0');
  document.getElementById('statTotal').textContent = String(data.tools.length).padStart(2, '0');

  // Hero (currently iterating)
  if (data.currentIteration) {
    const ci = data.currentIteration;
    document.getElementById('hero').style.display = 'block';
    document.getElementById('heroTool').textContent = ci.tool;
    document.getElementById('heroApproach').textContent = `Approach ${ci.approach} · ${ci.approachName}`;
    document.getElementById('heroSummary').textContent = ci.summary;
    document.getElementById('heroStarted').textContent = ci.startedDate || '—';

    const stepsEl = document.getElementById('heroSteps');
    stepsEl.innerHTML = ci.steps.map((s, i) => {
      const mark = s.status === 'complete' ? '✓' : String(i + 1).padStart(2, '0');
      return `
        <div class="step step--${s.status}">
          <div class="step__dot">${mark}</div>
          <div class="step__name">${s.name}</div>
        </div>`;
    }).join('');

    const docWrap = document.getElementById('heroDocLinkWrap');
    if (ci.designDoc) {
      docWrap.innerHTML = `<a href="${ci.designDoc}">DESIGN DOC →</a>`;
    }
  }

  // Tool grid
  const statusLabel = {
    pending: 'Pending',
    in_progress: 'In Progress',
    done: 'Done'
  };
  const statusClass = {
    pending: '',
    in_progress: 'card__status--in-progress',
    done: 'card__status--done'
  };

  document.getElementById('toolGrid').innerHTML = data.tools.map(t => {
    const isInProgress = t.status === 'in_progress';
    const approachBlock = t.approach
      ? `<span class="card__approach">Approach ${t.approach}</span>`
      : '<span style="color:var(--text-faint);font-size:10px;letter-spacing:.08em;">NO APPROACH YET</span>';
    const notes = t.notes
      ? `<div class="card__notes">${t.notes}</div>`
      : '';
    const docLink = t.designDoc
      ? `<a class="card__doc-link" href="${t.designDoc}">DESIGN </a>`
      : '';

    return `
      <div class="card ${isInProgress ? 'card--in-progress' : ''}">
        <div class="card__head">
          <div>
            <div class="card__id">#${String(t.id).padStart(2, '0')}</div>
            <div class="card__name">${t.name}</div>
          </div>
          <div class="card__status ${statusClass[t.status] || ''}">${statusLabel[t.status] || t.status}</div>
        </div>
        ${notes}
        ${docLink}
        <div class="card__meta">
          ${approachBlock}
        </div>
      </div>`;
  }).join('');

  // Legend
  const legendItems = Object.entries(data.approaches || {}).map(([key, v]) => `
    <div class="legend__item">
      <div class="legend__badge">${key}</div>
      <div class="legend__text">
        <strong>${v.name}</strong>
        <span>${v.description}</span>
      </div>
    </div>`).join('');
  document.getElementById('legendItems').innerHTML = legendItems;
}

load().catch(err => {
  console.error(err);
  document.querySelector('.container').innerHTML +=
    '<div style="color:var(--warn);margin-top:32px;font-family:JetBrains Mono,monospace;">Failed to load iteration-data.json — open this page via a local server (not file://) so fetch works.</div>';
});
</script>

</body>
</html>
