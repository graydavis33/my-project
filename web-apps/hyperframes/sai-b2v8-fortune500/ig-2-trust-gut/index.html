<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: transparent; font-family: "Montserrat", system-ui, sans-serif;
      }
      .scene { position: relative; width: 100%; height: 100%; overflow: hidden; }

      .kicker { position: absolute; left: 0; width: 100%; text-align: center; top: 660px;
        font-weight: 900; font-size: 74px; color: #F28129; text-transform: uppercase;
        letter-spacing: -0.02em; text-shadow: 0 5px 16px rgba(0,0,0,0.45);
        will-change: transform, opacity; }

      /* soft orange aura behind the figure */
      .aura { position: absolute; left: 390px; top: 940px; width: 300px; height: 300px;
        border-radius: 50%; opacity: 0; will-change: transform, opacity;
        background: radial-gradient(circle at 50% 50%, rgba(242,129,41,0.55) 0%, rgba(242,129,41,0.18) 42%, rgba(242,129,41,0) 70%); }

      .fig { position: absolute; left: 375px; top: 760px; width: 330px; height: 418px;
        will-change: transform, opacity; }
      .avatar { width: 100%; height: 100%; }
      .sil { fill: #fff; filter: drop-shadow(0 12px 20px rgba(0,0,0,0.38)); }
      .eye { fill: #3A2A20; }

      /* the gut core */
      .core { position: absolute; left: 490px; top: 1040px; width: 100px; height: 100px;
        border-radius: 50%; border: 2px solid #fff; opacity: 0; will-change: transform, opacity;
        background: radial-gradient(circle at 50% 38%, #FFE3C2 0%, #FFA858 40%, #F28129 70%, #D66416 100%);
        box-shadow: 0 0 30px 8px rgba(242,129,41,0.75), inset 0 2px 8px rgba(255,255,255,0.6); }

      .ring { position: absolute; left: 490px; top: 1040px; width: 100px; height: 100px;
        border-radius: 50%; border: 5px solid rgba(242,129,41,0.7); opacity: 0;
        will-change: transform, opacity; }
    </style>
  </head>
  <body>
    <div data-hf-id="hf-7lhe" id="root" data-composition-id="main" data-start="0" data-duration="4.4" data-width="1080" data-height="1920">
      <div data-hf-id="hf-6l01" id="scene" class="scene clip" data-start="0" data-duration="4.4" data-track-index="1">

        <div data-hf-id="hf-8caj" id="kicker" class="kicker">Trust Your Gut</div>

        <div data-hf-id="hf-zwku" id="aura" class="aura"></div>

        <div data-hf-id="hf-pd2y" id="fig" class="fig">
          <svg data-hf-id="hf-6t3v" class="avatar" viewBox="0 0 300 380">
            <use data-hf-id="hf-1d2x" href="#busthead" class="sil" />
            <circle data-hf-id="hf-tre4" class="eye" cx="124" cy="116" r="9" />
            <circle data-hf-id="hf-y3vn" class="eye" cx="176" cy="116" r="9" />
            <path data-hf-id="hf-ptad" d="M 132 168 Q 150 178 168 168" fill="none" stroke="#3A2A20" stroke-width="7" stroke-linecap="round" />
          </svg>
        </div>

        <div data-hf-id="hf-diuv" id="ring1" class="ring"></div>
        <div data-hf-id="hf-2nd8" id="ring2" class="ring"></div>
        <div data-hf-id="hf-5mmt" id="ring3" class="ring"></div>
        <div data-hf-id="hf-dtei" id="core" class="core"></div>

      </div>
    </div>

    <svg data-hf-id="hf-i1du" style="width:0;height:0;position:absolute" aria-hidden="true">
      <defs data-hf-id="hf-mh0t">
        <g data-hf-id="hf-6dpj" id="busthead">
          <path data-hf-id="hf-2til" d="M 60 380 Q 60 250 110 224 Q 132 210 150 209 Q 168 210 190 224 Q 240 250 240 380 Z" />
          <circle data-hf-id="hf-zesm" cx="150" cy="120" r="92" />
        </g>
      </defs>
    </svg>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        tl.from("#kicker", { y: -22, opacity: 0, duration: 0.5, ease: "power3.out" }, 0.1);
        tl.from("#fig", { scale: 0.78, opacity: 0, y: 34, duration: 0.55, ease: "back.out(1.5)", transformOrigin: "50% 100%" }, 0.28);

        // the gut ignites
        tl.to("#core", { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.9)", transformOrigin: "50% 50%" }, 0.95);
        tl.fromTo("#core", { scale: 1 }, { scale: 1.12, duration: 0.7, ease: "sine.inOut", yoyo: true, repeat: 4, transformOrigin: "50% 50%" }, 1.35);
        tl.to("#aura", { opacity: 1, duration: 0.6, ease: "power2.out" }, 1.0);
        tl.fromTo("#aura", { scale: 0.92 }, { scale: 1.06, duration: 0.9, ease: "sine.inOut", yoyo: true, repeat: 3, transformOrigin: "50% 50%" }, 1.5);

        // energy radiates outward (expanding rings)
        tl.fromTo("#ring1", { scale: 0.5, opacity: 0.75 }, { scale: 1.7, opacity: 0, duration: 1.2, ease: "power1.out", transformOrigin: "50% 50%", repeat: 2, immediateRender: false }, 1.2);
        tl.fromTo("#ring2", { scale: 0.5, opacity: 0.7 }, { scale: 2.0, opacity: 0, duration: 1.3, ease: "power1.out", transformOrigin: "50% 50%", repeat: 2, immediateRender: false }, 1.6);
        tl.fromTo("#ring3", { scale: 0.5, opacity: 0.6 }, { scale: 2.3, opacity: 0, duration: 1.4, ease: "power1.out", transformOrigin: "50% 50%", repeat: 1, immediateRender: false }, 2.1);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
