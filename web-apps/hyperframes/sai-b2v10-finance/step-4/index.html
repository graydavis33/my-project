<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: transparent; font-family: "Montserrat", system-ui, sans-serif;
      }
      .scene { position: relative; width: 100%; height: 100%; }
      .wrap { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }

      .glass {
        background:
          radial-gradient(ellipse 100% 60% at 50% 0%,
            rgba(255,220,180,0.55) 0%, rgba(255,200,150,0.20) 35%, rgba(255,180,120,0) 65%),
          linear-gradient(180deg, rgba(255,168,88,1) 0%, rgba(242,129,41,1) 35%, rgba(214,100,22,1) 100%);
        border: 2px solid #fff;
        box-shadow:
          inset 0 2px 0 rgba(255,240,215,0.55),
          inset 0 -3px 10px rgba(140,55,8,0.45),
          0 0 24px rgba(242,129,41,0.55),
          0 8px 22px rgba(0,0,0,0.30);
      }

      .card {
        width: 720px; border-radius: 52px;
        padding: 70px 60px 80px;
        display: flex; flex-direction: column; align-items: center;
        will-change: transform;
      }
      .badge {
        width: 112px; height: 112px; border-radius: 999px;
        background: #fff; color: #D66416;
        display: flex; align-items: center; justify-content: center;
        font-weight: 900; font-size: 62px; margin-bottom: 28px;
        box-shadow: 0 6px 14px rgba(0,0,0,0.28);
      }
      .kicker {
        font-weight: 800; font-size: 36px; letter-spacing: 0.16em; color: #fff;
        text-transform: uppercase; opacity: 0.94; text-align: center;
        text-shadow: 0 2px 6px rgba(0,0,0,0.35); margin-bottom: 22px;
      }
      .word {
        font-weight: 900; font-size: 104px; line-height: 1.0; color: #fff;
        text-transform: uppercase; letter-spacing: -0.015em; text-align: center;
        text-shadow: 0 4px 14px rgba(0,0,0,0.45);
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="3" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="3" data-track-index="1">
        <div class="wrap">
          <div id="card" class="card glass">
            <div id="badge" class="badge">4</div>
            <div id="kicker" class="kicker">Step Four</div>
            <div id="word" class="word">Rebuild</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        tl.from("#card",   { scale: 0.82, opacity: 0, duration: 0.60, ease: "back.out(1.5)" }, 0.12);
        tl.from("#badge",  { scale: 0, opacity: 0, duration: 0.50, ease: "back.out(1.8)" }, 0.32);
        tl.from("#kicker", { y: 26, opacity: 0, duration: 0.40, ease: "power2.out" }, 0.52);
        tl.from("#word",   { y: 44, opacity: 0, duration: 0.52, ease: "power3.out" }, 0.62);
        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
