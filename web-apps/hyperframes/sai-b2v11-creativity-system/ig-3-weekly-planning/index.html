<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: transparent; font-family: "Montserrat", system-ui, sans-serif;
      }
      .scene { position: relative; width: 100%; height: 100%; overflow: hidden; }
      .world { position: absolute; inset: 0; transform-origin: 0 0; will-change: transform; }

      .stage { position: absolute; left: 180px; top: 360px; width: 720px; height: 1200px;
        border-radius: 30px; will-change: transform, opacity;
        background: linear-gradient(112deg, #34302C 0%, #272320 55%, #1C1916 100%);
        box-shadow: inset 0 2px 6px rgba(255,255,255,0.08), 0 20px 48px rgba(0,0,0,0.5); }

      /* week header label */
      .head { position: absolute; left: 180px; width: 720px; text-align: center; top: 452px;
        font-weight: 900; font-size: 54px; letter-spacing: 0.02em; color: rgba(255,255,255,0.9);
        text-transform: uppercase; text-shadow: 0 4px 14px rgba(0,0,0,0.5);
        opacity: 0; will-change: transform, opacity; }

      /* day labels + week cells */
      .day { position: absolute; top: 596px; width: 80px; text-align: center; font-weight: 800;
        font-size: 28px; letter-spacing: 0.04em; color: rgba(255,255,255,0.55);
        text-transform: uppercase; opacity: 0; will-change: opacity; }
      .cell { position: absolute; top: 648px; width: 80px; height: 120px; border-radius: 14px;
        background: linear-gradient(150deg, #5C6470 0%, #3D434C 100%); opacity: 0;
        will-change: transform, opacity; box-shadow: 0 8px 16px rgba(0,0,0,0.3); }
      .cell .bl { position: absolute; left: 12px; height: 9px; border-radius: 5px;
        background: rgba(255,255,255,0.4); }
      .cell .bl.a { top: 18px; width: 50px; } .cell .bl.b { top: 36px; width: 40px; }
      .cell .bl.c { top: 84px; width: 46px; }

      /* the planning card (pen & paper) */
      .plan { position: absolute; left: 345px; top: 854px; width: 390px; height: 540px;
        border-radius: 24px; opacity: 0; will-change: transform, opacity;
        background: linear-gradient(150deg, #FFC68A 0%, #F28129 56%, #D66416 100%);
        border: 3px solid rgba(255,255,255,0.95);
        box-shadow: 0 0 30px rgba(242,129,41,0.5), 0 14px 30px rgba(0,0,0,0.35); }
      .plan .tab { position: absolute; left: 34px; top: 34px; width: 180px; height: 44px;
        border-radius: 12px; background: rgba(255,255,255,0.96); color: #D66416;
        font-weight: 900; font-size: 28px; letter-spacing: 0.02em; text-transform: uppercase;
        display: flex; align-items: center; justify-content: center; }
      .plan .line { position: absolute; left: 40px; height: 22px; border-radius: 11px;
        background: rgba(255,255,255,0.95); transform: scaleX(0); transform-origin: 0% 50%;
        will-change: transform; }
      .plan .line.l1 { top: 180px; width: 300px; }
      .plan .line.l2 { top: 250px; width: 270px; }
      .plan .line.l3 { top: 320px; width: 290px; }

      /* the pen */
      .pen { position: absolute; left: 0; top: 0; width: 150px; height: 34px; opacity: 0;
        will-change: transform, opacity; transform-origin: 0% 50%; }
      .pen .body { position: absolute; left: 22px; top: 4px; width: 120px; height: 26px;
        border-radius: 6px; background: linear-gradient(180deg, #3A3631, #1C1916);
        box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
      .pen .tip { position: absolute; left: 0; top: 6px; width: 0; height: 0;
        border-top: 11px solid transparent; border-bottom: 11px solid transparent;
        border-right: 24px solid #FFD9A8; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="6.8" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="6.8" data-track-index="1">
        <div id="world" class="world" data-layout-allow-overflow="">

          <div id="stage" class="stage"></div>
          <div id="head" class="head">Every Week</div>

          <!-- day labels + cells built/positioned inline (7 days) -->
          <div class="day" id="dl0" style="left:221px;">M</div>
          <div class="day" id="dl1" style="left:314px;">T</div>
          <div class="day" id="dl2" style="left:407px;">W</div>
          <div class="day" id="dl3" style="left:500px;">T</div>
          <div class="day" id="dl4" style="left:593px;">F</div>
          <div class="day" id="dl5" style="left:686px;">S</div>
          <div class="day" id="dl6" style="left:779px;">S</div>

          <div class="cell" id="c0" style="left:221px;"><div class="bl a"></div><div class="bl b"></div><div class="bl c"></div></div>
          <div class="cell" id="c1" style="left:314px;"><div class="bl a"></div><div class="bl b"></div><div class="bl c"></div></div>
          <div class="cell" id="c2" style="left:407px;"><div class="bl a"></div><div class="bl b"></div><div class="bl c"></div></div>
          <div class="cell" id="c3" style="left:500px;"><div class="bl a"></div><div class="bl b"></div><div class="bl c"></div></div>
          <div class="cell" id="c4" style="left:593px;"><div class="bl a"></div><div class="bl b"></div><div class="bl c"></div></div>
          <div class="cell" id="c5" style="left:686px;"><div class="bl a"></div><div class="bl b"></div><div class="bl c"></div></div>
          <div class="cell" id="c6" style="left:779px;"><div class="bl a"></div><div class="bl b"></div><div class="bl c"></div></div>

          <div class="plan" id="plan">
            <div class="tab">Plan</div>
            <div class="line l1"></div>
            <div class="line l2"></div>
            <div class="line l3"></div>
          </div>
          <div class="pen" id="pen"><div class="body"></div><div class="tip"></div></div>

        </div>
      </div>
    </div>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        gsap.set("#world", { x: 0, y: 0, scale: 1.0 });

        const days = ["#dl0","#dl1","#dl2","#dl3","#dl4","#dl5","#dl6"];
        const cells = ["#c0","#c1","#c2","#c3","#c4","#c5","#c6"];
        const chosen = "#c3";
        const others = cells.filter(c => c !== chosen);
        const otherDays = ["#dl0","#dl1","#dl2","#dl4","#dl5","#dl6"];

        // stage + header
        tl.from("#stage", { scaleY: 0.94, opacity: 0, duration: 0.5, ease: "back.out(1.2)", transformOrigin: "50% 100%" }, 0.1);
        tl.fromTo("#head", { opacity: 0, y: -18 }, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out", immediateRender: false }, 0.4);

        // day labels + busy week cells fill in (cluttered)
        tl.to(days, { opacity: 1, duration: 0.35, ease: "power1.out", stagger: 0.04 }, 0.7);
        tl.fromTo(cells, { opacity: 0, y: 24, scale: 0.85 }, { opacity: 1, y: 0, scale: 1, duration: 0.4, ease: "back.out(1.3)", stagger: 0.05, immediateRender: false }, 0.85);

        // ---- clear the calendar: dim every other day, lift the chosen one ----
        tl.to(others, { opacity: 0.18, scale: 0.9, duration: 0.5, ease: "power2.inOut" }, 2.0);
        tl.to(otherDays, { opacity: 0.12, duration: 0.4, ease: "power2.inOut" }, 2.0);
        tl.to("#head", { opacity: 0, y: -14, duration: 0.4, ease: "power2.in" }, 2.0);
        tl.to(chosen, { y: -24, scale: 1.08, duration: 0.4, ease: "back.out(1.4)" }, 2.1);

        // chosen cell flies to center and fades as the planning card grows from it
        tl.to(chosen, { x: 0, y: 360, scale: 0.5, opacity: 0, duration: 0.5, ease: "power2.in" }, 2.55);
        tl.fromTo("#plan", { opacity: 0, scale: 0.4, transformOrigin: "50% 50%" }, { opacity: 1, scale: 1, duration: 0.6, ease: "back.out(1.4)", immediateRender: false }, 2.8);
        // also fade the dimmed leftovers fully out so only the plan remains
        tl.to([...others, ...otherDays, "#dl3"], { opacity: 0, duration: 0.5, ease: "power2.in" }, 3.0);

        // ---- pen writes the lines (pen tracks the drawing tip of each line) ----
        // line geometry in world coords: card left 345, line left offset 40 -> x0 = 385; tops 180/250/320 -> y = 854+t
        const lineDefs = [
          { sel: "#plan .line.l1", x0: 385, w: 300, y: 854 + 180 + 11 },
          { sel: "#plan .line.l2", x0: 385, w: 270, y: 854 + 250 + 11 },
          { sel: "#plan .line.l3", x0: 385, w: 290, y: 854 + 320 + 11 },
        ];
        // pen appears at first line start
        tl.set("#pen", { x: lineDefs[0].x0 - 24, y: lineDefs[0].y - 17, rotation: 16 }, 3.4);
        tl.fromTo("#pen", { opacity: 0 }, { opacity: 1, duration: 0.2, ease: "power1.out", immediateRender: false }, 3.4);
        let t = 3.5;
        lineDefs.forEach((ld, i) => {
          // move pen to the line's start (instant hop between lines)
          if (i > 0) tl.set("#pen", { x: ld.x0 - 24, y: ld.y - 17 }, t);
          // draw the line + travel the pen across it together
          tl.to(ld.sel, { scaleX: 1, duration: 0.5, ease: "power1.inOut" }, t);
          tl.to("#pen", { x: ld.x0 + ld.w - 24, duration: 0.5, ease: "power1.inOut" }, t);
          t += 0.58;
        });
        // lift pen away
        tl.to("#pen", { opacity: 0, y: "-=24", duration: 0.35, ease: "power2.in" }, t);

        // idle float on the plan (no camera move)
        tl.to("#plan", { y: "-=8", duration: 0.9, ease: "sine.inOut", yoyo: true, repeat: 1 }, t + 0.3);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
