<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: transparent; font-family: "Montserrat", system-ui, sans-serif;
      }
      .scene { position: relative; width: 100%; height: 100%; overflow: hidden; }
      .world { position: absolute; inset: 0; transform-origin: 0 0; will-change: transform; }

      .stage { position: absolute; left: 180px; top: 360px; width: 720px; height: 1200px;
        border-radius: 30px; will-change: transform, opacity;
        background: linear-gradient(112deg, #34302C 0%, #272320 55%, #1C1916 100%);
        box-shadow: inset 0 2px 6px rgba(255,255,255,0.08), 0 20px 48px rgba(0,0,0,0.5); }

      /* the creativity spark (4-point star) */
      .spark { position: absolute; left: 460px; top: 512px; width: 160px; height: 160px;
        opacity: 0; will-change: transform, opacity;
        background: linear-gradient(150deg, #FFD9A8 0%, #F28129 58%, #D66416 100%);
        clip-path: polygon(50% 0%, 60% 40%, 100% 50%, 60% 60%, 50% 100%, 40% 60%, 0% 50%, 40% 40%);
        filter: drop-shadow(0 0 26px rgba(242,135,47,0.75)); }

      /* the plus operator */
      .op { position: absolute; left: 180px; width: 720px; text-align: center;
        font-weight: 900; font-size: 110px; line-height: 1; color: rgba(255,255,255,0.85);
        text-shadow: 0 4px 14px rgba(0,0,0,0.5); opacity: 0; will-change: transform, opacity; }
      #op-plus { top: 700px; }

      /* the structure grid (3x3) */
      .grid { position: absolute; left: 408px; top: 856px; width: 264px;
        display: grid; grid-template-columns: repeat(3, 80px); gap: 12px;
        opacity: 0; will-change: opacity, transform; }
      .gtile { position: relative; width: 80px; height: 80px; border-radius: 14px;
        background: linear-gradient(150deg, #5C6470 0%, #3D434C 100%); }
      .gtile .glit { position: absolute; inset: 0; border-radius: 14px; opacity: 0;
        will-change: opacity; pointer-events: none;
        background: linear-gradient(150deg, #FFC68A 0%, #F28129 55%, #D66416 100%);
        box-shadow: 0 0 16px rgba(242,129,41,0.7), inset 0 1px 3px rgba(255,255,255,0.45); }

      /* burst ring + win star at the merge moment */
      .ring { position: absolute; left: 470px; top: 918px; width: 140px; height: 140px;
        border-radius: 50%; border: 6px solid rgba(255,200,140,0.9); opacity: 0;
        will-change: transform, opacity; pointer-events: none; }
      .winstar { position: absolute; left: 492px; top: 720px; width: 96px; height: 96px; opacity: 0;
        will-change: transform, opacity;
        background: linear-gradient(150deg, #FFE3BE 0%, #F28129 60%, #D66416 100%);
        clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        filter: drop-shadow(0 0 22px rgba(242,135,47,0.8)); }

      /* payoff label */
      .payoff { position: absolute; left: 180px; width: 720px; text-align: center; top: 1300px;
        font-weight: 900; font-size: 78px; letter-spacing: -0.01em; line-height: 1;
        text-transform: uppercase; color: #F28129; opacity: 0; will-change: transform, opacity;
        text-shadow: 0 0 28px rgba(242,129,41,0.55), 0 4px 14px rgba(0,0,0,0.5); }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="6.4" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="6.4" data-track-index="1">
        <div id="world" class="world" data-layout-allow-overflow="">

          <div id="stage" class="stage"></div>

          <div id="spark" class="spark"></div>
          <div id="op-plus" class="op">+</div>

          <div id="grid" class="grid">
            <div class="gtile"><div class="glit"></div></div>
            <div class="gtile"><div class="glit"></div></div>
            <div class="gtile"><div class="glit"></div></div>
            <div class="gtile"><div class="glit"></div></div>
            <div class="gtile"><div class="glit"></div></div>
            <div class="gtile"><div class="glit"></div></div>
            <div class="gtile"><div class="glit"></div></div>
            <div class="gtile"><div class="glit"></div></div>
            <div class="gtile"><div class="glit"></div></div>
          </div>

          <div id="ring" class="ring"></div>
          <div id="winstar" class="winstar"></div>

          <div id="payoff" class="payoff">STANDOUT</div>

        </div>
      </div>
    </div>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        gsap.set("#world", { x: 0, y: 0, scale: 1.0 });

        const glits = gsap.utils.toArray("#grid .glit");

        // stage
        tl.from("#stage", { scaleY: 0.94, opacity: 0, duration: 0.5, ease: "back.out(1.2)", transformOrigin: "50% 100%" }, 0.1);

        // creativity spark drops in + spins
        tl.fromTo("#spark", { opacity: 0, scale: 0.4, y: -40, rotation: -90 }, { opacity: 1, scale: 1, y: 0, rotation: 0, duration: 0.6, ease: "back.out(1.5)", immediateRender: false }, 0.45);
        // spark idle twinkle
        tl.to("#spark", { scale: 1.08, duration: 0.7, ease: "sine.inOut", yoyo: true, repeat: 1, transformOrigin: "50% 50%" }, 1.1);

        // plus operator
        tl.fromTo("#op-plus", { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1, duration: 0.45, ease: "back.out(1.6)", immediateRender: false }, 1.0);

        // structure grid builds in, tile by tile (grey)
        tl.fromTo("#grid", { opacity: 1 }, { opacity: 1, duration: 0.01, immediateRender: false }, 1.3);
        tl.fromTo("#grid .gtile", { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.4)", stagger: { each: 0.05, grid: [3,3], from: "center" }, immediateRender: false }, 1.35);

        // ---- the merge: spark + plus fly into the grid center, grid ignites ----
        tl.to("#op-plus", { opacity: 0, scale: 0.6, duration: 0.3, ease: "power2.in" }, 2.5);
        // spark dives into the grid center (grid center ~ (540, 988); spark center starts ~ (540, 592))
        tl.to("#spark", { y: 396, scale: 0.25, opacity: 0, rotation: 180, duration: 0.55, ease: "power2.in" }, 2.55);

        // burst ring at impact
        tl.fromTo("#ring", { opacity: 0.9, scale: 0.3 }, { opacity: 0, scale: 1.9, duration: 0.6, ease: "power2.out", immediateRender: false }, 3.05);
        // grid ignites orange from center outward
        tl.to(glits, { opacity: 1, duration: 0.45, ease: "power2.out", stagger: { each: 0.05, grid: [3,3], from: "center" } }, 3.1);

        // win star pops above
        tl.fromTo("#winstar", { opacity: 0, scale: 0.3, y: 20 }, { opacity: 1, scale: 1, y: 0, duration: 0.55, ease: "back.out(1.7)", immediateRender: false }, 3.5);
        // payoff label
        tl.fromTo("#payoff", { opacity: 0, y: 24, scale: 0.85 }, { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: "back.out(1.5)", immediateRender: false }, 3.8);

        // camera settle on the result + idle glow
        tl.to("#world", { y: -36, scale: 1.05, duration: 1.3, ease: "power2.inOut" }, 3.7);
        tl.to(glits, { opacity: 0.82, duration: 0.7, ease: "sine.inOut", yoyo: true, repeat: 1 }, 5.0);
        tl.to("#winstar", { rotation: 8, duration: 0.8, ease: "sine.inOut", yoyo: true, repeat: 1, transformOrigin: "50% 50%" }, 5.0);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
