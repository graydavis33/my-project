<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: transparent; font-family: "Montserrat", system-ui, sans-serif;
      }
      .scene { position: relative; width: 100%; height: 100%; overflow: hidden; }
      .world { position: absolute; inset: 0; transform-origin: 0 0; will-change: transform; }

      /* dark stage card */
      .stage { position: absolute; left: 180px; top: 360px; width: 720px; height: 1200px;
        border-radius: 30px; will-change: transform, opacity;
        background: linear-gradient(112deg, #34302C 0%, #272320 55%, #1C1916 100%);
        box-shadow: inset 0 2px 6px rgba(255,255,255,0.08), 0 20px 48px rgba(0,0,0,0.5); }

      /* identity header */
      .head { position: absolute; left: 180px; width: 720px; text-align: center; top: 432px;
        font-weight: 900; font-size: 84px; letter-spacing: -0.02em; line-height: 1; color: #FFFFFF;
        text-shadow: 0 6px 16px rgba(0,0,0,0.5); font-variant-numeric: tabular-nums;
        opacity: 0; will-change: transform, opacity; }
      .head b { color: #F28129; text-shadow: 0 0 24px rgba(242,129,41,0.55), 0 6px 16px rgba(0,0,0,0.5); }
      .headsub { position: absolute; left: 180px; width: 720px; text-align: center; top: 536px;
        font-weight: 800; font-size: 30px; letter-spacing: 0.16em; color: rgba(255,255,255,0.6);
        text-transform: uppercase; opacity: 0; will-change: opacity; }

      /* the 10 idea-bulbs */
      .grid { position: absolute; left: 213px; top: 640px; width: 654px;
        display: grid; grid-template-columns: repeat(5, 110px); grid-auto-rows: 150px;
        column-gap: 26px; row-gap: 40px; }
      .bulb { position: relative; width: 110px; height: 150px;
        opacity: 0; will-change: opacity, transform; transform-origin: 50% 90%; }
      .bulb .halo { position: absolute; left: 50%; top: 56px; width: 150px; height: 150px;
        transform: translate(-50%, -50%); border-radius: 50%; opacity: 0; pointer-events: none;
        will-change: opacity; filter: blur(4px);
        background: radial-gradient(circle, rgba(242,135,47,0.65) 0%, rgba(242,135,47,0.0) 68%); }
      .bulb .ico { position: absolute; left: 50%; top: 0; transform: translateX(-50%);
        width: 92px; height: 130px; }
      .bulb .ico.lit { opacity: 0; will-change: opacity;
        filter: drop-shadow(0 0 10px rgba(242,135,47,0.7)); }
      .bulb .x { position: absolute; left: 50%; top: 30px; transform: translate(-50%,-50%) scale(0.6);
        font-weight: 900; font-size: 52px; color: #FF5A5A; opacity: 0; will-change: opacity, transform;
        text-shadow: 0 2px 8px rgba(0,0,0,0.5); }

      /* weekly cadence strip (revealed in beat 2) */
      .week { position: absolute; left: 259px; top: 1336px; width: 562px;
        display: grid; grid-template-columns: repeat(7, 70px); column-gap: 12px; opacity: 0;
        will-change: opacity; }
      .seg { position: relative; height: 20px; border-radius: 10px;
        background: linear-gradient(150deg, #5C6470 0%, #3D434C 100%); }
      .seg .litseg { position: absolute; inset: 0; border-radius: 10px; opacity: 0;
        will-change: opacity, transform; transform-origin: 50% 50%;
        background: linear-gradient(150deg, #FFC68A 0%, #F28129 55%, #D66416 100%);
        box-shadow: 0 0 16px rgba(242,129,41,0.8), inset 0 1px 2px rgba(255,255,255,0.45); }

      /* bottom status labels (swap once) */
      .status { position: absolute; left: 180px; width: 720px; text-align: center; top: 1452px;
        font-weight: 900; font-size: 56px; letter-spacing: -0.01em; line-height: 1.05;
        text-transform: uppercase; text-shadow: 0 4px 14px rgba(0,0,0,0.5);
        opacity: 0; will-change: transform, opacity; }
      #stat-fail { color: rgba(255,255,255,0.85); }
      #stat-fail b { color: #FF6B6B; }
      #stat-test { color: #F28129; text-shadow: 0 0 26px rgba(242,129,41,0.55), 0 4px 14px rgba(0,0,0,0.5); }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="8" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="8" data-track-index="1">
        <div id="world" class="world" data-layout-allow-overflow="">

          <div id="stage" class="stage"></div>
          <div id="head" class="head"><b>9</b> OF <b>10</b> FAIL</div>
          <div id="headsub" class="headsub">every idea you have</div>

          <div id="grid" class="grid"></div>

          <div id="week" class="week"></div>

          <div id="stat-fail" class="status"><b>9/10</b> FAIL MISERABLY</div>
          <div id="stat-test" class="status">TEST 1 EVERY WEEK</div>

        </div>
      </div>
    </div>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};

        // ---- bulb SVG (grey outline + orange-fill lit overlay) ----
        const GLASS = "M46 8 C26 8 13 22 13 41 C13 55 22 64 30 72 L30 88 L62 88 L62 72 C70 64 79 55 79 41 C79 22 66 8 46 8 Z";
        const B1 = "M32 96 L60 96"; const B2 = "M34 106 L58 106"; const B3 = "M38 116 L54 116";
        function bulbSVG(lit) {
          const stroke = lit ? "#FFFFFF" : "#8A93A0";
          const fill = lit
            ? "url(#bg" + (lit ? "L" : "") + ")"
            : "rgba(138,147,160,0.14)";
          return (
            '<svg class="ico ' + (lit ? "lit" : "base") + '" viewBox="0 0 92 130" fill="none" xmlns="http://www.w3.org/2000/svg">' +
            (lit ? '<defs><linearGradient id="bgL" x1="0" y1="0" x2="1" y2="1">' +
                   '<stop offset="0" stop-color="#FFC68A"/><stop offset="0.55" stop-color="#F28129"/><stop offset="1" stop-color="#D66416"/>' +
                   '</linearGradient></defs>' : '') +
            '<path d="' + GLASS + '" fill="' + fill + '" stroke="' + stroke + '" stroke-width="6" stroke-linejoin="round"/>' +
            '<path d="' + B1 + '" stroke="' + stroke + '" stroke-width="6" stroke-linecap="round"/>' +
            '<path d="' + B2 + '" stroke="' + stroke + '" stroke-width="6" stroke-linecap="round"/>' +
            '<path d="' + B3 + '" stroke="' + stroke + '" stroke-width="6" stroke-linecap="round"/>' +
            '</svg>'
          );
        }

        // ---- build 10 bulbs deterministically ----
        const N = 10, SURVIVOR = 7; // 0-indexed keeper (row2, col3)
        const gridEl = document.getElementById("grid");
        const bulbs = [], halos = [], litIcos = [], xs = [];
        for (let i = 0; i < N; i++) {
          const b = document.createElement("div");
          b.className = "bulb" + (i === SURVIVOR ? " keeper" : "");
          b.innerHTML =
            '<div class="halo"></div>' + bulbSVG(false) + bulbSVG(true) +
            '<div class="x">✕</div>';
          gridEl.appendChild(b);
          bulbs.push(b);
          halos.push(b.querySelector(".halo"));
          litIcos.push(b.querySelector(".ico.lit"));
          xs.push(b.querySelector(".x"));
        }
        const dudIdx = [];
        for (let i = 0; i < N; i++) if (i !== SURVIVOR) dudIdx.push(i);
        const dudBulbs = dudIdx.map(i => bulbs[i]);
        const dudLit = dudIdx.map(i => litIcos[i]);
        const dudHalo = dudIdx.map(i => halos[i]);
        const dudX = dudIdx.map(i => xs[i]);

        // ---- weekly strip: 7 segments, the 3rd ignites (the test day) ----
        const weekEl = document.getElementById("week");
        const segLits = [];
        const TESTDAY = 2;
        for (let d = 0; d < 7; d++) {
          const s = document.createElement("div");
          s.className = "seg";
          const l = document.createElement("div");
          l.className = "litseg";
          s.appendChild(l);
          weekEl.appendChild(s);
          segLits.push(l);
        }

        const tl = gsap.timeline({ paused: true });
        gsap.set("#world", { x: 0, y: 0, scale: 1.0 });

        // stage + header establish
        tl.from("#stage", { scaleY: 0.94, opacity: 0, duration: 0.5, ease: "back.out(1.2)", transformOrigin: "50% 100%" }, 0.1);
        tl.fromTo("#head", { opacity: 0, y: -18 }, { opacity: 1, y: 0, duration: 0.55, ease: "power3.out", immediateRender: false }, 0.4);
        tl.fromTo("#headsub", { opacity: 0 }, { opacity: 1, duration: 0.4, ease: "power1.out", immediateRender: false }, 0.7);

        // all 10 bulbs fade in (grey)
        tl.to(bulbs, { opacity: 1, duration: 0.4, ease: "power2.out", stagger: 0.05 }, 0.7);

        // the hopeful spark — every idea lights up orange
        tl.to(litIcos, { opacity: 1, duration: 0.4, ease: "power2.out", stagger: 0.04 }, 1.5);
        tl.to(halos, { opacity: 1, duration: 0.4, ease: "power2.out", stagger: 0.04 }, 1.5);

        // beat... then 9 fail: lights die, bulbs droop, red X appears
        tl.to(dudLit, { opacity: 0, duration: 0.45, ease: "power2.in", stagger: 0.05 }, 2.5);
        tl.to(dudHalo, { opacity: 0, duration: 0.45, ease: "power2.in", stagger: 0.05 }, 2.5);
        tl.to(dudBulbs, { y: 10, rotation: -3, opacity: 0.5, duration: 0.5, ease: "power2.in", stagger: 0.05 }, 2.55);
        tl.fromTo(dudX, { opacity: 0, scale: 0.6 }, { opacity: 1, scale: 1, duration: 0.35, ease: "back.out(2)", stagger: 0.05, immediateRender: false }, 2.7);

        // the survivor holds + pulses (the eye lands on it)
        tl.to(halos[SURVIVOR], { opacity: 0.95, duration: 0.55, ease: "sine.inOut", yoyo: true, repeat: 1 }, 3.1);
        tl.to([litIcos[SURVIVOR]], { scale: 1.08, duration: 0.55, ease: "sine.inOut", yoyo: true, repeat: 1, transformOrigin: "50% 60%" }, 3.1);

        // status beat 1: 9/10 FAIL MISERABLY
        tl.fromTo("#stat-fail", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out", immediateRender: false }, 3.0);

        // ---- resolution: swap to TEST 1 EVERY WEEK + the cadence strip ----
        tl.to("#stat-fail", { opacity: 0, y: -16, duration: 0.35, ease: "power2.in" }, 4.7);
        tl.fromTo("#week", { opacity: 0 }, { opacity: 1, duration: 0.4, ease: "power2.out", immediateRender: false }, 4.9);
        tl.fromTo("#stat-test", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out", immediateRender: false }, 5.0);
        // the one test-day segment ignites and pulses
        tl.to(segLits[TESTDAY], { opacity: 1, duration: 0.4, ease: "power2.out" }, 5.3);
        tl.fromTo(segLits[TESTDAY], { scale: 0.9 }, { scale: 1.06, duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: 3, transformOrigin: "50% 50%", immediateRender: false }, 5.6);

        // final survivor glow breath
        tl.to(halos[SURVIVOR], { opacity: 0.9, duration: 0.7, ease: "sine.inOut", yoyo: true, repeat: 1 }, 6.4);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
