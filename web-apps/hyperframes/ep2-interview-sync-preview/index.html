<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EP2 Interview Sync Preview</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 20px;
        }
        .header {
            margin-bottom: 30px;
        }
        h1 { font-size: 28px; margin-bottom: 8px; }
        .sync-info {
            font-size: 14px;
            color: #aaa;
            margin: 10px 0;
        }
        .sync-info strong { color: #f28129; }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .cam {
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
        }

        .cam-label {
            background: #1a1a1a;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            border-bottom: 1px solid #333;
        }

        video {
            width: 100%;
            height: auto;
            display: block;
            background: #000;
        }

        .controls {
            padding: 20px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            margin-top: 20px;
        }

        .control-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            color: #aaa;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #333;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #f28129;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #f28129;
            cursor: pointer;
            border: none;
        }

        button {
            background: #f28129;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
        }

        button:hover { background: #f0a845; }

        .status {
            font-size: 12px;
            color: #aaa;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>EP2 Interview Sync Preview</h1>
        <div class="sync-info">
            <strong>Sync Offset:</strong> B-cam started 13.56 seconds after A-cam
        </div>
        <div class="sync-info">
            Play both videos together to verify sync is correct.
        </div>
    </div>

    <div class="container">
        <div class="cam">
            <div class="cam-label">A-CAM (Primary)</div>
            <video id="videoA" controls>
                <source src="file:///D:/Sai/08_AI_EDITS/long-form/EP2-Interview-Pair1/PREVIEW/A-cam_preview.mp4" type="video/mp4">
            </video>
        </div>

        <div class="cam">
            <div class="cam-label">B-CAM (Secondary)</div>
            <video id="videoB" controls>
                <source src="file:///D:/Sai/08_AI_EDITS/long-form/EP2-Interview-Pair1/PREVIEW/B-cam_preview.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Sync Scrubber</label>
            <input type="range" id="scrubber" min="0" max="60" step="0.1" value="0">
            <div class="status">
                <span id="time">0:00</span> / 60s
            </div>
        </div>

        <div style="margin-top: 20px;">
            <button onclick="playBoth()">Play Both</button>
            <button onclick="pauseBoth()">Pause Both</button>
            <button onclick="resetBoth()">Reset</button>
        </div>
    </div>

    <script>
        const videoA = document.getElementById('videoA');
        const videoB = document.getElementById('videoB');
        const scrubber = document.getElementById('scrubber');
        const timeDisplay = document.getElementById('time');

        // Sync playback
        videoA.addEventListener('play', () => videoB.play());
        videoB.addEventListener('play', () => videoA.play());
        videoA.addEventListener('pause', () => videoB.pause());
        videoB.addEventListener('pause', () => videoA.pause());

        // Update scrubber when videos play
        videoA.addEventListener('timeupdate', () => {
            scrubber.value = videoA.currentTime;
            updateTimeDisplay();
        });

        // Scrubber control
        scrubber.addEventListener('input', () => {
            videoA.currentTime = parseFloat(scrubber.value);
            videoB.currentTime = parseFloat(scrubber.value);
            updateTimeDisplay();
        });

        function updateTimeDisplay() {
            const time = parseFloat(scrubber.value);
            const min = Math.floor(time / 60);
            const sec = (time % 60).toFixed(1);
            timeDisplay.textContent = `${min}:${sec.padStart(4, '0')}`;
        }

        function playBoth() {
            videoA.play();
            videoB.play();
        }

        function pauseBoth() {
            videoA.pause();
            videoB.pause();
        }

        function resetBoth() {
            videoA.currentTime = 0;
            videoB.currentTime = 0;
            scrubber.value = 0;
            updateTimeDisplay();
        }
    </script>
</body>
</html>
