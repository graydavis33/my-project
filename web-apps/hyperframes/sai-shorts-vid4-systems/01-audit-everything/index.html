<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #00FF00;
        font-family: "Montserrat", system-ui, sans-serif;
      }

      .scene {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 280px 80px 0 80px;
      }

      /* Step pill — small orange-glass capsule above title */
      .step-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 16px 44px;
        background:
          radial-gradient(
            ellipse 100% 60% at 50% 0%,
            rgba(255, 220, 180, 0.55) 0%,
            rgba(255, 200, 150, 0.20) 35%,
            rgba(255, 180, 120, 0.0) 65%
          ),
          linear-gradient(
            180deg,
            rgba(255, 168, 88, 1) 0%,
            rgba(242, 129, 41, 1) 35%,
            rgba(214, 100, 22, 1) 100%
          );
        border: 2px solid #ffffff;
        border-radius: 999px;
        box-shadow:
          inset 0 2px 0 rgba(255, 240, 215, 0.55),
          inset 0 -3px 10px rgba(140, 55, 8, 0.45),
          0 0 24px rgba(242, 129, 41, 0.55),
          0 6px 18px rgba(0, 0, 0, 0.28);
        margin-bottom: 36px;
      }
      .step-pill-text {
        font-weight: 800;
        font-size: 36px;
        letter-spacing: 0.10em;
        color: #ffffff;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
      }

      .title {
        font-weight: 800;
        font-size: 92px;
        line-height: 1.05;
        letter-spacing: 0.03em;
        color: #ffffff;
        text-align: center;
        text-transform: uppercase;
        text-shadow: 0 3px 10px rgba(0, 0, 0, 0.35);
        margin-bottom: 90px;
      }

      /* Task grid — 4 columns × 2 rows of white-stroke cards */
      .grid {
        position: relative;
        display: grid;
        grid-template-columns: repeat(4, 180px);
        grid-template-rows: repeat(2, 180px);
        gap: 32px;
        z-index: 1;
      }
      .task {
        width: 180px;
        height: 180px;
        border: 4px solid #ffffff;
        border-radius: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        box-shadow: 0 0 0 rgba(242, 129, 41, 0.0);
      }
      .task svg { width: 96px; height: 96px; }

      /* Magnifying glass — sweeps diagonally L-R top-to-bottom */
      .magnifier {
        position: absolute;
        left: 0;
        top: 0;
        width: 220px;
        height: 220px;
        pointer-events: none;
        z-index: 2;
        opacity: 0;
      }
      .magnifier svg { width: 100%; height: 100%; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="5" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="5" data-track-index="1">
        <div id="step-pill" class="step-pill">
          <div class="step-pill-text">STEP 1</div>
        </div>
        <div id="title" class="title">AUDIT<br>EVERYTHING</div>

        <div id="grid" class="grid">
          <!-- 8 task cards: email, message, code, phone, doc, calendar, gear, clock -->
          <div class="task" id="t0" data-layout-allow-overflow>
            <svg viewBox="0 0 96 96" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
              <rect x="14" y="24" width="68" height="48" rx="6" />
              <path d="M14 30 L48 56 L82 30" />
            </svg>
          </div>
          <div class="task" id="t1" data-layout-allow-overflow>
            <svg viewBox="0 0 96 96" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 26 H82 V60 H42 L26 76 V60 H14 Z" />
              <circle cx="34" cy="43" r="3" fill="#ffffff" stroke="none" />
              <circle cx="48" cy="43" r="3" fill="#ffffff" stroke="none" />
              <circle cx="62" cy="43" r="3" fill="#ffffff" stroke="none" />
            </svg>
          </div>
          <div class="task" id="t2" data-layout-allow-overflow>
            <svg viewBox="0 0 96 96" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="30 30 14 48 30 66" />
              <polyline points="66 30 82 48 66 66" />
              <line x1="56" y1="22" x2="40" y2="74" />
            </svg>
          </div>
          <div class="task" id="t3" data-layout-allow-overflow>
            <svg viewBox="0 0 96 96" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M28 12 H38 L46 28 L36 38 C40 50 46 56 58 60 L68 50 L84 58 V68 C84 76 78 82 70 82 C40 80 16 56 14 26 C14 18 20 12 28 12 Z" />
            </svg>
          </div>
          <div class="task" id="t4" data-layout-allow-overflow>
            <svg viewBox="0 0 96 96" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 14 H58 L74 30 V82 H22 Z" />
              <polyline points="58 14 58 30 74 30" />
              <line x1="32" y1="46" x2="64" y2="46" />
              <line x1="32" y1="58" x2="64" y2="58" />
              <line x1="32" y1="70" x2="54" y2="70" />
            </svg>
          </div>
          <div class="task" id="t5" data-layout-allow-overflow>
            <svg viewBox="0 0 96 96" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
              <rect x="14" y="20" width="68" height="62" rx="6" />
              <line x1="14" y1="36" x2="82" y2="36" />
              <line x1="30" y1="12" x2="30" y2="26" />
              <line x1="66" y1="12" x2="66" y2="26" />
              <rect x="32" y="50" width="14" height="14" rx="2" fill="#ffffff" stroke="none" />
            </svg>
          </div>
          <div class="task" id="t6" data-layout-allow-overflow>
            <svg viewBox="0 0 96 96" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="48" cy="48" r="14" />
              <path d="M48 6 V18 M48 78 V90 M6 48 H18 M78 48 H90 M18 18 L26 26 M70 70 L78 78 M18 78 L26 70 M70 26 L78 18" />
            </svg>
          </div>
          <div class="task" id="t7" data-layout-allow-overflow>
            <svg viewBox="0 0 96 96" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="48" cy="48" r="34" />
              <polyline points="48 26 48 48 64 58" />
            </svg>
          </div>
        </div>

        <!-- Magnifying glass — sweeps diagonally across the grid -->
        <div id="magnifier" class="magnifier" data-layout-allow-overflow>
          <svg viewBox="0 0 220 220" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="86" cy="86" r="62" />
            <line x1="132" y1="132" x2="190" y2="190" />
          </svg>
        </div>
      </div>
    </div>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // Pre-state: cards invisible, magnifier hidden.
        // Cards animated via tl.from below — no exit, transition (final scene fade) at end.

        // 1. Step pill bounces in
        tl.from("#step-pill", { y: 80, opacity: 0, duration: 0.55, ease: "back.out(1.7)" }, 0.20);

        // 2. Title slides up
        tl.from("#title", { y: 50, opacity: 0, duration: 0.55, ease: "power3.out" }, 0.45);

        // 3. Task cards pop in with stagger (back.out, scale 0.7 -> 1)
        tl.from(
          ".task",
          { scale: 0.6, opacity: 0, duration: 0.45, ease: "back.out(1.8)", stagger: 0.10 },
          0.85
        );

        // 4. Magnifying glass appears at top-left of grid and sweeps diagonally to bottom-right.
        // Grid is at (132, 870) approx. Width 816, height 392.
        // Magnifier 220px — center the lens (at viewport 86,86 in svg) over each card as it sweeps.
        // Start lens-center at row1-col1 (~222, 960) -> end at row2-col4 (~858, 1140).
        // Magnifier element offset so its lens (svg 86,86) aligns to that point: subtract (86, 86).
        const startX = 222 - 86;  // 136
        const startY = 960 - 86;  // 874
        const endX = 858 - 86;    // 772
        const endY = 1140 - 86;   // 1054

        tl.set("#magnifier", { left: startX, top: startY, opacity: 0 }, 0);
        tl.to("#magnifier", { opacity: 1, duration: 0.25, ease: "power2.out" }, 2.40);
        tl.to(
          "#magnifier",
          { left: endX, top: endY, duration: 2.10, ease: "power1.inOut" },
          2.55
        );

        // 5. Task glow pulses synced to magnifier hitting each card.
        // Magnifier sweeps from (222, 960) to (858, 1140) over 2.10s starting at 2.55.
        // Linear-ish, with card centers laid out as a 4x2 grid we can compute per-card hit times.
        // Row 1 y = 960. Row 2 y = 1172. Cards x: 222, 434, 646, 858.
        // We'll approximate sweep order: row1 col1 -> col2 -> col3 -> col4 -> row2 col1 -> col2 -> col3 -> col4
        // by linearly mapping position-along-path to time.
        const hitTimes = [0.10, 0.30, 0.55, 0.80, 1.05, 1.30, 1.55, 1.80]; // offsets from sweep start
        const sweepStart = 2.55;
        const cardIds = ["#t0", "#t1", "#t2", "#t3", "#t4", "#t5", "#t6", "#t7"];
        cardIds.forEach(function (id, i) {
          const t = sweepStart + hitTimes[i];
          // Pulse: box-shadow orange glow + brief border color shift via outline
          tl.to(
            id,
            {
              boxShadow: "0 0 36px rgba(242, 129, 41, 0.95), 0 0 80px rgba(242, 129, 41, 0.55)",
              borderColor: "#F28129",
              duration: 0.15,
              ease: "power2.out",
              overwrite: "auto",
            },
            t
          );
          tl.to(
            id,
            {
              boxShadow: "0 0 0px rgba(242, 129, 41, 0.0), 0 0 0px rgba(242, 129, 41, 0.0)",
              borderColor: "#ffffff",
              duration: 0.30,
              ease: "power2.in",
              overwrite: "auto",
            },
            t + 0.18
          );
        });

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
