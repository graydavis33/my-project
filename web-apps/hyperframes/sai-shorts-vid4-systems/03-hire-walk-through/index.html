<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #00FF00;
        font-family: "Montserrat", system-ui, sans-serif;
      }

      .scene {
        position: relative;
        width: 100%;
        height: 100%;
        padding: 280px 80px 0 80px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* Step pill */
      .step-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 16px 44px;
        background:
          radial-gradient(
            ellipse 100% 60% at 50% 0%,
            rgba(255, 220, 180, 0.55) 0%,
            rgba(255, 200, 150, 0.20) 35%,
            rgba(255, 180, 120, 0.0) 65%
          ),
          linear-gradient(
            180deg,
            rgba(255, 168, 88, 1) 0%,
            rgba(242, 129, 41, 1) 35%,
            rgba(214, 100, 22, 1) 100%
          );
        border: 2px solid #ffffff;
        border-radius: 999px;
        box-shadow:
          inset 0 2px 0 rgba(255, 240, 215, 0.55),
          inset 0 -3px 10px rgba(140, 55, 8, 0.45),
          0 0 24px rgba(242, 129, 41, 0.55),
          0 6px 18px rgba(0, 0, 0, 0.28);
        margin-bottom: 36px;
      }
      .step-pill-text {
        font-weight: 800;
        font-size: 36px;
        letter-spacing: 0.10em;
        color: #ffffff;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
      }

      .title {
        font-weight: 800;
        font-size: 78px;
        line-height: 1.05;
        letter-spacing: 0.03em;
        color: #ffffff;
        text-align: center;
        text-transform: uppercase;
        text-shadow: 0 3px 10px rgba(0, 0, 0, 0.35);
        margin-bottom: 60px;
      }

      /* Stickfigure container — absolute positioned within the scene */
      .figure {
        position: absolute;
        width: 220px;
        height: 290px;
      }
      .figure svg { width: 100%; height: 100%; }

      .figure-mentor { left: 200px; top: 1080px; z-index: 2; }
      .figure-hire { left: 660px; top: 1080px; z-index: 2; }

      /* Labels under figures */
      .figure-label {
        position: absolute;
        width: 240px;
        text-align: center;
        font-weight: 700;
        font-size: 32px;
        letter-spacing: 0.08em;
        color: #ffffff;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
        top: 1400px;
        z-index: 2;
      }
      .label-mentor { left: 190px; }
      .label-hire { left: 650px; }

      /* Document card — small orange-glass mini that travels between figures */
      .doc-card {
        position: absolute;
        width: 120px;
        height: 150px;
        border: 3px solid #ffffff;
        border-radius: 14px;
        background:
          radial-gradient(
            ellipse 100% 60% at 50% 0%,
            rgba(255, 220, 180, 0.55) 0%,
            rgba(255, 200, 150, 0.20) 35%,
            rgba(255, 180, 120, 0.0) 65%
          ),
          linear-gradient(
            180deg,
            rgba(255, 168, 88, 1) 0%,
            rgba(242, 129, 41, 1) 35%,
            rgba(214, 100, 22, 1) 100%
          );
        box-shadow:
          inset 0 2px 0 rgba(255, 240, 215, 0.55),
          inset 0 -3px 10px rgba(140, 55, 8, 0.45),
          0 0 24px rgba(242, 129, 41, 0.70),
          0 6px 16px rgba(0, 0, 0, 0.28);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        z-index: 3;
        /* Hero frame: arrived at hire's hand */
        left: 720px;
        top: 1230px;
      }
      .doc-card .lines {
        display: flex;
        flex-direction: column;
        gap: 8px;
        width: 80px;
      }
      .doc-card .lines span {
        display: block;
        height: 5px;
        background: #ffffff;
        border-radius: 3px;
      }
      .doc-card .lines span:nth-child(1) { width: 100%; }
      .doc-card .lines span:nth-child(2) { width: 80%; }
      .doc-card .lines span:nth-child(3) { width: 90%; }
      .doc-card .lines span:nth-child(4) { width: 65%; }

      /* Green checkmark badge — appears over hire after handoff */
      .check-badge {
        position: absolute;
        left: 760px;
        top: 1050px;
        width: 88px;
        height: 88px;
        border-radius: 50%;
        border: 3px solid #ffffff;
        background: #1BB05F;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 22px rgba(27, 176, 95, 0.7), 0 4px 12px rgba(0, 0, 0, 0.3);
        z-index: 4;
      }
      .check-badge svg { width: 56px; height: 56px; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="5" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="5" data-track-index="1">
        <div id="step-pill" class="step-pill">
          <div class="step-pill-text">STEP 3</div>
        </div>
        <div id="title" class="title">HIRE AND<br>WALK THROUGH</div>

        <!-- Mentor figure (left) — pointing right with one arm extended -->
        <div id="figure-mentor" class="figure figure-mentor" data-layout-allow-overflow>
          <svg viewBox="0 0 220 290" fill="#ffffff" stroke="#ffffff" stroke-width="2">
            <!-- Head -->
            <circle cx="110" cy="48" r="36" />
            <!-- Body taper -->
            <path d="M 70 88 Q 110 110 150 88 L 165 250 Q 110 268 55 250 Z" />
            <!-- Right arm extending toward hire (slightly raised, pointing) -->
            <path d="M 150 110 Q 195 115 210 130 Q 215 138 208 144 Q 192 138 158 134 Z" />
          </svg>
        </div>

        <!-- New hire figure (right) — receiving with one arm extended -->
        <div id="figure-hire" class="figure figure-hire" data-layout-allow-overflow>
          <svg viewBox="0 0 220 290" fill="#ffffff" stroke="#ffffff" stroke-width="2">
            <circle cx="110" cy="48" r="36" />
            <path d="M 70 88 Q 110 110 150 88 L 165 250 Q 110 268 55 250 Z" />
            <!-- Left arm extending toward mentor (receiving) -->
            <path d="M 70 110 Q 25 115 10 130 Q 5 138 12 144 Q 28 138 62 134 Z" />
          </svg>
        </div>

        <div id="label-mentor" class="figure-label label-mentor">YOU</div>
        <div id="label-hire" class="figure-label label-hire">NEW HIRE</div>

        <!-- Document — hero frame is arrived at hire's hand. Animates IN from mentor's hand. -->
        <div id="doc-card" class="doc-card" data-layout-allow-overflow>
          <div class="lines">
            <span></span><span></span><span></span><span></span>
          </div>
        </div>

        <!-- Check badge — hero frame is visible above hire's head. Animates IN after handoff. -->
        <div id="check-badge" class="check-badge" data-layout-allow-overflow>
          <svg viewBox="0 0 56 56" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="12 28 24 40 44 16" />
          </svg>
        </div>
      </div>
    </div>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // 1. Step pill bounces in
        tl.from("#step-pill", { y: 80, opacity: 0, duration: 0.55, ease: "back.out(1.7)" }, 0.20);
        // 2. Title slides up
        tl.from("#title", { y: 50, opacity: 0, duration: 0.55, ease: "power3.out" }, 0.45);

        // 3. Mentor figure pops in from left
        tl.from(
          "#figure-mentor",
          { x: -120, opacity: 0, duration: 0.55, ease: "back.out(1.6)" },
          0.85
        );
        tl.from(
          "#label-mentor",
          { y: 30, opacity: 0, duration: 0.4, ease: "power2.out" },
          1.10
        );

        // 4. Hire figure pops in from right
        tl.from(
          "#figure-hire",
          { x: 120, opacity: 0, duration: 0.55, ease: "back.out(1.6)" },
          1.20
        );
        tl.from(
          "#label-hire",
          { y: 30, opacity: 0, duration: 0.4, ease: "power2.out" },
          1.45
        );

        // 5. Document card travels from mentor's hand (left ~410) to hire's hand (final position left=720).
        //    Hero frame is "arrived at hire". Animate FROM mentor's hand position.
        //    Mentor hand area approx x=410, doc at left 720 -> animate from x:-310
        //    Also start scale 0.6 + rotate, settle into place.
        tl.from(
          "#doc-card",
          {
            x: -310,
            scale: 0.6,
            rotation: -25,
            opacity: 0,
            duration: 0.85,
            ease: "power3.out",
          },
          1.85
        );

        // 6. Hire figure bobs (acknowledges receipt) — y -8 yoyo
        tl.to(
          "#figure-hire",
          { y: -16, duration: 0.18, ease: "power2.out", yoyo: true, repeat: 1 },
          2.75
        );

        // 7. Check badge pops in over hire
        tl.from(
          "#check-badge",
          { scale: 0.0, opacity: 0, duration: 0.45, ease: "back.out(2.2)" },
          3.10
        );

        // 8. Glow pulse on doc-card right after delivery
        tl.fromTo(
          "#doc-card",
          { boxShadow: "inset 0 2px 0 rgba(255, 240, 215, 0.55), inset 0 -3px 10px rgba(140, 55, 8, 0.45), 0 0 24px rgba(242, 129, 41, 0.70), 0 6px 16px rgba(0, 0, 0, 0.28)" },
          {
            boxShadow: "inset 0 2px 0 rgba(255, 240, 215, 0.55), inset 0 -3px 10px rgba(140, 55, 8, 0.45), 0 0 48px rgba(242, 129, 41, 1.0), 0 6px 16px rgba(0, 0, 0, 0.28)",
            duration: 0.25,
            ease: "power2.out",
            yoyo: true,
            repeat: 1,
            overwrite: "auto",
            immediateRender: false,
          },
          2.75
        );

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
