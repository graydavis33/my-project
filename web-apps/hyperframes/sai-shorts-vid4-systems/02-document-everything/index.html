<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #00FF00;
        font-family: "Montserrat", system-ui, sans-serif;
      }

      .scene {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 280px 80px 0 80px;
      }

      /* Step pill */
      .step-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 16px 44px;
        background:
          radial-gradient(
            ellipse 100% 60% at 50% 0%,
            rgba(255, 220, 180, 0.55) 0%,
            rgba(255, 200, 150, 0.20) 35%,
            rgba(255, 180, 120, 0.0) 65%
          ),
          linear-gradient(
            180deg,
            rgba(255, 168, 88, 1) 0%,
            rgba(242, 129, 41, 1) 35%,
            rgba(214, 100, 22, 1) 100%
          );
        border: 2px solid #ffffff;
        border-radius: 999px;
        box-shadow:
          inset 0 2px 0 rgba(255, 240, 215, 0.55),
          inset 0 -3px 10px rgba(140, 55, 8, 0.45),
          0 0 24px rgba(242, 129, 41, 0.55),
          0 6px 18px rgba(0, 0, 0, 0.28);
        margin-bottom: 36px;
      }
      .step-pill-text {
        font-weight: 800;
        font-size: 36px;
        letter-spacing: 0.10em;
        color: #ffffff;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
      }

      .title {
        font-weight: 800;
        font-size: 88px;
        line-height: 1.05;
        letter-spacing: 0.03em;
        color: #ffffff;
        text-align: center;
        text-transform: uppercase;
        text-shadow: 0 3px 10px rgba(0, 0, 0, 0.35);
        margin-bottom: 70px;
      }

      /* Clipboard — large white-stroke document with orange-glass header bar */
      .clipboard {
        position: relative;
        width: 760px;
        height: 800px;
        border: 4px solid #ffffff;
        border-radius: 28px;
        background: rgba(0, 0, 0, 0.0); /* transparent body — only stroke shows on chroma */
        box-shadow: 0 0 28px rgba(255, 255, 255, 0.25);
        overflow: visible;
      }
      /* Clipboard top clip badge (the metal clip at top) */
      .clip-top {
        position: absolute;
        top: -36px;
        left: 50%;
        transform: translateX(-50%);
        width: 200px;
        height: 60px;
        border: 4px solid #ffffff;
        border-radius: 14px;
        background:
          radial-gradient(
            ellipse 100% 60% at 50% 0%,
            rgba(255, 220, 180, 0.55) 0%,
            rgba(255, 200, 150, 0.20) 35%,
            rgba(255, 180, 120, 0.0) 65%
          ),
          linear-gradient(
            180deg,
            rgba(255, 168, 88, 1) 0%,
            rgba(242, 129, 41, 1) 35%,
            rgba(214, 100, 22, 1) 100%
          );
        box-shadow:
          inset 0 2px 0 rgba(255, 240, 215, 0.55),
          inset 0 -3px 8px rgba(140, 55, 8, 0.40),
          0 0 18px rgba(242, 129, 41, 0.55);
      }

      .doc-lines {
        position: absolute;
        top: 90px;
        left: 60px;
        right: 60px;
        display: flex;
        flex-direction: column;
        gap: 38px;
      }
      .doc-line {
        display: flex;
        align-items: center;
        gap: 24px;
      }
      .num-badge {
        flex-shrink: 0;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        border: 3px solid #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 32px;
        color: #ffffff;
        background:
          radial-gradient(
            ellipse 100% 60% at 50% 0%,
            rgba(255, 220, 180, 0.55) 0%,
            rgba(255, 200, 150, 0.20) 35%,
            rgba(255, 180, 120, 0.0) 65%
          ),
          linear-gradient(
            180deg,
            rgba(255, 168, 88, 1) 0%,
            rgba(242, 129, 41, 1) 35%,
            rgba(214, 100, 22, 1) 100%
          );
        box-shadow:
          inset 0 2px 0 rgba(255, 240, 215, 0.55),
          0 0 12px rgba(242, 129, 41, 0.55);
      }
      .line-text {
        font-weight: 600;
        font-size: 40px;
        color: #ffffff;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
        flex: 1;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="5.5" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="5.5" data-track-index="1">
        <div id="step-pill" class="step-pill">
          <div class="step-pill-text">STEP 2</div>
        </div>
        <div id="title" class="title">DOCUMENT<br>EVERYTHING</div>

        <div id="clipboard" class="clipboard" data-layout-allow-overflow>
          <div id="clip-top" class="clip-top"></div>
          <div class="doc-lines">
            <div class="doc-line" id="line0">
              <div class="num-badge">1</div>
              <div class="line-text">Open the project</div>
            </div>
            <div class="doc-line" id="line1">
              <div class="num-badge">2</div>
              <div class="line-text">Pull latest changes</div>
            </div>
            <div class="doc-line" id="line2">
              <div class="num-badge">3</div>
              <div class="line-text">Run the tests</div>
            </div>
            <div class="doc-line" id="line3">
              <div class="num-badge">4</div>
              <div class="line-text">Edit the file</div>
            </div>
            <div class="doc-line" id="line4">
              <div class="num-badge">5</div>
              <div class="line-text">Commit and push</div>
            </div>
            <div class="doc-line" id="line5">
              <div class="num-badge">6</div>
              <div class="line-text">Open a pull request</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // 1. Step pill bounces in
        tl.from("#step-pill", { y: 80, opacity: 0, duration: 0.55, ease: "back.out(1.7)" }, 0.20);

        // 2. Title slides up
        tl.from("#title", { y: 50, opacity: 0, duration: 0.55, ease: "power3.out" }, 0.45);

        // 3. Clipboard scales up from below
        tl.from(
          "#clipboard",
          { y: 80, scale: 0.85, opacity: 0, duration: 0.6, ease: "back.out(1.5)" },
          0.85
        );

        // 4. Clip-top pops in slightly after
        tl.from(
          "#clip-top",
          { y: -40, scale: 0.5, opacity: 0, duration: 0.4, ease: "back.out(2)" },
          1.20
        );

        // 5. Doc lines draw in one-by-one with stagger
        tl.from(
          ".doc-line",
          { x: -60, opacity: 0, duration: 0.40, ease: "power3.out", stagger: 0.20 },
          1.55
        );

        // 6. Number badges pulse on entry — separate scale pulse synced to each line
        const lineIds = ["#line0", "#line1", "#line2", "#line3", "#line4", "#line5"];
        lineIds.forEach(function (id, i) {
          const t = 1.55 + i * 0.20 + 0.30;
          tl.fromTo(
            id + " .num-badge",
            { scale: 0.8 },
            { scale: 1.12, duration: 0.18, ease: "power2.out", yoyo: true, repeat: 1, overwrite: "auto", immediateRender: false },
            t
          );
        });

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
