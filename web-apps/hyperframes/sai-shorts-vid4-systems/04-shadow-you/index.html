<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #00FF00;
        font-family: "Montserrat", system-ui, sans-serif;
      }

      .scene {
        position: relative;
        width: 100%;
        height: 100%;
        padding: 280px 80px 0 80px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .step-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 16px 44px;
        background:
          radial-gradient(
            ellipse 100% 60% at 50% 0%,
            rgba(255, 220, 180, 0.55) 0%,
            rgba(255, 200, 150, 0.20) 35%,
            rgba(255, 180, 120, 0.0) 65%
          ),
          linear-gradient(
            180deg,
            rgba(255, 168, 88, 1) 0%,
            rgba(242, 129, 41, 1) 35%,
            rgba(214, 100, 22, 1) 100%
          );
        border: 2px solid #ffffff;
        border-radius: 999px;
        box-shadow:
          inset 0 2px 0 rgba(255, 240, 215, 0.55),
          inset 0 -3px 10px rgba(140, 55, 8, 0.45),
          0 0 24px rgba(242, 129, 41, 0.55),
          0 6px 18px rgba(0, 0, 0, 0.28);
        margin-bottom: 36px;
      }
      .step-pill-text {
        font-weight: 800;
        font-size: 36px;
        letter-spacing: 0.10em;
        color: #ffffff;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
      }

      .title {
        font-weight: 800;
        font-size: 92px;
        line-height: 1.05;
        letter-spacing: 0.03em;
        color: #ffffff;
        text-align: center;
        text-transform: uppercase;
        text-shadow: 0 3px 10px rgba(0, 0, 0, 0.35);
        margin-bottom: 80px;
      }

      .figure {
        position: absolute;
        width: 260px;
        height: 340px;
      }
      .figure svg { width: 100%; height: 100%; }

      /* Lead figure — bigger, in front, white solid. Hero frame: centered at x=410. */
      .figure-lead {
        left: 410px;
        top: 950px;
        z-index: 3;
      }

      /* Shadow figure — same shape but at 35% opacity, offset to right + slightly lower */
      .figure-shadow {
        left: 540px;
        top: 985px;
        z-index: 2;
        opacity: 0.35;
      }

      .label-row {
        position: absolute;
        top: 1380px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        z-index: 4;
      }
      .label-text {
        font-weight: 800;
        font-size: 44px;
        letter-spacing: 0.10em;
        color: #ffffff;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
      }

      /* Eye-icon badge — sits above the shadow figure */
      .eye-badge {
        position: absolute;
        left: 580px;
        top: 880px;
        width: 110px;
        height: 110px;
        border-radius: 50%;
        border: 3px solid #ffffff;
        background:
          radial-gradient(
            ellipse 100% 60% at 50% 0%,
            rgba(255, 220, 180, 0.55) 0%,
            rgba(255, 200, 150, 0.20) 35%,
            rgba(255, 180, 120, 0.0) 65%
          ),
          linear-gradient(
            180deg,
            rgba(255, 168, 88, 1) 0%,
            rgba(242, 129, 41, 1) 35%,
            rgba(214, 100, 22, 1) 100%
          );
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow:
          inset 0 2px 0 rgba(255, 240, 215, 0.55),
          0 0 26px rgba(242, 129, 41, 0.70),
          0 4px 12px rgba(0, 0, 0, 0.3);
        z-index: 5;
      }
      .eye-badge svg { width: 70px; height: 70px; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="5" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="5" data-track-index="1">
        <div id="step-pill" class="step-pill">
          <div class="step-pill-text">STEP 4</div>
        </div>
        <div id="title" class="title">SHADOW<br>YOU</div>

        <!-- Lead figure (you) -->
        <div id="figure-lead" class="figure figure-lead" data-layout-allow-overflow>
          <svg viewBox="0 0 260 340" fill="#ffffff" stroke="#ffffff" stroke-width="2">
            <circle cx="130" cy="56" r="42" />
            <path d="M 80 100 Q 130 124 180 100 L 196 296 Q 130 318 64 296 Z" />
          </svg>
        </div>

        <!-- Shadow figure (trainee) -->
        <div id="figure-shadow" class="figure figure-shadow" data-layout-allow-overflow>
          <svg viewBox="0 0 260 340" fill="#ffffff" stroke="#ffffff" stroke-width="2">
            <circle cx="130" cy="56" r="42" />
            <path d="M 80 100 Q 130 124 180 100 L 196 296 Q 130 318 64 296 Z" />
          </svg>
        </div>

        <!-- Eye-icon badge over shadow figure -->
        <div id="eye-badge" class="eye-badge" data-layout-allow-overflow>
          <svg viewBox="0 0 70 70" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M 6 35 Q 35 8 64 35 Q 35 62 6 35 Z" />
            <circle cx="35" cy="35" r="11" fill="#ffffff" stroke="none" />
            <circle cx="35" cy="35" r="5" fill="#F28129" stroke="none" />
          </svg>
        </div>

        <div id="label-row" class="label-row">
          <div class="label-text">LEARN BY WATCHING</div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // 1. Pill + title entrance
        tl.from("#step-pill", { y: 80, opacity: 0, duration: 0.55, ease: "back.out(1.7)" }, 0.20);
        tl.from("#title", { y: 50, opacity: 0, duration: 0.55, ease: "power3.out" }, 0.45);

        // 2. Lead figure scales up from below
        tl.from(
          "#figure-lead",
          { y: 80, scale: 0.7, opacity: 0, duration: 0.6, ease: "back.out(1.6)" },
          0.85
        );

        // 3. Shadow figure begins HIDDEN AT LEAD POSITION, then slides RIGHT to its offset spot
        //    (suggests "trainee positions behind you to learn"). Final hero frame at left=540.
        tl.fromTo(
          "#figure-shadow",
          { x: -130, opacity: 0 },
          { x: 0, opacity: 0.35, duration: 0.7, ease: "power3.out", immediateRender: false },
          1.55
        );

        // 4. Eye-icon badge pops in over shadow figure
        tl.from(
          "#eye-badge",
          { scale: 0.0, opacity: 0, rotation: -45, duration: 0.55, ease: "back.out(2.2)" },
          2.30
        );

        // 5. Subtitle label slides up
        tl.from(
          "#label-row",
          { y: 40, opacity: 0, duration: 0.5, ease: "power2.out" },
          2.55
        );

        // 6. Both figures bob in sync — 3 finite cycles (no repeat: -1)
        const bobCycles = 3;
        for (let i = 0; i < bobCycles; i++) {
          const t = 3.10 + i * 0.55;
          tl.to(
            ["#figure-lead", "#figure-shadow"],
            { y: -12, duration: 0.20, ease: "power2.out", overwrite: "auto" },
            t
          );
          tl.to(
            ["#figure-lead", "#figure-shadow"],
            { y: 0, duration: 0.30, ease: "power2.in", overwrite: "auto" },
            t + 0.20
          );
        }

        // 7. Eye badge glow pulse — 2 finite cycles
        for (let i = 0; i < 2; i++) {
          const t = 3.10 + i * 0.85;
          tl.to(
            "#eye-badge",
            {
              boxShadow: "inset 0 2px 0 rgba(255, 240, 215, 0.55), 0 0 46px rgba(242, 129, 41, 1.0), 0 4px 12px rgba(0, 0, 0, 0.3)",
              duration: 0.25,
              ease: "power2.out",
              overwrite: "auto",
            },
            t
          );
          tl.to(
            "#eye-badge",
            {
              boxShadow: "inset 0 2px 0 rgba(255, 240, 215, 0.55), 0 0 26px rgba(242, 129, 41, 0.70), 0 4px 12px rgba(0, 0, 0, 0.3)",
              duration: 0.35,
              ease: "power2.in",
              overwrite: "auto",
            },
            t + 0.25
          );
        }

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
