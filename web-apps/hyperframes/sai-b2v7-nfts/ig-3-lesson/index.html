<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: #00FF00; font-family: "Montserrat", system-ui, sans-serif;
      }
      .scene {
        position: relative; width: 100%; height: 100%;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 40px; padding: 60px 36px;
      }
      .glass {
        background:
          radial-gradient(ellipse 100% 60% at 50% 0%,
            rgba(255,220,180,0.55) 0%, rgba(255,200,150,0.20) 35%, rgba(255,180,120,0) 65%),
          linear-gradient(180deg, rgba(255,168,88,1) 0%, rgba(242,129,41,1) 35%, rgba(214,100,22,1) 100%);
        border: 2px solid #fff;
        box-shadow:
          inset 0 2px 0 rgba(255,240,215,0.55),
          inset 0 -3px 10px rgba(140,55,8,0.45),
          0 0 24px rgba(242,129,41,0.55),
          0 6px 18px rgba(0,0,0,0.28);
      }
      .pill {
        display: inline-flex; align-items: center; justify-content: center;
        padding: 16px 50px; border-radius: 999px; margin-bottom: 12px;
      }
      .pill-text {
        font-weight: 800; font-size: 40px; letter-spacing: 0.14em;
        color: #fff; text-shadow: 0 2px 6px rgba(0,0,0,0.4);
      }
      .eq {
        font-weight: 900; font-size: 64px; line-height: 1.0; letter-spacing: -0.01em;
        color: #fff; text-align: center; text-transform: uppercase; white-space: nowrap;
        text-shadow: 0 4px 12px rgba(0,0,0,0.4); will-change: transform, opacity;
      }
      .eq .eqsign { color: #F28129; margin: 0 8px; }
      .nothing { color: #E63946; }
      .happy   { color: #F28129; }
      .but {
        font-weight: 800; font-size: 34px; letter-spacing: 0.28em;
        color: #fff; opacity: 0.85; text-transform: uppercase;
        text-shadow: 0 2px 6px rgba(0,0,0,0.4);
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="4.4" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="4.4" data-track-index="1">
        <div id="pill" class="pill glass"><div class="pill-text">THE LESSON</div></div>
        <div id="eq1" class="eq">PROVE YOURSELF <span class="eqsign">=</span> <span class="nothing">NOTHING</span></div>
        <div id="but" class="but">BUT</div>
        <div id="eq2" class="eq">DO IT FOR YOU <span class="eqsign">=</span> <span class="happy">HAPPY</span></div>
      </div>
    </div>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const DUR = 4.4;

        tl.from("#pill", { y: 70, opacity: 0, duration: 0.5, ease: "back.out(1.7)" }, 0.15);
        tl.from("#eq1", { y: 50, opacity: 0, duration: 0.5, ease: "power3.out" }, 0.45);
        tl.from("#but", { scale: 0.4, opacity: 0, duration: 0.4, ease: "back.out(2)" }, 0.85);
        tl.from("#eq2", { y: 50, opacity: 0, scale: 0.9, duration: 0.55, ease: "back.out(1.6)" }, 1.1);

        // gentle finite glow pulse on the payoff word
        const cyc = 0.9, start = 1.7;
        const reps = Math.ceil((DUR - start) / cyc) - 1;
        tl.fromTo(".happy",
          { textShadow: "0 4px 12px rgba(0,0,0,0.4), 0 0 0px rgba(242,129,41,0)" },
          { textShadow: "0 4px 12px rgba(0,0,0,0.4), 0 0 30px rgba(242,129,41,0.9)",
            duration: cyc / 2, ease: "sine.inOut", yoyo: true, repeat: reps * 2 + 1 },
          start);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
