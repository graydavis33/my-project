<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: #00FF00; font-family: "Montserrat", system-ui, sans-serif;
      }
      .scene { position: relative; width: 100%; height: 100%; }

      .glass {
        background:
          radial-gradient(ellipse 100% 60% at 50% 0%,
            rgba(255,220,180,0.55) 0%, rgba(255,200,150,0.20) 35%, rgba(255,180,120,0) 65%),
          linear-gradient(180deg, rgba(255,168,88,1) 0%, rgba(242,129,41,1) 35%, rgba(214,100,22,1) 100%);
        border: 2px solid #fff;
        box-shadow:
          inset 0 2px 0 rgba(255,240,215,0.55),
          inset 0 -3px 10px rgba(140,55,8,0.45),
          0 0 24px rgba(242,129,41,0.55),
          0 8px 22px rgba(0,0,0,0.30);
      }

      .pill {
        position: absolute; left: 50%; top: 560px; transform: translateX(-50%);
        display: inline-flex; align-items: center; justify-content: center;
        padding: 16px 52px; border-radius: 999px; white-space: nowrap;
      }
      .pill-text {
        font-weight: 800; font-size: 38px; letter-spacing: 0.16em;
        color: #fff; text-shadow: 0 2px 6px rgba(0,0,0,0.4);
      }
      .title {
        position: absolute; left: 0; top: 660px; width: 100%; text-align: center;
        font-weight: 900; font-size: 104px; letter-spacing: -0.02em; color: #fff;
        text-transform: uppercase; text-shadow: 0 6px 18px rgba(0,0,0,0.45);
        white-space: nowrap;
      }

      .step {
        position: absolute; border-radius: 30px;
        display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
        padding: 34px 18px 0 18px;
      }
      #step1 { left: 80px;  width: 280px; top: 1250px; height: 370px; }
      #step2 { left: 400px; width: 280px; top: 1120px; height: 500px; }
      #step3 { left: 720px; width: 280px; top: 1000px; height: 620px; }

      .badge {
        width: 64px; height: 64px; border-radius: 999px;
        background: #fff; color: #D66416;
        display: flex; align-items: center; justify-content: center;
        font-weight: 900; font-size: 38px; margin-bottom: 16px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.25);
      }
      .school {
        font-weight: 800; font-size: 28px; letter-spacing: 0.10em; color: #fff;
        text-transform: uppercase; opacity: 0.92; text-align: center;
        text-shadow: 0 2px 6px rgba(0,0,0,0.35); margin-bottom: 14px;
      }
      .driver {
        display: flex; flex-direction: column; align-items: center;
        font-weight: 900; font-size: 50px; line-height: 1.04; color: #fff;
        text-transform: uppercase; letter-spacing: -0.01em; text-align: center;
        text-shadow: 0 3px 10px rgba(0,0,0,0.4);
      }

      svg.decor { position: absolute; inset: 0; overflow: visible; }
      .arrow { fill: none; stroke: #fff; stroke-width: 8; stroke-linecap: round;
        stroke-linejoin: round; stroke-dasharray: 16 20; }
      .figure { fill: #fff; filter: drop-shadow(0 8px 12px rgba(0,0,0,0.35)); }
      .figline { fill: none; stroke: #fff; stroke-width: 22; stroke-linecap: round;
        filter: drop-shadow(0 8px 12px rgba(0,0,0,0.35)); }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="5" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="5" data-track-index="1">

        <div id="pill" class="pill glass"><div class="pill-text">THE PATTERN</div></div>
        <div id="title" class="title">PROVE MYSELF</div>

        <!-- rising dashed arrow across the step tops -->
        <svg class="decor" viewBox="0 0 1080 1920" data-layout-allow-overflow>
          <path id="arrow" class="arrow" d="M 150 1300 L 470 1170 L 800 1050"/>
          <path id="arrow-head" class="arrow" style="stroke-dasharray:none" d="M 760 1036 L 808 1046 L 792 1092"/>

          <!-- locked stick figure: climbed to the top of step 3, reaching up -->
          <g id="figure" data-layout-allow-overflow>
            <circle class="figure" cx="860" cy="858" r="30"/>
            <path class="figline" d="M 860 892 L 860 958"/>
            <path class="figline" d="M 860 916 L 824 884"/>
            <path class="figline" d="M 860 916 L 896 884"/>
            <path class="figline" d="M 860 958 L 836 1000"/>
            <path class="figline" d="M 860 958 L 884 1000"/>
          </g>
        </svg>

        <div id="step1" class="step glass">
          <div class="badge">1</div>
          <div class="school">Elementary</div>
          <div class="driver"><span>FIT</span><span>IN</span></div>
        </div>
        <div id="step2" class="step glass">
          <div class="badge">2</div>
          <div class="school">Middle</div>
          <div class="driver"><span>BE</span><span>SMARTER</span></div>
        </div>
        <div id="step3" class="step glass">
          <div class="badge">3</div>
          <div class="school">High School</div>
          <div class="driver"><span>THE</span><span>FUTURE</span></div>
        </div>

      </div>
    </div>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        tl.from("#pill", { y: 60, opacity: 0, duration: 0.5, ease: "back.out(1.7)" }, 0.12);
        tl.from("#title", { y: 50, opacity: 0, duration: 0.5, ease: "power3.out" }, 0.34);

        // steps rise into place (bottom-aligned), staggered low → high
        tl.from("#step1", { y: 80, opacity: 0, duration: 0.5, ease: "power3.out" }, 0.70);
        tl.from("#step2", { y: 90, opacity: 0, duration: 0.5, ease: "power3.out" }, 0.92);
        tl.from("#step3", { y: 100, opacity: 0, duration: 0.5, ease: "back.out(1.4)" }, 1.14);

        // badges + labels pop per step
        tl.from(["#step1 .badge", "#step1 .school", "#step1 .driver"],
          { y: 24, opacity: 0, duration: 0.34, ease: "power2.out", stagger: 0.06 }, 0.90);
        tl.from(["#step2 .badge", "#step2 .school", "#step2 .driver"],
          { y: 24, opacity: 0, duration: 0.34, ease: "power2.out", stagger: 0.06 }, 1.12);
        tl.from(["#step3 .badge", "#step3 .school", "#step3 .driver"],
          { y: 24, opacity: 0, duration: 0.34, ease: "power2.out", stagger: 0.06 }, 1.34);

        // dashed arrow draws up the staircase
        const arrow = document.getElementById("arrow");
        const len = arrow.getTotalLength();
        gsap.set(arrow, { strokeDashoffset: 0 });
        const proxy = { p: 0 };
        gsap.set(arrow, { attr: { "stroke-dasharray": len }, strokeDashoffset: len });
        tl.to(proxy, { p: 1, duration: 0.7, ease: "power2.inOut",
          onUpdate: () => { arrow.style.strokeDashoffset = len * (1 - proxy.p); } }, 1.55);
        tl.from("#arrow-head", { opacity: 0, scale: 0.5, transformOrigin: "800px 1050px",
          duration: 0.3, ease: "back.out(2)" }, 2.15);

        // figure climbs onto the top step, little reach-up bounce
        tl.from("#figure", { y: 60, opacity: 0, duration: 0.5, ease: "back.out(1.6)",
          transformOrigin: "860px 1000px" }, 2.35);
        tl.to("#figure", { y: -10, duration: 0.28, ease: "power2.out", yoyo: true, repeat: 1,
          transformOrigin: "860px 1000px" }, 2.9);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
