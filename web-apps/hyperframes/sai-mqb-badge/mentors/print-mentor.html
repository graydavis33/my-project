<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mentor Print Page</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  /* Letter @300dpi */
  body { width:2550px; height:3300px; background:#fff; font-family:'Helvetica Neue',Arial,sans-serif; display:flex; flex-direction:column; align-items:center; }
  .frame { margin-top:220px; width:2100px; height:2625px; overflow:hidden; background:#dfe4ea; }
  .frame img { width:100%; height:100%; object-fit:cover; }
  .name { font-weight:900; font-size:150px; letter-spacing:6px; text-transform:uppercase; margin-top:60px; }
  /* same per-person framing as sheet.html (percent-based, scales cleanly) */
  .hormozi img  { object-position:50% 20%; }
  .kan img      { object-position:67% 42%; transform:scale(1.42); transform-origin:67% 44%; }
  .cuban img    { object-position:50% 22%; }
  .bloom img    { object-position:50% 10%; transform:scale(2.6); transform-origin:47% 13%; }
  .sharran img  { object-position:50% 20%; }
  .puri img     { object-position:50% 25%; }
  .parr img     { object-position:50% 25%; }
  .kamo img     { object-position:50% 30%; }
</style>
</head>
<body>
<div class="frame" id="frame"><img id="photo"></div>
<div class="name" id="name"></div>
<script>
const people = {
  'alex-hormozi':      {cls:'hormozi', file:'alex-hormozi.png',      name:'Alex Hormozi'},
  'justin-kan':        {cls:'kan',     file:'justin-kan.jpg',        name:'Justin Kan'},
  'mark-cuban':        {cls:'cuban',   file:'mark-cuban.jpg',        name:'Mark Cuban'},
  'sahil-bloom':       {cls:'bloom',   file:'sahil-bloom.jpg',       name:'Sahil Bloom'},
  'sharran-srivatsaa': {cls:'sharran', file:'sharran-srivatsaa.jpg', name:'Sharran Srivatsaa'},
  'shaan-puri':        {cls:'puri',    file:'shaan-puri-clean.png',  name:'Shaan Puri'},
  'sam-parr':          {cls:'parr',    file:'sam-parr.jpg',          name:'Sam Parr'},
  'mike-kamo':         {cls:'kamo',    file:'mike-kamo_enhanced.png',         name:'Mike Kamo'},
};
const p = people[new URLSearchParams(location.search).get('p')] || people['alex-hormozi'];
document.getElementById('frame').classList.add(p.cls);
document.getElementById('photo').src = p.file;
document.getElementById('name').textContent = p.name;
</script>
</body>
</html>
