<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Sai Karra — Q2 Update Sign</title>
<style>
  @font-face {
    font-family: 'Montserrat';
    src: url('assets/Montserrat.ttf');
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  /* Letter landscape-feel but portrait page @300dpi */
  body { width:2550px; height:3300px; background:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:'Montserrat','Helvetica Neue',Arial,sans-serif; position:relative; }
  .bar { position:absolute; left:0; right:0; height:70px; background:#f28129; }
  .bar.top { top:0; }
  .bar.bottom { bottom:0; }
  .name { font-size:330px; font-weight:800; color:#111; letter-spacing:4px; text-align:center; line-height:1.05; }
  .sub { margin-top:90px; font-size:190px; font-weight:800; color:#f28129; letter-spacing:14px; text-align:center; text-transform:uppercase; }
  .rule { width:1500px; height:14px; background:#111; margin-top:110px; }
</style>
</head>
<body>
  <div class="bar top"></div>
  <div class="name">SAI KARRA</div>
  <div class="sub">Q2 Update</div>
  <div class="rule"></div>
  <div class="bar bottom"></div>
</body>
</html>
