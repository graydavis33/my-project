<!doctype html>
<html lang="en" data-resolution="landscape">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; background: #000; }

      #root .stage { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
      /* faint vignette for depth (invisible-ish over black, gives a filmic falloff) */
      #root .vignette { position: absolute; inset: 0; background: radial-gradient(ellipse 75% 60% at center, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0) 60%); z-index: 0; }

      #root .content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 36px; padding: 120px; }

      #root .title-wrap { position: relative; overflow: hidden; padding: 16px 14px; }
      #root .title { font-family: "Montserrat", sans-serif; font-weight: 300; font-size: 66px; line-height: 1; letter-spacing: 0.30em; color: #ffffff; white-space: nowrap; text-indent: 0.30em; }
      /* light sweep */
      #root .glint { position: absolute; top: -20%; left: 0; width: 200px; height: 140%; background: linear-gradient(100deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.85) 50%, rgba(255,255,255,0) 100%); transform: skewX(-12deg); mix-blend-mode: screen; pointer-events: none; }

      #root .meta { display: flex; align-items: center; gap: 30px; }
      #root .rule { width: 90px; height: 1px; background: rgba(255,255,255,0.55); transform-origin: center; }
      #root .episode { font-family: "Montserrat", sans-serif; font-weight: 400; font-size: 28px; letter-spacing: 0.62em; color: rgba(255,255,255,0.85); white-space: nowrap; text-indent: 0.62em; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="5.4" data-width="1920" data-height="1080">
      <div class="stage">
        <div class="vignette"></div>
        <div class="content">
          <div class="title-wrap" data-layout-allow-overflow>
            <span class="title">TRENDIFY DIARIES</span>
            <span class="glint" data-layout-ignore></span>
          </div>
          <div class="meta">
            <span class="rule r-l"></span>
            <span class="episode">EPISODE ONE</span>
            <span class="rule r-r"></span>
          </div>
        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // slow continuous push-in across the whole card
        tl.fromTo(".content", { scale: 1.0 }, { scale: 1.03, duration: 5.4, ease: "none" }, 0);

        // title rises and fades in slowly
        tl.from(".title", { y: 26, opacity: 0, duration: 1.1, ease: "power2.out" }, 0.3);

        // light sweep across the wordmark
        tl.fromTo(".glint", { xPercent: -160 }, { xPercent: 760, duration: 1.1, ease: "power2.inOut" }, 0.95);

        // hairlines draw outward
        tl.from(".r-l", { scaleX: 0, opacity: 0, duration: 0.7, ease: "power3.inOut" }, 1.15);
        tl.from(".r-r", { scaleX: 0, opacity: 0, duration: 0.7, ease: "power3.inOut" }, 1.15);

        // episode label settles in
        tl.from(".episode", { y: 14, opacity: 0, duration: 0.8, ease: "power2.out" }, 1.35);

        // slow filmic fade out (final scene)
        tl.to(".content", { opacity: 0, duration: 0.8, ease: "power2.inOut" }, 4.6);

        window.__timelines["main"] = tl;
      </script>
    </div>
  </body>
</html>
