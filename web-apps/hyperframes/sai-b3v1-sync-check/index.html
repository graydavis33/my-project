<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  #root { position: relative; width: 1920px; height: 1080px; background: #000; overflow: hidden; font-family: 'Montserrat', sans-serif; }
  #root video { position: absolute; top: 0; width: 960px; height: 1080px; object-fit: contain; background: #000; z-index: 1; }
  #root #va { left: 0; }
  #root #vb { left: 960px; }
  #root .label { position: absolute; top: 24px; z-index: 5; color: #fff; font-size: 28px; font-weight: 700;
            letter-spacing: .12em; text-transform: uppercase; text-shadow: 0 2px 8px rgba(0,0,0,.9);
            background: rgba(0,0,0,.45); padding: 8px 16px; border-radius: 8px; }
  #root #labelA { left: 24px; }
  #root #labelB { left: 984px; color: #F28129; }
  #root #divider { position: absolute; top: 0; left: 959px; width: 2px; height: 1080px; background: rgba(255,255,255,.35); z-index: 6; }
</style>
</head>
<body>
<div id="root" data-composition-id="root" data-width="1920" data-height="1080" data-start="0" data-duration="161.560">
  <video id="va" class="clip" src="acam.mp4" muted playsinline data-start="0.000" data-duration="161.560" data-media-start="0.000" data-track-index="0"></video>
  <video id="vb" class="clip" src="bcam.mp4" muted playsinline data-start="0.000" data-duration="161.560" data-media-start="0.000" data-track-index="1"></video>
  <audio id="aa" class="clip" src="acam.mp4" data-start="0.000" data-duration="161.560" data-media-start="0.000" data-volume="1" data-track-index="2"></audio>
  <audio id="ab" class="clip" src="bcam.mp4" data-start="0.000" data-duration="161.560" data-media-start="0.000" data-volume="1" data-track-index="3"></audio>
  <div id="labelA" class="label">A-CAM + A-AUDIO</div>
  <div id="labelB" class="label">B-CAM + B-AUDIO</div>
  <div id="divider"></div>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
  window.__timelines = window.__timelines || {};
  window.__timelines["root"] = gsap.timeline({ paused: true });
  </script>
</div>
</body>
</html>
