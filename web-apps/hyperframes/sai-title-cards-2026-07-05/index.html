<!doctype html>
<html lang="en" data-composition-variables='[
  {"id":"title","type":"string","label":"Title text (auto Title Case)","default":"Operationalize Kindness"},
  {"id":"canvasBg","type":"string","label":"Canvas (transparent for alpha render, #00FF00 for preview)","default":"#00FF00"},
  {"id":"titleSize","type":"number","label":"Title font size (px)","default":76},
  {"id":"cardY","type":"number","label":"Card center Y (px)","default":880},
  {"id":"maxCardWidth","type":"number","label":"Max card width (px)","default":940}
]'>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        font-family: "Montserrat", system-ui, sans-serif;
      }
      .scene { position: relative; width: 100%; height: 100%; }

      /* Dark stage card (locked brand style) */
      .card {
        position: absolute;
        left: 50%;
        display: inline-block;
        padding: 52px 64px 46px;
        border-radius: 28px;
        background: linear-gradient(160deg, #34302C, #272320 55%, #1C1916);
        /* no drop shadow — soft black edges fringe when keying the green */
        text-align: center;
        will-change: transform, opacity;
      }
      .title {
        font-weight: 800;
        color: #FFFFFF;
        line-height: 1.22;
        letter-spacing: -0.01em;
        text-shadow: 0 4px 14px rgba(0, 0, 0, 0.45);
      }
      .title .w {
        display: inline-block;
        margin: 0 0.14em;
        will-change: transform, opacity;
      }
      /* The one orange payoff — glass underline sweep */
      .underline {
        height: 9px;
        margin: 26px auto 0;
        border-radius: 5px;
        background: linear-gradient(90deg, #FFC68A, #F28129 55%, #D66416);
        box-shadow: 0 0 24px rgba(242, 129, 41, 0.55);
        transform-origin: left center;
        will-change: transform;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="6" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="6" data-track-index="1">
        <div id="card" class="card" data-layout-allow-overflow>
          <div id="title" class="title"></div>
          <div id="underline" class="underline"></div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        const v = window.__hyperframes.getVariables();
        document.body.style.background = v.canvasBg;

        // Capitalize Each Word
        const words = v.title.trim().split(/\s+/).map(function (w) {
          return w.charAt(0).toUpperCase() + w.slice(1);
        });

        const card = document.getElementById("card");
        card.style.maxWidth = v.maxCardWidth + "px";
        const titleEl = document.getElementById("title");
        titleEl.style.fontSize = v.titleSize + "px";
        words.forEach(function (w) {
          const s = document.createElement("span");
          s.className = "w";
          s.textContent = w;
          titleEl.appendChild(s);
        });

        // Vertically center on cardY (offsetHeight is transform-independent),
        // then let GSAP own the transform: xPercent centers horizontally
        const h = card.offsetHeight;
        card.style.top = (v.cardY - h / 2) + "px";
        gsap.set(card, { xPercent: -50 });

        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // 1) Stage card rises in, soft and weighty
        tl.from("#card", { y: 44, opacity: 0, scale: 0.965, duration: 0.65, ease: "power3.out" }, 0.12);

        // 2) Words rise in one after another
        const wordsStart = 0.34, wordStagger = 0.12, wordDur = 0.55;
        tl.from(".title .w", { y: 30, opacity: 0, duration: wordDur, ease: "power2.out", stagger: wordStagger }, wordsStart);

        // 3) Orange underline sweeps ONCE, exactly while the words fade on —
        //    starts with the first word, lands as the last word finishes
        const wordsEnd = wordsStart + (words.length - 1) * wordStagger + wordDur;
        tl.fromTo("#underline", { scaleX: 0 },
          { scaleX: 1, duration: wordsEnd - wordsStart, ease: "power1.inOut", immediateRender: false },
          wordsStart);
        // then everything holds still to the end

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
