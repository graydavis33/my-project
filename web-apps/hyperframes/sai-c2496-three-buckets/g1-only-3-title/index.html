<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #00FF00;
        font-family: "Montserrat", system-ui, sans-serif;
      }

      .scene {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        padding: 80px;
      }

      .word {
        display: block;
        font-family: "Montserrat", system-ui, sans-serif;
        font-weight: 900;
        color: #FFFFFF;
        text-shadow: 0 6px 18px rgba(0, 0, 0, 0.45);
        letter-spacing: -0.01em;
        line-height: 1.0;
        text-align: center;
        will-change: transform, opacity;
      }

      .small { font-size: 140px; }
      .big   {
        font-size: 520px;
        color: #F28129;
        text-shadow: 0 10px 32px rgba(0, 0, 0, 0.5);
        line-height: 1.0;
      }
      .mid   { font-size: 200px; letter-spacing: 0.04em; }
      .sub   {
        font-size: 80px;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: #FFFFFF;
        text-transform: uppercase;
        text-shadow: 0 4px 14px rgba(0, 0, 0, 0.45);
        margin-top: 18px;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="3" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="3" data-track-index="1">
        <div class="word small" id="w-only">ONLY</div>
        <div class="word big"   id="w-three">3</div>
        <div class="word mid"   id="w-buckets">BUCKETS</div>
        <div class="word sub"   id="w-sub">EVERY FOUNDER NEEDS</div>
      </div>
    </div>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        tl.from("#w-only",    { y: 80,  opacity: 0, duration: 0.40, ease: "power3.out" }, 0.10);
        tl.from("#w-three",   { y: 120, opacity: 0, scale: 0.7, duration: 0.55, ease: "back.out(1.6)" }, 0.30);
        tl.from("#w-buckets", { y: 70,  opacity: 0, duration: 0.40, ease: "power3.out" }, 0.62);
        tl.from("#w-sub",     { y: 50,  opacity: 0, duration: 0.40, ease: "power2.out" }, 0.92);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
