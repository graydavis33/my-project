<!DOCTYPE html>
<html lang="en" data-composition-variables='[
  {"id":"num","type":"string","label":"Number","default":"01"},
  {"id":"label","type":"string","label":"Lesson label","default":"LEARNED FACEBOOK ADS"},
  {"id":"labelSize","type":"number","label":"Label font size","default":92},
  {"id":"kicker","type":"string","label":"Kicker","default":"WHAT I LEARNED"}
]'>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        font-family: "Montserrat", system-ui, sans-serif;
        background: #00B140;
      }
      /* flat chroma-green stage for keying */
      .stage {
        position: absolute; inset: 0; overflow: hidden;
        background: #00B140;
      }
      /* world wrapper carries the slow camera push */
      .world {
        position: absolute; inset: 0;
        transform-origin: 50% 50%;
        will-change: transform;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 46px; padding: 0 110px;
      }
      .kicker {
        font-weight: 800; font-size: 34px; letter-spacing: 0.34em; text-transform: uppercase;
        color: #F28129; opacity: 0; will-change: transform, opacity;
        text-shadow: 0 2px 10px rgba(0,0,0,0.4);
      }
      /* orange-glass number plaque */
      .badge {
        width: 300px; height: 300px; border-radius: 56px;
        display: flex; align-items: center; justify-content: center;
        background: linear-gradient(150deg, #FFC68A 0%, #F28129 55%, #D66416 100%);
        border: 3px solid #fff; opacity: 0; will-change: transform, opacity;
        box-shadow: 0 0 46px rgba(242,129,41,0.55), 0 18px 40px rgba(0,0,0,0.42),
                    inset 0 3px 8px rgba(255,255,255,0.25);
      }
      .badge span {
        font-weight: 900; font-size: 190px; line-height: 1; color: #fff;
        letter-spacing: -0.03em; font-variant-numeric: tabular-nums;
        text-shadow: 0 6px 16px rgba(0,0,0,0.35);
      }
      .accent {
        width: 200px; height: 9px; border-radius: 6px;
        background: linear-gradient(90deg, #FFC68A 0%, #F28129 60%, #D66416 100%);
        box-shadow: 0 0 20px rgba(242,129,41,0.6);
        opacity: 0; transform: scaleX(0); will-change: transform, opacity;
      }
      .label {
        font-weight: 800; font-size: 92px; line-height: 1.05; letter-spacing: -0.015em;
        text-transform: uppercase; color: #fff; text-align: center; max-width: 860px;
        opacity: 0; will-change: transform, opacity;
        text-shadow: 0 5px 18px rgba(0,0,0,0.5);
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="3.2" data-width="1080" data-height="1920">
      <div id="scene" class="clip" data-start="0" data-duration="3.2" data-track-index="1">
        <div class="stage">
          <div id="world" class="world" data-layout-allow-overflow>
            <div id="badge" class="badge"><span id="num">01</span></div>
            <div id="accent" class="accent"></div>
            <div id="label" class="label">LEARNED FACEBOOK ADS</div>
          </div>
        </div>
      </div>
    </div>
    <script>
      (function () {
        const v = (window.__hyperframes && window.__hyperframes.getVariables)
          ? window.__hyperframes.getVariables() : {};
        if (v.num) document.getElementById("num").textContent = v.num;
        if (v.label) document.getElementById("label").textContent = v.label;
        if (v.labelSize) document.getElementById("label").style.fontSize = v.labelSize + "px";

        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // slow camera push across the whole card (one synced ease)
        tl.fromTo("#world", { scale: 1.0 }, { scale: 1.045, duration: 3.2, ease: "power2.inOut" }, 0);
        // number plaque slams in
        tl.fromTo("#badge", { opacity: 0, scale: 0.5, rotation: -8 }, { opacity: 1, scale: 1, rotation: 0, duration: 0.6, ease: "back.out(1.6)", immediateRender: false }, 0.3);
        // accent line draws out from center
        tl.fromTo("#accent", { opacity: 0, scaleX: 0 }, { opacity: 1, scaleX: 1, duration: 0.5, ease: "expo.out", immediateRender: false }, 0.62);
        // label rises in
        tl.fromTo("#label", { opacity: 0, y: 46 }, { opacity: 1, y: 0, duration: 0.55, ease: "power3.out", immediateRender: false }, 0.72);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
