<!DOCTYPE html>
<html lang="en" data-resolution="landscape">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; background: #060608; }

      #root .stage { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }

      /* faint tech grid */
      #root .grid {
        position: absolute; inset: 0; z-index: 0;
        background:
          repeating-linear-gradient(0deg, rgba(255,255,255,0.035) 0 1px, transparent 1px 66px),
          repeating-linear-gradient(90deg, rgba(255,255,255,0.035) 0 1px, transparent 1px 66px);
      }
      /* orange glow pool behind the panel */
      #root .glow { position: absolute; inset: 0; z-index: 0; background: radial-gradient(ellipse 46% 46% at center, rgba(242,129,41,0.30) 0%, rgba(242,129,41,0) 65%); }

      #root .panel {
        position: relative; z-index: 1;
        width: 1180px; padding: 70px 90px;
        display: flex; flex-direction: column; align-items: center; gap: 26px;
        border-radius: 24px;
        background: linear-gradient(135deg, rgba(242,129,41,0.18) 0%, rgba(242,129,41,0.05) 100%);
        border: 1.5px solid rgba(242,129,41,0.55);
        box-shadow: 0 0 90px rgba(242,129,41,0.25), inset 0 1px 0 rgba(255,255,255,0.12);
      }

      #root .badge {
        font-family: "Montserrat", sans-serif; font-weight: 700; font-size: 26px; letter-spacing: 0.22em;
        color: #ffffff; background: #F28129; padding: 10px 26px; border-radius: 100px; text-indent: 0.22em;
      }
      #root .title { font-family: "Montserrat", sans-serif; font-weight: 600; font-size: 104px; line-height: 1; letter-spacing: 0.04em; color: #ffffff; white-space: nowrap; }
      #root .underline { width: 360px; height: 3px; background: #F28129; border-radius: 3px; transform-origin: center; box-shadow: 0 0 16px rgba(242,129,41,0.7); }
      #root .episode { font-family: "Montserrat", sans-serif; font-weight: 500; font-size: 30px; letter-spacing: 0.5em; color: rgba(255,255,255,0.82); text-indent: 0.5em; }
    </style>
  </head>
  <body>
    <div data-hf-id="hf-vl5w" id="root" data-composition-id="main" data-start="0" data-duration="6.2" data-width="1920" data-height="1080">
      <div data-hf-id="hf-tan6" class="stage">
        <div data-hf-id="hf-kxq8" class="grid"></div>
        <div data-hf-id="hf-2s7n" class="glow"></div>
        <div data-hf-id="hf-owjm" class="panel">
          <span data-hf-id="hf-52zi" class="badge">EP. 01</span>
          <span data-hf-id="hf-awb9" class="title">TRENDIFY DIARIES</span>
          <span data-hf-id="hf-b46r" class="underline"></span>
          <span data-hf-id="hf-ydpt" class="episode">EPISODE ONE</span>
        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        tl.from(".grid", { opacity: 0, duration: 0.9, ease: "power2.out" }, 0.05);
        tl.from(".glow", { opacity: 0, scale: 0.7, transformOrigin: "center", duration: 1.0, ease: "power2.out" }, 0.1);

        // glass panel materializes
        tl.from(".panel", { scale: 0.92, y: 22, opacity: 0, duration: 0.7, ease: "power3.out" }, 0.22);
        // badge pops
        tl.from(".badge", { scale: 0.5, opacity: 0, transformOrigin: "center", duration: 0.5, ease: "back.out(2.2)" }, 0.55);
        // title rises
        tl.from(".title", { y: 26, opacity: 0, duration: 0.6, ease: "power3.out" }, 0.62);
        // underline draws
        tl.from(".underline", { scaleX: 0, duration: 0.55, ease: "power3.inOut" }, 0.9);
        // episode label
        tl.from(".episode", { y: 12, opacity: 0, duration: 0.5, ease: "power2.out" }, 1.05);

        // ambient: the glow breathes, panel + underline subtly pulse
        tl.to(".glow", { opacity: 0.6, duration: 0.9, ease: "sine.inOut", repeat: 3, yoyo: true }, 1.8);
        tl.to(".panel", { scale: 1.008, transformOrigin: "center", duration: 1.4, ease: "sine.inOut", repeat: 1, yoyo: true }, 1.9);
        tl.to(".underline", { opacity: 0.55, duration: 0.8, ease: "sine.inOut", repeat: 3, yoyo: true }, 2.0);

        tl.to(".stage", { opacity: 0, duration: 0.6, ease: "power2.inOut" }, 5.55);

        window.__timelines["main"] = tl;
      </script>
    </div>
  </body>
</html>
