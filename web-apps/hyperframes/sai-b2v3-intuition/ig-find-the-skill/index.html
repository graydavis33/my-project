<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: transparent; font-family: "Montserrat", system-ui, sans-serif;
      }
      .scene { position: relative; width: 100%; height: 100%; overflow: hidden; }
      .world { position: absolute; inset: 0; transform-origin: 0 0; will-change: transform; }

      /* soft rolling terrain (semi-transparent so footage shows through) */
      .terrain { position: absolute; left: 0; top: 760px; width: 1080px; height: 560px;
        opacity: 0; will-change: opacity; }

      /* gems */
      .gem { position: absolute; width: 92px; height: 96px; opacity: 0;
        will-change: transform, opacity; filter: drop-shadow(0 8px 12px rgba(0,0,0,0.4)); }
      .gem.grey { color: #6B7280; }
      .gem.orange { color: #F2872F; width: 106px; height: 110px; }

      .findglow { position: absolute; width: 300px; height: 300px; border-radius: 50%; opacity: 0;
        will-change: transform, opacity; pointer-events: none;
        background: radial-gradient(circle, rgba(242,129,41,0.55) 0%, rgba(242,129,41,0.12) 45%, rgba(242,129,41,0) 72%); }
      .ring { position: absolute; width: 150px; height: 150px; border-radius: 50%;
        border: 5px solid rgba(242,129,41,0.85); opacity: 0; will-change: transform, opacity; }

      /* magnifier */
      .mag { position: absolute; left: 0; top: 0; width: 210px; height: 240px; opacity: 0;
        will-change: transform, opacity; filter: drop-shadow(0 14px 20px rgba(0,0,0,0.45)); }
      .mag .glass { fill: rgba(190,225,255,0.14); stroke: rgba(255,255,255,0.5); stroke-width: 2; }
      .mag .ringo { fill: none; stroke: #2C3340; stroke-width: 14; }
      .mag .sheen { fill: none; stroke: rgba(255,255,255,0.8); stroke-width: 7; stroke-linecap: round; }
      .mag .handle { fill: #2C3340; }
    </style>
  </head>
  <body>
    <div data-hf-id="hf-yk9p" id="root" data-composition-id="main" data-start="0" data-duration="5.6" data-width="1080" data-height="1920">
      <div data-hf-id="hf-408w" id="scene" class="scene clip" data-start="0" data-duration="5.6" data-track-index="1">
        <div data-hf-id="hf-e6wx" id="world" class="world" data-layout-allow-overflow="">

          <svg data-hf-id="hf-zd4m" id="terrain" class="terrain" viewBox="0 0 1080 560" preserveAspectRatio="none">
            <defs data-hf-id="hf-mh0t">
              <lineargradient data-hf-id="hf-9zdp" id="tg" x1="0" y1="0" x2="0" y2="1">
                <stop data-hf-id="hf-dyfh" offset="0" stop-color="rgba(70,80,94,0.5)" />
                <stop data-hf-id="hf-jmv8" offset="1" stop-color="rgba(34,40,50,0.5)" />
              </lineargradient>
              <lineargradient data-hf-id="hf-wvhz" id="tg2" x1="0" y1="0" x2="0" y2="1">
                <stop data-hf-id="hf-auoc" offset="0" stop-color="rgba(54,62,76,0.42)" />
                <stop data-hf-id="hf-a9hh" offset="1" stop-color="rgba(30,36,46,0.42)" />
              </lineargradient>
            </defs>
            <path data-hf-id="hf-wvah" fill="url(#tg2)" d="M0,210 C180,150 320,250 520,200 C700,160 860,250 1080,190 L1080,560 L0,560 Z" />
            <path data-hf-id="hf-760q" fill="url(#tg)" d="M0,290 C160,210 360,210 540,270 C740,335 900,235 1080,300 L1080,560 L0,560 Z" />
          </svg>

          <div data-hf-id="hf-83ke" id="findglow" class="findglow" style="left:484px; top:806px;"></div>

          <svg data-hf-id="hf-ugfg" class="gem grey" id="gem1" style="left:182px; top:986px;" viewBox="0 0 100 104">
            <path data-hf-id="hf-9e2j" fill="currentColor" d="M50 8 L88 42 L50 96 L12 42 Z" />
            <path data-hf-id="hf-mica" fill="rgba(255,255,255,0.30)" d="M50 8 L12 42 L33 42 L50 26 Z" />

          </svg>

            <path data-hf-id="hf-gj26" fill="rgba(255,255,255,0.30)" d="M50 8 L12 42 L33 42 L50 26 Z" />
            <path data-hf-id="hf-x51g" fill="rgba(0,0,0,0.18)" d="M50 8 L88 42 L67 42 L50 26 Z" />

          </svg>

          <svg data-hf-id="hf-760f" id="mag" class="mag" viewBox="0 0 210 240">
            <circle data-hf-id="hf-w4ko" class="glass" cx="92" cy="92" r="72" />
            <circle data-hf-id="hf-xms7" class="ringo" cx="92" cy="92" r="72" />
            <path data-hf-id="hf-j3dz" class="sheen" d="M56 68 A38 38 0 0 1 92 53" />
            <rect data-hf-id="hf-jr3t" class="handle" x="146" y="146" width="34" height="92" rx="17" transform="rotate(-45 163 192)" />
          </svg>

        </div>
      </div>
    </div>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        gsap.set("#world", { x: 0, y: 0, scale: 1 });

        tl.to("#terrain", { opacity: 1, duration: 0.6, ease: "power2.out" }, 0.0);

        tl.fromTo(["#gem1","#gem2","#gemO","#gem4","#gem5"],
          { opacity: 0, y: 26, scale: 0.7 },
          { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: "back.out(1.6)", stagger: 0.08, transformOrigin: "50% 100%", immediateRender: false }, 0.3);

        // magnifier searches across (lens center = mag.x+92, mag.y+92)
        // gem1 c(228,1034)->mag(136,942); gem2 c(418,972)->mag(326,880);
        // gem4 c(790,964)->mag(698,872); gemO c(609,1003)->mag(517,911)
        tl.fromTo("#mag", { opacity: 0, x: -180, y: 900 }, { opacity: 1, x: 136, y: 942, duration: 0.7, ease: "power2.out", immediateRender: false }, 0.9);
        tl.to("#mag", { x: 326, y: 880, duration: 0.7, ease: "power1.inOut" }, 1.7);
        tl.to("#mag", { x: 698, y: 872, duration: 0.8, ease: "power1.inOut" }, 2.5);
        tl.to("#mag", { x: 517, y: 911, duration: 0.7, ease: "power2.inOut" }, 3.5);

        const mag = (sel, at) => {
          tl.to(sel, { scale: 1.55, duration: 0.35, ease: "power2.out", transformOrigin: "50% 50%" }, at);
          tl.to(sel, { scale: 1.0, duration: 0.35, ease: "power2.in", transformOrigin: "50% 50%" }, at + 0.55);
        };
        mag("#gem1", 1.5); mag("#gem2", 2.3); mag("#gem4", 3.1);

        // THE FIND
        tl.to("#gemO", { scale: 1.9, duration: 0.55, ease: "back.out(1.7)", transformOrigin: "50% 50%" }, 4.2);
        tl.to("#findglow", { opacity: 1, duration: 0.5, ease: "power2.out" }, 4.3);
        tl.fromTo("#findglow", { scale: 0.9 }, { scale: 1.08, duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 1, transformOrigin: "50% 50%", immediateRender: false }, 4.6);
        tl.fromTo("#ring", { scale: 0.4, opacity: 0.9 }, { scale: 1.7, opacity: 0, duration: 1.0, ease: "power1.out", transformOrigin: "50% 50%", repeat: 1, immediateRender: false }, 4.4);
        tl.to("#mag", { opacity: 0, duration: 0.45, ease: "power1.out" }, 4.4);

        // camera push to the find (gemO center 609,1003 @1.3): tx=540-1.3*609=-252; ty=960-1.3*1003=-344
        tl.to("#world", { x: -252, y: -344, scale: 1.3, duration: 1.2, ease: "power2.inOut" }, 4.3);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
