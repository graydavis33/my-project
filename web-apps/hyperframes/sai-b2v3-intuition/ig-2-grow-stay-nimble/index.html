<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: transparent; font-family: "Montserrat", system-ui, sans-serif;
      }
      .scene { position: relative; width: 100%; height: 100%; overflow: hidden; }

      /* the camera — cranes up the tower */
      .world { position: absolute; inset: 0; transform-origin: 0 0; will-change: transform; }

      /* base haze + ground glow */
      .haze { position: absolute; left: -200px; top: 1480px; width: 1480px; height: 520px;
        opacity: 0; will-change: opacity; pointer-events: none;
        background: radial-gradient(ellipse 46% 60% at 50% 30%, rgba(242,129,41,0.34) 0%, rgba(242,129,41,0.08) 46%, rgba(242,129,41,0) 72%); }

      /* dim grey corporate towers left behind at the base */
      .greys { position: absolute; left: 0; top: 0; width: 1080px; filter: blur(2px) saturate(0.5) brightness(0.62); }
      .grey { position: absolute; border-radius: 5px 5px 0 0; border: 1px solid rgba(255,255,255,0.06);
        background-image:
          repeating-linear-gradient(to bottom, rgba(0,0,0,0.40) 0 5px, transparent 5px 40px),
          repeating-linear-gradient(to right, rgba(0,0,0,0.40) 0 5px, transparent 5px 44px),
          linear-gradient(160deg, #79828F 0%, #4E555F 60%, #343A42 100%);
        box-shadow: 0 14px 36px rgba(0,0,0,0.4); }

      /* ===== the hero: soaring orange-glass tower ===== */
      .towerwrap { position: absolute; left: 392px; top: -1520px; width: 296px; height: 3220px;
        clip-path: polygon(9% 0, 91% 0, 100% 100%, 0 100%); overflow: hidden;
        will-change: transform, opacity; filter: drop-shadow(0 0 46px rgba(242,129,41,0.45)); }

      .face { position: absolute; inset: 0; }
      /* dim, "asleep" facade */
      .face.dim {
        background-image:
          repeating-linear-gradient(to bottom, rgba(0,0,0,0.34) 0 6px, transparent 6px 46px),
          repeating-linear-gradient(to right, rgba(0,0,0,0.36) 0 7px, transparent 7px 52px),
          linear-gradient(155deg, #B9824F 0%, #8C5C32 58%, #5E3C20 100%);
        background-position: center bottom; }
      /* lit facade, revealed bottom-up as we ascend */
      .lit { position: absolute; left: 0; right: 0; bottom: 0; height: 0; overflow: hidden; will-change: height; }
      .lit .face {
        position: absolute; left: 0; right: 0; top: auto; bottom: 0; height: 3220px;
        background-image:
          repeating-linear-gradient(to bottom, rgba(255,240,220,0.16) 0 6px, transparent 6px 46px),
          repeating-linear-gradient(to right, rgba(255,240,220,0.18) 0 7px, transparent 7px 52px),
          linear-gradient(155deg, #FFE0B8 0%, #F8923A 52%, #D86B1C 100%);
        background-position: center bottom;
        box-shadow: inset 0 0 60px rgba(255,210,150,0.5); }
      /* bloom band riding the top edge of the lit fill (child of towerwrap, animated up) */
      .bloom { position: absolute; left: -10%; right: -10%; bottom: -20px; height: 78px; opacity: 0;
        will-change: transform, opacity;
        background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(255,236,200,0.95) 0%, rgba(255,170,90,0.4) 45%, rgba(255,150,70,0) 75%);
        filter: blur(3px); }

      /* left rim light + right depth face for dimensionality */
      .rim { position: absolute; left: 0; top: 0; width: 16px; height: 100%;
        background: linear-gradient(90deg, rgba(255,240,220,0.85), rgba(255,240,220,0)); }
      .depth { position: absolute; right: 0; top: 0; width: 30px; height: 100%;
        background: linear-gradient(270deg, rgba(0,0,0,0.45), rgba(0,0,0,0)); }

      /* crown spire + beacon */
      .spire { position: absolute; left: 528px; top: -1612px; width: 24px; height: 110px;
        background: linear-gradient(180deg, #FFD9A8, #F28129); border-radius: 12px 12px 0 0;
        opacity: 0; will-change: transform, opacity; filter: drop-shadow(0 0 14px rgba(242,129,41,0.8)); }
      .beacon { position: absolute; left: 524px; top: -1640px; width: 32px; height: 32px; border-radius: 50%;
        background: radial-gradient(circle at 50% 40%, #FFF6E8 0%, #FFB163 50%, #F28129 100%);
        opacity: 0; will-change: transform, opacity; box-shadow: 0 0 30px 10px rgba(242,129,41,0.9); }
      .glint { position: absolute; left: 470px; top: -1690px; width: 140px; height: 140px; opacity: 0;
        will-change: transform, opacity; pointer-events: none;
        background:
          linear-gradient(0deg, transparent 47%, rgba(255,245,225,0.95) 50%, transparent 53%),
          linear-gradient(90deg, transparent 47%, rgba(255,245,225,0.95) 50%, transparent 53%);
        filter: blur(0.5px); }

      /* embers drifting up the face (subtle, with vertical blur) */
      .ember { position: absolute; width: 10px; height: 26px; border-radius: 50%; opacity: 0;
        will-change: transform, opacity; filter: blur(1px);
        background: linear-gradient(180deg, rgba(255,200,140,0) 0%, #FFB163 60%, #F28129 100%);
        box-shadow: 0 0 12px 3px rgba(242,129,41,0.6); }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="6" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="6" data-track-index="1">
        <div id="world" class="world" data-layout-allow-overflow>

          <div id="haze" class="haze"></div>

          <!-- grey towers clustered low at the base -->
          <div class="greys" data-layout-allow-overflow>
            <div class="grey" style="left:70px;  top:1230px; width:150px; height:330px;"></div>
            <div class="grey" style="left:240px; top:1140px; width:130px; height:420px;"></div>
            <div class="grey" style="left:720px; top:1180px; width:140px; height:380px;"></div>
            <div class="grey" style="left:880px; top:1260px; width:150px; height:300px;"></div>
            <div class="grey" style="left:610px; top:1300px; width:90px;  height:260px;"></div>
          </div>

          <!-- HERO tower -->
          <div id="towerwrap" class="towerwrap" data-layout-allow-overflow>
            <div class="face dim"></div>
            <div id="lit" class="lit" data-layout-allow-overflow>
              <div class="face"></div>
            </div>
            <div id="bloom" class="bloom" data-layout-allow-overflow></div>
            <div class="rim"></div>
            <div class="depth"></div>
          </div>

          <div id="spire" class="spire"></div>
          <div id="beacon" class="beacon"></div>
          <div id="glint" class="glint"></div>

          <div id="em1" class="ember" style="left:430px; top:1300px;"></div>
          <div id="em2" class="ember" style="left:630px; top:1180px;"></div>
          <div id="em3" class="ember" style="left:500px; top:980px;"></div>
          <div id="em4" class="ember" style="left:590px; top:760px;"></div>

        </div>
      </div>
    </div>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // camera starts framed on the base of the tower (grey towers in shot)
        gsap.set("#world", { x: 0, y: -80, scale: 1.0 });

        // settle in
        tl.from("#towerwrap", { opacity: 0, duration: 0.5, ease: "power2.out" }, 0.0);
        tl.fromTo("#haze", { opacity: 0 }, { opacity: 1, duration: 0.6, ease: "power2.out", immediateRender: false }, 0.2);

        // the light ignites and races up the tower (bottom -> top)
        tl.to("#lit", { height: 3220, duration: 3.6, ease: "power1.in" }, 0.6);
        // bloom rides the leading edge of the lit fill (same ease so it stays on the wavefront)
        tl.to("#bloom", { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.7);
        tl.to("#bloom", { y: -3190, duration: 3.6, ease: "power1.in" }, 0.6);
        tl.to("#bloom", { opacity: 0, duration: 0.4, ease: "power1.out" }, 4.0);

        // CAMERA cranes UP the tower, synced (Y + slight scale + tiny x to stay centered)
        // start (0,-80,1.0) -> end (-43, 2050, 1.08); one ease so the crown glides to frame
        tl.to("#world", { x: -43, y: 2050, scale: 1.08, duration: 3.9, ease: "power2.inOut" }, 0.7);

        // embers drift up the face as we rise
        const ems = ["#em1","#em2","#em3","#em4"];
        const ed  = [0.9, 1.4, 2.0, 2.6];
        ems.forEach((e, i) => {
          tl.fromTo(e, { opacity: 0, y: 60 }, { opacity: 0.9, y: 0, duration: 0.4, ease: "power2.out", immediateRender: false }, ed[i]);
          tl.fromTo(e, { y: 0, opacity: 0.9 }, { y: -180, opacity: 0, duration: 1.6, ease: "power1.in", immediateRender: false }, ed[i] + 0.4);
        });

        // reaching the crown: spire + beacon + glint bloom
        tl.fromTo("#spire", { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.5, ease: "power2.out", immediateRender: false }, 3.7);
        tl.fromTo("#beacon", { opacity: 0, scale: 0.4 }, { opacity: 1, scale: 1, duration: 0.45, ease: "back.out(2.2)", transformOrigin: "50% 50%", immediateRender: false }, 4.1);
        tl.fromTo("#beacon", { scale: 1 }, { scale: 1.18, duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: 2, transformOrigin: "50% 50%", immediateRender: false }, 4.55);
        tl.fromTo("#glint", { opacity: 0, scale: 0.3, rotation: 0 }, { opacity: 0.95, scale: 1, rotation: 45, duration: 0.5, ease: "power2.out", transformOrigin: "50% 50%", immediateRender: false }, 4.3);
        tl.to("#glint", { opacity: 0, scale: 1.3, duration: 0.7, ease: "power1.out" }, 4.8);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
