<!doctype html>
<html lang="en" data-resolution="landscape">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; background: #000; }

      #root .stage {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        padding: 0 0 0 150px;
        gap: 8px;
      }
      #root .line { display: block; font-family: "Archivo Black", sans-serif; font-weight: 900; font-size: 196px; line-height: 0.96; letter-spacing: -0.01em; }
      #root .l1 { color: #ffffff; }
      #root .l2 { color: #F28129; }
      #root .tagrow { display: flex; align-items: center; gap: 26px; margin-top: 30px; }
      #root .tagsq { width: 64px; height: 18px; background: #F28129; transform-origin: left center; }
      #root .tagtext { font-family: "Archivo Black", sans-serif; font-weight: 900; font-size: 36px; letter-spacing: 0.34em; color: #ffffff; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="6.0" data-width="1920" data-height="1080">
      <div class="stage">
        <span class="line l1">TRENDIFY</span>
        <span class="line l2">DIARIES</span>
        <div class="tagrow">
          <span class="tagsq"></span>
          <span class="tagtext">EPISODE 01</span>
        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        tl.from(".l1", { scale: 1.2, opacity: 0, transformOrigin: "left center", duration: 0.5, ease: "power4.out" }, 0.2);
        tl.from(".l2", { scale: 1.2, opacity: 0, transformOrigin: "left center", duration: 0.5, ease: "expo.out" }, 0.36);
        tl.from(".tagsq", { scaleX: 0, duration: 0.4, ease: "back.out(2)" }, 0.66);
        tl.from(".tagtext", { x: -26, opacity: 0, duration: 0.45, ease: "power2.out" }, 0.74);

        // ambient: a slow parallax drift + the accent bar breathing
        tl.to(".stage", { x: 7, y: -5, duration: 0.95, ease: "sine.inOut", repeat: 3, yoyo: true }, 1.6);
        tl.to(".tagsq", { scaleY: 1.3, transformOrigin: "center", duration: 0.9, ease: "sine.inOut", repeat: 3, yoyo: true }, 1.7);

        tl.to(".stage", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 5.4);

        window.__timelines["main"] = tl;
      </script>
    </div>
  </body>
</html>
