<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: transparent; font-family: "Montserrat", system-ui, sans-serif;
      }
      .scene { position: relative; width: 100%; height: 100%; overflow: hidden; }
      .world { position: absolute; inset: 0; transform-origin: 0 0; will-change: transform; }

      /* dark stage card */
      .stage { position: absolute; left: 215px; top: 520px; width: 650px; height: 900px;
        border-radius: 26px; will-change: transform, opacity;
        background: linear-gradient(110deg, #34302C 0%, #272320 55%, #1C1916 100%);
        box-shadow: inset 0 2px 6px rgba(255,255,255,0.08), 0 18px 42px rgba(0,0,0,0.5); }

      /* big number label at the top of the card */
      .num { position: absolute; left: 215px; width: 650px; text-align: center; top: 556px;
        font-weight: 900; font-size: 150px; letter-spacing: -0.03em; line-height: 1;
        text-shadow: 0 6px 16px rgba(0,0,0,0.45); will-change: transform, opacity; opacity: 0;
        font-variant-numeric: tabular-nums; }
      #ten { color: #FFFFFF; }
      #three { color: #F28129; text-shadow: 0 0 26px rgba(242,129,41,0.65), 0 6px 16px rgba(0,0,0,0.5); }
      .num { line-height: 1; height: 150px; }
      .kick { position: absolute; left: 215px; width: 650px; text-align: center; top: 736px;
        font-weight: 800; font-size: 32px; letter-spacing: 0.12em; color: rgba(255,255,255,0.72);
        text-transform: uppercase; opacity: 0; will-change: opacity; }

      /* orange payoff glow behind the clean stack */
      .glow { position: absolute; left: 280px; top: 700px; width: 520px; height: 580px; opacity: 0;
        will-change: transform, opacity; pointer-events: none;
        background: radial-gradient(ellipse 50% 50% at 50% 50%, rgba(242,135,47,0.55) 0%, rgba(242,135,47,0.18) 45%, rgba(242,135,47,0) 72%);
        filter: blur(2px); }

      /* pages — white rounded cards with thin grey content lines */
      .page { position: absolute; width: 330px; height: 450px; border-radius: 16px;
        background: #FFFFFF; will-change: transform, opacity; opacity: 0;
        box-shadow: 0 12px 26px rgba(0,0,0,0.34); }
      .page .ln { position: absolute; left: 30px; height: 11px; border-radius: 6px;
        background: rgba(120,128,140,0.5); }
      .page .ln.l1 { top: 56px; width: 200px; } .page .ln.l2 { top: 92px; width: 250px; }
      .page .ln.l3 { top: 128px; width: 230px; } .page .ln.l4 { top: 164px; width: 180px; }
      /* the front "clean" page gets an orange header tab */
      .page .tab { position: absolute; left: 30px; top: 26px; width: 120px; height: 16px;
        border-radius: 8px; background: linear-gradient(90deg, #FFC68A, #F28129); display: none; }
      .page.keep.front .tab { display: block; }
      .page.keep.front { box-shadow: 0 0 24px rgba(242,129,41,0.55), 0 12px 26px rgba(0,0,0,0.34),
        inset 0 0 0 2px rgba(242,129,41,0.85); }
    </style>
  </head>
  <body>
    <div data-hf-id="hf-gm97" id="root" data-composition-id="main" data-start="0" data-duration="5.4" data-width="1080" data-height="1920">
      <div data-hf-id="hf-624y" id="scene" class="scene clip" data-start="0" data-duration="5.4" data-track-index="1">
        <div data-hf-id="hf-e6wx" id="world" class="world" data-layout-allow-overflow="">

          <div data-hf-id="hf-lp42" id="stage" class="stage"></div>
          <div data-hf-id="hf-35j2" id="glow" class="glow"></div>

          <!-- drop pages (7) — the messy old version that gets cut -->
          <div data-hf-id="hf-qq9o" id="d1" class="page drop" style="left:250px; top:820px;"><div data-hf-id="hf-6im3" class="ln l1"></div><div data-hf-id="hf-xuq8" class="ln l2"></div><div data-hf-id="hf-yme1" class="ln l3"></div><div data-hf-id="hf-nqwe" class="ln l4"></div></div>
          <div data-hf-id="hf-ecs2" id="d2" class="page drop" style="left:560px; top:760px;"><div data-hf-id="hf-pfgb" class="ln l1"></div><div data-hf-id="hf-pm7c" class="ln l2"></div><div data-hf-id="hf-eld9" class="ln l3"></div></div>
          <div data-hf-id="hf-d9wl" id="d3" class="page drop" style="left:300px; top:690px;"><div data-hf-id="hf-p15a" class="ln l1"></div><div data-hf-id="hf-ofa9" class="ln l2"></div><div data-hf-id="hf-fsac" class="ln l3"></div><div data-hf-id="hf-klpu" class="ln l4"></div></div>
          <div data-hf-id="hf-tmt7" id="d4" class="page drop" style="left:520px; top:880px;"><div data-hf-id="hf-omu9" class="ln l1"></div><div data-hf-id="hf-otla" class="ln l2"></div><div data-hf-id="hf-fdzb" class="ln l3"></div></div>
          <div data-hf-id="hf-ozsx" id="d5" class="page drop" style="left:410px; top:700px;"><div data-hf-id="hf-o8j8" class="ln l1"></div><div data-hf-id="hf-nmo7" class="ln l2"></div><div data-hf-id="hf-gkwe" class="ln l3"></div><div data-hf-id="hf-l00v" class="ln l4"></div></div>
          <div data-hf-id="hf-pago" id="d6" class="page drop" style="left:600px; top:930px;"><div data-hf-id="hf-nu87" class="ln l1"></div><div data-hf-id="hf-o0z8" class="ln l2"></div><div data-hf-id="hf-g6ld" class="ln l3"></div></div>
          <div data-hf-id="hf-nrsq" id="d7" class="page drop" style="left:230px; top:930px;"><div data-hf-id="hf-nfx6" class="ln l1"></div><div data-hf-id="hf-mu25" class="ln l2"></div><div data-hf-id="hf-hdig" class="ln l3"></div><div data-hf-id="hf-lebw" class="ln l4"></div></div>

          <!-- keep pages (3) — the clean simplified set -->
          <div data-hf-id="hf-vlbh" id="k3" class="page keep" style="left:345px; top:788px;"><div data-hf-id="hf-n1m5" class="ln l1"></div><div data-hf-id="hf-n8d6" class="ln l2"></div><div data-hf-id="hf-gz7f" class="ln l3"></div></div>
          <div data-hf-id="hf-q8rg" id="k2" class="page keep" style="left:405px; top:772px;"><div data-hf-id="hf-t07k" class="ln l1"></div><div data-hf-id="hf-secj" class="ln l2"></div><div data-hf-id="hf-i64i" class="ln l3"></div></div>
          <div data-hf-id="hf-15ih" id="k1" class="page keep front" style="left:375px; top:780px;"><div data-hf-id="hf-clpx" class="tab"></div><div data-hf-id="hf-slwj" class="ln l1"></div><div data-hf-id="hf-ssnk" class="ln l2"></div><div data-hf-id="hf-hrth" class="ln l3"></div><div data-hf-id="hf-lsmx" class="ln l4"></div></div>

          <div data-hf-id="hf-nsky" id="ten" class="num">10</div>
          <div data-hf-id="hf-x9fj" id="three" class="num">3</div>

        </div>
      </div>
    </div>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        gsap.set("#world", { x: 0, y: 0, scale: 1.0 });

        // messy start states (all 10 pages jumbled in the pile)
        gsap.set("#d1", { rotation: -18 }); gsap.set("#d2", { rotation: 14 });
        gsap.set("#d3", { rotation: 22 });  gsap.set("#d4", { rotation: -12 });
        gsap.set("#d5", { rotation: 8 });   gsap.set("#d6", { rotation: -22 });
        gsap.set("#d7", { rotation: 16 });
        gsap.set("#k1", { rotation: -3, x: 8,  y: -10 });
        gsap.set("#k2", { rotation: 16, x: 34, y: 6 });
        gsap.set("#k3", { rotation: -15, x: -30, y: 4 });

        // stage establishes
        tl.from("#stage", { scaleY: 0.92, opacity: 0, duration: 0.5, ease: "back.out(1.2)", transformOrigin: "50% 100%" }, 0.1);

        // the messy pile of 10 fades in, staggered
        tl.to(["#d3","#d5","#d2","#d4","#d1","#d6","#d7","#k3","#k2","#k1"],
          { opacity: 1, duration: 0.4, ease: "power2.out", stagger: 0.05 }, 0.35);
        tl.fromTo("#ten", { opacity: 0, y: -16 }, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out", immediateRender: false }, 0.6);

        // 7 messy pages fly outward and clear off the card
        const flyout = [
          ["#d1", -380, 120, -60], ["#d2", 420, -90, 70], ["#d3", -300, -260, 90],
          ["#d4", 360, 270, -70], ["#d5", 70, -360, 40], ["#d6", 420, 300, -90], ["#d7", -420, 300, 80],
        ];
        flyout.forEach((f, i) => {
          tl.to(f[0], { x: f[1], y: f[2], rotation: "+=" + f[3], opacity: 0, duration: 0.6, ease: "power2.in" }, 1.9 + i * 0.05);
        });
        tl.to("#ten", { opacity: 0, y: -18, duration: 0.4, ease: "power2.in" }, 2.0);

        // the 3 keepers straighten + neaten into a clean fanned stack
        tl.to("#k3", { rotation: -6, x: 0, y: 0, duration: 0.7, ease: "power3.out" }, 2.35);
        tl.to("#k2", { rotation: 5,  x: 0, y: 0, duration: 0.7, ease: "power3.out" }, 2.42);
        tl.to("#k1", { rotation: 0,  x: 0, y: 0, duration: 0.7, ease: "back.out(1.3)" }, 2.48);

        // orange glow ignites behind the clean stack
        tl.fromTo("#glow", { opacity: 0, scale: 0.8 }, { opacity: 1, scale: 1, duration: 0.6, ease: "power2.out", transformOrigin: "50% 50%", immediateRender: false }, 2.55);

        // camera push-in to frame the clean stack (pan + zoom in ONE synced ease)
        tl.to("#world", { x: -86, y: -182, scale: 1.16, duration: 1.5, ease: "power2.inOut" }, 2.5);

        // "3" payoff + kicker
        tl.fromTo("#three", { opacity: 0, scale: 0.6 }, { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.6)", immediateRender: false }, 3.05);

        // subtle idle float on the clean stack (finite, seekable)
        tl.to(["#k1","#k2","#k3"], { y: "-=8", duration: 0.9, ease: "sine.inOut", yoyo: true, repeat: 1 }, 3.7);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
