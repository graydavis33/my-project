<!DOCTYPE html>
<html lang="en" data-composition-variables='[{"id":"orange","type":"color","label":"Accent orange","default":"#F28129"},{"id":"white","type":"color","label":"Base white","default":"#FFFFFF"},{"id":"strokeWidth","type":"number","label":"Stroke / connector width (px)","default":6},{"id":"cornerRadius","type":"number","label":"Tile corner radius (px)","default":26},{"id":"stepCount","type":"number","label":"Number of steps","default":4},{"id":"kickerText","type":"string","label":"Title kicker","default":"THE FRAMEWORK"},{"id":"stageEnterTime","type":"number","label":"Stage enter time (s)","default":0.1},{"id":"firstStepTime","type":"number","label":"First step time (s)","default":0.55},{"id":"stepGap","type":"number","label":"Gap between steps (s)","default":0.5},{"id":"kickerTime","type":"number","label":"Kicker time (s)","default":0.15},{"id":"cameraTime","type":"number","label":"Camera move time (s)","default":2.7}]'>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: transparent; font-family: "Montserrat", system-ui, sans-serif;
      }
      .scene { position: relative; width: 100%; height: 100%; overflow: hidden; }
      .world { position: absolute; inset: 0; transform-origin: 0 0; will-change: transform; }

      /* dark high-contrast stage card */
      .stage { position: absolute; left: 170px; top: 470px; width: 740px; height: 1020px;
        border-radius: 32px; will-change: transform, opacity;
        background: linear-gradient(120deg, #34302C 0%, #272320 55%, #1C1916 100%);
        box-shadow: inset 0 2px 5px rgba(255,255,255,0.08), 0 18px 42px rgba(0,0,0,0.5); }

      /* the connector spine running down the steps (drawn) */
      .spine { position: absolute; left: 286px; top: 560px; width: 6px; height: 770px;
        background: rgba(255,255,255,0.9); border-radius: 4px; transform-origin: 50% 0%;
        will-change: transform; box-shadow: 0 2px 6px rgba(0,0,0,0.4); }

      /* a clean numbered step tile */
      .step { position: absolute; left: 230px; width: 620px; height: 168px;
        border-radius: 26px; background: #FFFFFF; opacity: 0;
        display: flex; align-items: center; will-change: transform, opacity;
        box-shadow: 0 16px 32px rgba(0,0,0,0.30), inset 0 1px 0 rgba(255,255,255,0.9); }
      /* the orange numbered node sits on the spine */
      .node { position: absolute; left: -72px; top: 34px; width: 100px; height: 100px;
        border-radius: 50%; display: flex; align-items: center; justify-content: center;
        font-weight: 900; font-size: 56px; color: #fff;
        background: radial-gradient(circle at 35% 30%, #FFC68A 0%, #F28129 55%, #C8631A 100%);
        border: 3px solid #fff; box-shadow: 0 0 22px rgba(242,129,41,0.55), 0 8px 18px rgba(0,0,0,0.35); }
      /* a clean abstract content mark inside each tile (no label clutter) */
      .bars { margin-left: 70px; display: flex; flex-direction: column; gap: 16px; }
      .bar { height: 16px; border-radius: 8px; background: #CDD2DA; }
      .bar.b1 { width: 360px; } .bar.b2 { width: 280px; }

      .kicker { position: absolute; left: 0; width: 100%; text-align: center; top: 300px;
        font-weight: 900; font-size: 90px; color: #F28129; text-transform: uppercase;
        letter-spacing: -0.02em; text-shadow: 0 6px 16px rgba(0,0,0,0.45);
        opacity: 0; will-change: transform, opacity; white-space: nowrap; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="5.0" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="5.0" data-track-index="1">
        <div id="world" class="world" data-layout-allow-overflow="">

          <div id="stage" class="stage"></div>
          <div id="spine" class="spine"></div>

          <!-- steps built by JS for full parameterization -->
          <div id="steps" data-layout-allow-overflow=""></div>

        </div>
        <div id="kicker" class="kicker" data-layout-allow-overflow="">THE FRAMEWORK</div>
      </div>
    </div>

    <script>
      (function () {
        const V = (window.__hyperframes && window.__hyperframes.getVariables)
          ? window.__hyperframes.getVariables() : {};
        const orange       = V.orange       ?? "#F28129";
        const white        = V.white        ?? "#FFFFFF";
        const strokeWidth  = V.strokeWidth  ?? 6;
        const cornerRadius = V.cornerRadius ?? 26;
        const stepCount    = V.stepCount    ?? 4;
        const kickerText   = V.kickerText   ?? "THE FRAMEWORK";
        const stageEnterT  = V.stageEnterTime ?? 0.1;
        const firstStepT   = V.firstStepTime  ?? 0.55;
        const stepGap      = V.stepGap        ?? 0.5;
        const kickerT      = V.kickerTime     ?? 0.15;
        const cameraT      = V.cameraTime     ?? 2.7;

        const kEl = document.getElementById("kicker");
        kEl.textContent = kickerText;
        kEl.style.color = orange;

        const spine = document.getElementById("spine");
        spine.style.width = strokeWidth + "px";
        spine.style.background = "rgba(255,255,255,0.9)";

        // --- build the step tiles ---
        const steps = document.getElementById("steps");
        const topStart = 560;     // first tile top
        const pitch = 210;        // vertical distance between tiles
        for (let i = 0; i < stepCount; i++) {
          const tile = document.createElement("div");
          tile.className = "step";
          tile.id = "s" + i;
          tile.style.top = (topStart + i * pitch) + "px";
          tile.style.borderRadius = cornerRadius + "px";

          const node = document.createElement("div");
          node.className = "node";
          node.textContent = (i + 1);
          tile.appendChild(node);

          const bars = document.createElement("div");
          bars.className = "bars";
          const b1 = document.createElement("div"); b1.className = "bar b1";
          const b2 = document.createElement("div"); b2.className = "bar b2";
          bars.appendChild(b1); bars.appendChild(b2);
          tile.appendChild(bars);

          steps.appendChild(tile);
        }

        // --- timeline ---
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        gsap.set("#world", { x: 0, y: 0, scale: 1.0 });

        // stage establishes
        tl.from("#stage", { scaleY: 0.92, opacity: 0, duration: 0.5, ease: "back.out(1.3)", transformOrigin: "50% 50%" }, stageEnterT);

        // kicker title in early
        tl.fromTo("#kicker", { opacity: 0, y: -22 }, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out", immediateRender: false }, kickerT + 0.15);

        // ONE MOTION: the spine draws downward (scaleY 0→1) and each step tile snaps onto it
        // in order — the onboarding SYSTEM building itself, step by step.
        const lastStepAt = firstStepT + (stepCount - 1) * stepGap;
        tl.fromTo("#spine", { scaleY: 0 }, { scaleY: 1, duration: lastStepAt + 0.2 - firstStepT, ease: "none" }, firstStepT - 0.1);

        for (let i = 0; i < stepCount; i++) {
          const at = firstStepT + i * stepGap;
          tl.fromTo("#s" + i,
            { opacity: 0, x: -36, scale: 0.92 },
            { opacity: 1, x: 0, scale: 1, duration: 0.45, ease: "back.out(1.6)", immediateRender: false }, at);
          // node pops a beat after its tile
          tl.fromTo("#s" + i + " .node",
            { scale: 0.3 },
            { scale: 1, duration: 0.4, ease: "back.out(2.4)", transformOrigin: "50% 50%", immediateRender: false }, at + 0.1);
        }

        // CAMERA payoff: gentle pan + zoom together onto the finished system (center of stack)
        const s = 1.18, Px = 540, Py = 1010;
        tl.to("#world", { x: 540 - s * Px, y: 960 - s * Py, scale: s, duration: 1.4, ease: "power2.inOut" }, cameraT);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
