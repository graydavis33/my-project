<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: transparent; font-family: "Montserrat", system-ui, sans-serif;
      }
      .scene { position: relative; width: 100%; height: 100%; }
      .stage { position: absolute; inset: 0; }

      /* North star — rises from behind the figure to above the head (z below figure) */
      .starwrap {
        position: absolute; left: 50%; margin-left: -180px; top: 549px;
        width: 360px; height: 360px; z-index: 1;
        display: flex; align-items: center; justify-content: center; will-change: transform, opacity;
      }
      .glow {
        position: absolute; width: 360px; height: 360px; border-radius: 50%;
        background: radial-gradient(circle, rgba(242,129,41,0.7) 0%, rgba(242,129,41,0.28) 38%, rgba(242,129,41,0) 70%);
        will-change: transform, opacity;
      }
      .star {
        width: 248px; height: 248px; position: relative;
        fill: #F28129; stroke: #fff; stroke-width: 3.5;
        filter: drop-shadow(0 0 26px rgba(242,129,41,0.8)) drop-shadow(0 8px 18px rgba(0,0,0,0.35));
      }

      /* Figure — head + shoulders bust, sits in the upper-middle, paints over the rising star */
      .fig {
        position: absolute; left: 50%; margin-left: -95px; top: 880px;
        width: 190px; height: 346px; fill: #fff; z-index: 2;
        filter: drop-shadow(0 10px 18px rgba(0,0,0,0.4)); will-change: transform, opacity;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="4.2" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="4.2" data-track-index="1">
        <div class="stage">
          <div id="starwrap" class="starwrap" data-layout-allow-overflow>
            <div id="glow" class="glow"></div>
            <svg id="star" class="star" viewBox="0 0 100 100">
              <path d="M50 5 L61 38 L96 38 L68 59 L79 92 L50 72 L21 92 L32 59 L4 38 L39 38 Z" />
            </svg>
          </div>
          <svg id="fig" class="fig" viewBox="345 598 390 712"><use href="#avatarShape" /></svg>
        </div>
      </div>
    </div>

    <!-- locked avatar shape — defs resolve by id regardless of order -->
    <svg style="width:0;height:0;position:absolute" aria-hidden="true">
      <defs>
        <g id="avatarShape">
          <path d="M 352 1300 Q 352 1000 448 938 Q 494 910 540 908 Q 586 910 632 938 Q 728 1000 728 1300 Z" />
          <circle cx="540" cy="752" r="146" />
        </g>
      </defs>
    </svg>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // 1) figure settles in first
        tl.from("#fig", { y: 54, opacity: 0, duration: 0.62, ease: "power3.out" }, 0.15);

        // 2) once settled, the north star rises up from behind him (fade + up) to above his head
        tl.from("#starwrap", { y: 236, opacity: 0, duration: 1.05, ease: "power2.out" }, 0.95);

        // gentle finite glow breathe after it settles (own props, sequential — no conflict)
        tl.to("#glow", { scale: 1.12, opacity: 0.82, duration: 0.95, ease: "sine.inOut",
                         yoyo: true, repeat: 1, transformOrigin: "50% 50%" }, 2.15);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
