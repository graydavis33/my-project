<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: transparent; font-family: "Montserrat", system-ui, sans-serif;
      }
      .scene { position: relative; width: 100%; height: 100%; }
      .wrap {
        position: absolute; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        padding: 165px 90px; gap: 30px;
      }

      .glass {
        background:
          radial-gradient(ellipse 100% 55% at 50% 0%,
            rgba(255,220,180,0.55) 0%, rgba(255,200,150,0.20) 35%, rgba(255,180,120,0) 65%),
          linear-gradient(180deg, rgba(255,168,88,1) 0%, rgba(242,129,41,1) 38%, rgba(214,100,22,1) 100%);
        border: 2px solid #fff;
        box-shadow:
          inset 0 2px 0 rgba(255,240,215,0.55),
          inset 0 -3px 10px rgba(140,55,8,0.45),
          0 0 24px rgba(242,129,41,0.55),
          0 8px 22px rgba(0,0,0,0.30);
      }

      .kicker {
        font-weight: 800; font-size: 38px; color: #fff; text-transform: uppercase;
        letter-spacing: 0.18em; text-shadow: 0 3px 10px rgba(0,0,0,0.45);
      }

      .starbox { position: relative; width: 360px; height: 360px;
        display: flex; align-items: center; justify-content: center; }
      .glow {
        position: absolute; width: 360px; height: 360px; border-radius: 50%;
        background: radial-gradient(circle, rgba(242,129,41,0.65) 0%, rgba(242,129,41,0.25) 38%, rgba(242,129,41,0) 70%);
        will-change: transform, opacity;
      }
      .star { width: 270px; height: 270px; position: relative;
        fill: #F28129; stroke: #fff; stroke-width: 3.5;
        filter: drop-shadow(0 0 26px rgba(242,129,41,0.75)) drop-shadow(0 8px 18px rgba(0,0,0,0.35)); }

      .starlabel {
        font-weight: 900; font-size: 58px; color: #F7A455; text-transform: uppercase;
        letter-spacing: 0.01em; text-align: center; text-shadow: 0 3px 12px rgba(0,0,0,0.5);
      }

      .figbox { position: relative; width: 360px; height: 300px;
        display: flex; align-items: flex-end; justify-content: center; }
      .av { width: 190px; height: 346px; fill: #fff;
        filter: drop-shadow(0 8px 16px rgba(0,0,0,0.4)); position: relative; z-index: 2; }
      .shine { position: absolute; top: 0; left: 0; width: 360px; height: 300px;
        stroke: #FFD9A8; stroke-width: 9; stroke-linecap: round; z-index: 1; }

      .payoff {
        border-radius: 999px; padding: 22px 54px; will-change: transform;
        font-weight: 900; font-size: 56px; color: #fff; text-transform: uppercase;
        letter-spacing: 0.01em; text-shadow: 0 3px 10px rgba(0,0,0,0.4); text-align: center;
      }
      .material {
        font-weight: 800; font-size: 34px; color: rgba(255,255,255,0.72);
        text-transform: uppercase; letter-spacing: 0.06em; text-decoration: line-through;
        text-decoration-thickness: 4px; text-decoration-color: #E63946;
        text-shadow: 0 2px 8px rgba(0,0,0,0.4);
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="4" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="4" data-track-index="1">
        <div class="wrap">
          <div id="kicker" class="kicker">Your North Star</div>

          <div class="starbox">
            <div id="glow" class="glow"></div>
            <svg id="star" class="star" viewBox="0 0 100 100">
              <path d="M50 5 L61 38 L96 38 L68 59 L79 92 L50 72 L21 92 L32 59 L4 38 L39 38 Z" />
            </svg>
          </div>

          <div id="starlabel" class="starlabel">Do Good For People</div>

          <div class="figbox">
            <svg id="shine" class="shine" viewBox="0 0 360 300">
              <line class="sh" x1="180" y1="92" x2="180" y2="40" />
              <line class="sh" x1="128" y1="104" x2="98"  y2="64" />
              <line class="sh" x1="232" y1="104" x2="262" y2="64" />
            </svg>
            <svg id="fig" class="av" viewBox="345 598 390 712"><use href="#avatarShape" /></svg>
          </div>

          <div id="payoff" class="payoff glass">Become a Better Person</div>
          <div id="material" class="material">Not Money — Not Status</div>
        </div>
      </div>
    </div>

    <!-- locked avatar shape — defs resolve by id regardless of order -->
    <svg style="width:0;height:0;position:absolute" aria-hidden="true">
      <defs>
        <g id="avatarShape">
          <path d="M 352 1300 Q 352 1000 448 938 Q 494 910 540 908 Q 586 910 632 938 Q 728 1000 728 1300 Z" />
          <circle cx="540" cy="752" r="146" />
        </g>
      </defs>
    </svg>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        tl.from("#kicker",    { y: 26, opacity: 0, duration: 0.45, ease: "power3.out" }, 0.10);
        tl.from("#star",      { scale: 0, opacity: 0, duration: 0.7, ease: "back.out(1.7)", transformOrigin: "50% 50%" }, 0.26);
        tl.from("#glow",      { scale: 0.4, opacity: 0, duration: 0.7, ease: "power2.out", transformOrigin: "50% 50%" }, 0.3);
        tl.from("#starlabel", { y: 24, opacity: 0, duration: 0.5, ease: "power2.out" }, 0.7);
        tl.from("#fig",       { y: 40, scale: 0.85, opacity: 0, duration: 0.55, ease: "back.out(1.5)", transformOrigin: "50% 100%" }, 0.95);
        tl.from("#shine line", { scaleY: 0, opacity: 0, duration: 0.4, ease: "power2.out", stagger: 0.08, transformOrigin: "50% 100%" }, 1.3);
        tl.from("#payoff",    { y: 26, scale: 0.85, opacity: 0, duration: 0.55, ease: "back.out(1.6)" }, 1.55);
        tl.from("#material",  { opacity: 0, duration: 0.5, ease: "power1.out" }, 1.95);

        // subtle finite glow breathing (own element, seekable, no infinite repeat)
        tl.to("#glow", { scale: 1.12, opacity: 0.78, duration: 0.9, ease: "sine.inOut",
                         yoyo: true, repeat: 2, transformOrigin: "50% 50%" }, 1.1);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
