<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: transparent; font-family: "Montserrat", system-ui, sans-serif;
      }
      .scene { position: relative; width: 100%; height: 100%; }
      .wrap {
        position: absolute; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        padding: 180px 90px; gap: 40px;
      }

      .kicker {
        font-weight: 800; font-size: 40px; color: #fff; text-transform: uppercase;
        letter-spacing: 0.16em; text-align: center; text-shadow: 0 3px 10px rgba(0,0,0,0.45);
      }
      .mentors { display: flex; gap: 70px; align-items: flex-end; }
      .mentors .av { width: 158px; height: 288px; fill: #fff;
        filter: drop-shadow(0 8px 16px rgba(0,0,0,0.4)); }

      .connect {
        font-weight: 800; font-size: 34px; color: #fff; text-transform: uppercase;
        letter-spacing: 0.10em; text-align: center; opacity: 0.92;
        text-shadow: 0 3px 10px rgba(0,0,0,0.4);
      }

      .glass {
        background:
          radial-gradient(ellipse 100% 55% at 50% 0%,
            rgba(255,220,180,0.55) 0%, rgba(255,200,150,0.20) 35%, rgba(255,180,120,0) 65%),
          linear-gradient(180deg, rgba(255,168,88,1) 0%, rgba(242,129,41,1) 38%, rgba(214,100,22,1) 100%);
        border: 2px solid #fff;
        box-shadow:
          inset 0 2px 0 rgba(255,240,215,0.55),
          inset 0 -3px 10px rgba(140,55,8,0.45),
          0 0 24px rgba(242,129,41,0.55),
          0 8px 22px rgba(0,0,0,0.30);
      }
      .badge {
        border-radius: 44px; padding: 28px 64px 34px;
        display: flex; flex-direction: column; align-items: center; will-change: transform;
      }
      .badge .num {
        font-weight: 900; font-size: 158px; line-height: 0.92; color: #fff;
        letter-spacing: -0.02em; text-shadow: 0 5px 16px rgba(0,0,0,0.4);
        font-variant-numeric: tabular-nums;
      }
      .badge .lbl {
        font-weight: 800; font-size: 46px; color: #fff; text-transform: uppercase;
        letter-spacing: 0.14em; margin-top: 6px; text-shadow: 0 3px 10px rgba(0,0,0,0.4);
      }

      .crowd {
        display: grid; grid-template-columns: repeat(10, 1fr);
        gap: 14px 18px; width: 760px; justify-items: center;
      }
      .crowd .av { width: 46px; height: 84px; fill: #fff; opacity: 0.9;
        filter: drop-shadow(0 3px 6px rgba(0,0,0,0.35)); }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="3.6" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="3.6" data-track-index="1">
        <div class="wrap">
          <div id="kicker" class="kicker">My Two Mentors</div>
          <div id="mentors" class="mentors">
            <svg class="av m-av" viewBox="345 598 390 712"><use href="#avatarShape" /></svg>
            <svg class="av m-av" viewBox="345 598 390 712"><use href="#avatarShape" /></svg>
          </div>
          <div id="connect" class="connect">Run an agency of</div>
          <div id="badge" class="badge glass">
            <div class="num">800+</div>
            <div class="lbl">Employees</div>
          </div>
          <div id="crowd" class="crowd"></div>
        </div>
      </div>
    </div>

    <!-- locked avatar shape (head + shoulders bust) — defs resolve by id regardless of order -->
    <svg style="width:0;height:0;position:absolute" aria-hidden="true">
      <defs>
        <g id="avatarShape">
          <path d="M 352 1300 Q 352 1000 448 938 Q 494 910 540 908 Q 586 910 632 938 Q 728 1000 728 1300 Z" />
          <circle cx="540" cy="752" r="146" />
        </g>
      </defs>
    </svg>

    <script>
      (function () {
        // build the workforce grid (deterministic — 40 figures, 10 cols x 4 rows)
        const crowd = document.getElementById("crowd");
        const COUNT = 40;
        for (let i = 0; i < COUNT; i++) {
          const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
          svg.setAttribute("class", "av");
          svg.setAttribute("viewBox", "345 598 390 712");
          const use = document.createElementNS("http://www.w3.org/2000/svg", "use");
          use.setAttribute("href", "#avatarShape");
          svg.appendChild(use);
          crowd.appendChild(svg);
        }

        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        tl.from("#kicker",        { y: 30, opacity: 0, duration: 0.45, ease: "power3.out" }, 0.10);
        tl.from("#mentors .av",   { y: 36, scale: 0.8, opacity: 0, duration: 0.55, ease: "back.out(1.6)", stagger: 0.12, transformOrigin: "50% 100%" }, 0.26);
        tl.from("#connect",       { y: 24, opacity: 0, duration: 0.42, ease: "power2.out" }, 0.62);
        tl.from("#badge",         { scale: 0.84, opacity: 0, duration: 0.55, ease: "back.out(1.5)" }, 0.78);
        tl.from("#crowd .av",     { y: 18, opacity: 0, duration: 0.40, ease: "power2.out", stagger: 0.022 }, 1.02);
        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
