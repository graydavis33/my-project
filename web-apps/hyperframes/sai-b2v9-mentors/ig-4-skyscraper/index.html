<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: transparent; font-family: "Montserrat", system-ui, sans-serif;
      }
      .scene { position: relative; width: 100%; height: 100%; overflow: hidden; }

      /* soft ambient glow behind the tower for depth */
      .glow {
        position: absolute; left: 540px; top: 950px; width: 560px; height: 560px;
        margin-left: -280px; margin-top: -280px; border-radius: 50%; z-index: 0;
        background: radial-gradient(circle, rgba(242,129,41,0.4) 0%, rgba(242,129,41,0.14) 42%, rgba(242,129,41,0) 70%);
        will-change: opacity;
      }

      /* the building grows upward by revealing this bottom-anchored wrapper */
      .revealwrap {
        position: absolute; left: 400px; bottom: 600px; width: 280px; height: 0;
        overflow: hidden; z-index: 1; will-change: height;
      }
      .bld { position: absolute; left: 0; bottom: 0; width: 280px; height: 720px; }
      .win.lit  { fill: #FFE7AE; }
      .win.dark { fill: #9A5016; }

      /* the money the tower rises out of (sits in front of the base) */
      .money { position: absolute; left: 390px; top: 1250px; width: 300px; height: 175px; z-index: 2; }
      .coin { fill: #EFA93A; stroke: #FFF3D6; stroke-width: 3; will-change: transform, opacity; }
      .coinslot { fill: #C9852A; }
      .mdollar { fill: #F28129; font-weight: 900; will-change: transform, opacity;
        filter: drop-shadow(0 0 10px rgba(242,129,41,0.6)); }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="3.2" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="3.2" data-track-index="1">

        <div id="glow" class="glow"></div>

        <div class="revealwrap" data-layout-allow-overflow>
          <svg id="bld" class="bld" viewBox="0 0 280 720" data-layout-allow-overflow>
            <defs>
              <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0" stop-color="#FFB877" />
                <stop offset="0.45" stop-color="#F28129" />
                <stop offset="1" stop-color="#BE5E16" />
              </linearGradient>
              <linearGradient id="topSheen" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="rgba(255,240,215,0.5)" />
                <stop offset="1" stop-color="rgba(255,240,215,0)" />
              </linearGradient>
            </defs>
            <g id="bodyGroup"></g>
            <g id="winGroup"></g>
            <!-- crown antenna -->
            <rect x="135" y="44" width="6" height="70" rx="3" fill="#F0D2A6" />
            <circle id="beacon" cx="138" cy="40" r="8" fill="#FFE7AE" />
          </svg>
        </div>

        <svg id="money" class="money" viewBox="0 0 300 175" data-layout-allow-overflow>
          <text class="mdollar" x="92"  y="58"  font-size="56" text-anchor="middle">$</text>
          <text class="mdollar" x="208" y="50"  font-size="44" text-anchor="middle">$</text>
          <g id="coins"></g>
        </svg>
      </div>
    </div>

    <script>
      (function () {
        // --- realistic setback tower: continuous body + window grid ---
        const sections = [
          { x: 36, y: 470, w: 208, h: 250, idx: 0 },
          { x: 66, y: 250, w: 148, h: 220, idx: 1 },
          { x: 94, y: 112, w: 92,  h: 138, idx: 2 },
        ];
        const bodyGroup = document.getElementById("bodyGroup");
        const winGroup = document.getElementById("winGroup");
        const NS = "http://www.w3.org/2000/svg";

        sections.forEach((s) => {
          const r = document.createElementNS(NS, "rect");
          r.setAttribute("x", s.x); r.setAttribute("y", s.y);
          r.setAttribute("width", s.w); r.setAttribute("height", s.h);
          r.setAttribute("rx", 1);
          r.setAttribute("fill", "url(#bodyGrad)");
          r.setAttribute("stroke", "rgba(110,50,8,0.55)");
          r.setAttribute("stroke-width", "1.5");
          bodyGroup.appendChild(r);
          // thin top sheen on each setback ledge
          const sheen = document.createElementNS(NS, "rect");
          sheen.setAttribute("x", s.x); sheen.setAttribute("y", s.y);
          sheen.setAttribute("width", s.w); sheen.setAttribute("height", 14);
          sheen.setAttribute("fill", "url(#topSheen)");
          bodyGroup.appendChild(sheen);

          // window grid
          const winW = 16, winH = 20, gapX = 11, gapY = 11, padX = 16, padY = 18;
          const cols = Math.max(2, Math.floor((s.w - 2 * padX + gapX) / (winW + gapX)));
          const rows = Math.max(2, Math.floor((s.h - 2 * padY + gapY) / (winH + gapY)));
          const totalW = cols * winW + (cols - 1) * gapX;
          const totalH = rows * winH + (rows - 1) * gapY;
          const startX = s.x + (s.w - totalW) / 2;
          const startY = s.y + (s.h - totalH) / 2;
          for (let row = 0; row < rows; row++) {
            for (let c = 0; c < cols; c++) {
              const w = document.createElementNS(NS, "rect");
              w.setAttribute("x", startX + c * (winW + gapX));
              w.setAttribute("y", startY + row * (winH + gapY));
              w.setAttribute("width", winW); w.setAttribute("height", winH);
              w.setAttribute("rx", 2);
              const lit = ((row * 3 + c * 7 + s.idx * 5) % 4) === 0;
              w.setAttribute("class", "win " + (lit ? "lit" : "dark"));
              winGroup.appendChild(w);
            }
          }
        });

        // --- coin stack ---
        const coins = document.getElementById("coins");
        const stack = [
          { cx: 150, cy: 150 }, { cx: 150, cy: 130 }, { cx: 150, cy: 110 }, { cx: 150, cy: 92 },
        ];
        stack.forEach((s) => {
          const e = document.createElementNS(NS, "ellipse");
          e.setAttribute("class", "coin");
          e.setAttribute("cx", s.cx); e.setAttribute("cy", s.cy);
          e.setAttribute("rx", 78); e.setAttribute("ry", 20);
          coins.appendChild(e);
        });

        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // 1) money eases + fades + pops in, then a little settle-pop
        tl.from("#coins .coin", { y: 18, scaleY: 0, opacity: 0, duration: 0.45, ease: "power2.out", stagger: 0.07, transformOrigin: "50% 100%" }, 0.12);
        tl.from(".mdollar",     { y: 24, scale: 0.5, opacity: 0, duration: 0.5, ease: "back.out(1.7)", stagger: 0.1, transformOrigin: "50% 100%" }, 0.2);
        tl.to(".mdollar",       { scale: 1.14, duration: 0.12, ease: "power2.out", yoyo: true, repeat: 1, stagger: 0.05, transformOrigin: "50% 100%" }, 0.7);

        // 2) the building rises out of the money (bottom-anchored reveal, no camera move)
        tl.fromTo(".revealwrap", { height: 0 }, { height: 720, duration: 1.25, ease: "power2.out" }, 0.95);
        tl.from("#glow",        { opacity: 0, duration: 1.0, ease: "power2.out" }, 1.0);
        // the floating $ dissolve as the tower rises (money becomes the building)
        tl.to(".mdollar",       { opacity: 0, duration: 0.45, ease: "power1.in" }, 1.05);

        // 3) beacon blinks on at the crown
        tl.from("#beacon",      { scale: 0, opacity: 0, duration: 0.4, ease: "back.out(2)", transformOrigin: "138px 40px" }, 2.15);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
