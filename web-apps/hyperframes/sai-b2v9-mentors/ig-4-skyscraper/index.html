<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: transparent; font-family: "Montserrat", system-ui, sans-serif;
      }
      .scene { position: relative; width: 100%; height: 100%; overflow: hidden; }

      .glow {
        position: absolute; left: 540px; top: 1000px; width: 560px; height: 560px;
        margin-left: -280px; margin-top: -280px; border-radius: 50%; z-index: 0;
        background: radial-gradient(circle, rgba(242,129,41,0.4) 0%, rgba(242,129,41,0.14) 42%, rgba(242,129,41,0) 70%);
        opacity: 0; will-change: opacity;
      }

      /* big dollar signs — the money the tower rises from */
      .mdollar { position: absolute; font-weight: 900; color: #F28129; line-height: 1; z-index: 2;
        text-shadow: 0 0 22px rgba(242,129,41,0.6), 0 6px 14px rgba(0,0,0,0.32);
        will-change: transform, opacity; }

      /* reveal wrapper — bottom-anchored, height grows for the rise */
      .revealwrap { position: absolute; left: 360px; bottom: 590px; width: 360px; height: 0;
        overflow: hidden; z-index: 1; }
      .bld { position: absolute; left: 76px; bottom: 0; width: 208px; height: 690px; will-change: transform; }

      .sec {
        position: absolute; border: 1.5px solid rgba(110,50,8,0.55); will-change: transform, opacity;
        background: linear-gradient(90deg, #FFB877 0%, #F28129 45%, #BE5E16 100%);
        box-shadow: inset 0 2px 0 rgba(255,240,215,0.45), inset 0 -3px 9px rgba(140,55,8,0.35);
        display: grid; align-content: center; justify-content: center;
      }
      .win { width: 16px; height: 20px; border-radius: 2px; }
      .win.lit  { background: #FFE7AE; }
      .win.dark { background: #9A5016; }

      .antenna { position: absolute; left: 100px; width: 8px; bottom: 590px; height: 70px;
        background: #F0D2A6; border-radius: 3px; z-index: 1; }
      .beacon { position: absolute; left: 95px; width: 18px; height: 18px; border-radius: 50%; bottom: 656px;
        background: radial-gradient(circle, #fff 0%, #FFE7AE 70%); box-shadow: 0 0 14px rgba(242,129,41,0.8); z-index: 1; }

      /* demolition debris + dust (scene level, hidden until collapse) */
      /* faceted low-poly rubble mound (SVG) — rises to swallow the collapsing tower */
      .mound { position: absolute; left: 370px; top: 1118px; width: 340px; height: 232px; z-index: 3;
        transform: scaleY(0); transform-origin: 50% 100%; will-change: transform; }
      .crumb { position: absolute; z-index: 4; opacity: 0; box-shadow: 0 1px 2px rgba(80,35,5,0.35);
        will-change: transform, opacity; }
      .puff { position: absolute; z-index: 5; border-radius: 50%; opacity: 0; will-change: transform, opacity;
        background: radial-gradient(circle, rgba(196,190,182,0.55) 0%, rgba(196,190,182,0) 70%); }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="5" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="5" data-track-index="1">

        <div id="glow" class="glow"></div>

        <div class="mdollar" id="d1" style="left:493px; top:1120px; font-size:168px;">$</div>
        <div class="mdollar" id="d2" style="left:392px; top:1210px; font-size:120px;">$</div>
        <div class="mdollar" id="d3" style="left:612px; top:1210px; font-size:120px;">$</div>

        <div class="revealwrap" data-layout-allow-overflow>
          <div id="bld" class="bld" data-layout-allow-overflow>
            <div class="sec" id="sec0"></div>
            <div class="sec" id="sec1"></div>
            <div class="sec" id="sec2"></div>
            <div class="antenna"></div>
            <div class="beacon"></div>
          </div>
        </div>

        <svg id="mound" class="mound" viewBox="0 0 340 232" data-layout-allow-overflow>
          <!-- wide flat debris skirt (behind) -->
          <ellipse cx="170" cy="208" rx="170" ry="22" fill="#E8A968" opacity="0.85" />
          <polygon points="12,214 64,202 122,210 180,204 248,212 322,202 330,224 6,224" fill="#DC9A5A" opacity="0.8" />
          <!-- mound base silhouette (fills any facet gaps so the pile is dense) -->
          <polygon points="150,18 185,68 210,95 250,150 300,206 40,206 78,150 105,100 128,55" fill="#C8631A" />
          <!-- low-poly facets: light upper-left -> dark lower-right -->
          <polygon points="150,18 128,55 105,100 146,120" fill="#F2B66A" />
          <polygon points="150,18 146,120 196,118 185,68" fill="#EC9A4E" />
          <polygon points="185,68 196,118 250,150 210,95" fill="#A85311" />
          <polygon points="105,100 78,150 130,166 146,120" fill="#D77A28" />
          <polygon points="78,150 40,206 136,206 130,166" fill="#C8631A" />
          <polygon points="146,120 130,166 180,186 196,118" fill="#E0741F" />
          <polygon points="130,166 136,206 210,206 180,186" fill="#B85E14" />
          <polygon points="196,118 180,186 250,150" fill="#9A490F" />
          <polygon points="250,150 180,186 210,206 300,206" fill="#7E3C0C" />
          <g id="speckles"></g>
        </svg>
        <div id="debris"></div>
      </div>
    </div>

    <script>
      (function () {
        function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
        const rnd = mulberry32(20260608);

        // --- build the 3 facade sections (HTML so each can collapse independently) ---
        const sections = [
          { el: "sec0", w: 208, h: 240, bottom: 0,   idx: 0 },
          { el: "sec1", w: 150, h: 210, bottom: 240, idx: 1 },
          { el: "sec2", w: 96,  h: 140, bottom: 450, idx: 2 },
        ];
        sections.forEach((s) => {
          const el = document.getElementById(s.el);
          el.style.width = s.w + "px";
          el.style.height = s.h + "px";
          el.style.bottom = s.bottom + "px";
          el.style.left = ((208 - s.w) / 2) + "px";
          const winW = 16, gapX = 11, gapY = 11, padX = 16, padY = 18;
          const cols = Math.max(2, Math.floor((s.w - 2 * padX + gapX) / (winW + gapX)));
          const rows = Math.max(2, Math.floor((s.h - 2 * padY + gapY) / (20 + gapY)));
          el.style.gridTemplateColumns = "repeat(" + cols + ", " + winW + "px)";
          el.style.gap = gapY + "px " + gapX + "px";
          for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
              const w = document.createElement("div");
              const lit = ((r * 3 + c * 7 + s.idx * 5) % 4) === 0;
              w.className = "win " + (lit ? "lit" : "dark");
              el.appendChild(w);
            }
          }
        });

        // --- pre-generate rubble chunks + dust puffs at the base ---
        const debris = document.getElementById("debris");
        const BASE_Y = 1330; // frame y of the tower footprint
        const palette = ["#F8A04E", "#EC8636", "#E0741F", "#C8631A", "#B2540F", "#8A4A12", "#F2B66A"];

        // speckle texture scattered over the mound surface (light + dark flecks)
        const SVGNS = "http://www.w3.org/2000/svg";
        const speckles = document.getElementById("speckles");
        for (let i = 0; i < 34; i++) {
          const sy = 45 + rnd() * 150;
          const hw = Math.max(6, (sy - 18) / 188 * 122);
          const sx = 150 + (rnd() * 2 - 1) * (hw - 6);
          const c = document.createElementNS(SVGNS, "circle");
          c.setAttribute("cx", sx.toFixed(1)); c.setAttribute("cy", sy.toFixed(1));
          c.setAttribute("r", (1.4 + rnd() * 2.4).toFixed(1));
          c.setAttribute("fill", rnd() < 0.5 ? "#FFE0B0" : "#5E2E08");
          c.setAttribute("opacity", (0.45 + rnd() * 0.4).toFixed(2));
          speckles.appendChild(c);
        }

        // scattered outlier chunks flung out around the base
        const outliers = [];
        for (let i = 0; i < 14; i++) {
          const side = rnd() < 0.5 ? -1 : 1;
          const dist = 118 + rnd() * 120;
          const x = 540 + side * dist + (rnd() * 2 - 1) * 28;
          const y = BASE_Y - 8 + rnd() * 40;
          const cw = 7 + Math.floor(rnd() * 12);
          const ch = 6 + Math.floor(rnd() * 9);
          const ang = (rnd() * 2 - 1) * 180;
          const d = document.createElement("div");
          d.className = "crumb";
          d.style.width = cw + "px"; d.style.height = ch + "px";
          d.style.left = (x - cw / 2) + "px"; d.style.top = (y - ch / 2) + "px";
          d.style.background = palette[Math.floor(rnd() * palette.length)];
          d.style.borderRadius = rnd() < 0.4 ? "50%" : "1px";
          debris.appendChild(d);
          outliers.push({ el: d, ang, cx: x });
        }
        const puffs = [];
        for (let i = 0; i < 7; i++) {
          const ps = 130 + Math.floor(rnd() * 150);
          const x = 540 + (rnd() - 0.5) * 240;
          const y = BASE_Y - 30 + rnd() * 40;
          const p = document.createElement("div");
          p.className = "puff";
          p.style.width = ps + "px"; p.style.height = ps + "px";
          p.style.left = (x - ps / 2) + "px"; p.style.top = (y - ps / 2) + "px";
          debris.appendChild(p);
          puffs.push(p);
        }

        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // 1) big dollar signs ease + fade in, settle-pop, then HOLD
        tl.from(".mdollar", { y: 30, scale: 0.5, opacity: 0, duration: 0.55, ease: "back.out(1.6)", stagger: 0.12, transformOrigin: "50% 50%" }, 0.2);
        tl.to(".mdollar", { scale: 1.1, duration: 0.14, ease: "power2.out", yoyo: true, repeat: 1, stagger: 0.06, transformOrigin: "50% 50%" }, 0.9);

        // 2) the building rises out of the money (held to 1.5); money fades as it comes in
        tl.fromTo(".revealwrap", { height: 0 }, { height: 690, duration: 1.1, ease: "power2.out" }, 1.5);
        tl.fromTo("#glow", { opacity: 0 }, { opacity: 1, duration: 1.0, ease: "power2.out" }, 1.55);
        tl.to(".mdollar", { opacity: 0, duration: 0.5, ease: "power1.in" }, 1.5);

        // 3) built — long HOLD (~2.6 -> 3.7) so it's obviously stopped

        // 4) COLLAPSE — no shake. Tower sinks + breaks straight down (no fade) into a dense pile.
        tl.to("#bld", { y: 660, duration: 0.5, ease: "power2.in" }, 3.7);
        tl.to("#sec2", { rotation: -22, duration: 0.42, ease: "power1.in", transformOrigin: "50% 100%" }, 3.72);
        tl.to("#sec1", { rotation: 16,  duration: 0.42, ease: "power1.in", transformOrigin: "50% 100%" }, 3.76);
        tl.to("#sec0", { rotation: -6, scaleY: 0.82, duration: 0.42, ease: "power1.in", transformOrigin: "50% 100%" }, 3.8);
        tl.to(".antenna, .beacon", { rotation: 42, duration: 0.4, ease: "power1.in" }, 3.7);
        tl.to("#glow", { opacity: 0, duration: 0.55, ease: "power1.in" }, 3.8);

        // faceted rubble mound rises to swallow the collapsing tower (thick, no gaps)
        tl.fromTo("#mound", { scaleY: 0 }, { scaleY: 1, duration: 0.52, ease: "back.out(1.05)" }, 3.82);

        // outlier debris bursts outward from the collapse and settles around the base
        outliers.forEach((o, i) => {
          const dx = (540 - o.cx) * 0.55;
          tl.fromTo(o.el,
            { opacity: 0, scale: 0.3, x: dx, y: -28, rotation: o.ang - 60 },
            { opacity: 1, scale: 1, x: 0, y: 0, rotation: o.ang, duration: 0.5, ease: "power2.out", transformOrigin: "50% 50%" },
            3.9 + i * 0.02);
        });

        // dust cloud billows on impact then settles (single tween per puff — no overlap)
        puffs.forEach((p, i) => {
          tl.to(p, { keyframes: [
            { opacity: 0.5, scale: 1.2, duration: 0.38, ease: "power2.out" },
            { opacity: 0, scale: 1.55, duration: 0.7, ease: "power1.in" },
          ] }, 3.85 + i * 0.04);
        });

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
