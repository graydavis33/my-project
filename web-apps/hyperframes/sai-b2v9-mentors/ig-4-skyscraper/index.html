<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: transparent; font-family: "Montserrat", system-ui, sans-serif;
      }
      .scene { position: relative; width: 100%; height: 100%; overflow: hidden; }

      /* the camera cranes up by translating this tall world downward */
      .world { position: absolute; left: 0; top: 0; width: 1080px; height: 2700px;
        transform: translateY(-780px); will-change: transform; }

      .money { position: absolute; z-index: 1; }
      .dollar { position: absolute; font-weight: 900; color: #F28129; line-height: 1;
        text-shadow: 0 0 18px rgba(242,129,41,0.7), 0 4px 10px rgba(0,0,0,0.35);
        will-change: transform, opacity; }

      .ground { position: absolute; left: 120px; top: 2638px; width: 840px; height: 5px;
        background: rgba(255,255,255,0.18); border-radius: 999px; z-index: 1; }

      .building { position: absolute; inset: 0; z-index: 2; }
      .floor {
        position: absolute; border-radius: 10px; border: 2px solid #fff; will-change: transform, opacity;
        background:
          radial-gradient(ellipse 120% 60% at 50% 0%,
            rgba(255,220,180,0.5) 0%, rgba(255,200,150,0.18) 40%, rgba(255,180,120,0) 70%),
          linear-gradient(180deg, rgba(255,168,88,1) 0%, rgba(242,129,41,1) 45%, rgba(214,100,22,1) 100%);
        box-shadow:
          inset 0 2px 0 rgba(255,240,215,0.5),
          inset 0 -3px 9px rgba(140,55,8,0.4),
          0 0 18px rgba(242,129,41,0.45),
          0 6px 16px rgba(0,0,0,0.28);
        display: flex; align-items: center; justify-content: center; gap: 16px;
      }
      .win { width: 24px; height: 26px; border-radius: 4px;
        background: rgba(255,242,222,0.92); box-shadow: 0 0 6px rgba(255,230,200,0.6); }

      .spire { position: absolute; left: 533px; width: 14px; border-radius: 8px;
        background: linear-gradient(180deg, #fff 0%, #FFD9A8 100%);
        box-shadow: 0 0 16px rgba(242,129,41,0.7); will-change: transform, opacity; transform-origin: 50% 100%; }
      .beacon { position: absolute; left: 524px; width: 32px; height: 32px; border-radius: 50%;
        background: radial-gradient(circle, #fff 0%, #F28129 70%);
        box-shadow: 0 0 22px rgba(242,129,41,0.9); will-change: transform, opacity; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="4.4" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="4.4" data-track-index="1">
        <div id="world" class="world" data-layout-allow-overflow>
          <div class="ground"></div>
          <div id="money" class="money"></div>
          <div id="building" class="building" data-layout-ignore></div>
          <div id="spire" class="spire"></div>
          <div id="beacon" class="beacon"></div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        const WORLD_H = 2700, CX = 540;
        const FLOORS = 14, FLOOR_H = 140, STEP = 150;
        const baseBottom = WORLD_H - 60; // 2640

        function widthFor(i) { return i <= 5 ? 360 : i <= 10 ? 280 : 200; }

        // --- build the dollar-sign cluster at street level ---
        const money = document.getElementById("money");
        const dollars = [
          { x: 462, y: 2486, s: 72 }, { x: 540, y: 2452, s: 104 }, { x: 624, y: 2492, s: 70 },
          { x: 500, y: 2556, s: 54 }, { x: 592, y: 2556, s: 54 },
        ];
        dollars.forEach((d) => {
          const el = document.createElement("div");
          el.className = "dollar";
          el.textContent = "$";
          el.style.left = d.x + "px"; el.style.top = d.y + "px";
          el.style.fontSize = d.s + "px";
          el.style.marginLeft = (-d.s * 0.3) + "px";
          money.appendChild(el);
        });

        // --- build the skyscraper floors, bottom to top ---
        const building = document.getElementById("building");
        const floorEls = [];
        for (let i = 0; i < FLOORS; i++) {
          const w = widthFor(i);
          const bottom = baseBottom - i * STEP;
          const top = bottom - FLOOR_H;
          const f = document.createElement("div");
          f.className = "floor";
          f.style.left = (CX - w / 2) + "px";
          f.style.top = top + "px";
          f.style.width = w + "px";
          f.style.height = FLOOR_H + "px";
          const cols = Math.max(3, Math.floor(w / 78));
          for (let c = 0; c < cols; c++) {
            const win = document.createElement("div");
            win.className = "win";
            f.appendChild(win);
          }
          building.appendChild(f);
          floorEls.push(f);
        }

        // spire + beacon sit on top of the highest floor
        const topFloorTop = baseBottom - (FLOORS - 1) * STEP - FLOOR_H; // 550
        const spire = document.getElementById("spire");
        spire.style.top = (topFloorTop - 120) + "px";
        spire.style.height = "126px";
        const beacon = document.getElementById("beacon");
        beacon.style.top = (topFloorTop - 150) + "px";

        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // 1) dollar signs ease + fade in, then a little settle-pop
        tl.from(".dollar", { y: 26, scale: 0.6, opacity: 0, duration: 0.5, ease: "power2.out", stagger: 0.08 }, 0.12);
        tl.to(".dollar", { scale: 1.14, duration: 0.13, ease: "power2.out", stagger: 0.05, yoyo: true, repeat: 1, transformOrigin: "50% 50%" }, 0.72);

        // 2) camera cranes from the base up to the spire
        tl.fromTo("#world", { y: -780 }, { y: 0, duration: 2.9, ease: "power1.inOut" }, 1.05);

        // 3) floors build bottom -> top, each popping into place (synced under the camera)
        tl.from(floorEls, { y: 26, scale: 0.6, opacity: 0, duration: 0.42, ease: "back.out(1.7)", stagger: 0.188, transformOrigin: "50% 100%" }, 1.05);

        // 4) spire + beacon cap it off
        tl.from("#spire", { scaleY: 0, opacity: 0, duration: 0.45, ease: "power3.out" }, 3.66);
        tl.from("#beacon", { scale: 0, opacity: 0, duration: 0.4, ease: "back.out(2)", transformOrigin: "50% 50%" }, 3.92);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
