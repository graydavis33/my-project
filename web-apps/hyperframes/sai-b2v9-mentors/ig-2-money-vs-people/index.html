<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: transparent; font-family: "Montserrat", system-ui, sans-serif;
      }
      .scene { position: relative; width: 100%; height: 100%; }
      .stage { position: absolute; inset: 0; }

      .divider {
        position: absolute; left: 539px; top: 640px; width: 3px; height: 600px;
        background: rgba(255,255,255,0.16); border-radius: 999px;
      }

      .av { will-change: transform, opacity; }

      /* LEFT — alone with money, dull/grey, bored */
      #grey-fig { position: absolute; left: 192px; top: 745px; width: 156px; height: 285px;
        fill: #9AA0A6; z-index: 2; filter: drop-shadow(0 8px 14px rgba(0,0,0,0.35)); }
      #coins { position: absolute; left: 190px; top: 1075px; width: 160px; height: 120px; z-index: 2; }
      .coin { fill: #9AA0A6; stroke: #fff; stroke-width: 3; }
      .coinsym { fill: #fff; font-weight: 900; font-size: 34px; }
      .z { position: absolute; font-weight: 900; color: #9AA0A6; opacity: 0;
        text-shadow: 0 2px 6px rgba(0,0,0,0.3); z-index: 2; will-change: transform, opacity; }
      #z1 { left: 350px; top: 800px; font-size: 38px; }
      #z2 { left: 388px; top: 760px; font-size: 52px; }
      #z3 { left: 432px; top: 712px; font-size: 70px; }

      /* RIGHT — thriving in a glowing group */
      #rglow {
        position: absolute; left: 812px; top: 880px; width: 380px; height: 380px;
        margin-left: -190px; margin-top: -190px; border-radius: 50%; z-index: 1;
        background: radial-gradient(circle, rgba(242,129,41,0.62) 0%, rgba(242,129,41,0.24) 40%, rgba(242,129,41,0) 70%);
        will-change: transform, opacity;
      }
      .person { position: absolute; fill: #fff;
        filter: drop-shadow(0 0 16px rgba(242,129,41,0.85)) drop-shadow(0 6px 12px rgba(0,0,0,0.35)); }
      #r2 { left: 734px; top: 745px; width: 156px; height: 285px; z-index: 3; }
      #r1 { left: 648px; top: 832px; width: 120px; height: 219px; z-index: 2; }
      #r3 { left: 856px; top: 832px; width: 120px; height: 219px; z-index: 2; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="3.8" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="3.8" data-track-index="1">
        <div class="stage">

          <div class="divider"></div>

          <!-- LEFT: alone + money + bored -->
          <svg id="grey-fig" class="av" viewBox="345 598 390 712"><use href="#avatarShape" /></svg>
          <svg id="coins" viewBox="0 0 160 120">
            <ellipse class="coin" cx="80" cy="96" rx="60" ry="18" />
            <ellipse class="coin" cx="80" cy="74" rx="60" ry="18" />
            <ellipse class="coin" cx="80" cy="52" rx="60" ry="18" />
            <text class="coinsym" x="80" y="64" text-anchor="middle">$</text>
          </svg>
          <div id="z1" class="z">z</div>
          <div id="z2" class="z">z</div>
          <div id="z3" class="z">Z</div>

          <!-- RIGHT: thriving in a glowing group -->
          <div id="rglow"></div>
          <svg id="r1" class="av person" viewBox="345 598 390 712"><use href="#avatarShape" /></svg>
          <svg id="r3" class="av person" viewBox="345 598 390 712"><use href="#avatarShape" /></svg>
          <svg id="r2" class="av person" viewBox="345 598 390 712"><use href="#avatarShape" /></svg>

        </div>
      </div>
    </div>

    <!-- locked avatar shape — defs resolve by id regardless of order -->
    <svg style="width:0;height:0;position:absolute" aria-hidden="true">
      <defs>
        <g id="avatarShape">
          <path d="M 352 1300 Q 352 1000 448 938 Q 494 910 540 908 Q 586 910 632 938 Q 728 1000 728 1300 Z" />
          <circle cx="540" cy="752" r="146" />
        </g>
      </defs>
    </svg>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // LEFT — dull/grey, alone with money, bored
        tl.from("#grey-fig",     { y: 44, opacity: 0, duration: 0.55, ease: "power3.out" }, 0.18);
        tl.from("#coins ellipse",{ y: 18, scale: 0, opacity: 0, duration: 0.4, ease: "back.out(1.5)", stagger: 0.1, transformOrigin: "50% 100%" }, 0.6);
        tl.to("#z1, #z2, #z3",   { keyframes: [{ opacity: 0.85, y: -16, duration: 0.5 }, { opacity: 0, y: -50, duration: 0.7 }],
                                   ease: "sine.out", stagger: 0.22, repeat: 1 }, 1.05);

        // RIGHT — glowing, thriving in a group
        tl.from("#rglow",        { scale: 0.5, opacity: 0, duration: 0.7, ease: "power2.out", transformOrigin: "50% 50%" }, 0.85);
        tl.from("#r2",           { y: 42, scale: 0.8, opacity: 0, duration: 0.55, ease: "back.out(1.6)", transformOrigin: "50% 100%" }, 0.95);
        tl.from("#r1",           { y: 36, scale: 0.7, opacity: 0, duration: 0.5, ease: "back.out(1.6)", transformOrigin: "50% 100%" }, 1.15);
        tl.from("#r3",           { y: 36, scale: 0.7, opacity: 0, duration: 0.5, ease: "back.out(1.6)", transformOrigin: "50% 100%" }, 1.3);

        // gentle finite glow breathe on the thriving side
        tl.to("#rglow", { scale: 1.12, opacity: 0.85, duration: 0.9, ease: "sine.inOut",
                          yoyo: true, repeat: 1, transformOrigin: "50% 50%" }, 2.2);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
