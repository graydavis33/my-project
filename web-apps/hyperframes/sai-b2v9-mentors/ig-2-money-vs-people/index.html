<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: transparent; font-family: "Montserrat", system-ui, sans-serif;
      }
      .scene { position: relative; width: 100%; height: 100%; }

      .fig { position: absolute; will-change: transform, opacity; }
      .avatar { width: 100%; height: 100%; }
      .sil { fill: #fff; filter: drop-shadow(0 8px 16px rgba(0,0,0,0.38)); }
      .eye { fill: #3A2A20; }
      .mouth { fill: #3A2A20; }

      .bubble {
        position: absolute; background: #fff; border: 2px solid #E0741F; border-radius: 20px;
        padding: 16px 18px; display: flex; flex-direction: column; gap: 9px;
        box-shadow: 0 6px 16px rgba(0,0,0,0.18); opacity: 0; transform: scale(0);
        will-change: transform, opacity; z-index: 5;
      }
      .bubble .bline { height: 9px; border-radius: 6px; background: #F4A85C; }
      .bubble .tail {
        position: absolute; bottom: -9px; left: 26px; width: 18px; height: 18px; background: #fff;
        border-right: 2px solid #E0741F; border-bottom: 2px solid #E0741F; transform: rotate(45deg);
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="4.8" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="4.8" data-track-index="1">

        <!-- MENTOR A -->
        <div id="figA" class="fig" style="left:150px; top:805px; width:252px; height:319px;">
          <svg class="avatar" viewBox="0 0 300 380">
            <use href="#busthead" class="sil" />
            <circle class="eye" cx="124" cy="116" r="9" />
            <circle class="eye" cx="176" cy="116" r="9" />
            <ellipse id="mouthA" class="mouth" cx="150" cy="166" rx="15" ry="15" />
          </svg>
        </div>

        <!-- MENTOR B -->
        <div id="figB" class="fig" style="left:352px; top:828px; width:252px; height:319px;">
          <svg class="avatar" viewBox="0 0 300 380">
            <use href="#busthead" class="sil" />
            <circle class="eye" cx="124" cy="116" r="9" />
            <circle class="eye" cx="176" cy="116" r="9" />
            <ellipse id="mouthB" class="mouth" cx="150" cy="166" rx="15" ry="15" />
          </svg>
        </div>

        <!-- YOU (the one listening) -->
        <div id="figY" class="fig" style="left:700px; top:812px; width:238px; height:301px;">
          <svg class="avatar" viewBox="0 0 300 380">
            <use href="#busthead" class="sil" />
            <circle class="eye" cx="124" cy="116" r="9" />
            <circle class="eye" cx="176" cy="116" r="9" />
            <path class="mouth" d="M 132 168 Q 150 178 168 168" fill="none" stroke="#3A2A20" stroke-width="7" stroke-linecap="round" />
          </svg>
        </div>

        <!-- speech bubbles from the two mentors -->
        <div id="bubA" class="bubble" style="left:236px; top:700px; width:158px;">
          <div class="bline" style="width:100%;"></div>
          <div class="bline" style="width:72%;"></div>
          <div class="bline" style="width:88%;"></div>
          <div class="tail"></div>
        </div>
        <div id="bubB" class="bubble" style="left:452px; top:720px; width:150px;">
          <div class="bline" style="width:84%;"></div>
          <div class="bline" style="width:100%;"></div>
          <div class="bline" style="width:64%;"></div>
          <div class="tail"></div>
        </div>

      </div>
    </div>

    <!-- shared head + shoulders bust — defs resolve by id regardless of order -->
    <svg style="width:0;height:0;position:absolute" aria-hidden="true">
      <defs>
        <g id="busthead">
          <path d="M 60 380 Q 60 250 110 224 Q 132 210 150 209 Q 168 210 190 224 Q 240 250 240 380 Z" />
          <circle cx="150" cy="120" r="92" />
        </g>
      </defs>
    </svg>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // entrance
        tl.from("#figA", { scale: 0.7, opacity: 0, y: 34, duration: 0.5, ease: "back.out(1.6)", transformOrigin: "50% 100%" }, 0.12);
        tl.from("#figB", { scale: 0.7, opacity: 0, y: 34, duration: 0.5, ease: "back.out(1.6)", transformOrigin: "50% 100%" }, 0.26);
        tl.from("#figY", { scale: 0.7, opacity: 0, y: 34, duration: 0.5, ease: "back.out(1.6)", transformOrigin: "50% 100%" }, 0.42);

        // head bobs (offset phases so it feels like a real back-and-forth)
        tl.to("#figA", { y: -10, rotation: 1.6, duration: 0.55, ease: "sine.inOut", yoyo: true, repeat: 7, transformOrigin: "50% 100%" }, 0.85);
        tl.to("#figB", { y: -9, rotation: -1.6, duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: 6, transformOrigin: "50% 100%" }, 1.05);
        tl.to("#figY", { y: -6, rotation: 0.8, duration: 0.72, ease: "sine.inOut", yoyo: true, repeat: 5, transformOrigin: "50% 100%" }, 1.2);

        // mouths talking (mentors only) — scaleY open/close, offset
        tl.to("#mouthA", { scaleY: 0.18, duration: 0.16, ease: "sine.inOut", yoyo: true, repeat: 21, svgOrigin: "150 166" }, 0.95);
        tl.to("#mouthB", { scaleY: 0.18, duration: 0.17, ease: "sine.inOut", yoyo: true, repeat: 19, svgOrigin: "150 166" }, 1.15);

        // speech bubbles pop in/out, alternating between the two mentors (ongoing conversation)
        tl.to("#bubA", { scale: 1, opacity: 1, duration: 0.3, ease: "back.out(1.7)", transformOrigin: "16% 100%" }, 1.0);
        tl.to("#bubA", { scale: 0, opacity: 0, duration: 0.24, ease: "back.in(1.4)", transformOrigin: "16% 100%" }, 2.05);
        tl.to("#bubB", { scale: 1, opacity: 1, duration: 0.3, ease: "back.out(1.7)", transformOrigin: "16% 100%" }, 1.7);
        tl.to("#bubB", { scale: 0, opacity: 0, duration: 0.24, ease: "back.in(1.4)", transformOrigin: "16% 100%" }, 2.75);
        tl.to("#bubA", { scale: 1, opacity: 1, duration: 0.3, ease: "back.out(1.7)", transformOrigin: "16% 100%" }, 2.95);
        tl.to("#bubA", { scale: 0, opacity: 0, duration: 0.24, ease: "back.in(1.4)", transformOrigin: "16% 100%" }, 3.9);
        tl.to("#bubB", { scale: 1, opacity: 1, duration: 0.3, ease: "back.out(1.7)", transformOrigin: "16% 100%" }, 3.55);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
