<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: transparent; font-family: "Montserrat", system-ui, sans-serif;
      }
      .scene { position: relative; width: 100%; height: 100%; }
      .stage { position: absolute; inset: 0; }

      .paths { position: absolute; inset: 0; z-index: 1; }
      .path { fill: none; stroke-width: 16; stroke-linecap: round; stroke-linejoin: round; }
      .path.money { stroke: #9AA0A6; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
      .path.people { stroke: #F28129; filter: drop-shadow(0 0 16px rgba(242,129,41,0.6)) drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
      .deadcap { stroke: #9AA0A6; stroke-width: 16; stroke-linecap: round; }
      .uparrow { fill: none; stroke: #F28129; stroke-width: 16; stroke-linecap: round; stroke-linejoin: round;
        filter: drop-shadow(0 0 12px rgba(242,129,41,0.7)); }

      /* dull grey money coin (dead end) */
      .coinc { fill: #9AA0A6; stroke: #fff; stroke-width: 4; filter: drop-shadow(0 6px 12px rgba(0,0,0,0.3)); }
      .coint { fill: #fff; font-weight: 900; font-size: 60px; }

      /* glow behind the people cluster */
      .pglow {
        position: absolute; left: 805px; top: 440px; width: 320px; height: 320px;
        margin-left: -160px; margin-top: -160px; border-radius: 50%; z-index: 1;
        background: radial-gradient(circle, rgba(242,129,41,0.6) 0%, rgba(242,129,41,0.22) 40%, rgba(242,129,41,0) 70%);
        will-change: transform, opacity;
      }

      .av { fill: #fff; will-change: transform, opacity; }
      /* the figure at the fork ("you") */
      #you { position: absolute; left: 50%; margin-left: -78px; top: 1350px; width: 156px; height: 285px; z-index: 2;
        filter: drop-shadow(0 10px 18px rgba(0,0,0,0.4)); }
      /* the people the right path leads to */
      .person { position: absolute; width: 78px; height: 142px; z-index: 2;
        filter: drop-shadow(0 0 14px rgba(242,129,41,0.85)) drop-shadow(0 6px 10px rgba(0,0,0,0.35)); }
      #p1 { left: 700px; top: 392px; }
      #p2 { left: 766px; top: 360px; }
      #p3 { left: 832px; top: 392px; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="3.8" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="3.8" data-track-index="1">
        <div class="stage">

          <div id="pglow" class="pglow"></div>

          <svg class="paths" viewBox="0 0 1080 1920" data-layout-allow-overflow>
            <!-- money branch: climbs then flatlines into a dead end -->
            <path id="path-money" class="path money" d="M 540 1350 C 470 1140 360 1030 320 860 C 304 790 300 740 300 712 L 470 712" />
            <line id="deadcap" class="deadcap" x1="470" y1="688" x2="470" y2="736" />
            <!-- people branch: keeps rising -->
            <path id="path-people" class="path people" d="M 540 1350 C 630 1130 710 1000 760 820 C 792 700 800 640 805 575" />
            <polyline id="uparrow" class="uparrow" points="778,598 805,560 832,598" />
            <!-- dull grey money coin at the top of the climb -->
            <g id="coin">
              <circle class="coinc" cx="300" cy="628" r="54" />
              <text class="coint" x="300" y="650" text-anchor="middle">$</text>
            </g>
          </svg>

          <!-- you, at the fork -->
          <svg id="you" class="av" viewBox="345 598 390 712"><use href="#avatarShape" /></svg>
          <!-- the people -->
          <svg id="p1" class="av person" viewBox="345 598 390 712"><use href="#avatarShape" /></svg>
          <svg id="p2" class="av person" viewBox="345 598 390 712"><use href="#avatarShape" /></svg>
          <svg id="p3" class="av person" viewBox="345 598 390 712"><use href="#avatarShape" /></svg>

        </div>
      </div>
    </div>

    <!-- locked avatar shape — defs resolve by id regardless of order -->
    <svg style="width:0;height:0;position:absolute" aria-hidden="true">
      <defs>
        <g id="avatarShape">
          <path d="M 352 1300 Q 352 1000 448 938 Q 494 910 540 908 Q 586 910 632 938 Q 728 1000 728 1300 Z" />
          <circle cx="540" cy="752" r="146" />
        </g>
      </defs>
    </svg>

    <script>
      (function () {
        function prep(id) {
          const p = document.getElementById(id);
          const len = p.getTotalLength();
          p.style.strokeDasharray = len;
          p.style.strokeDashoffset = len;
          return len;
        }
        prep("path-money");
        prep("path-people");

        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // 1) you, at the fork
        tl.from("#you", { y: 52, opacity: 0, duration: 0.55, ease: "power3.out" }, 0.15);

        // 2) money branch draws, flatlines, dead-ends (dull)
        tl.to("#path-money", { strokeDashoffset: 0, duration: 0.8, ease: "power1.inOut" }, 0.8);
        tl.from("#coin",     { scale: 0, opacity: 0, duration: 0.4, ease: "back.out(1.4)", transformOrigin: "300px 628px" }, 1.45);
        tl.from("#deadcap",  { scaleX: 0, opacity: 0, duration: 0.3, ease: "power2.out", transformOrigin: "470px 712px" }, 1.55);

        // 3) people branch rises and blooms (the winner)
        tl.to("#path-people", { strokeDashoffset: 0, duration: 0.95, ease: "power2.out" }, 0.95);
        tl.from("#pglow",    { scale: 0.5, opacity: 0, duration: 0.7, ease: "power2.out", transformOrigin: "50% 50%" }, 1.7);
        tl.from(".person",   { y: 34, scale: 0.7, opacity: 0, duration: 0.5, ease: "back.out(1.6)", stagger: 0.12, transformOrigin: "50% 100%" }, 1.8);
        tl.from("#uparrow",  { y: 20, scale: 0, opacity: 0, duration: 0.42, ease: "back.out(1.7)", transformOrigin: "805px 580px" }, 2.05);

        // gentle finite glow breathe on the winning side
        tl.to("#pglow", { scale: 1.12, opacity: 0.85, duration: 0.9, ease: "sine.inOut",
                          yoyo: true, repeat: 1, transformOrigin: "50% 50%" }, 2.5);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
