<!DOCTYPE html>
<html lang="en" data-composition-variables='[{"id":"word","type":"string","label":"Word","default":"WIN"},{"id":"fontSize","type":"number","label":"Font size (px)","default":260},{"id":"color","type":"color","label":"Trendify orange","default":"#F28129"},{"id":"holdDuration","type":"number","label":"Hold (s) after bounce in","default":1.2},{"id":"verticalPosition","type":"number","label":"Y position (px from top)","default":960}]'>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #00FF00; /* chroma key — Gray keys this out in Premiere */
        font-family: "Montserrat", system-ui, sans-serif;
      }

      .scene {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .word {
        position: absolute;
        left: 50%;
        top: 0;
        transform: translate(-50%, -50%);
        font-family: "Montserrat", system-ui, sans-serif;
        font-weight: 700; /* bold */
        letter-spacing: 0.02em;
        white-space: nowrap;
        text-shadow:
          0 4px 14px rgba(0, 0, 0, 0.35),
          0 2px 4px rgba(0, 0, 0, 0.25);
        will-change: transform, opacity;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="2.0" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="2.0" data-track-index="1">
        <div id="word" class="word"></div>
      </div>
    </div>

    <script>
      (function () {
        const vars = window.__hyperframes.getVariables();
        const wordEl = document.getElementById("word");

        wordEl.textContent = vars.word;
        wordEl.style.fontSize = vars.fontSize + "px";
        wordEl.style.color = vars.color;
        wordEl.style.top = vars.verticalPosition + "px";

        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // Start: invisible, scaled down, slightly below resting position
        gsap.set(wordEl, {
          opacity: 0,
          scale: 0.4,
          y: 40
        });

        // Fade in + bounce in — back.out gives the overshoot/bounce feel
        tl.to(wordEl, {
          opacity: 1,
          scale: 1,
          y: 0,
          duration: 0.55,
          ease: "back.out(2.6)"
        }, 0);

        // Subtle settle wiggle — tiny scale pulse for personality
        tl.to(wordEl, {
          scale: 1.04,
          duration: 0.12,
          ease: "power2.out"
        }, 0.55);
        tl.to(wordEl, {
          scale: 1.0,
          duration: 0.18,
          ease: "power2.inOut"
        }, 0.67);

        // Hold (no animation, just sits on screen)
        // Then fade out at the tail so Gray has a clean exit if needed
        const fadeOutStart = 0.55 + vars.holdDuration;
        tl.to(wordEl, {
          opacity: 0,
          scale: 1.08,
          duration: 0.25,
          ease: "power2.in"
        }, fadeOutStart);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
