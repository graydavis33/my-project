<!DOCTYPE html>
<html lang="en" data-composition-variables='[{"id":"orange","type":"color","label":"Curve color","default":"#F28129"},{"id":"white","type":"color","label":"Axes / grid color","default":"#FFFFFF"},{"id":"curveDuration","type":"number","label":"Curve draw duration (s)","default":2.2},{"id":"strokeWidth","type":"number","label":"Curve stroke width (px)","default":14},{"id":"startZoom","type":"number","label":"Start zoom level","default":3.2},{"id":"endZoom","type":"number","label":"End zoom level","default":1.0}]'>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #00FF00; /* chroma key — Gray keys this out in Premiere */
        font-family: "Montserrat", system-ui, sans-serif;
      }

      .scene {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      /* Camera wrapper — handles the zoom + pan transform.
         transform-origin: 0 0 so scale/translate math is simple. */
      .camera {
        position: absolute;
        left: 0;
        top: 0;
        width: 1080px;
        height: 1920px;
        transform-origin: 0 0;
        will-change: transform;
      }

      svg {
        display: block;
        width: 1080px;
        height: 1920px;
        overflow: visible;
      }

      .axis, .grid-line {
        fill: none;
        stroke-linecap: round;
      }

      .axis      { stroke-width: 6; }
      .grid-line { stroke-width: 2; opacity: 0.35; }

      .curve {
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: drop-shadow(0 4px 16px rgba(0, 0, 0, 0.3));
      }

      .head-dot {
        filter: drop-shadow(0 0 22px rgba(242, 129, 41, 1.0));
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="3.4" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="3.4" data-track-index="1">
        <div id="camera" class="camera" data-layout-allow-overflow>
          <svg viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">
            <!-- Gridlines -->
            <g id="grid">
              <line class="grid-line" id="grid-h-1" x1="160" y1="1400" x2="940" y2="1400" data-axis="y" data-pos="1400"/>
              <line class="grid-line" id="grid-h-2" x1="160" y1="1140" x2="940" y2="1140" data-axis="y" data-pos="1140"/>
              <line class="grid-line" id="grid-h-3" x1="160" y1="880"  x2="940" y2="880"  data-axis="y" data-pos="880"/>
              <line class="grid-line" id="grid-h-4" x1="160" y1="620"  x2="940" y2="620"  data-axis="y" data-pos="620"/>
              <line class="grid-line" id="grid-h-5" x1="160" y1="360"  x2="940" y2="360"  data-axis="y" data-pos="360"/>
              <line class="grid-line" id="grid-v-1" x1="316" y1="240" x2="316" y2="1660" data-axis="x" data-pos="316"/>
              <line class="grid-line" id="grid-v-2" x1="472" y1="240" x2="472" y2="1660" data-axis="x" data-pos="472"/>
              <line class="grid-line" id="grid-v-3" x1="628" y1="240" x2="628" y2="1660" data-axis="x" data-pos="628"/>
              <line class="grid-line" id="grid-v-4" x1="784" y1="240" x2="784" y2="1660" data-axis="x" data-pos="784"/>
            </g>

            <!-- Axes — solid from frame 0 -->
            <line id="axis-y" class="axis" x1="160" y1="240"  x2="160" y2="1660"/>
            <line id="axis-x" class="axis" x1="160" y1="1660" x2="940" y2="1660"/>

            <!-- Exponential curve -->
            <path id="curve" class="curve" d=""/>

            <!-- Head dot tracks the leading edge of the curve -->
            <circle id="head-dot" class="head-dot" r="18" cx="160" cy="1620"/>
          </svg>
        </div>
      </div>
    </div>

    <script>
      (function () {
        const vars = window.__hyperframes.getVariables();

        // Apply colors
        document.querySelectorAll(".axis, .grid-line").forEach(function (el) {
          el.setAttribute("stroke", vars.white);
        });
        const curveEl = document.getElementById("curve");
        const headDot = document.getElementById("head-dot");
        const cameraEl = document.getElementById("camera");
        curveEl.setAttribute("stroke", vars.orange);
        curveEl.setAttribute("stroke-width", vars.strokeWidth);
        headDot.setAttribute("fill", vars.orange);

        // === Build exponential curve path ===
        const X0 = 160, X1 = 940;
        const Y_BOT = 1620, Y_TOP = 280;
        const k = 3.2;
        const STEPS = 80;

        const points = [];
        for (let i = 0; i <= STEPS; i++) {
          const t = i / STEPS;
          const norm = (Math.exp(k * t) - 1) / (Math.exp(k) - 1);
          points.push([
            X0 + t * (X1 - X0),
            Y_BOT - norm * (Y_BOT - Y_TOP)
          ]);
        }

        let d = `M ${points[0][0].toFixed(2)} ${points[0][1].toFixed(2)}`;
        for (let i = 1; i < points.length; i++) {
          d += ` L ${points[i][0].toFixed(2)} ${points[i][1].toFixed(2)}`;
        }
        curveEl.setAttribute("d", d);

        const pathLen = curveEl.getTotalLength();
        curveEl.style.strokeDasharray  = pathLen;
        curveEl.style.strokeDashoffset = pathLen;

        // === Sample dot positions + camera transforms along the curve ===
        const N = 36;
        const SCREEN_CX = 540, SCREEN_CY = 960; // viewport center
        const CHART_CX = 540, CHART_CY = 960;   // final settle point (chart center)

        const dotCxs = [], dotCys = [];
        const camXs  = [], camYs  = [], camScales = [];

        for (let i = 0; i <= N; i++) {
          const t = i / N; // linear progress over curveDuration

          // Dot position = leading edge of curve at this progress
          const pt = curveEl.getPointAtLength(t * pathLen);
          dotCxs.push(pt.x);
          dotCys.push(pt.y);

          // Camera: zoom linearly from startZoom → endZoom
          const scale = vars.startZoom + (vars.endZoom - vars.startZoom) * t;

          // Camera center: lerp from dot position (t=0) → chart center (t=1)
          // Early frames keep the dot locked to screen center; later frames
          // release toward the natural chart framing so the wide shot sits right.
          const camCx = pt.x   + (CHART_CX - pt.x)   * t;
          const camCy = pt.y   + (CHART_CY - pt.y)   * t;

          // Translate so camCx,camCy lands at screen center under the chosen scale
          const tx = SCREEN_CX - camCx * scale;
          const ty = SCREEN_CY - camCy * scale;

          camXs.push(tx);
          camYs.push(ty);
          camScales.push(scale);
        }

        // Initial state — frame 0
        gsap.set(cameraEl, {
          transformOrigin: "0 0",
          x: camXs[0],
          y: camYs[0],
          scale: camScales[0]
        });
        gsap.set(headDot, { attr: { cx: dotCxs[0], cy: dotCys[0] } });

        // === Find path-length fraction where curve crosses each gridline ===
        const SAMPLES = 400;
        const crossings = {};
        const gridEls = document.querySelectorAll(".grid-line");
        let lastX = points[0][0], lastY = points[0][1];
        for (let s = 1; s <= SAMPLES; s++) {
          const len = (s / SAMPLES) * pathLen;
          const pt  = curveEl.getPointAtLength(len);
          gridEls.forEach(function (g) {
            if (crossings[g.id] !== undefined) return;
            const axis = g.getAttribute("data-axis");
            const pos  = parseFloat(g.getAttribute("data-pos"));
            if (axis === "x") {
              if (lastX < pos && pt.x >= pos) crossings[g.id] = len / pathLen;
            } else {
              if (lastY > pos && pt.y <= pos) crossings[g.id] = len / pathLen;
            }
          });
          lastX = pt.x;
          lastY = pt.y;
        }
        gsap.set(".grid-line", { opacity: 0 });

        // === Timeline ===
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        const CURVE_START = 0.25;
        const segDur = vars.curveDuration / N;

        // Curve draw — linear along arc length
        tl.to(curveEl, {
          strokeDashoffset: 0,
          duration: vars.curveDuration,
          ease: "none"
        }, CURVE_START);

        // Head dot tracks the leading edge — one tween per sample segment
        for (let i = 1; i <= N; i++) {
          tl.to(headDot, {
            attr: { cx: dotCxs[i], cy: dotCys[i] },
            duration: segDur,
            ease: "none"
          }, CURVE_START + (i - 1) * segDur);
        }

        // Camera (zoom + pan) — same N segments, same timing
        for (let i = 1; i <= N; i++) {
          tl.to(cameraEl, {
            x: camXs[i],
            y: camYs[i],
            scale: camScales[i],
            duration: segDur,
            ease: "none"
          }, CURVE_START + (i - 1) * segDur);
        }

        // Each gridline fades in when curve passes it
        gridEls.forEach(function (g) {
          const frac = crossings[g.id];
          if (frac === undefined) return;
          tl.to(g, {
            opacity: 0.35,
            duration: 0.3,
            ease: "power2.out"
          }, CURVE_START + frac * vars.curveDuration);
        });

        // Subtle pulse on head dot during final hold
        tl.to(headDot, {
          attr: { r: 28 },
          duration: 0.45,
          ease: "power2.inOut",
          yoyo: true,
          repeat: 1
        }, CURVE_START + vars.curveDuration + 0.25);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
