<!doctype html>
<html lang="en" data-composition-variables='[{"id":"orange","type":"color","label":"Hazard fill","default":"#E53935"},{"id":"white","type":"color","label":"Stroke / exclamation (white)","default":"#FFFFFF"},{"id":"strokeWidth","type":"number","label":"Border stroke width (px)","default":6},{"id":"signSize","type":"number","label":"Hazard sign size (px)","default":520},{"id":"topY","type":"number","label":"Final Y from top (px)","default":340},{"id":"enterStart","type":"number","label":"Enter starts at (s)","default":0.15},{"id":"enterDuration","type":"number","label":"Rise + fade-in duration (s)","default":1.1},{"id":"shakeStart","type":"number","label":"Shake starts at (s)","default":1.35},{"id":"shakeDuration","type":"number","label":"Shake duration (s)","default":0.5},{"id":"shakeIntensity","type":"number","label":"Shake intensity (px)","default":40},{"id":"shakeRotation","type":"number","label":"Shake rotation (deg)","default":9}]'>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #00FF00;
        font-family: "Montserrat", system-ui, sans-serif;
      }

      .scene {
        position: relative;
        width: 100%;
        height: 100%;
      }

      /* Hazard sign — centered horizontally; vertical position driven by JS variable.
         filter: drop-shadow on the wrapper so the triangle silhouette (not bounding box)
         casts the shadow. */
      /* left: 50% + xPercent: -50 in JS centers the wrapper.
         GSAP owns transform so x/rotation tweens don't collide with CSS translate. */
      .hazard {
        position: absolute;
        left: 50%;
        will-change: transform, opacity;
        filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.35));
      }
      .hazard svg {
        display: block;
        width: 100%;
        height: 100%;
        overflow: visible;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="3" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="3" data-track-index="1">
        <!-- Hazard sign — starts off-screen below frame; rises up + fades in; then shakes.
             allow-overflow because at t=0 it sits below the canvas. -->
        <div id="hazard" class="hazard" data-layout-allow-overflow>
          <svg id="hazard-svg" viewBox="0 0 200 180" fill="none">
            <!-- Equilateral-ish triangle with rounded corners via stroke-linejoin: round. -->
            <path
              id="hazard-tri"
              d="M 100 14 L 188 166 L 12 166 Z"
              fill="#F28129"
              stroke="#FFFFFF"
              stroke-width="6"
              stroke-linejoin="round"
              stroke-linecap="round"
            />
            <!-- Exclamation bar (white, rounded ends) -->
            <rect id="hazard-bar" x="92" y="60" width="16" height="62" rx="8" fill="#FFFFFF" />
            <!-- Exclamation dot (white) -->
            <circle id="hazard-dot" cx="100" cy="142" r="9" fill="#FFFFFF" />
          </svg>
        </div>
      </div>
    </div>

    <script>
      (function () {
        const vars = window.__hyperframes.getVariables();

        const hazard = document.getElementById("hazard");
        hazard.style.width = vars.signSize + "px";
        hazard.style.height = (vars.signSize * 0.9) + "px";

        const tri = document.getElementById("hazard-tri");
        tri.setAttribute("fill", vars.orange);
        tri.setAttribute("stroke", vars.white);
        tri.setAttribute("stroke-width", vars.strokeWidth);

        document.getElementById("hazard-bar").setAttribute("fill", vars.white);
        document.getElementById("hazard-dot").setAttribute("fill", vars.white);

        const finalY = vars.topY;
        const startY = 1920 + 100;

        // xPercent: -50 = centering bakes into GSAP's transform.
        gsap.set("#hazard", { top: startY + "px", opacity: 0, xPercent: -50, x: 0, rotation: 0 });

        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // 1. Rise from bottom + fade in. power3.out = decelerates into settle.
        tl.to(
          "#hazard",
          {
            top: finalY + "px",
            opacity: 1,
            duration: vars.enterDuration,
            ease: "power3.out",
          },
          vars.enterStart
        );

        // 2. Shake — short horizontal + rotational jitter once settled.
        //    Deterministic chained tweens (no Math.random — framework requires determinism).
        // 10 sharp alternations holding near-full intensity, then a quick tail decay.
        // Fewer steps so each oscillation reads at the shorter duration.
        const shakeSteps = 10;
        const stepDur = vars.shakeDuration / shakeSteps;
        const offsets =    [1, -1, 1, -1, 1, -1, 0.8, -0.5, 0.3, 0];
        const rotOffsets = [1, -1, 1, -1, 1, -1, 0.7, -0.4, 0.2, 0];

        for (let i = 0; i < shakeSteps; i++) {
          tl.to(
            "#hazard",
            {
              x: offsets[i] * vars.shakeIntensity,
              rotation: rotOffsets[i] * vars.shakeRotation,
              duration: stepDur,
              ease: "power1.inOut",
              overwrite: "auto",
            },
            vars.shakeStart + i * stepDur
          );
        }

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
