<!DOCTYPE html>
<html lang="en" data-composition-variables='[{"id":"orange","type":"color","label":"Curve color","default":"#F28129"},{"id":"white","type":"color","label":"Axes / grid color","default":"#FFFFFF"},{"id":"curveDuration","type":"number","label":"Curve draw duration (s)","default":1.8},{"id":"strokeWidth","type":"number","label":"Curve stroke width (px)","default":14}]'>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #00FF00; /* chroma key — Gray keys this out in Premiere */
        font-family: "Montserrat", system-ui, sans-serif;
      }

      .scene {
        position: relative;
        width: 100%;
        height: 100%;
      }

      svg {
        position: absolute;
        inset: 0;
        width: 1080px;
        height: 1920px;
        overflow: visible;
      }

      .axis, .grid-line {
        fill: none;
        stroke-linecap: round;
      }

      .axis      { stroke-width: 6; }
      .grid-line { stroke-width: 2; opacity: 0.35; }

      .curve {
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: drop-shadow(0 4px 16px rgba(0, 0, 0, 0.3));
      }

      .head-dot {
        filter: drop-shadow(0 0 18px rgba(242, 129, 41, 0.9));
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="3.0" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="3.0" data-track-index="1">
        <svg viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">
          <!-- Gridlines (drawn first so they sit under axes / curve) -->
          <g id="grid">
            <!-- horizontal grid lines -->
            <line class="grid-line" id="grid-h-1" x1="160" y1="1400" x2="940" y2="1400"/>
            <line class="grid-line" id="grid-h-2" x1="160" y1="1140" x2="940" y2="1140"/>
            <line class="grid-line" id="grid-h-3" x1="160" y1="880"  x2="940" y2="880"/>
            <line class="grid-line" id="grid-h-4" x1="160" y1="620"  x2="940" y2="620"/>
            <line class="grid-line" id="grid-h-5" x1="160" y1="360"  x2="940" y2="360"/>
            <!-- vertical grid lines -->
            <line class="grid-line" id="grid-v-1" x1="316" y1="240" x2="316" y2="1660"/>
            <line class="grid-line" id="grid-v-2" x1="472" y1="240" x2="472" y2="1660"/>
            <line class="grid-line" id="grid-v-3" x1="628" y1="240" x2="628" y2="1660"/>
            <line class="grid-line" id="grid-v-4" x1="784" y1="240" x2="784" y2="1660"/>
          </g>

          <!-- Axes -->
          <line id="axis-y" class="axis" x1="160" y1="240" x2="160" y2="1660"/>
          <line id="axis-x" class="axis" x1="160" y1="1660" x2="940" y2="1660"/>

          <!-- Exponential curve (path filled in by JS) -->
          <path id="curve" class="curve" d=""/>

          <!-- Head dot at the leading edge of the curve -->
          <circle id="head-dot" class="head-dot" r="18" cx="0" cy="0" opacity="0"/>
        </svg>
      </div>
    </div>

    <script>
      (function () {
        const vars = window.__hyperframes.getVariables();

        // Apply colors from variables
        document.querySelectorAll(".axis, .grid-line").forEach(function (el) {
          el.setAttribute("stroke", vars.white);
        });
        const curveEl  = document.getElementById("curve");
        const headDot  = document.getElementById("head-dot");
        curveEl.setAttribute("stroke", vars.orange);
        curveEl.setAttribute("stroke-width", vars.strokeWidth);
        headDot.setAttribute("fill", vars.orange);

        // === Build exponential curve path ===
        // Graph plot area: x ∈ [160, 940], y ∈ [240, 1660] (SVG: top=240, bottom=1660)
        // Curve: y(x) = ymax - amplitude * (e^(k*xNorm) - 1) / (e^k - 1)
        // Starts flat at bottom-left, accelerates upward to top-right.
        const X0 = 160, X1 = 940;
        const Y_BOT = 1620, Y_TOP = 280;
        const k = 3.2; // exponential steepness — higher = more aggressive hockey-stick
        const STEPS = 80;

        const points = [];
        for (let i = 0; i <= STEPS; i++) {
          const t = i / STEPS;                       // 0 → 1 along x-axis
          const norm = (Math.exp(k * t) - 1) / (Math.exp(k) - 1); // 0 → 1, exponential
          const px = X0 + t * (X1 - X0);
          const py = Y_BOT - norm * (Y_BOT - Y_TOP);
          points.push([px, py]);
        }

        // Smooth path: M then C cubic bezier segments using neighbor tangents
        let d = `M ${points[0][0].toFixed(2)} ${points[0][1].toFixed(2)}`;
        for (let i = 1; i < points.length; i++) {
          const prev = points[i - 1];
          const curr = points[i];
          // Simple line segments — enough density for it to read as a smooth curve
          d += ` L ${curr[0].toFixed(2)} ${curr[1].toFixed(2)}`;
        }
        curveEl.setAttribute("d", d);

        // Compute path length for stroke-dashoffset draw-on
        const pathLen = curveEl.getTotalLength();
        curveEl.style.strokeDasharray  = pathLen;
        curveEl.style.strokeDashoffset = pathLen;

        // Final head-dot position (end of curve)
        const last = points[points.length - 1];
        headDot.setAttribute("cx", last[0]);
        headDot.setAttribute("cy", last[1]);

        // === Timeline ===
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // 1. Y-axis draws in from bottom to top
        gsap.set("#axis-y", { attr: { y2: 1660 } });
        tl.fromTo("#axis-y",
          { attr: { y2: 1660 } },
          { attr: { y2: 240 }, duration: 0.35, ease: "power2.out" },
          0
        );

        // 2. X-axis draws in from left to right (right after y-axis starts)
        gsap.set("#axis-x", { attr: { x2: 160 } });
        tl.fromTo("#axis-x",
          { attr: { x2: 160 } },
          { attr: { x2: 940 }, duration: 0.35, ease: "power2.out" },
          0.1
        );

        // 3. Gridlines fade in (staggered, subtle)
        tl.from(".grid-line",
          { opacity: 0, duration: 0.4, stagger: 0.04, ease: "power1.out" },
          0.35
        );

        // 4. Curve draws on — slow start, accelerating with curve shape itself
        //    Using power3.in gives the visual "starts slow, blows up fast" effect
        //    that matches what an exponential growth feels like.
        tl.to(curveEl,
          {
            strokeDashoffset: 0,
            duration: vars.curveDuration,
            ease: "power3.in"
          },
          0.55
        );

        // 5. Head dot pops in at the end of the curve draw
        tl.fromTo(headDot,
          { attr: { r: 0 }, opacity: 0 },
          { attr: { r: 22 }, opacity: 1, duration: 0.35, ease: "back.out(3)" },
          0.55 + vars.curveDuration - 0.05
        );

        // 6. Subtle pulse on the head dot during the hold
        tl.to(headDot,
          { attr: { r: 30 }, duration: 0.45, ease: "power2.inOut", yoyo: true, repeat: 1 },
          0.55 + vars.curveDuration + 0.35
        );

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
