<!doctype html>
<html lang="en" data-composition-variables='[{"id":"titleText","type":"string","label":"Title text","default":"My Number One Business Hack For 2026"},{"id":"orange","type":"color","label":"Accent orange","default":"#F28129"},{"id":"white","type":"color","label":"White","default":"#FFFFFF"},{"id":"strokeWidth","type":"number","label":"Border stroke width (px)","default":3},{"id":"cornerRadius","type":"number","label":"Corner radius (px)","default":36},{"id":"enterTime","type":"number","label":"Title slides in at (s)","default":0.2}]'>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #00FF00; /* chroma key green */
        font-family: "Montserrat", system-ui, sans-serif;
      }

      /* === Scene container — pushes the card into the TOP THIRD ===
         Title card vertical center sits around Y=480 (top third = 0-640). */
      .scene {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        padding: 380px 80px 0 80px;
      }

      /* === Title card — rounded orange-glass rectangle ===
         Same glass treatment as 02-bank-vault-deposit:
           - radial specular highlight at top
           - linear body gradient (light -> mid -> dark orange)
           - inset top white highlight + inset bottom shadow + outer orange bloom
         All applied opaque so chroma-key keys cleanly around the card. */
      .title-card {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        max-width: 900px;
        padding: 38px 60px;
        background:
          radial-gradient(
            ellipse 100% 60% at 50% 0%,
            rgba(255, 220, 180, 0.55) 0%,
            rgba(255, 200, 150, 0.20) 35%,
            rgba(255, 180, 120, 0.0) 65%
          ),
          linear-gradient(
            180deg,
            rgba(255, 168, 88, 1) 0%,
            rgba(242, 129, 41, 1) 35%,
            rgba(214, 100, 22, 1) 100%
          );
        border-style: solid;
      }

      .title-text {
        font-family: "Montserrat", sans-serif;
        font-weight: 800;
        font-size: 72px;
        line-height: 1.12;
        color: var(--white);
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        text-shadow: 0 3px 10px rgba(0, 0, 0, 0.35);
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="5" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="5" data-track-index="1">
        <!-- Title card — sits in the top third, bounces up from below. -->
        <div id="title-card" class="title-card" data-layout-allow-overflow>
          <div id="title-text" class="title-text">My Number One Business Hack For 2026</div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        const vars = window.__hyperframes.getVariables();

        // Brand colors
        document.documentElement.style.setProperty("--white", vars.white);
        document.documentElement.style.setProperty("--orange", vars.orange);

        // Card styling — white edge + glass shadows
        const glassShadow = [
          "inset 0 2px 0 rgba(255, 240, 215, 0.55)",   // top inner highlight (specular)
          "inset 0 -4px 14px rgba(140, 55, 8, 0.45)",  // bottom inner shadow (depth)
          "0 0 32px rgba(242, 129, 41, 0.55)",          // outer orange bloom
          "0 8px 24px rgba(0, 0, 0, 0.28)",             // base drop shadow
        ].join(", ");

        const card = document.getElementById("title-card");
        card.style.borderWidth = vars.strokeWidth + "px";
        card.style.borderColor = vars.white;
        card.style.borderRadius = vars.cornerRadius + "px";
        card.style.boxShadow = glassShadow;

        // Text content
        document.getElementById("title-text").textContent = vars.titleText;

        // === Timeline ===
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // Entrance: bounce up from below + fade in.
        // - y: +140 -> 0 with back.out(1.6) for a satisfying overshoot-settle
        // - opacity: 0 -> 1 alongside the slide (fade meets the bounce)
        tl.from(
          "#title-card",
          {
            y: 140,
            opacity: 0,
            duration: 0.75,
            ease: "back.out(1.6)",
          },
          vars.enterTime
        );

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
