<!DOCTYPE html>
<html lang="en" data-composition-variables='[{"id":"year","type":"string","label":"Year label","default":"2026"},{"id":"orange","type":"color","label":"Accent orange","default":"#F28129"},{"id":"paper","type":"color","label":"Paper color","default":"#FAF7F0"},{"id":"ink","type":"color","label":"Primary text (ink)","default":"#1A1A1A"},{"id":"inkSoft","type":"color","label":"Secondary text","default":"#6B6358"},{"id":"cornerRadius","type":"number","label":"Page corner radius (px)","default":18},{"id":"cardEnterTime","type":"number","label":"Calendar enters at (s)","default":0.0},{"id":"firstFlipTime","type":"number","label":"First page tear (Jan→Feb) at (s)","default":0.35},{"id":"fastInterval","type":"number","label":"Interval between early tears (s)","default":0.22},{"id":"slowInterval","type":"number","label":"Interval between later tears (s)","default":0.34},{"id":"decemberHoldStart","type":"number","label":"December lands at (s)","default":2.80},{"id":"highlightTime","type":"number","label":"Orange ring on Dec 31 at (s)","default":3.40},{"id":"tearDuration","type":"number","label":"Per-page tear duration (s)","default":0.55}]'>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #00FF00; /* chroma key green — Gray keys this out */
        font-family: "Montserrat", system-ui, sans-serif;
      }

      .scene {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* === Binder: holds the binding strip + page stack === */
      .binder {
        position: relative;
        width: 920px;
        height: 1240px;
        will-change: transform, opacity;
      }

      /* Soft shadow underneath the whole stack */
      .stack-shadow {
        position: absolute;
        inset: 22px -14px -14px 22px;
        background: rgba(0, 0, 0, 0.32);
        border-radius: 22px;
        filter: blur(22px);
        z-index: 0;
      }

      /* Binding strip — stays fixed, covers top of every page, holds the punch holes */
      .binding-strip {
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 100px;
        background: var(--paper);
        border-radius: var(--corner) var(--corner) 0 0;
        z-index: 100;
        box-shadow:
          0 6px 8px -2px rgba(0, 0, 0, 0.18),
          0 2px 0 rgba(0, 0, 0, 0.04) inset;
        background-image:
          radial-gradient(circle at 20% 50%, rgba(0,0,0,0.025) 0, transparent 60%),
          radial-gradient(circle at 80% 50%, rgba(0,0,0,0.025) 0, transparent 60%);
      }

      /* Subtle horizontal binding line just under the punch holes */
      .bind-rod {
        position: absolute;
        left: 8%; right: 8%;
        top: 78px;
        height: 2px;
        background: rgba(0, 0, 0, 0.12);
      }

      .punch {
        position: absolute;
        top: 38px;
        width: 26px;
        height: 26px;
        background: #0d0d0d;
        border-radius: 50%;
        box-shadow:
          inset 0 3px 3px rgba(0, 0, 0, 0.8),
          inset 0 -2px 2px rgba(255, 255, 255, 0.06);
      }
      .punch.left  { left: 28%; }
      .punch.right { right: 28%; }

      /* === Page (one per month) === */
      .page {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: var(--paper);
        border-radius: var(--corner);
        padding: 130px 70px 60px 70px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        transform-origin: 0% 0%; /* tear pivot near top-left corner */
        backface-visibility: hidden;
        will-change: transform, opacity;
        box-shadow:
          0 2px 0 rgba(0, 0, 0, 0.05) inset,
          0 12px 28px rgba(0, 0, 0, 0.22);
        /* paper grain */
        background-image:
          radial-gradient(circle at 22% 28%, rgba(0,0,0,0.020) 0, transparent 60%),
          radial-gradient(circle at 78% 72%, rgba(0,0,0,0.020) 0, transparent 60%);
        /* Ragged top edge — hidden behind the binding strip until torn */
        clip-path: polygon(
          0% 6%, 4% 2%, 8% 5%, 12% 1%, 16% 4%, 20% 2%, 24% 5%, 28% 1%, 32% 4%, 36% 2%,
          40% 5%, 44% 1%, 48% 4%, 52% 2%, 56% 5%, 60% 1%, 64% 4%, 68% 2%, 72% 5%, 76% 1%,
          80% 4%, 84% 2%, 88% 5%, 92% 1%, 96% 4%, 100% 2%,
          100% 100%, 0% 100%
        );
      }

      .year-label {
        font-size: 36px;
        font-weight: 500;
        letter-spacing: 0.32em;
        color: var(--ink-soft);
        text-align: center;
      }

      .month-name {
        font-size: 112px;
        font-weight: 800;
        letter-spacing: 0.01em;
        color: var(--ink);
        text-align: center;
        line-height: 1;
      }

      .divider {
        width: 100%;
        height: 1.5px;
        background: var(--ink);
        opacity: 0.18;
        margin: 4px 0 8px 0;
      }

      .weekday-row {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 4px;
      }
      .weekday-cell {
        text-align: center;
        font-size: 28px;
        font-weight: 700;
        color: var(--ink-soft);
        letter-spacing: 0.16em;
      }

      .month-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        grid-auto-rows: 96px;
        gap: 4px;
        flex: 1;
      }
      .day-cell {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        font-weight: 600;
        color: var(--ink);
        position: relative;
      }
      .day-cell.empty { visibility: hidden; }

      .day-highlight {
        position: absolute;
        inset: 4px;
        border: 4px solid var(--orange);
        border-radius: 999px;
        opacity: 0;
        will-change: transform, opacity;
        box-shadow: 0 0 16px rgba(242, 129, 41, 0.55);
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="4" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="4" data-track-index="1">
        <div id="binder" class="binder">
          <div class="stack-shadow"></div>
          <!-- pages stacked here (12 of them), injected by JS -->
          <div class="binding-strip">
            <div class="bind-rod"></div>
            <div class="punch left"></div>
            <div class="punch right"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        const vars = window.__hyperframes.getVariables();

        // Theme tokens
        document.documentElement.style.setProperty("--paper", vars.paper);
        document.documentElement.style.setProperty("--ink", vars.ink);
        document.documentElement.style.setProperty("--ink-soft", vars.inkSoft);
        document.documentElement.style.setProperty("--orange", vars.orange);
        document.documentElement.style.setProperty("--corner", vars.cornerRadius + "px");

        // 2026 calendar data (deterministic — verified)
        const months = [
          { name: "JANUARY",   days: 31, firstDay: 4 },
          { name: "FEBRUARY",  days: 28, firstDay: 0 },
          { name: "MARCH",     days: 31, firstDay: 0 },
          { name: "APRIL",     days: 30, firstDay: 3 },
          { name: "MAY",       days: 31, firstDay: 5 },
          { name: "JUNE",      days: 30, firstDay: 1 },
          { name: "JULY",      days: 31, firstDay: 3 },
          { name: "AUGUST",    days: 31, firstDay: 6 },
          { name: "SEPTEMBER", days: 30, firstDay: 2 },
          { name: "OCTOBER",   days: 31, firstDay: 4 },
          { name: "NOVEMBER",  days: 30, firstDay: 0 },
          { name: "DECEMBER",  days: 31, firstDay: 2 },
        ];

        const binder = document.getElementById("binder");
        const bindingStrip = binder.querySelector(".binding-strip");

        // Build 12 pages in reverse so December is at the bottom of the stack,
        // and January is on top (peels off first). Insert each page BEFORE the
        // binding strip so the strip always renders above all pages.
        for (let i = months.length - 1; i >= 0; i--) {
          const m = months[i];
          const page = document.createElement("div");
          page.className = "page";
          page.id = "page-" + i;
          page.style.zIndex = String(months.length - i); // earlier months sit higher
          page.setAttribute("data-layout-allow-overflow", ""); // pages intentionally fall off-canvas

          // Year
          const year = document.createElement("div");
          year.className = "year-label";
          year.textContent = vars.year;
          page.appendChild(year);

          // Month name
          const name = document.createElement("div");
          name.className = "month-name";
          name.textContent = m.name;
          page.appendChild(name);

          // Divider
          const div = document.createElement("div");
          div.className = "divider";
          page.appendChild(div);

          // Weekday header
          const week = document.createElement("div");
          week.className = "weekday-row";
          ["S","M","T","W","T","F","S"].forEach(function (d) {
            const c = document.createElement("div");
            c.className = "weekday-cell";
            c.textContent = d;
            week.appendChild(c);
          });
          page.appendChild(week);

          // Day grid
          const grid = document.createElement("div");
          grid.className = "month-grid";
          for (let e = 0; e < m.firstDay; e++) {
            const empty = document.createElement("div");
            empty.className = "day-cell empty";
            grid.appendChild(empty);
          }
          for (let d = 1; d <= m.days; d++) {
            const cell = document.createElement("div");
            cell.className = "day-cell";
            cell.textContent = d;
            if (i === 11 && d === 31) {
              cell.id = "dec-31";
              const ring = document.createElement("div");
              ring.className = "day-highlight";
              ring.id = "dec-31-ring";
              cell.appendChild(ring);
            }
            grid.appendChild(cell);
          }
          page.appendChild(grid);

          binder.insertBefore(page, bindingStrip);
        }

        // Flip schedule
        const flipTimes = [];
        flipTimes.push(vars.firstFlipTime);
        for (let i = 1; i < 11; i++) {
          const interval = i < 6 ? vars.fastInterval : vars.slowInterval;
          flipTimes.push(flipTimes[i - 1] + interval);
        }
        flipTimes[10] = vars.decemberHoldStart;

        // Timeline
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // Whole binder enters
        tl.from(
          "#binder",
          { opacity: 0, scale: 0.94, y: 24, duration: 0.30, ease: "power2.out" },
          vars.cardEnterTime
        );

        // Each torn page: deterministic alternating fall direction/rotation
        for (let i = 0; i < 11; i++) {
          const t = flipTimes[i];
          // Alternate left/right tear so the falling pages don't all stack the same way
          const direction = i % 2 === 0 ? -1 : 1; // -1 = falls left, +1 = falls right
          const rotEnd = direction * (6 + (i % 3) * 2); // 6, 8, 10 deg varied per page
          const xEnd = direction * 80;

          // Quick lift / tear-loose: page nudges before falling
          tl.to("#page-" + i, {
            y: -8,
            rotation: direction * 1.2,
            duration: 0.08,
            ease: "power2.out",
          }, t);

          // Fall + rotate + fade away
          tl.to("#page-" + i, {
            y: 1500,
            x: xEnd,
            rotation: rotEnd,
            opacity: 0,
            duration: vars.tearDuration,
            ease: "power2.in",
          }, t + 0.08);
        }

        // Orange ring on Dec 31
        tl.fromTo("#dec-31-ring",
          { opacity: 0, scale: 1.6 },
          { opacity: 1, scale: 1.0, duration: 0.35, ease: "back.out(2)" },
          vars.highlightTime
        );
        tl.fromTo("#dec-31",
          { scale: 1.0 },
          { scale: 1.10, duration: 0.18, ease: "power2.out", yoyo: true, repeat: 1 },
          vars.highlightTime
        );

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
