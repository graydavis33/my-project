<!DOCTYPE html>
<html lang="en" data-composition-variables='[{"id":"year","type":"string","label":"Year label","default":"2026"},{"id":"orange","type":"color","label":"Accent orange","default":"#F28129"},{"id":"paper","type":"color","label":"Paper color","default":"#FAF7F0"},{"id":"paperBack","type":"color","label":"Paper back color","default":"#F2EEE3"},{"id":"ink","type":"color","label":"Primary text (ink)","default":"#1A1A1A"},{"id":"inkSoft","type":"color","label":"Secondary text","default":"#6B6358"},{"id":"cornerRadius","type":"number","label":"Page corner radius (px)","default":18},{"id":"cardEnterTime","type":"number","label":"Calendar enters at (s)","default":0.0},{"id":"firstFlipTime","type":"number","label":"First page flip (Jan→Feb) at (s)","default":0.35},{"id":"fastInterval","type":"number","label":"Interval between early flips (s)","default":0.22},{"id":"slowInterval","type":"number","label":"Interval between later flips (s)","default":0.34},{"id":"decemberHoldStart","type":"number","label":"December lands at (s)","default":2.80},{"id":"highlightTime","type":"number","label":"Orange ring on Dec 31 at (s)","default":3.40},{"id":"flipDuration","type":"number","label":"Per-page flip duration (s)","default":0.55}]'>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #00FF00; /* chroma key green */
        font-family: "Montserrat", system-ui, sans-serif;
      }

      .scene {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* === Binder: 3D perspective container === */
      .binder {
        position: relative;
        width: 920px;
        height: 1240px;
        perspective: 2200px;
        perspective-origin: 50% -10%;
        transform-style: preserve-3d;
        will-change: transform, opacity;
      }

      /* Soft shadow underneath the stack */
      .stack-shadow {
        position: absolute;
        inset: 22px -14px -14px 22px;
        background: rgba(0, 0, 0, 0.32);
        border-radius: 22px;
        filter: blur(22px);
        z-index: 0;
      }

      /* Binding strip — fixed, holds punch holes, always above pages */
      .binding-strip {
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 100px;
        background: var(--paper);
        border-radius: var(--corner) var(--corner) 0 0;
        border: 2px solid var(--orange);
        border-bottom: none;
        z-index: 1000;
        box-shadow:
          0 6px 8px -2px rgba(0, 0, 0, 0.18),
          0 2px 0 rgba(0, 0, 0, 0.04) inset;
        background-image:
          radial-gradient(circle at 20% 50%, rgba(0,0,0,0.025) 0, transparent 60%),
          radial-gradient(circle at 80% 50%, rgba(0,0,0,0.025) 0, transparent 60%);
      }
      .bind-rod {
        position: absolute;
        left: 8%; right: 8%;
        top: 78px;
        height: 2px;
        background: rgba(0, 0, 0, 0.12);
      }
      .punch {
        position: absolute;
        top: 38px;
        width: 26px;
        height: 26px;
        background: #0d0d0d;
        border-radius: 50%;
        box-shadow:
          inset 0 3px 3px rgba(0, 0, 0, 0.8),
          inset 0 -2px 2px rgba(255, 255, 255, 0.06);
      }
      .punch.left  { left: 28%; }
      .punch.right { right: 28%; }

      /* === Page = 3D rotating wrapper with front + back faces === */
      .page {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        transform-origin: 50% 0%; /* hinge at top edge — flip pivot */
        transform-style: preserve-3d;
        will-change: transform;
      }

      .page-face {
        position: absolute;
        inset: 0;
        border-radius: var(--corner);
        border: 2px solid var(--orange);
        backface-visibility: hidden;
        background: var(--paper);
        box-shadow:
          0 2px 0 rgba(0, 0, 0, 0.04) inset,
          0 12px 28px rgba(0, 0, 0, 0.20);
      }

      .page-front {
        padding: 130px 70px 60px 70px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        background-image:
          radial-gradient(circle at 22% 28%, rgba(0,0,0,0.020) 0, transparent 60%),
          radial-gradient(circle at 78% 72%, rgba(0,0,0,0.020) 0, transparent 60%);
      }

      .page-back {
        transform: rotateX(180deg);
        background-color: var(--paper-back);
        /* faint horizontal rule lines suggest the back of a paper page */
        background-image:
          repeating-linear-gradient(
            to bottom,
            transparent 0px,
            transparent 56px,
            rgba(0, 0, 0, 0.05) 56px,
            rgba(0, 0, 0, 0.05) 57px
          ),
          radial-gradient(circle at 30% 30%, rgba(0,0,0,0.025) 0, transparent 65%),
          radial-gradient(circle at 70% 70%, rgba(0,0,0,0.025) 0, transparent 65%);
      }

      .year-label {
        font-size: 36px;
        font-weight: 500;
        letter-spacing: 0.32em;
        color: var(--ink-soft);
        text-align: center;
      }

      .month-name {
        font-size: 112px;
        font-weight: 800;
        letter-spacing: 0.01em;
        color: var(--ink);
        text-align: center;
        line-height: 1;
      }

      .divider {
        width: 100%;
        height: 1.5px;
        background: var(--ink);
        opacity: 0.18;
        margin: 4px 0 8px 0;
      }

      .weekday-row {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 4px;
      }
      .weekday-cell {
        text-align: center;
        font-size: 28px;
        font-weight: 700;
        color: var(--ink-soft);
        letter-spacing: 0.16em;
      }

      .month-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        grid-auto-rows: 96px;
        gap: 4px;
        flex: 1;
      }
      .day-cell {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        font-weight: 600;
        color: var(--ink);
        position: relative;
      }
      .day-cell.empty { visibility: hidden; }

      .day-highlight {
        position: absolute;
        inset: 4px;
        border: 4px solid var(--orange);
        border-radius: 999px;
        opacity: 0;
        will-change: transform, opacity;
        box-shadow: 0 0 16px rgba(242, 129, 41, 0.55);
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="4" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="4" data-track-index="1">
        <div id="binder" class="binder">
          <div class="stack-shadow"></div>
          <!-- 12 pages injected here -->
          <div class="binding-strip">
            <div class="bind-rod"></div>
            <div class="punch left"></div>
            <div class="punch right"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        const vars = window.__hyperframes.getVariables();

        // Theme tokens
        document.documentElement.style.setProperty("--paper", vars.paper);
        document.documentElement.style.setProperty("--paper-back", vars.paperBack);
        document.documentElement.style.setProperty("--ink", vars.ink);
        document.documentElement.style.setProperty("--ink-soft", vars.inkSoft);
        document.documentElement.style.setProperty("--orange", vars.orange);
        document.documentElement.style.setProperty("--corner", vars.cornerRadius + "px");

        // 2026 calendar data (deterministic)
        const months = [
          { name: "JANUARY",   days: 31, firstDay: 4 },
          { name: "FEBRUARY",  days: 28, firstDay: 0 },
          { name: "MARCH",     days: 31, firstDay: 0 },
          { name: "APRIL",     days: 30, firstDay: 3 },
          { name: "MAY",       days: 31, firstDay: 5 },
          { name: "JUNE",      days: 30, firstDay: 1 },
          { name: "JULY",      days: 31, firstDay: 3 },
          { name: "AUGUST",    days: 31, firstDay: 6 },
          { name: "SEPTEMBER", days: 30, firstDay: 2 },
          { name: "OCTOBER",   days: 31, firstDay: 4 },
          { name: "NOVEMBER",  days: 30, firstDay: 0 },
          { name: "DECEMBER",  days: 31, firstDay: 2 },
        ];

        const binder = document.getElementById("binder");
        const bindingStrip = binder.querySelector(".binding-strip");

        // Build pages in REVERSE so December sits at the bottom of the stack
        // (rendered first, lowest z-index) and January sits on top (flips first).
        for (let i = months.length - 1; i >= 0; i--) {
          const m = months[i];

          // Outer page wrapper (rotates in 3D)
          const page = document.createElement("div");
          page.className = "page";
          page.id = "page-" + i;
          page.style.zIndex = String(months.length - i);
          page.setAttribute("data-layout-allow-overflow", ""); // flips swing above binder

          // Front face — calendar content
          const front = document.createElement("div");
          front.className = "page-face page-front";

          const year = document.createElement("div");
          year.className = "year-label";
          year.textContent = vars.year;
          front.appendChild(year);

          const name = document.createElement("div");
          name.className = "month-name";
          name.textContent = m.name;
          front.appendChild(name);

          const div = document.createElement("div");
          div.className = "divider";
          front.appendChild(div);

          const week = document.createElement("div");
          week.className = "weekday-row";
          ["S","M","T","W","T","F","S"].forEach(function (d) {
            const c = document.createElement("div");
            c.className = "weekday-cell";
            c.textContent = d;
            week.appendChild(c);
          });
          front.appendChild(week);

          const grid = document.createElement("div");
          grid.className = "month-grid";
          for (let e = 0; e < m.firstDay; e++) {
            const empty = document.createElement("div");
            empty.className = "day-cell empty";
            grid.appendChild(empty);
          }
          for (let d = 1; d <= m.days; d++) {
            const cell = document.createElement("div");
            cell.className = "day-cell";
            cell.textContent = d;
            if (i === 11 && d === 31) {
              cell.id = "dec-31";
              const ring = document.createElement("div");
              ring.className = "day-highlight";
              ring.id = "dec-31-ring";
              cell.appendChild(ring);
            }
            grid.appendChild(cell);
          }
          front.appendChild(grid);
          page.appendChild(front);

          // Back face — blank lined paper, rotated 180° to face viewer during flip
          const back = document.createElement("div");
          back.className = "page-face page-back";
          page.appendChild(back);

          binder.insertBefore(page, bindingStrip);
        }

        // Flip schedule
        const flipTimes = [];
        flipTimes.push(vars.firstFlipTime);
        for (let i = 1; i < 11; i++) {
          const interval = i < 6 ? vars.fastInterval : vars.slowInterval;
          flipTimes.push(flipTimes[i - 1] + interval);
        }
        flipTimes[10] = vars.decemberHoldStart;

        // Timeline
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // Binder enters
        tl.from(
          "#binder",
          { opacity: 0, scale: 0.94, y: 24, duration: 0.30, ease: "power2.out" },
          vars.cardEnterTime
        );

        // Each page flip: small lift, then full fold-up rotation
        for (let i = 0; i < 11; i++) {
          const t = flipTimes[i];

          // Lift: page rises slightly off the stack (gravity-release feel)
          tl.to("#page-" + i, {
            rotationX: -12,
            duration: 0.08,
            ease: "power2.out",
          }, t);

          // Full fold: rotates up + over the binder, ease-in (accelerating like gravity)
          tl.to("#page-" + i, {
            rotationX: -175,
            duration: vars.flipDuration,
            ease: "power2.in",
          }, t + 0.08);
        }

        // Dec 31 orange ring
        tl.fromTo("#dec-31-ring",
          { opacity: 0, scale: 1.6 },
          { opacity: 1, scale: 1.0, duration: 0.35, ease: "back.out(2)" },
          vars.highlightTime
        );
        tl.fromTo("#dec-31",
          { scale: 1.0 },
          { scale: 1.10, duration: 0.18, ease: "power2.out", yoyo: true, repeat: 1 },
          vars.highlightTime
        );

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
