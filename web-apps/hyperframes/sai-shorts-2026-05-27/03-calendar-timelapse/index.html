<!DOCTYPE html>
<html lang="en" data-composition-variables='[{"id":"year","type":"string","label":"Year label","default":"2026"},{"id":"orange","type":"color","label":"Accent orange","default":"#F28129"},{"id":"paper","type":"color","label":"Paper color","default":"#FAF7F0"},{"id":"ink","type":"color","label":"Primary text (ink)","default":"#1A1A1A"},{"id":"inkSoft","type":"color","label":"Secondary text","default":"#6B6358"},{"id":"cornerRadius","type":"number","label":"Page corner radius (px)","default":18},{"id":"cardEnterTime","type":"number","label":"Calendar enters at (s)","default":0.0},{"id":"firstFlipTime","type":"number","label":"First page peel (Jan→Feb) at (s)","default":0.35},{"id":"fastInterval","type":"number","label":"Interval between early peels (s)","default":0.22},{"id":"slowInterval","type":"number","label":"Interval between later peels (s)","default":0.34},{"id":"decemberHoldStart","type":"number","label":"December lands at (s)","default":2.80},{"id":"highlightTime","type":"number","label":"Orange ring on Dec 31 at (s)","default":3.40},{"id":"peelDuration","type":"number","label":"Per-page peel duration (s)","default":0.45}]'>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #00FF00; /* chroma key green — Gray keys this out */
        font-family: "Montserrat", system-ui, sans-serif;
      }

      .scene {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* === Binder / stack container (perspective for 3D page flip) === */
      .binder {
        position: relative;
        width: 920px;
        height: 1180px;
        perspective: 1800px;
        perspective-origin: 50% 0%;
        will-change: transform, opacity;
      }

      /* Drop-shadow base underneath the stack — gives "stack of pages" depth */
      .stack-shadow {
        position: absolute;
        inset: 18px -12px -12px 18px;
        background: rgba(0, 0, 0, 0.28);
        border-radius: 22px;
        filter: blur(20px);
        z-index: 0;
      }

      /* Each page = a sheet of paper holding one month */
      .page {
        position: absolute;
        inset: 0;
        background: var(--paper);
        border-radius: var(--corner);
        padding: 80px 70px 90px 70px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        transform-origin: 50% 0%; /* peel from top edge — wall-calendar flip */
        backface-visibility: hidden;
        will-change: transform, opacity;
        box-shadow:
          0 2px 0 rgba(0, 0, 0, 0.05) inset,
          0 10px 30px rgba(0, 0, 0, 0.25);
        /* subtle paper grain: layered radial micro-gradients (no images, no random) */
        background-image:
          radial-gradient(circle at 20% 20%, rgba(0,0,0,0.018) 0, transparent 60%),
          radial-gradient(circle at 80% 70%, rgba(0,0,0,0.018) 0, transparent 60%);
      }

      /* Two punch-holes at the top suggesting a wall/desk calendar */
      .punch {
        position: absolute;
        top: 22px;
        width: 22px;
        height: 22px;
        background: rgba(0, 0, 0, 0.55);
        border-radius: 50%;
        box-shadow: inset 0 2px 2px rgba(0, 0, 0, 0.6);
      }
      .punch.left  { left: 30%; }
      .punch.right { right: 30%; }

      /* Year line */
      .year-label {
        font-size: 36px;
        font-weight: 500;
        letter-spacing: 0.32em;
        color: var(--ink-soft);
        text-align: center;
        margin-top: 18px;
      }

      /* Month name — hero element on each page */
      .month-name {
        font-size: 112px;
        font-weight: 800;
        letter-spacing: 0.01em;
        color: var(--ink);
        text-align: center;
        line-height: 1;
      }

      /* Hairline divider */
      .divider {
        width: 100%;
        height: 1.5px;
        background: var(--ink);
        opacity: 0.18;
        margin: 4px 0 8px 0;
      }

      /* Weekday header */
      .weekday-row {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 4px;
      }
      .weekday-cell {
        text-align: center;
        font-size: 28px;
        font-weight: 700;
        color: var(--ink-soft);
        letter-spacing: 0.16em;
      }

      /* Day grid */
      .month-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        grid-auto-rows: 96px;
        gap: 4px;
        flex: 1;
      }
      .day-cell {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        font-weight: 600;
        color: var(--ink);
        position: relative;
      }
      .day-cell.empty {
        visibility: hidden;
      }

      /* Dec 31 orange highlight ring */
      .day-highlight {
        position: absolute;
        inset: 4px;
        border: 4px solid var(--orange);
        border-radius: 999px;
        opacity: 0;
        will-change: transform, opacity;
        box-shadow: 0 0 16px rgba(242, 129, 41, 0.55);
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="4" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="4" data-track-index="1">
        <div id="binder" class="binder">
          <div class="stack-shadow"></div>
          <!-- 12 pages injected here, layered back-to-front -->
        </div>
      </div>
    </div>

    <script>
      (function () {
        const vars = window.__hyperframes.getVariables();

        // Apply theme colors as CSS custom properties
        document.documentElement.style.setProperty("--paper", vars.paper);
        document.documentElement.style.setProperty("--ink", vars.ink);
        document.documentElement.style.setProperty("--ink-soft", vars.inkSoft);
        document.documentElement.style.setProperty("--orange", vars.orange);
        document.documentElement.style.setProperty("--corner", vars.cornerRadius + "px");

        // === 2026 calendar data (deterministic, no Date object needed) ===
        // firstDay: 0=Sun ... 6=Sat — verified for 2026
        const months = [
          { name: "JANUARY",   days: 31, firstDay: 4 },
          { name: "FEBRUARY",  days: 28, firstDay: 0 },
          { name: "MARCH",     days: 31, firstDay: 0 },
          { name: "APRIL",     days: 30, firstDay: 3 },
          { name: "MAY",       days: 31, firstDay: 5 },
          { name: "JUNE",      days: 30, firstDay: 1 },
          { name: "JULY",      days: 31, firstDay: 3 },
          { name: "AUGUST",    days: 31, firstDay: 6 },
          { name: "SEPTEMBER", days: 30, firstDay: 2 },
          { name: "OCTOBER",   days: 31, firstDay: 4 },
          { name: "NOVEMBER",  days: 30, firstDay: 0 },
          { name: "DECEMBER",  days: 31, firstDay: 2 },
        ];

        const binder = document.getElementById("binder");

        // Build 12 pages. December (index 11) goes in FIRST so it sits at the bottom
        // of the z-stack; January goes in LAST so it sits on top and peels off first.
        for (let i = months.length - 1; i >= 0; i--) {
          const m = months[i];
          const page = document.createElement("div");
          page.className = "page";
          page.id = "page-" + i;
          // z-index: earlier months on TOP (lower index = higher in stack)
          page.style.zIndex = String(months.length - i);

          // Punch holes
          const pL = document.createElement("div"); pL.className = "punch left";  page.appendChild(pL);
          const pR = document.createElement("div"); pR.className = "punch right"; page.appendChild(pR);

          // Year label
          const year = document.createElement("div");
          year.className = "year-label";
          year.textContent = vars.year;
          page.appendChild(year);

          // Month name
          const name = document.createElement("div");
          name.className = "month-name";
          name.textContent = m.name;
          page.appendChild(name);

          // Divider
          const div = document.createElement("div");
          div.className = "divider";
          page.appendChild(div);

          // Weekday header
          const week = document.createElement("div");
          week.className = "weekday-row";
          ["S","M","T","W","T","F","S"].forEach(function (d) {
            const c = document.createElement("div");
            c.className = "weekday-cell";
            c.textContent = d;
            week.appendChild(c);
          });
          page.appendChild(week);

          // Day grid
          const grid = document.createElement("div");
          grid.className = "month-grid";
          for (let e = 0; e < m.firstDay; e++) {
            const empty = document.createElement("div");
            empty.className = "day-cell empty";
            grid.appendChild(empty);
          }
          for (let d = 1; d <= m.days; d++) {
            const cell = document.createElement("div");
            cell.className = "day-cell";
            cell.textContent = d;
            if (i === 11 && d === 31) {
              cell.id = "dec-31";
              const ring = document.createElement("div");
              ring.className = "day-highlight";
              ring.id = "dec-31-ring";
              cell.appendChild(ring);
            }
            grid.appendChild(cell);
          }
          page.appendChild(grid);

          binder.appendChild(page);
        }

        // === Flip schedule ===
        const flipTimes = [];
        flipTimes.push(vars.firstFlipTime);
        for (let i = 1; i < 11; i++) {
          const interval = i < 6 ? vars.fastInterval : vars.slowInterval;
          flipTimes.push(flipTimes[i - 1] + interval);
        }
        // Force final flip (Nov -> Dec) to land precisely on decemberHoldStart
        flipTimes[10] = vars.decemberHoldStart;

        // === Timeline ===
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // Binder enters: slight scale up + fade
        tl.from(
          "#binder",
          { opacity: 0, scale: 0.94, y: 24, duration: 0.30, ease: "power2.out" },
          vars.cardEnterTime
        );

        // For each of the 11 transitions: page i peels off (revealing page i+1 underneath)
        for (let i = 0; i < 11; i++) {
          const t = flipTimes[i];
          // Peel: rotate up around the top edge, fade out near the end of the rotation
          tl.to("#page-" + i, {
            rotationX: -118,
            y: -30,
            opacity: 0,
            duration: vars.peelDuration,
            ease: "power2.inOut",
          }, t);
        }

        // Orange ring lands on Dec 31
        tl.fromTo("#dec-31-ring",
          { opacity: 0, scale: 1.6 },
          { opacity: 1, scale: 1.0, duration: 0.35, ease: "back.out(2)" },
          vars.highlightTime
        );

        // Subtle pulse on Dec 31
        tl.fromTo("#dec-31",
          { scale: 1.0 },
          { scale: 1.10, duration: 0.18, ease: "power2.out", yoyo: true, repeat: 1 },
          vars.highlightTime
        );

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
