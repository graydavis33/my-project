<!DOCTYPE html>
<html lang="en" data-composition-variables='[{"id":"orange","type":"color","label":"Accent color","default":"#F28129"},{"id":"counterFinal","type":"text","label":"Final counter value","default":"$10,000"},{"id":"countDuration","type":"number","label":"Count-up duration (s)","default":2.4}]'>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #00FF00;
        font-family: "Montserrat", system-ui, sans-serif;
      }
      .scene { position: relative; width: 100%; height: 100%; overflow: hidden; }

      .card-wrap {
        position: absolute;
        left: 80px;
        top: 560px;
        width: 920px;
        height: 800px;
        filter: drop-shadow(0 14px 36px rgba(0, 0, 0, 0.28));
        will-change: transform, opacity;
      }
      .card-bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
      .card-stack {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 26px;
        padding: 0 40px;
      }

      .icon-dollar {
        width: 130px;
        height: 130px;
        border: 6px solid #F28129;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 90px;
        font-weight: 900;
        color: #F28129;
        line-height: 1;
        padding-bottom: 6px;
      }

      .label-top {
        font-size: 38px;
        font-weight: 700;
        letter-spacing: 0.20em;
        color: #2a2a2a;
        text-transform: uppercase;
        opacity: 0.55;
      }

      .counter {
        font-size: 210px;
        font-weight: 900;
        letter-spacing: -0.01em;
        color: #F28129;
        font-variant-numeric: tabular-nums;
        line-height: 1.0;
        white-space: nowrap;
        transform-origin: 50% 50%;
      }

      .label-bottom {
        font-size: 44px;
        font-weight: 700;
        letter-spacing: 0.15em;
        color: #2a2a2a;
        text-transform: uppercase;
        opacity: 0.55;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="5" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="5" data-track-index="1">
        <div class="card-wrap" id="card-wrap" data-layout-allow-overflow>
          <svg class="card-bg" viewBox="0 0 920 800" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="corner-tint-1" cx="100%" cy="100%" r="78%">
                <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.95"/>
                <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0"/>
              </radialGradient>
            </defs>
            <rect x="0" y="0" width="920" height="800" rx="44" ry="44" fill="#F2EFE9"/>
            <rect x="0" y="0" width="920" height="800" rx="44" ry="44" fill="url(#corner-tint-1)"/>
          </svg>
          <div class="card-stack">
            <div class="icon-dollar">$</div>
            <div class="label-top">Ad Spend</div>
            <div class="counter" id="counter">$0</div>
            <div class="label-bottom">/ month</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        const vars = window.__hyperframes.getVariables();
        const cardWrap = document.getElementById("card-wrap");
        const counter  = document.getElementById("counter");

        const finalNum = parseInt(String(vars.counterFinal).replace(/[^0-9]/g, ""), 10);

        gsap.set(cardWrap, { opacity: 0, scale: 0.82, transformOrigin: "50% 50%" });
        counter.textContent = "$0";

        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // Card pops in
        tl.to(cardWrap, {
          opacity: 1,
          scale: 1,
          duration: 0.55,
          ease: "back.out(1.5)"
        }, 0.20);

        // Slot-machine count up
        const counterObj = { val: 0 };
        const countStart = 0.80;
        tl.to(counterObj, {
          val: finalNum,
          duration: vars.countDuration,
          ease: "power3.out",
          onUpdate: function () {
            counter.textContent = "$" + Math.floor(counterObj.val).toLocaleString("en-US");
          }
        }, countStart);

        // Settle pulse when number lands
        tl.to(counter, {
          scale: 1.08,
          duration: 0.18,
          ease: "power2.out",
          yoyo: true,
          repeat: 1
        }, countStart + vars.countDuration - 0.04);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
