<!doctype html>
<html lang="en" data-composition-variables='[{"id":"bankLabel","type":"string","label":"Bank label text","default":"BANK"},{"id":"vaultLabel","type":"string","label":"Vault label text","default":"Taxes"},{"id":"orange","type":"color","label":"Accent orange","default":"#F28129"},{"id":"white","type":"color","label":"White","default":"#FFFFFF"},{"id":"strokeWidth","type":"number","label":"Stroke width (px)","default":2},{"id":"cornerRadius","type":"number","label":"Corner radius (px)","default":32},{"id":"bankEnterTime","type":"number","label":"Bank slides in from left at (s)","default":0.2},{"id":"vaultEnterTime","type":"number","label":"Vault emerges from bank at (s)","default":1.1},{"id":"arrowEnterTime","type":"number","label":"Arrow draws in at (s)","default":2.0},{"id":"moneyStartTime","type":"number","label":"Money starts appearing at (s)","default":2.6},{"id":"moneyCount","type":"number","label":"Number of bills falling","default":12},{"id":"moneyFallDuration","type":"number","label":"Each bill falls for (s)","default":0.8},{"id":"vaultBlinkScale","type":"number","label":"Vault blink scale on bill arrival","default":1.08}]'>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #00FF00; /* chroma key green */
        font-family: "Montserrat", system-ui, sans-serif;
      }

      /* === Scene container — pushes the row toward the bottom third === */
      .scene {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: center;
        padding: 0 80px 280px 80px;
      }

      /* === Row: bank | arrow | vault, side-by-side === */
      .row {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 30px;
      }

      /* === Bank card (LEFT) === */
      .bank-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 280px;
        height: 300px;
        background: transparent;
        border-style: solid;
        gap: 18px;
      }
      .bank-icon { width: 80px; height: 80px; position: relative; }
      .bank-icon svg { width: 100%; height: 100%; }
      .bank-label {
        font-size: 36px;
        font-weight: 600;
        letter-spacing: 0.08em;
        color: var(--white);
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      }

      /* === Horizontal arrow (LEFT → RIGHT, bank → vault) === */
      .arrow {
        width: 140px;
        height: 12px;
        position: relative;
      }
      .arrow-line {
        position: absolute;
        top: 50%;
        left: 0;
        transform: translateY(-50%);
        width: 100%;
        height: 4px;
        background: var(--white);
        transform-origin: left center; /* draws from bank-side toward vault */
      }
      /* Arrowhead pointing RIGHT toward the vault */
      .arrow-head {
        position: absolute;
        top: 50%;
        right: 0;
        transform: translateY(-50%) rotate(-45deg);
        width: 20px;
        height: 20px;
        border-right: 4px solid var(--white);
        border-bottom: 4px solid var(--white);
      }

      /* === Vault card (RIGHT) === */
      .vault-card {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 280px;
        height: 300px;
        background: transparent;
        border-style: solid;
        gap: 18px;
        overflow: visible;
      }
      .vault-icon { width: 96px; height: 96px; }
      .vault-icon svg { width: 100%; height: 100%; }
      .vault-label {
        font-size: 44px;
        font-weight: 600;
        color: var(--orange);
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        letter-spacing: 0.02em;
      }

      /* === Money bills (absolute layer over scene) === */
      .money-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        overflow: hidden;
      }
      .bill {
        position: absolute;
        width: 64px;
        height: 64px;
        font-size: 56px;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--orange);
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        font-weight: 700;
        will-change: transform, opacity;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="6" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="6" data-track-index="1">
        <!-- Row: bank | arrow | vault. All in the bottom third of the frame. -->
        <div class="row">
          <!-- Bank card — LEFT.
               Starts off-screen below; rises into row. allow-overflow flags this as intentional. -->
          <div id="bank-card" class="bank-card" data-layout-allow-overflow>
            <div class="bank-icon">
              <!-- Generic bank/building icon -->
              <svg viewBox="0 0 96 96" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                <path d="M48 12 L84 32 L12 32 Z" />
                <line x1="12" y1="32" x2="84" y2="32" />
                <line x1="20" y1="36" x2="20" y2="72" />
                <line x1="36" y1="36" x2="36" y2="72" />
                <line x1="60" y1="36" x2="60" y2="72" />
                <line x1="76" y1="36" x2="76" y2="72" />
                <line x1="8" y1="80" x2="88" y2="80" />
                <line x1="8" y1="84" x2="88" y2="84" />
              </svg>
            </div>
            <div id="bank-label" class="bank-label">BANK</div>
          </div>

          <!-- Arrow (horizontal, points right) -->
          <div id="arrow" class="arrow">
            <div id="arrow-line" class="arrow-line"></div>
            <div id="arrow-head" class="arrow-head"></div>
          </div>

          <!-- Vault card — RIGHT. Born from bank position, slides RIGHT.
               allow-overflow because at t=0 it sits over the bank (offscreen of its final spot). -->
          <div id="vault-card" class="vault-card" data-layout-allow-overflow>
            <div class="vault-icon">
              <!-- Modern vault / safe icon -->
              <svg viewBox="0 0 144 144" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
                <rect x="20" y="28" width="104" height="92" rx="12" />
                <circle cx="72" cy="74" r="22" />
                <circle cx="72" cy="74" r="6" fill="white" />
                <line x1="72" y1="52" x2="72" y2="44" />
                <line x1="94" y1="74" x2="102" y2="74" />
                <line x1="72" y1="96" x2="72" y2="104" />
                <line x1="50" y1="74" x2="42" y2="74" />
                <line x1="32" y1="120" x2="32" y2="128" />
                <line x1="112" y1="120" x2="112" y2="128" />
              </svg>
            </div>
            <div id="vault-label" class="vault-label">Taxes</div>
          </div>
        </div>

        <!-- Money layer — bills start above frame, fall into the vault. -->
        <div id="money-layer" class="money-layer" data-layout-allow-overflow></div>
      </div>
    </div>

    <script>
      (function () {
        const vars = window.__hyperframes.getVariables();

        // Brand colors
        document.documentElement.style.setProperty("--white", vars.white);
        document.documentElement.style.setProperty("--orange", vars.orange);

        // Card styling
        const bankCard = document.getElementById("bank-card");
        const vaultCard = document.getElementById("vault-card");
        bankCard.style.borderWidth = vars.strokeWidth + "px";
        bankCard.style.borderColor = vars.white;
        bankCard.style.borderRadius = vars.cornerRadius + "px";
        bankCard.style.boxShadow = "0 4px 16px rgba(0,0,0,0.25)";
        vaultCard.style.borderWidth = vars.strokeWidth + "px";
        vaultCard.style.borderColor = vars.white;
        vaultCard.style.borderRadius = vars.cornerRadius + "px";
        vaultCard.style.boxShadow = "0 4px 16px rgba(0,0,0,0.25)";

        // Text content
        document.getElementById("bank-label").textContent = vars.bankLabel;
        document.getElementById("vault-label").textContent = vars.vaultLabel;
        document.getElementById("vault-label").style.color = vars.orange;

        // SVG stroke / fill colors
        document.querySelectorAll("svg [stroke]").forEach(function (el) {
          el.setAttribute("stroke", vars.white);
        });
        document.querySelectorAll("svg [fill='white']").forEach(function (el) {
          el.setAttribute("fill", vars.white);
        });

        // Arrow color
        document.getElementById("arrow-line").style.background = vars.white;
        const ah = document.getElementById("arrow-head");
        ah.style.borderRightColor = vars.white;
        ah.style.borderBottomColor = vars.white;

        // === Generate money bills (deterministic — mulberry32 PRNG) ===
        const moneyLayer = document.getElementById("money-layer");
        const count = Math.max(1, Math.floor(vars.moneyCount));

        // Vault sits at x ≈ 780 (right side of bottom row), card top ≈ 1340.
        // Money APPEARS at middle of screen above the row, then falls into the vault.
        const vaultCenterX = 780;
        const vaultLandY = 1380; // y where bills land (near vault top edge)
        const moneyOriginY = 900; // middle of screen — where bills fade in
        const spreadX = 130; // tighter spread since they start close to vault

        function mulberry32(seed) {
          return function () {
            let t = (seed += 0x6d2b79f5);
            t = Math.imul(t ^ (t >>> 15), t | 1);
            t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
          };
        }
        const rng = mulberry32(42);

        for (let i = 0; i < count; i++) {
          const bill = document.createElement("div");
          bill.className = "bill";
          bill.textContent = "$";
          bill.id = "bill-" + i;

          // Start position: middle of screen, above the bank-vault row.
          // Bills appear here (fade in) then fall down to the vault.
          const startX = vaultCenterX - spreadX + rng() * (spreadX * 2) - 32;
          const startY = moneyOriginY + (rng() - 0.5) * 60; // slight vertical variation
          const endX = vaultCenterX - 60 + rng() * 120 - 32;
          const rotation = (rng() - 0.5) * 30; // less rotation since fall is shorter

          bill.style.left = startX + "px";
          bill.style.top = startY + "px";
          bill.dataset.startX = startX;
          bill.dataset.startY = startY;
          bill.dataset.endX = endX;
          bill.dataset.endY = vaultLandY;
          bill.dataset.rotation = rotation;
          bill.dataset.staggerOffset = (rng() * 0.6).toFixed(2);

          moneyLayer.appendChild(bill);
        }

        // === Timeline ===
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // 1. Bank slides in from off-screen LEFT into the bottom-left.
        tl.from(
          "#bank-card",
          { x: -800, opacity: 0, duration: 0.8, ease: "power3.out" },
          vars.bankEnterTime
        );

        // 2. Vault is "born" from the bank's position — scales up from inside the bank
        //    and slides RIGHT to its final position to the right of the bank.
        //    x: -450 means vault starts 450px LEFT of its final position (roughly where the bank sits).
        tl.from(
          "#vault-card",
          { x: -450, scale: 0.2, opacity: 0, duration: 0.9, ease: "power2.out" },
          vars.vaultEnterTime
        );

        // 3. Arrow draws LEFT→RIGHT after the vault settles.
        tl.from(
          "#arrow-line",
          { scaleX: 0, duration: 0.4, ease: "power2.out" },
          vars.arrowEnterTime
        );
        tl.from(
          "#arrow-head",
          { scale: 0, opacity: 0, duration: 0.3, ease: "back.out(2)" },
          vars.arrowEnterTime + 0.3
        );

        // 4. Money falls from above and lands in the vault (right side, bottom area).
        const bills = moneyLayer.querySelectorAll(".bill");
        bills.forEach(function (bill) {
          const stagger = parseFloat(bill.dataset.staggerOffset);
          const endX = parseFloat(bill.dataset.endX);
          const endY = parseFloat(bill.dataset.endY);
          const rotation = parseFloat(bill.dataset.rotation);

          tl.fromTo(
            bill,
            { y: 0, x: 0, opacity: 0, rotation: 0 },
            {
              y: endY + 80,
              x: endX - parseFloat(bill.style.left),
              opacity: 1,
              rotation: rotation,
              duration: vars.moneyFallDuration,
              ease: "power2.in",
            },
            vars.moneyStartTime + stagger
          );

          tl.to(
            bill,
            { opacity: 0, scale: 0.5, duration: 0.3, ease: "power1.in" },
            vars.moneyStartTime + stagger + vars.moneyFallDuration
          );
        });

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
