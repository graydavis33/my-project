<!doctype html>
<html
  lang="en"
  data-composition-variables='[
    {"id":"bankLabel","type":"string","label":"Bank label text","default":"BANK"},
    {"id":"vaultLabel","type":"string","label":"Vault label text","default":"Taxes"},
    {"id":"orange","type":"color","label":"Accent orange","default":"#F28129"},
    {"id":"white","type":"color","label":"White","default":"#FFFFFF"},
    {"id":"strokeWidth","type":"number","label":"Stroke width (px)","default":2},
    {"id":"cornerRadius","type":"number","label":"Corner radius (px)","default":40},
    {"id":"bankEnterTime","type":"number","label":"Bank slides in at (s)","default":0.2},
    {"id":"vaultEnterTime","type":"number","label":"Vault fades in at (s)","default":1.0},
    {"id":"arrowEnterTime","type":"number","label":"Arrow draws in at (s)","default":1.2},
    {"id":"moneyStartTime","type":"number","label":"Money starts falling at (s)","default":2.0},
    {"id":"moneyCount","type":"number","label":"Number of bills falling","default":12},
    {"id":"moneyFallDuration","type":"number","label":"Each bill falls for (s)","default":1.4}
  ]'
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #00FF00; /* chroma key green — Gray keys this out in Premiere */
        font-family: "Montserrat", system-ui, sans-serif;
      }

      /* === Scene container fills the full frame === */
      .scene {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 120px 80px;
        gap: 80px;
      }

      /* === Bank card (top) === */
      .bank-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 720px;
        height: 280px;
        background: transparent;
        border-style: solid;
        gap: 24px;
      }
      .bank-icon {
        width: 96px;
        height: 96px;
        position: relative;
      }
      .bank-icon svg {
        width: 100%;
        height: 100%;
      }
      .bank-label {
        font-size: 56px;
        font-weight: 600;
        letter-spacing: 0.08em;
        color: var(--white);
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      }

      /* === Arrow between bank and vault === */
      .arrow {
        width: 12px;
        height: 200px;
        position: relative;
      }
      .arrow-line {
        position: absolute;
        left: 50%;
        top: 0;
        transform: translateX(-50%);
        width: 4px;
        height: 100%;
        background: var(--white);
        transform-origin: top center;
      }
      .arrow-head {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%) rotate(45deg);
        width: 24px;
        height: 24px;
        border-right: 4px solid var(--white);
        border-bottom: 4px solid var(--white);
      }

      /* === Vault card (bottom) === */
      .vault-card {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 720px;
        height: 480px;
        background: transparent;
        border-style: solid;
        gap: 24px;
        overflow: visible;
      }
      .vault-icon {
        width: 144px;
        height: 144px;
      }
      .vault-icon svg {
        width: 100%;
        height: 100%;
      }
      .vault-label {
        font-size: 72px;
        font-weight: 600;
        color: var(--orange);
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        letter-spacing: 0.02em;
      }

      /* === Money bills === */
      .money-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        overflow: hidden;
      }
      .bill {
        position: absolute;
        width: 80px;
        height: 80px;
        font-size: 72px;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--orange);
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        font-weight: 700;
        will-change: transform, opacity;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="6"
      data-width="1080"
      data-height="1920"
    >
      <div id="scene" class="scene clip" data-start="0" data-duration="6" data-track-index="1">
        <!-- Bank card (top) -->
        <div id="bank-card" class="bank-card">
          <div class="bank-icon">
            <!-- Generic bank/building icon -->
            <svg viewBox="0 0 96 96" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
              <path d="M48 12 L84 32 L12 32 Z" />
              <line x1="12" y1="32" x2="84" y2="32" />
              <line x1="20" y1="36" x2="20" y2="72" />
              <line x1="36" y1="36" x2="36" y2="72" />
              <line x1="60" y1="36" x2="60" y2="72" />
              <line x1="76" y1="36" x2="76" y2="72" />
              <line x1="8" y1="80" x2="88" y2="80" />
              <line x1="8" y1="84" x2="88" y2="84" />
            </svg>
          </div>
          <div id="bank-label" class="bank-label">BANK</div>
        </div>

        <!-- Arrow -->
        <div id="arrow" class="arrow">
          <div id="arrow-line" class="arrow-line"></div>
          <div id="arrow-head" class="arrow-head"></div>
        </div>

        <!-- Vault card (bottom) -->
        <div id="vault-card" class="vault-card">
          <div class="vault-icon">
            <!-- Modern vault / safe icon -->
            <svg viewBox="0 0 144 144" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
              <rect x="20" y="28" width="104" height="92" rx="12" />
              <circle cx="72" cy="74" r="22" />
              <circle cx="72" cy="74" r="6" fill="white" />
              <line x1="72" y1="52" x2="72" y2="44" />
              <line x1="94" y1="74" x2="102" y2="74" />
              <line x1="72" y1="96" x2="72" y2="104" />
              <line x1="50" y1="74" x2="42" y2="74" />
              <line x1="32" y1="120" x2="32" y2="128" />
              <line x1="112" y1="120" x2="112" y2="128" />
            </svg>
          </div>
          <div id="vault-label" class="vault-label">Taxes</div>
        </div>

        <!-- Money layer (absolute over scene) -->
        <!-- Bills start above the frame and fall into the vault — intentional off-canvas at t=0 -->
        <div id="money-layer" class="money-layer" data-layout-allow-overflow></div>
      </div>
    </div>

    <script>
      (function () {
        const vars = window.__hyperframes.getVariables();

        // Apply colors as CSS custom properties on root
        document.documentElement.style.setProperty("--white", vars.white);
        document.documentElement.style.setProperty("--orange", vars.orange);

        // Apply stroke width and corner radius to cards
        const bankCard = document.getElementById("bank-card");
        const vaultCard = document.getElementById("vault-card");
        const arrowLine = document.getElementById("arrow-line");
        const arrowHead = document.getElementById("arrow-head");

        bankCard.style.borderWidth = vars.strokeWidth + "px";
        bankCard.style.borderColor = vars.white;
        bankCard.style.borderRadius = vars.cornerRadius + "px";
        bankCard.style.boxShadow = "0 4px 16px rgba(0,0,0,0.25)";

        vaultCard.style.borderWidth = vars.strokeWidth + "px";
        vaultCard.style.borderColor = vars.white;
        vaultCard.style.borderRadius = vars.cornerRadius + "px";
        vaultCard.style.boxShadow = "0 4px 16px rgba(0,0,0,0.25)";

        // Apply text content from variables
        document.getElementById("bank-label").textContent = vars.bankLabel;
        document.getElementById("vault-label").textContent = vars.vaultLabel;
        document.getElementById("vault-label").style.color = vars.orange;

        // Update SVG strokes
        document.querySelectorAll("svg [stroke]").forEach(function (el) {
          el.setAttribute("stroke", vars.white);
        });
        document.querySelectorAll("svg [fill='white']").forEach(function (el) {
          el.setAttribute("fill", vars.white);
        });

        // Arrow color
        arrowLine.style.background = vars.white;
        arrowHead.style.borderRightColor = vars.white;
        arrowHead.style.borderBottomColor = vars.white;

        // === Generate money bills (deterministic — no Math.random) ===
        const moneyLayer = document.getElementById("money-layer");
        const count = Math.max(1, Math.floor(vars.moneyCount));

        // Vault target position (where money lands) — center bottom of scene
        // Scene is full screen (1080x1920). Vault is centered horizontally,
        // bottom region. Money falls from top into vault opening (~y=1300 center).
        const vaultCenterX = 540; // scene center
        const vaultCenterY = 1280; // approximate vault top edge
        const spreadX = 280; // horizontal spread for entry points

        // Mulberry32 seeded PRNG for deterministic randomness
        function mulberry32(seed) {
          return function () {
            let t = (seed += 0x6d2b79f5);
            t = Math.imul(t ^ (t >>> 15), t | 1);
            t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
          };
        }
        const rng = mulberry32(42);

        for (let i = 0; i < count; i++) {
          const bill = document.createElement("div");
          bill.className = "bill";
          bill.textContent = "$";
          bill.id = "bill-" + i;

          // Starting position above frame, varied across width
          const startX = vaultCenterX - spreadX + rng() * (spreadX * 2) - 40;
          const endX = vaultCenterX - 80 + rng() * 160 - 40; // converges toward vault
          const rotation = (rng() - 0.5) * 60;

          bill.style.left = startX + "px";
          bill.style.top = "-100px";
          bill.dataset.endX = endX;
          bill.dataset.endY = vaultCenterY;
          bill.dataset.rotation = rotation;
          bill.dataset.staggerOffset = (rng() * 0.6).toFixed(2);

          moneyLayer.appendChild(bill);
        }

        // === Timeline ===
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // 1. Bank card slides in from left (ease-out)
        tl.from(
          "#bank-card",
          { x: -800, opacity: 0, duration: 0.7, ease: "power3.out" },
          vars.bankEnterTime
        );

        // 2. Arrow draws in (scale from 0 height)
        tl.from(
          "#arrow-line",
          { scaleY: 0, duration: 0.4, ease: "power2.out" },
          vars.arrowEnterTime
        );
        tl.from(
          "#arrow-head",
          { scale: 0, opacity: 0, duration: 0.3, ease: "back.out(2)" },
          vars.arrowEnterTime + 0.3
        );

        // 3. Vault card fades+rises into view
        tl.from(
          "#vault-card",
          { y: 80, opacity: 0, duration: 0.6, ease: "expo.out" },
          vars.vaultEnterTime
        );

        // 4. Money falls — each bill has its own stagger offset for natural cascade
        const bills = moneyLayer.querySelectorAll(".bill");
        bills.forEach(function (bill) {
          const stagger = parseFloat(bill.dataset.staggerOffset);
          const endX = parseFloat(bill.dataset.endX);
          const endY = parseFloat(bill.dataset.endY);
          const rotation = parseFloat(bill.dataset.rotation);

          tl.fromTo(
            bill,
            { y: 0, x: 0, opacity: 0, rotation: 0 },
            {
              y: endY + 100,
              x: endX - parseFloat(bill.style.left),
              opacity: 1,
              rotation: rotation,
              duration: vars.moneyFallDuration,
              ease: "power2.in",
            },
            vars.moneyStartTime + stagger
          );

          // Then fade out as it "enters" the vault
          tl.to(
            bill,
            { opacity: 0, scale: 0.5, duration: 0.3, ease: "power1.in" },
            vars.moneyStartTime + stagger + vars.moneyFallDuration
          );
        });

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
