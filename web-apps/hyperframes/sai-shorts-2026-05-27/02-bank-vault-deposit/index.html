        // === Generate money bills (deterministic — mulberry32 PRNG) ===
        const moneyLayer = document.getElementById("money-layer");
        const count = Math.max(1, Math.floor(vars.moneyCount));

        // Vault sits at x ≈ 780 (right side of bottom row), card top ≈ 1340.
        // Money APPEARS at middle of screen above the row, then falls into the vault.
        const vaultCenterX = 780;
        const vaultLandY = 1380; // y where bills land (near vault top edge)
        const moneyOriginY = 900; // middle of screen — where bills fade in
        const spreadX = 130; // tighter spread since they start close to vault

        function mulberry32(seed) {
          return function () {
            let t = (seed += 0x6d2b79f5);
            t = Math.imul(t ^ (t >>> 15), t | 1);
            t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
          };
        }
        const rng = mulberry32(42);

        for (let i = 0; i < count; i++) {
          const bill = document.createElement("div");
          bill.className = "bill";
          bill.textContent = "$";
          bill.id = "bill-" + i;

          // Start position: middle of screen, above the bank-vault row.
          // Bills appear here (fade in) then fall down to the vault.
          const startX = vaultCenterX - spreadX + rng() * (spreadX * 2) - 32;
          const startY = moneyOriginY + (rng() - 0.5) * 60; // slight vertical variation
          const endX = vaultCenterX - 60 + rng() * 120 - 32;
          const rotation = (rng() - 0.5) * 30; // less rotation since fall is shorter

          bill.style.left = startX + "px";
          bill.style.top = startY + "px";
          bill.dataset.startX = startX;
          bill.dataset.startY = startY;
          bill.dataset.endX = endX;
          bill.dataset.endY = vaultLandY;
          bill.dataset.rotation = rotation;
          bill.dataset.staggerOffset = (rng() * 0.6).toFixed(2);

          moneyLayer.appendChild(bill);
        }

        // Pre-state: hide all bills before the timeline starts.
        // Lets the motion tween run while bills are still invisible,
        // and the fade-in (delayed) reveals them mid-motion.
        gsap.set(".bill", { opacity: 0, scale: 0.7 });

        // === Timeline ===
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // 1. Bank slides in from off-screen LEFT into the bottom-left.
        tl.from(
          "#bank-card",
          { x: -800, opacity: 0, duration: 0.8, ease: "power3.out" },
          vars.bankEnterTime
        );

        // 2. Vault is "born" from the bank's position — scales up from inside the bank
        //    and slides RIGHT to its final position to the right of the bank.
        //    x: -450 means vault starts 450px LEFT of its final position (roughly where the bank sits).
        tl.from(
          "#vault-card",
          { x: -450, scale: 0.2, opacity: 0, duration: 0.9, ease: "power2.out" },
          vars.vaultEnterTime
        );

        // 3. Arrow draws LEFT→RIGHT after the vault settles.
        tl.from(
          "#arrow-line",
          { scaleX: 0, duration: 0.4, ease: "power2.out" },
          vars.arrowEnterTime
        );
        tl.from(
          "#arrow-head",
          { scale: 0, opacity: 0, duration: 0.3, ease: "back.out(2)" },
          vars.arrowEnterTime + 0.3
        );

        // 4. Money lifecycle per bill:
        //    a) Fade in AND fall START at the same moment (bills are already moving as they appear)
        //    b) The bill naturally disappears behind the vault card (z-index occlusion)
        //    c) Vault scale-blinks at the moment each bill arrives (impact feedback)
        const bills = moneyLayer.querySelectorAll(".bill");
        bills.forEach(function (bill) {
          const stagger = parseFloat(bill.dataset.staggerOffset);
          const startX = parseFloat(bill.dataset.startX);
          const startY = parseFloat(bill.dataset.startY);
          const endX = parseFloat(bill.dataset.endX);
          const endY = parseFloat(bill.dataset.endY);
          const rotation = parseFloat(bill.dataset.rotation);

          const billStart = vars.moneyStartTime + stagger;
          const fallDuration = vars.moneyFallDuration;
          const fadeInDelay = 0.2;  // motion has a 0.2s head start — bill is already moving when it appears
          const fadeInDuration = 0.25;
          const landTime = billStart + fallDuration;

          // (a1) MOTION starts first — bill is moving (invisibly) before it fades in.
          //      power1.in gives more uniform velocity so visible motion is pronounced from the start.
          tl.to(
            bill,
            {
              y: endY - startY,
              x: endX - startX,
              rotation: rotation,
              duration: fallDuration,
              ease: "power1.in",
            },
            billStart
          );

          // (a2) FADE-IN delayed — by the time the bill becomes visible, it's mid-fall.
          tl.to(
            bill,
            { opacity: 1, scale: 1, duration: fadeInDuration, ease: "power2.out" },
            billStart + fadeInDelay
          );

          // (b) No explicit fade-out — the bill is occluded by the vault card (z-index)
          //     when it arrives at the landing position. Visually it "disappears into" the vault.

          // (c) Vault BLINK — scale-up pulse on bill arrival.
          //     overwrite: "auto" on BOTH phases so rapid successive blinks chain cleanly.
          tl.to(
            "#vault-card",
            { scale: vars.vaultBlinkScale, duration: 0.08, ease: "power2.out", overwrite: "auto" },
            landTime
          );
          tl.to(
            "#vault-card",
            { scale: 1.0, duration: 0.18, ease: "elastic.out(1, 0.4)", overwrite: "auto" },
            landTime + 0.08
          );
        });

        window.__timelines["main"] = tl;
      })();
