<!DOCTYPE html>
<html lang="en" data-composition-variables='[{"id":"workColor","type":"color","label":"Work liquid color","default":"#F28129"},{"id":"planColor","type":"color","label":"Planning liquid color","default":"#3FC1C9"},{"id":"white","type":"color","label":"White","default":"#FFFFFF"},{"id":"strokeWidth","type":"number","label":"Tube stroke (px)","default":5},{"id":"liquidHeightPct","type":"number","label":"Liquid height % of tube (rest is air)","default":70},{"id":"tubeRevealStart","type":"number","label":"Tube reveal starts at (s)","default":0.0},{"id":"tubeRevealDuration","type":"number","label":"Tube reveal duration (s)","default":0.8},{"id":"liquidFillStart","type":"number","label":"Liquids start filling at (s)","default":1.0},{"id":"liquidFillDuration","type":"number","label":"Initial fill duration (s)","default":0.7},{"id":"workInitialPct","type":"number","label":"Work initial fill %","default":90},{"id":"planInitialPct","type":"number","label":"Planning initial fill %","default":10},{"id":"transitionStart","type":"number","label":"Transition to new ratio at (s)","default":4.5},{"id":"transitionDuration","type":"number","label":"Transition duration (s)","default":1.0},{"id":"workFinalPct","type":"number","label":"Work final fill %","default":40},{"id":"planFinalPct","type":"number","label":"Planning final fill %","default":60},{"id":"waveFrontCycle","type":"number","label":"Front wave cycle (s)","default":1.5},{"id":"waveBackCycle","type":"number","label":"Back wave cycle (s)","default":2.0},{"id":"waveAmplitude","type":"number","label":"Wave amplitude (viewBox units)","default":16},{"id":"labelFontSize","type":"number","label":"Percent label font size (px)","default":80}]'>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #00FF00; /* chroma key green — Gray keys this out in Premiere */
        font-family: "Montserrat", system-ui, sans-serif;
      }

      .scene {
        position: relative;
        width: 100%;
        height: 100%;
      }

      /* === Horizontal 3D tube === */
      .tube {
        position: absolute;
        width: 800px;
        height: 200px;
        left: 50%;
        bottom: 600px;
        transform: translateX(-50%);
        border-radius: 9999px;
        border-style: solid;
        border-color: var(--white);
        overflow: hidden;
        background: transparent;
        clip-path: inset(100% 0% 0% 0%);  /* animated reveal from bottom up */
        will-change: clip-path;
      }

      /* Liquid container — sits in the bottom portion of the tube, top is air */
      .liquid {
        position: absolute;
        bottom: 0;
        height: 70%;              /* overridden from variable in JS */
        overflow: hidden;
        background: transparent;  /* SVG waves provide the visible color */
        will-change: width;
      }
      .liquid-work {
        left: 0;
        width: 0%;                /* animated */
        color: var(--work-color);
        z-index: 1;
      }
      .liquid-plan {
        right: 0;
        width: 0%;                /* animated */
        color: var(--plan-color);
        z-index: 1;
      }

      /* Water wave layers — two SVGs per liquid for parallax depth */
      .water {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 200%;              /* twice as wide as liquid → seamless scroll */
        pointer-events: none;
        will-change: transform;
      }
      .water-front path { fill: currentColor; }
      .water-back  path { fill: currentColor; opacity: 0.55; }

      /* 3D shading overlay — cylindrical depth (top bright, bottom dark) */
      .tube-3d {
        position: absolute;
        inset: 0;
        z-index: 3;
        pointer-events: none;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.32) 0%,
          rgba(255, 255, 255, 0.08) 30%,
          rgba(255, 255, 255, 0.00) 55%,
          rgba(0, 0, 0, 0.18) 100%
        );
      }

      /* Gloss strip — thin specular highlight near the top of the glass */
      .tube-gloss {
        position: absolute;
        left: 10%;
        right: 10%;
        top: 14px;
        height: 22px;
        border-radius: 9999px;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.45) 30%,
          rgba(255, 255, 255, 0.55) 50%,
          rgba(255, 255, 255, 0.45) 70%,
          rgba(255, 255, 255, 0) 100%
        );
        z-index: 4;
        pointer-events: none;
      }

      /* === Percent labels above the tube === */
      .label-row {
        position: absolute;
        width: 800px;
        height: 100px;
        left: 50%;
        bottom: 820px;
        transform: translateX(-50%);
        pointer-events: none;
      }
      .label {
        position: absolute;
        bottom: 0;
        transform: translateX(-50%);
        white-space: nowrap;
        font-size: 80px;
        font-weight: 600;
        color: var(--white);
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        opacity: 0;
        will-change: left, opacity;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="7" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="7" data-track-index="1">
        <div id="tube" class="tube">
          <div id="liquid-work" class="liquid liquid-work">
            <svg id="water-back-work" class="water water-back" viewBox="0 0 1600 200" preserveAspectRatio="none" data-layout-allow-overflow=""><path></path></svg>
            <svg id="water-front-work" class="water water-front" viewBox="0 0 1600 200" preserveAspectRatio="none" data-layout-allow-overflow=""><path></path></svg>
          </div>
          <div id="liquid-plan" class="liquid liquid-plan">
            <svg id="water-back-plan" class="water water-back" viewBox="0 0 1600 200" preserveAspectRatio="none" data-layout-allow-overflow=""><path></path></svg>
            <svg id="water-front-plan" class="water water-front" viewBox="0 0 1600 200" preserveAspectRatio="none" data-layout-allow-overflow=""><path></path></svg>
          </div>
          <div class="tube-3d"></div>
          <div class="tube-gloss"></div>
        </div>
        <div class="label-row">
          <div id="label-work" class="label">90%</div>
          <div id="label-plan" class="label">10%</div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        const vars = window.__hyperframes.getVariables();

        // Colors via CSS custom properties
        document.documentElement.style.setProperty("--white", vars.white);
        document.documentElement.style.setProperty("--work-color", vars.workColor);
        document.documentElement.style.setProperty("--plan-color", vars.planColor);

        // Tube stroke
        const tube = document.getElementById("tube");
        tube.style.borderWidth = vars.strokeWidth + "px";
        tube.style.borderColor = vars.white;

        // Liquid fill height (rest is air)
        document.querySelectorAll(".liquid").forEach(function (el) {
          el.style.height = vars.liquidHeightPct + "%";
        });

        // === Build wave SVG paths ===
        // viewBox is 1600 wide; SVG element is 200% of liquid width.
        // Wavelength 200 → 8 full waves across viewBox → exact match for seamless
        // translateX(-50%) loop (the wave at x=0 matches the wave at x=800).
        const VIEW_W = 1600;
        const VIEW_H = 200;
        const WAVELENGTH = 200;

        function buildWavePath(baseY, amplitude) {
          const halfW = WAVELENGTH / 2;
          let d = "M0," + baseY;
          // First quadratic bezier sets the initial peak
          d += " Q" + (halfW / 2) + "," + (baseY - amplitude) + " " + halfW + "," + baseY;
          // Subsequent T commands alternate peak/trough automatically (smooth mirror)
          for (let x = halfW; x < VIEW_W; x += halfW) {
            d += " T" + (x + halfW) + "," + baseY;
          }
          // Close down to the bottom edge and back to origin
          d += " L" + VIEW_W + "," + VIEW_H + " L0," + VIEW_H + " Z";
          return d;
        }

        // Front wave: taller crest, brighter
        const frontPath = buildWavePath(34, vars.waveAmplitude);
        // Back wave: slightly lower baseline + smaller amp, dimmer (parallax depth)
        const backPath  = buildWavePath(40, Math.max(4, vars.waveAmplitude - 6));

        document.querySelectorAll(".water-front path").forEach(function (p) { p.setAttribute("d", frontPath); });
        document.querySelectorAll(".water-back  path").forEach(function (p) { p.setAttribute("d", backPath);  });

        // Label setup
        const workLabel = document.getElementById("label-work");
        const planLabel = document.getElementById("label-plan");
        workLabel.style.fontSize = vars.labelFontSize + "px";
        planLabel.style.fontSize = vars.labelFontSize + "px";
        workLabel.textContent = Math.round(vars.workInitialPct) + "%";
        planLabel.textContent = Math.round(vars.planInitialPct) + "%";
        workLabel.style.left = (vars.workInitialPct / 2) + "%";
        planLabel.style.left = (100 - vars.planInitialPct / 2) + "%";

        // === Timeline ===
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // 1. Tube reveals from bottom up
        tl.fromTo(
          "#tube",
          { clipPath: "inset(100% 0% 0% 0%)" },
          {
            clipPath: "inset(0% 0% 0% 0%)",
            duration: vars.tubeRevealDuration,
            ease: "power3.out",
          },
          vars.tubeRevealStart
        );

        // 2. Liquids fill to initial 90/10
        tl.to("#liquid-work", { width: vars.workInitialPct + "%", duration: vars.liquidFillDuration, ease: "power2.out" }, vars.liquidFillStart);
        tl.to("#liquid-plan", { width: vars.planInitialPct + "%", duration: vars.liquidFillDuration, ease: "power2.out" }, vars.liquidFillStart);

        // 3. Labels fade in after fill settles
        const labelFadeStart = vars.liquidFillStart + vars.liquidFillDuration;
        tl.to([workLabel, planLabel], { opacity: 1, duration: 0.35, ease: "power2.out" }, labelFadeStart);

        // 4. Transition — work 90→40, planning 10→60. Labels track + count.
        const workCounter = { value: vars.workInitialPct };
        const planCounter = { value: vars.planInitialPct };

        tl.to("#liquid-work", { width: vars.workFinalPct + "%", duration: vars.transitionDuration, ease: "power2.inOut" }, vars.transitionStart);
        tl.to("#liquid-plan", { width: vars.planFinalPct + "%", duration: vars.transitionDuration, ease: "power2.inOut" }, vars.transitionStart);

        tl.to(workCounter, {
          value: vars.workFinalPct,
          duration: vars.transitionDuration,
          ease: "power2.inOut",
          onUpdate: function () {
            workLabel.textContent = Math.round(workCounter.value) + "%";
            workLabel.style.left = (workCounter.value / 2) + "%";
          },
        }, vars.transitionStart);

        tl.to(planCounter, {
          value: vars.planFinalPct,
          duration: vars.transitionDuration,
          ease: "power2.inOut",
          onUpdate: function () {
            planLabel.textContent = Math.round(planCounter.value) + "%";
            planLabel.style.left = (100 - planCounter.value / 2) + "%";
          },
        }, vars.transitionStart);

        // 5. Water wave animations — front + back layers scroll at different speeds
        //    for parallax. Finite repeat counts for deterministic capture.
        const compositionDuration = 7;
        const waveStart = vars.liquidFillStart;
        const waveAvailable = compositionDuration - waveStart;

        const frontRepeats = Math.max(0, Math.floor(waveAvailable / vars.waveFrontCycle) - 1);
        const backRepeats  = Math.max(0, Math.floor(waveAvailable / vars.waveBackCycle)  - 1);

        // Front waves scroll left
        ["#water-front-work", "#water-front-plan"].forEach(function (sel) {
          tl.fromTo(sel,
            { xPercent: 0 },
            { xPercent: -50, duration: vars.waveFrontCycle, ease: "none", repeat: frontRepeats },
            waveStart
          );
        });

        // Back waves scroll right (opposite direction) for added depth
        ["#water-back-work", "#water-back-plan"].forEach(function (sel) {
          tl.fromTo(sel,
            { xPercent: -50 },
            { xPercent: 0, duration: vars.waveBackCycle, ease: "none", repeat: backRepeats },
            waveStart
          );
        });

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
