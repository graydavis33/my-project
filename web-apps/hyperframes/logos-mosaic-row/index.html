<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px; height: 1080px; overflow: hidden;
        background: transparent;
      }
      /* TRANSPARENT background — deliverable is alpha ProRes (.mov).
         No chroma color: Slack contains green AND blue, Notion/Scribe
         contain black/white, so no keyable color is safe. Alpha needs
         no keying at all. */
      .scene {
        position: relative; width: 100%; height: 100%; overflow: hidden;
        background: transparent;
      }
      /* centered horizontal row of the three logos */
      .row {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        gap: 170px;
      }
      .logo {
        width: 320px; height: 320px;
        /* mosaic: 14px source upscaled with hard pixel edges (no smoothing) */
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        will-change: transform, opacity;
      }
      /* float wrappers — sway animates these so it never conflicts
         with the entrance tween on the img itself */
      .float { position: relative; will-change: transform; }
      .float .logo { position: relative; z-index: 1; }

      /* green pulse aura behind the Scribe logo — pulsing radial glow.
         Sits inside the float wrapper so it floats AND scales with it. */
      .aura {
        position: absolute; inset: -70px; z-index: 0;
        border-radius: 50%; opacity: 0;
        background: radial-gradient(circle,
          rgba(34, 226, 93, 0.98) 0%,
          rgba(34, 226, 93, 0.55) 46%,
          rgba(34, 226, 93, 0) 72%);
        will-change: transform, opacity;
      }
    </style>
  </head>
  <body>
    <div data-hf-id="hf-mvyi" id="root" data-composition-id="main" data-start="0" data-duration="7" data-width="1920" data-height="1080">
      <div data-hf-id="hf-ig6n" id="scene" class="scene clip" data-start="0" data-duration="7" data-track-index="1">
        <div data-hf-id="hf-thy4" class="row">
          <div data-hf-id="hf-6te7" class="float" id="float1"><img data-hf-id="hf-xsu5" class="logo" id="logo1" src="slack.png" alt=""></div>
          <div data-hf-id="hf-vxwk" class="float" id="float2"><img data-hf-id="hf-410v" class="logo" id="logo2" src="notion.png" alt=""></div>
          <div data-hf-id="hf-yx65" class="float" id="float3"><div data-hf-id="hf-pvk9" class="aura" id="aura3"></div><img data-hf-id="hf-tzj9" class="logo" id="logo3" src="scribe.png" alt=""></div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      (function () {
        const tl = gsap.timeline({ paused: true });

        const DUR = 7; // composition duration (matches data-duration)

        // Each logo eases in from below (down -> up), one by one, smooth.
        // y:150 -> 0 with opacity 0 -> 1; power3.out for a smooth settle;
        // stagger 0.35s gives the left-to-right, one-at-a-time entrance.
        tl.from(".logo", {
          y: 150,
          opacity: 0,
          duration: 0.9,
          ease: "power3.out",
          stagger: 0.35
        }, 0.2);

        // Floating sway — starts as each logo settles. Animates the .float
        // wrapper (never the img, so it can't fight the entrance tween).
        // Per-logo amplitudes/durations all differ (deterministic, no RNG),
        // and x/y cycle at different speeds so the drift never repeats in
        // sync — reads as a gentle randomized hover. No rotation.
        const sway = [
          { el: "#float1", start: 1.15, y: 10, yd: 1.3, x: 6,  xd: 1.7 },
          { el: "#float2", start: 1.50, y: 12, yd: 1.5, x: -7, xd: 1.2 },
          { el: "#float3", start: 1.85, y: 9,  yd: 1.1, x: 8,  xd: 1.45 }
        ];
        sway.forEach(s => {
          const remain = DUR - s.start;
          const reps = d => Math.max(1, Math.ceil(remain / d) - 1);
          tl.to(s.el, { y: -s.y, duration: s.yd, ease: "sine.inOut", yoyo: true, repeat: reps(s.yd) }, s.start);
          tl.to(s.el, { x: s.x, duration: s.xd, ease: "sine.inOut", yoyo: true, repeat: reps(s.xd) }, s.start);
        });

        // ---- Scribe highlight: after a beat of floating, scale up in
        // place + pulsing green glow. Scale rides the img (entrance tween
        // is long done and never touched scale); the sway keeps moving
        // the wrapper, so it floats while highlighted.
        const HL = 3.2; // highlight start
        tl.to("#logo3", {
          scale: 1.22,
          duration: 0.7,
          ease: "back.out(1.3)",
          transformOrigin: "50% 50%"
        }, HL);

        // aura fades in with the scale-up...
        tl.to("#aura3", { opacity: 0.95, duration: 0.45, ease: "power2.out" }, HL);
        // ...then breathes: opacity + scale pulse in sync (sine yoyo).
        // 0.55s half-cycle = a clear "blink" that still feels smooth.
        const P = 0.55, pStart = HL + 0.5;
        const pReps = Math.max(1, Math.ceil((DUR - pStart) / P) - 1);
        tl.to("#aura3", {
          opacity: 0.45, scale: 0.92,
          duration: P, ease: "sine.inOut", yoyo: true, repeat: pReps,
          transformOrigin: "50% 50%"
        }, pStart);
        // matching green rim glow pulses on the logo itself
        // (double drop-shadow: tight hot rim + wide soft bloom)
        tl.fromTo("#logo3",
          { filter: "drop-shadow(0 0 6px rgba(34,226,93,0.5)) drop-shadow(0 0 18px rgba(34,226,93,0.4))" },
          { filter: "drop-shadow(0 0 16px rgba(34,226,93,1)) drop-shadow(0 0 52px rgba(34,226,93,0.95))",
            duration: P, ease: "sine.inOut", yoyo: true, repeat: pReps,
            immediateRender: false
          }, pStart);

        // No exit — hold the floating row (B-roll).

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
