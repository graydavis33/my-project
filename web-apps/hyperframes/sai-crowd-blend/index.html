<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Crowd Blend</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #00FF00;
  }
  #root {
    position: relative;
    width: 1080px;
    height: 1920px;
    background: #00FF00;
    overflow: hidden;
    font-family: "Montserrat", sans-serif;
  }
  .crowd {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
  }
  .fig {
    position: absolute;
    transform-origin: 50% 100%;
    will-change: transform;
  }
</style>
</head>
<body>
  <div id="root" data-composition-id="main" data-start="0" data-duration="5" data-width="1080" data-height="1920">
    <div class="crowd" id="crowd"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};

    // Deterministic PRNG (no Math.random / Date)
    function mulberry32(a) {
      return function () {
        a |= 0; a = a + 0x6D2B79F5 | 0;
        let t = Math.imul(a ^ a >>> 15, 1 | a);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }
    const rand = mulberry32(20260606);

    // --- Build the crowd ---
    const crowd = document.getElementById("crowd");
    const rows = 10, figW = 190;
    const figH = Math.round(figW * 180 / 140);
    const figHalf = figW / 2;
    // Keep every figure fully inside the frame (no edge clipping)
    const sideMargin = 30, topY = 40, pitch = 178;
    const loCenter = sideMargin + figHalf;            // 125
    const hiCenter = 1080 - sideMargin - figHalf;     // 955
    const evenN = 5;
    const evenStep = (hiCenter - loCenter) / (evenN - 1);
    const evenCenter = (c) => loCenter + c * evenStep;
    const oddCenter = (c) => loCenter + evenStep * (c + 0.5);  // brick offset, 4 per row
    const ORANGE = { r: 7, c: 2 };   // a front-ish, central figure
    const figEls = [];

    function svgMarkup(isOrange) {
      const col = isOrange ? "#F28129" : "#FFFFFF";
      const cls = isOrange ? "orange-part" : "";
      const armsUp = rand() < 0.32;
      let s = `<svg viewBox="0 0 140 180" width="${figW}" height="${figH}" xmlns="http://www.w3.org/2000/svg">`;
      s += `<circle class="${cls}" cx="70" cy="34" r="26" fill="${col}"/>`;
      s += `<path class="${cls}" d="M70 64 C40 64 30 96 30 130 L30 180 L110 180 L110 130 C110 96 100 64 70 64 Z" fill="${col}"/>`;
      if (armsUp) {
        s += `<rect class="${cls}" x="22" y="30" width="16" height="60" rx="8" fill="${col}" transform="rotate(38 30 60)"/>`;
        s += `<rect class="${cls}" x="102" y="30" width="16" height="60" rx="8" fill="${col}" transform="rotate(-38 110 60)"/>`;
      }
      s += `</svg>`;
      return s;
    }

    for (let r = 0; r < rows; r++) {
      const odd = r % 2 === 1;
      const n = odd ? evenN - 1 : evenN;
      for (let c = 0; c < n; c++) {
        const cx = odd ? oddCenter(c) : evenCenter(c);
        const x = Math.round(cx - figHalf);
        const y = topY + r * pitch;
        const isOrange = (r === ORANGE.r && c === ORANGE.c);
        const div = document.createElement("div");
        div.className = "fig";
        div.style.left = x + "px";
        div.style.top = y + "px";
        div.style.zIndex = isOrange ? 200 : (r + 1);
        div.innerHTML = svgMarkup(isOrange);
        crowd.appendChild(div);
        figEls.push(div);
      }
    }

    // --- Animate ---
    const DUR = 5;
    const tl = gsap.timeline({ paused: true });

    // Entrance: crowd pops in from the center outward
    tl.from(".fig", {
      opacity: 0,
      scale: 0.5,
      y: 40,
      duration: 0.5,
      ease: "back.out(1.6)",
      stagger: { each: 0.015, from: "center" }
    }, 0.15);

    // Walk-in-place: each figure bobs + sways on its own clock (desynced)
    figEls.forEach((el) => {
      const amp = 8 + rand() * 12;
      const half = 0.5 + rand() * 0.35;
      const rot = rand() * 4 - 2;
      const start = 1.5 + rand() * 0.5;
      const repsY = Math.ceil((DUR + 0.6 - start) / half);
      tl.to(el, { y: -amp, duration: half, ease: "sine.inOut", yoyo: true, repeat: repsY }, start);

      const halfR = half * 1.25;
      const repsR = Math.ceil((DUR + 0.6 - (start + 0.1)) / halfR);
      tl.to(el, { rotation: rot, duration: halfR, ease: "sine.inOut", yoyo: true, repeat: repsR }, start + 0.1);
    });

    // The orange one blends in — turns white like the rest
    tl.to(".orange-part", { fill: "#FFFFFF", duration: 0.9, ease: "power2.inOut" }, 2.8);

    window.__timelines["main"] = tl;
  </script>
</body>
</html>
