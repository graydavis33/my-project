<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: #00FF00;
        font-family: "Montserrat", system-ui, sans-serif;
      }
      .scene {
        position: relative; width: 100%; height: 100%;
        display: flex; flex-direction: column; align-items: center;
        padding: 300px 80px 0 80px;
      }
      /* orange-glass recipe */
      .glass {
        background:
          radial-gradient(ellipse 100% 60% at 50% 0%,
            rgba(255,220,180,0.55) 0%, rgba(255,200,150,0.20) 35%, rgba(255,180,120,0) 65%),
          linear-gradient(180deg, rgba(255,168,88,1) 0%, rgba(242,129,41,1) 35%, rgba(214,100,22,1) 100%);
        border: 2px solid #fff;
        box-shadow:
          inset 0 2px 0 rgba(255,240,215,0.55),
          inset 0 -3px 10px rgba(140,55,8,0.45),
          0 0 24px rgba(242,129,41,0.55),
          0 6px 18px rgba(0,0,0,0.28);
      }
      .pill {
        display: inline-flex; align-items: center; justify-content: center;
        padding: 16px 46px; border-radius: 999px; margin-bottom: 34px;
      }
      .pill-text {
        font-weight: 800; font-size: 38px; letter-spacing: 0.10em;
        color: #fff; text-shadow: 0 2px 6px rgba(0,0,0,0.4);
      }
      .title {
        font-weight: 800; font-size: 96px; line-height: 1.04; letter-spacing: 0.02em;
        color: #fff; text-align: center; text-transform: uppercase;
        text-shadow: 0 3px 10px rgba(0,0,0,0.35); margin-bottom: 40px;
      }
      .stage {
        position: relative; width: 760px; height: 760px;
        display: flex; align-items: center; justify-content: center;
      }
      .stage svg { position: absolute; width: 760px; height: 760px; overflow: visible; }
      .moon-glow { filter: drop-shadow(0 0 26px rgba(242,129,41,0.85)); }
      .ztext {
        font-weight: 800; fill: #fff;
        filter: drop-shadow(0 3px 8px rgba(0,0,0,0.4));
      }
      .subtitle {
        margin-top: 18px; font-weight: 600; font-size: 44px; color: #fff;
        text-align: center; text-shadow: 0 2px 8px rgba(0,0,0,0.45); letter-spacing: 0.01em;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="5" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="5" data-track-index="1">
        <div id="pill" class="pill glass"><div class="pill-text">WEEK ONE</div></div>
        <div id="title" class="title">I COULDN'T SLEEP</div>

        <div class="stage" data-layout-allow-overflow>
          <!-- crescent moon -->
          <svg id="moon" class="moon-glow" viewBox="0 0 760 760">
            <defs>
              <radialGradient id="moonFill" cx="38%" cy="36%" r="72%">
                <stop offset="0%" stop-color="rgba(255,220,180,0.55)" />
                <stop offset="40%" stop-color="rgba(255,200,150,0.30)" />
                <stop offset="100%" stop-color="rgba(242,129,41,0.18)" />
              </radialGradient>
            </defs>
            <path d="M 360 200
                     A 180 180 0 1 0 360 560
                     A 140 140 0 1 1 360 200 Z"
                  fill="url(#moonFill)" stroke="#fff" stroke-width="8" stroke-linejoin="round"/>
          </svg>
          <!-- floating Z's, increasing size, up and to the right -->
          <svg id="zzz" viewBox="0 0 760 760">
            <text class="z1 ztext" x="480" y="430" font-size="70">Z</text>
            <text class="z2 ztext" x="560" y="330" font-size="100">Z</text>
            <text class="z3 ztext" x="650" y="210" font-size="140">Z</text>
          </svg>
          <!-- orange strike-through across the Zzz -->
          <svg id="strike" viewBox="0 0 760 760">
            <line id="strikeline" x1="450" y1="450" x2="700" y2="150"
                  stroke="#F28129" stroke-width="12" stroke-linecap="round"/>
          </svg>
        </div>
        <div id="subtitle" class="subtitle">not a single night of rest</div>
      </div>
    </div>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const DUR = 5;

        // entrances
        tl.from("#pill", { y: 70, opacity: 0, duration: 0.5, ease: "back.out(1.7)" }, 0.15);
        tl.from("#title", { y: 50, opacity: 0, duration: 0.5, ease: "power3.out" }, 0.4);
        tl.from("#moon", { scale: 0.6, opacity: 0, duration: 0.6, ease: "back.out(1.7)", transformOrigin: "50% 50%" }, 0.7);

        // three Z's float up one-by-one
        tl.from(".z1", { y: 50, opacity: 0, duration: 0.45, ease: "power2.out" }, 1.15);
        tl.from(".z2", { y: 50, opacity: 0, duration: 0.45, ease: "power2.out" }, 1.35);
        tl.from(".z3", { y: 50, opacity: 0, duration: 0.45, ease: "power2.out" }, 1.55);

        // subtitle
        tl.from("#subtitle", { y: 40, opacity: 0, duration: 0.45, ease: "power2.out" }, 1.8);

        // strike line draws across (punchline) via strokeDashoffset
        const line = document.getElementById("strikeline");
        const len = line.getTotalLength();
        line.style.strokeDasharray = len;
        line.style.strokeDashoffset = len;
        tl.to("#strikeline", { strokeDashoffset: 0, duration: 0.55, ease: "power2.out" }, 2.15);

        // gentle finite float loop on the Z's
        const floatCycle = 1.1;
        const floatReps = Math.ceil((DUR - 2.8) / floatCycle) - 1;
        gsap.utils.toArray([".z1", ".z2", ".z3"]).forEach(function (z, i) {
          tl.to(z, { y: -16, duration: floatCycle / 2, ease: "sine.inOut",
            yoyo: true, repeat: floatReps * 2 + 1 }, 2.8 + i * 0.12);
        });

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
