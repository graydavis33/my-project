<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: #00FF00;
        font-family: "Montserrat", system-ui, sans-serif;
      }
      .scene {
        position: relative; width: 100%; height: 100%;
        display: flex; flex-direction: column; align-items: center;
        padding: 300px 80px 0 80px;
      }
      /* orange-glass recipe */
      .glass {
        background:
          radial-gradient(ellipse 100% 60% at 50% 0%,
            rgba(255,220,180,0.55) 0%, rgba(255,200,150,0.20) 35%, rgba(255,180,120,0) 65%),
          linear-gradient(180deg, rgba(255,168,88,1) 0%, rgba(242,129,41,1) 35%, rgba(214,100,22,1) 100%);
        border: 2px solid #fff;
        box-shadow:
          inset 0 2px 0 rgba(255,240,215,0.55),
          inset 0 -3px 10px rgba(140,55,8,0.45),
          0 0 24px rgba(242,129,41,0.55),
          0 6px 18px rgba(0,0,0,0.28);
      }
      .pill {
        display: inline-flex; align-items: center; justify-content: center;
        padding: 16px 46px; border-radius: 999px; margin-bottom: 34px;
      }
      .pill-text {
        font-weight: 800; font-size: 38px; letter-spacing: 0.10em;
        color: #fff; text-shadow: 0 2px 6px rgba(0,0,0,0.4);
      }
      .title {
        font-weight: 800; font-size: 96px; line-height: 1.04; letter-spacing: 0.02em;
        color: #fff; text-align: center; text-transform: uppercase;
        text-shadow: 0 3px 10px rgba(0,0,0,0.35); margin-bottom: 40px;
      }
      .stage {
        position: relative; width: 760px; height: 760px;
        display: flex; align-items: center; justify-content: center;
      }
      .stage svg { position: absolute; width: 760px; height: 760px; overflow: visible; }
      .beacon-glow { filter: drop-shadow(0 0 26px rgba(242,129,41,0.85)); }
      .subtitle {
        margin-top: 18px; font-weight: 600; font-size: 44px; color: #fff;
        text-align: center; text-shadow: 0 2px 8px rgba(0,0,0,0.45); letter-spacing: 0.01em;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="5" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="5" data-track-index="1">
        <div id="pill" class="pill glass"><div class="pill-text">THE REFRAME</div></div>
        <div id="title" class="title">A LIFE BEING SAVED</div>

        <div class="stage" data-layout-allow-overflow>
          <!-- LEFT: siren + annoyed mark -->
          <svg id="left" class="beacon-glow" viewBox="0 0 760 760">
            <!-- siren base -->
            <rect x="70" y="430" width="160" height="70" rx="16" fill="none" stroke="#fff" stroke-width="8"/>
            <!-- dome -->
            <path d="M 82 432 A 68 68 0 0 1 218 432 Z" fill="#F28129" stroke="#fff" stroke-width="8" stroke-linejoin="round"/>
            <!-- top knob -->
            <rect x="138" y="338" width="24" height="34" rx="8" fill="#fff"/>
            <!-- annoyed squiggle -->
            <path id="annoyed" d="M 90 300 q 14 -26 28 0 q 14 26 28 0 q 14 -26 28 0"
              fill="none" stroke="#fff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>

          <!-- ARROW across -->
          <svg id="arrowsvg" viewBox="0 0 760 760">
            <path id="arrow" d="M 290 465 L 470 465" fill="none" stroke="#fff"
              stroke-width="14" stroke-linecap="round"/>
            <path id="arrowhead" d="M 442 440 L 478 465 L 442 490" fill="none" stroke="#fff"
              stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>

          <!-- RIGHT: siren + heart payoff -->
          <svg id="right" class="beacon-glow" viewBox="0 0 760 760">
            <!-- siren base -->
            <rect x="530" y="430" width="160" height="70" rx="16" fill="none" stroke="#fff" stroke-width="8"/>
            <!-- dome -->
            <path d="M 542 432 A 68 68 0 0 1 678 432 Z" fill="#F28129" stroke="#fff" stroke-width="8" stroke-linejoin="round"/>
            <!-- top knob -->
            <rect x="598" y="338" width="24" height="34" rx="8" fill="#fff"/>
          </svg>

          <!-- HEART payoff (own svg so it can pulse independently) -->
          <svg id="heartsvg" viewBox="0 0 760 760">
            <path id="heart"
              d="M 610 256
                 C 596 230, 558 232, 558 264
                 C 558 292, 588 312, 610 332
                 C 632 312, 662 292, 662 264
                 C 662 232, 624 230, 610 256 Z"
              fill="#F28129" stroke="#fff" stroke-width="8" stroke-linejoin="round"/>
          </svg>
        </div>
        <div id="subtitle" class="subtitle">not annoying — someone's getting saved</div>
      </div>
    </div>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const DUR = 5;

        // text entrances
        tl.from("#pill", { y: 70, opacity: 0, duration: 0.5, ease: "back.out(1.7)" }, 0.15);
        tl.from("#title", { y: 50, opacity: 0, duration: 0.5, ease: "power3.out" }, 0.4);

        // LEFT side slides in from the left
        tl.from("#left", { x: -260, opacity: 0, duration: 0.6, ease: "power3.out" }, 0.7);

        // ARROW draws across
        const arrow = document.getElementById("arrow");
        const arrowLen = arrow.getTotalLength();
        arrow.style.strokeDasharray = arrowLen;
        const head = document.getElementById("arrowhead");
        tl.fromTo("#arrow",
          { strokeDashoffset: arrowLen },
          { strokeDashoffset: 0, duration: 0.45, ease: "power2.out" }, 1.25);
        tl.from("#arrowhead", { opacity: 0, scale: 0.4, duration: 0.25, ease: "power2.out",
          transformOrigin: "470px 465px" }, 1.6);

        // RIGHT side + HEART pop in big (the payoff)
        tl.from("#right", { scale: 0.6, opacity: 0, duration: 0.55, ease: "back.out(1.9)",
          transformOrigin: "610px 465px" }, 1.85);
        tl.from("#heart", { scale: 0.0, opacity: 0, duration: 0.55, ease: "back.out(1.9)",
          transformOrigin: "610px 280px" }, 2.05);

        // subtitle
        tl.from("#subtitle", { y: 40, opacity: 0, duration: 0.45, ease: "power2.out" }, 2.4);

        // gentle finite heartbeat pulse on the heart
        const beatCycle = 0.9;
        const beatStart = 2.7;
        const beatReps = Math.ceil((DUR - beatStart) / beatCycle) - 1;
        tl.fromTo("#heart",
          { scale: 1.0, transformOrigin: "610px 280px" },
          { scale: 1.14, duration: beatCycle / 2, ease: "sine.inOut",
            yoyo: true, repeat: beatReps * 2 + 1 },
          beatStart);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
