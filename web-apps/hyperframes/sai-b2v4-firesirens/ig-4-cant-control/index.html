<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: #00FF00;
        font-family: "Montserrat", system-ui, sans-serif;
      }
      .scene {
        position: relative; width: 100%; height: 100%;
        display: flex; flex-direction: column; align-items: center;
        padding: 300px 80px 0 80px;
      }
      /* orange-glass recipe */
      .glass {
        background:
          radial-gradient(ellipse 100% 60% at 50% 0%,
            rgba(255,220,180,0.55) 0%, rgba(255,200,150,0.20) 35%, rgba(255,180,120,0) 65%),
          linear-gradient(180deg, rgba(255,168,88,1) 0%, rgba(242,129,41,1) 35%, rgba(214,100,22,1) 100%);
        border: 2px solid #fff;
        box-shadow:
          inset 0 2px 0 rgba(255,240,215,0.55),
          inset 0 -3px 10px rgba(140,55,8,0.45),
          0 0 24px rgba(242,129,41,0.55),
          0 6px 18px rgba(0,0,0,0.28);
      }
      .pill {
        display: inline-flex; align-items: center; justify-content: center;
        padding: 16px 46px; border-radius: 999px; margin-bottom: 34px;
      }
      .pill-text {
        font-weight: 800; font-size: 38px; letter-spacing: 0.10em;
        color: #fff; text-shadow: 0 2px 6px rgba(0,0,0,0.4);
      }
      .title {
        font-weight: 800; font-size: 96px; line-height: 1.04; letter-spacing: 0.02em;
        color: #fff; text-align: center; text-transform: uppercase;
        text-shadow: 0 3px 10px rgba(0,0,0,0.35); margin-bottom: 40px;
      }
      .stage {
        position: relative; width: 760px; height: 760px;
        display: flex; align-items: center; justify-content: center;
      }
      .stage svg { position: absolute; width: 760px; height: 760px; overflow: visible; }
      .beacon-glow { filter: drop-shadow(0 0 26px rgba(242,129,41,0.85)); }
      .slash-glow { filter: drop-shadow(0 0 30px rgba(242,129,41,0.9)); }
      .subtitle {
        margin-top: 18px; font-weight: 600; font-size: 44px; color: #fff;
        text-align: center; text-shadow: 0 2px 8px rgba(0,0,0,0.45); letter-spacing: 0.01em;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="5" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="5" data-track-index="1">
        <div id="pill" class="pill glass"><div class="pill-text">THE REALIZATION</div></div>
        <div id="title" class="title">OUT OF MY CONTROL</div>

        <div class="stage" data-layout-allow-overflow>
          <!-- the can't-control zone: large containing ring -->
          <svg id="ring" viewBox="0 0 760 760">
            <circle cx="380" cy="380" r="280" fill="none" stroke="#fff" stroke-width="8" />
          </svg>
          <!-- small sound-wave arcs flickering off the siren -->
          <svg id="waves" viewBox="0 0 760 760">
            <path class="wave" d="M 470 330 A 70 70 0 0 1 470 430" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
            <path class="wave" d="M 505 305 A 110 110 0 0 1 505 455" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
            <path class="wave" d="M 290 330 A 70 70 0 0 0 290 430" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
            <path class="wave" d="M 255 305 A 110 110 0 0 0 255 455" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
          </svg>
          <!-- siren beacon (scaled down, centered in ring) -->
          <svg id="beacon" class="beacon-glow" viewBox="0 0 760 760">
            <!-- base -->
            <rect x="332" y="400" width="96" height="46" rx="11" fill="none" stroke="#fff" stroke-width="7"/>
            <!-- dome -->
            <path d="M 340 401 A 41 41 0 0 1 420 401 Z" fill="#F28129" stroke="#fff" stroke-width="7" stroke-linejoin="round"/>
            <!-- top knob -->
            <rect x="369" y="336" width="16" height="24" rx="6" fill="#fff"/>
          </svg>
          <!-- orange forbidden / no mark — stamps on last -->
          <svg id="slash" class="slash-glow" viewBox="0 0 760 760">
            <circle cx="380" cy="380" r="300" fill="none" stroke="#F28129" stroke-width="16" />
            <line x1="168" y1="168" x2="592" y2="592" stroke="#F28129" stroke-width="16" stroke-linecap="round" />
          </svg>
        </div>
        <div id="subtitle" class="subtitle">I could do nothing about it</div>
      </div>
    </div>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const DUR = 5;

        // entrances
        tl.from("#pill", { y: 70, opacity: 0, duration: 0.5, ease: "back.out(1.7)" }, 0.15);
        tl.from("#title", { y: 50, opacity: 0, duration: 0.5, ease: "power3.out" }, 0.4);
        // ring draws/scales in
        tl.from("#ring", { scale: 0.4, opacity: 0, duration: 0.6, ease: "back.out(1.5)", transformOrigin: "380px 380px" }, 0.7);
        // siren beacon pops inside the ring
        tl.from("#beacon", { y: 50, scale: 0.6, opacity: 0, duration: 0.55, ease: "back.out(1.8)", transformOrigin: "380px 410px" }, 1.05);

        // small wave arcs flicker (finite)
        const waves = gsap.utils.toArray(".wave");
        const flickCycle = 0.5;
        const flickReps = Math.ceil((DUR - 1.4) / flickCycle) - 1;
        waves.forEach(function (w, i) {
          tl.fromTo(w,
            { opacity: 0 },
            { opacity: 0.9, duration: flickCycle / 2, ease: "sine.inOut",
              yoyo: true, repeat: flickReps * 2 + 1 },
            1.4 + i * 0.08);
        });

        // orange forbidden-slash STAMPS on as the punchline
        tl.from("#slash", { scale: 1.6, opacity: 0, duration: 0.4, ease: "back.out(2)", transformOrigin: "380px 380px" }, 2.4);
        // tiny impact shake on the whole stage
        tl.fromTo("#scene",
          { x: -6 },
          { x: 0, duration: 0.3, ease: "elastic.out(1.6, 0.35)" },
          2.78);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
