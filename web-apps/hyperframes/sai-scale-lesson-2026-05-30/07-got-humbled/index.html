<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Sai — And Quickly Got Humbled</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #00FF00;
  }
  #root {
    position: relative;
    width: 1080px;
    height: 1920px;
    background: #00FF00;
    overflow: hidden;
    font-family: "Montserrat", sans-serif;
  }

  /* SVG graph centered vertically a touch above middle so the stamp sits in face zone */
  .graph {
    position: absolute;
    top: 640px;
    left: 0;
    width: 1080px;
    height: 640px;
  }

  .axis-line {
    stroke: #FFFFFF;
    stroke-width: 6;
    stroke-linecap: round;
    filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.4));
  }

  .graph-line {
    fill: none;
    stroke: #FFFFFF;
    stroke-width: 12;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.4));
  }

  /* Falling arrowhead at the crash end (orange) */
  .arrowhead {
    fill: #F28129;
    filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.4));
    will-change: transform, opacity;
  }

  /* HUMBLED slam-in word */
  .stamp {
    position: absolute;
    top: 980px;
    left: 0;
    width: 1080px;
    text-align: center;
    font-weight: 900;
    font-size: 130px;
    line-height: 1;
    text-transform: uppercase;
    letter-spacing: 0.01em;
    color: #F28129;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
    will-change: transform, opacity;
  }
</style>
</head>
<body>
  <div id="root" data-composition-id="main" data-start="0" data-duration="3.5" data-width="1080" data-height="1920">

    <svg class="graph" viewBox="0 0 1080 640" xmlns="http://www.w3.org/2000/svg">
      <!-- baseline axis -->
      <line class="axis-line" id="baseline" x1="140" y1="560" x2="940" y2="560" />
      <!-- climb to a peak left-center, then crash steeply to lower-right -->
      <polyline class="graph-line" id="line"
        points="160,500 320,360 440,180 520,120 720,500 860,560" />
      <!-- orange arrowhead at the crash end (~860,560), pointing down -->
      <polygon class="arrowhead" id="arrow"
        points="860,600 826,548 894,548" />
    </svg>

    <div class="stamp" id="stamp">HUMBLED</div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // --- Baseline draw-in (quick) ---
      const baseline = document.getElementById("baseline");
      const baseLen = baseline.getTotalLength();
      baseline.style.strokeDasharray = baseLen;
      tl.fromTo(baseline,
        { strokeDashoffset: baseLen },
        { strokeDashoffset: 0, duration: 0.2, ease: "power1.out" },
        0.15
      );

      // --- Graph line draws: rise then accelerating crash (power2.in) ---
      const line = document.getElementById("line");
      const lineLen = line.getTotalLength();
      line.style.strokeDasharray = lineLen;
      tl.fromTo(line,
        { strokeDashoffset: lineLen },
        { strokeDashoffset: 0, duration: 0.9, ease: "power2.in" },
        0.4
      );

      // --- Falling arrowhead drops in at the end of the line draw ---
      tl.from("#arrow", {
        y: -90,
        opacity: 0,
        duration: 0.3,
        ease: "back.out(2.0)"
      }, 1.25);

      // --- HUMBLED slams in: scale down + fade, with rotation + impact shake ---
      tl.set("#stamp", { rotation: -8, transformOrigin: "50% 50%" }, 0);
      tl.from("#stamp", {
        scale: 1.8,
        opacity: 0,
        duration: 0.4,
        ease: "back.out(2.2)"
      }, 1.5);

      // Finite impact shake (±10px x, ~2.5 oscillations), preserving the -8deg tilt
      tl.to("#stamp", { x: 10,  duration: 0.05, ease: "power1.inOut" }, 1.9);
      tl.to("#stamp", { x: -8,  duration: 0.05, ease: "power1.inOut" }, 1.95);
      tl.to("#stamp", { x: 6,   duration: 0.05, ease: "power1.inOut" }, 2.0);
      tl.to("#stamp", { x: -4,  duration: 0.05, ease: "power1.inOut" }, 2.05);
      tl.to("#stamp", { x: 0,   duration: 0.05, ease: "power1.inOut" }, 2.1);

      window.__timelines["main"] = tl;
    </script>
  </div>
</body>
</html>
