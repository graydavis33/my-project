<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #00FF00;
    width: 1080px;
    height: 1920px;
    overflow: hidden;
  }
  #root {
    position: relative;
    width: 1080px;
    height: 1920px;
    background: #00FF00;
    font-family: "Montserrat", sans-serif;
    overflow: hidden;
  }

  /* ---- Top requirement pills ---- */
  .pills {
    position: absolute;
    top: 230px;
    left: 0;
    width: 1080px;
    display: flex;
    justify-content: center;
    gap: 60px;
  }
  .pill-wrap {
    position: relative;
    width: 380px;
    height: 130px;
  }
  .pill {
    width: 100%;
    height: 100%;
    box-sizing: border-box;
    border: 3px solid #FFFFFF;
    border-radius: 999px;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 24px rgba(0,0,0,0.28);
  }
  .pill span {
    color: #FFFFFF;
    font-weight: 800;
    font-size: 46px;
    letter-spacing: 0.04em;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  /* Orange X stamp over each pill */
  .xmark {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 150px;
    height: 150px;
    margin: -75px 0 0 -75px;
    pointer-events: none;
  }
  .x-stroke {
    position: absolute;
    top: 50%;
    left: 0;
    width: 150px;
    height: 16px;
    margin-top: -8px;
    background: #F28129;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .x-a { transform: rotate(45deg); }
  .x-b { transform: rotate(-45deg); }

  /* ---- Broken / dashed foundation line ---- */
  .base-line {
    position: absolute;
    top: 1560px;
    left: 270px;
    width: 540px;
    border-top: 8px dashed #FFFFFF;
    opacity: 0.85;
  }

  /* ---- SCALE arrow column ---- */
  .scale-rig {
    position: absolute;
    top: 560px;
    left: 50%;
    width: 520px;
    margin-left: -260px;
    height: 1000px;
    transform-origin: 50% 90%;
  }
  .scale-rig svg {
    display: block;
    width: 520px;
    height: 1000px;
    overflow: visible;
    filter: drop-shadow(0 8px 16px rgba(0,0,0,0.35));
  }
  .scale-word {
    position: absolute;
    top: 300px;
    left: 50%;
    width: 560px;
    margin-left: -280px;
    text-align: center;
    color: #FFFFFF;
    font-weight: 900;
    font-size: 88px;
    letter-spacing: 0.05em;
    text-shadow: 0 4px 14px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>
  <div id="root" data-composition-id="main" data-start="0" data-duration="4" data-width="1080" data-height="1920">

    <!-- Two requirements: NOT true yet -->
    <div class="pills">
      <div class="pill-wrap" id="pw1">
        <div class="pill"><span>CUSTOMERS</span></div>
        <div class="xmark" id="x1">
          <div class="x-stroke x-a"></div>
          <div class="x-stroke x-b"></div>
        </div>
      </div>
      <div class="pill-wrap" id="pw2">
        <div class="pill"><span>TEAM</span></div>
        <div class="xmark" id="x2">
          <div class="x-stroke x-a"></div>
          <div class="x-stroke x-b"></div>
        </div>
      </div>
    </div>

    <!-- Broken foundation line -->
    <div class="base-line" id="baseline"></div>

    <!-- SCALE arrow rocketing up (unstable) -->
    <div class="scale-rig" id="rig">
      <svg viewBox="0 0 520 1000" xmlns="http://www.w3.org/2000/svg">
        <!-- rising bars -->
        <rect x="60"  y="780" width="80" height="200" fill="#FFFFFF" rx="10"/>
        <rect x="170" y="640" width="80" height="340" fill="#FFFFFF" rx="10"/>
        <rect x="280" y="470" width="80" height="510" fill="#F28129" rx="10"/>
        <!-- steep up-arrow shaft -->
        <line x1="100" y1="900" x2="410" y2="120" stroke="#FFFFFF" stroke-width="26" stroke-linecap="round"/>
        <!-- arrowhead -->
        <polyline points="300,90 430,90 430,230" fill="none" stroke="#FFFFFF" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="scale-word">SCALE</div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });

    // Pills pop in
    tl.from("#pw1", { scale: 0, opacity: 0, duration: 0.45, ease: "back.out(1.8)" }, 0.15);
    tl.from("#pw2", { scale: 0, opacity: 0, duration: 0.45, ease: "back.out(1.8)" }, 0.30);

    // Orange X strokes draw across from each side (scaleX from 0)
    tl.from("#x1 .x-a", { scaleX: 0, opacity: 0, duration: 0.22, ease: "power3.out", transformOrigin: "left center" }, 0.60);
    tl.from("#x1 .x-b", { scaleX: 0, opacity: 0, duration: 0.22, ease: "power3.out", transformOrigin: "right center" }, 0.72);
    tl.from("#x2 .x-a", { scaleX: 0, opacity: 0, duration: 0.22, ease: "power3.out", transformOrigin: "left center" }, 0.85);
    tl.from("#x2 .x-b", { scaleX: 0, opacity: 0, duration: 0.22, ease: "power3.out", transformOrigin: "right center" }, 0.97);

    // Broken foundation line draws in
    tl.from("#baseline", { scaleX: 0, opacity: 0, duration: 0.4, ease: "power2.out", transformOrigin: "center center" }, 1.1);

    // SCALE arrow rockets up from below
    tl.from("#rig", { y: 520, opacity: 0, duration: 0.7, ease: "power3.out" }, 1.3);

    // Instability wobble through the hold (finite yoyo)
    // cycle ~0.5s, run from t=2.05 to end (~1.95s) -> 3 cycles after the initial
    tl.fromTo("#rig",
      { rotation: -3 },
      { rotation: 3, duration: 0.5, ease: "sine.inOut", yoyo: true, repeat: 3, transformOrigin: "50% 90%" },
      2.05
    );

    window.__timelines["main"] = tl;
  </script>
</body>
</html>
