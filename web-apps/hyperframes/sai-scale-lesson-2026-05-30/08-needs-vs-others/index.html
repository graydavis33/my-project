<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>My Needs vs Others</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #00FF00;
    width: 1080px;
    height: 1920px;
    overflow: hidden;
  }
  #root {
    position: relative;
    width: 1080px;
    height: 1920px;
    background: #00FF00;
    font-family: "Montserrat", sans-serif;
    overflow: hidden;
  }

  /* ---- SVG rig: post + beam + hang lines ---- */
  .rig-svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 1080px;
    height: 1920px;
    overflow: visible;
    pointer-events: none;
  }
  .rig-svg .post,
  .rig-svg .beam-bar,
  .rig-svg .hang {
    filter: drop-shadow(0 6px 14px rgba(0,0,0,0.35));
  }

  /* ---- Pans (HTML plates) ---- */
  .pan {
    position: absolute;
    width: 360px;
    height: 70px;
    margin-left: -180px;          /* center on its x */
    box-sizing: border-box;
  }
  /* MY NEEDS — heavy orange-glass plate, left side */
  #pan-left {
    left: 180px;
    top: 1004px;                  /* plate top; hang line meets at ~1004 */
    height: 74px;
    border-radius: 22px;
    border: 3px solid #fff;
    background:
      radial-gradient(ellipse 100% 60% at 50% 0%,
        rgba(255,220,180,0.55) 0%,
        rgba(255,200,150,0.20) 35%,
        rgba(255,180,120,0) 65%),
      linear-gradient(180deg,
        rgba(255,168,88,1) 0%,
        rgba(242,129,41,1) 35%,
        rgba(214,100,22,1) 100%);
    box-shadow:
      inset 0 2px 0 rgba(255,240,215,0.55),
      inset 0 -4px 14px rgba(140,55,8,0.45),
      0 0 32px rgba(242,129,41,0.55),
      0 8px 24px rgba(0,0,0,0.28);
  }
  /* OTHERS — blue-glass plate (cool, complements the orange MY NEEDS plate) */
  #pan-right {
    left: 900px;
    top: 1004px;
    height: 74px;
    border-radius: 22px;
    border: 3px solid #fff;
    background:
      radial-gradient(ellipse 100% 60% at 50% 0%,
        rgba(190,225,255,0.55) 0%,
        rgba(150,200,245,0.20) 35%,
        rgba(120,180,235,0) 65%),
      linear-gradient(180deg,
        rgba(88,168,255,1) 0%,
        rgba(41,129,242,1) 35%,
        rgba(22,92,200,1) 100%);
    box-shadow:
      inset 0 2px 0 rgba(215,235,255,0.55),
      inset 0 -4px 14px rgba(8,55,140,0.45),
      0 0 32px rgba(41,129,242,0.55),
      0 8px 24px rgba(0,0,0,0.28);
  }

  /* ---- Load groups (translate with their pan during the tilt) ---- */
  .load {
    position: absolute;
    top: 1004px;
    width: 360px;
    margin-left: -180px;
    height: 0;                    /* anchor; graphics sit above the plate */
    pointer-events: none;
  }
  #load-left  { left: 180px; }
  #load-right { left: 900px; }

  /* MY NEEDS — orange-glass blocks with white need-icons */
  .need-block {
    position: absolute;
    width: 76px;
    height: 76px;
    margin-left: -38px;
    box-sizing: border-box;
    border-radius: 15px;
    border: 3px solid #fff;
    background:
      radial-gradient(ellipse 100% 55% at 50% 0%,
        rgba(255,200,150,0.35) 0%,
        rgba(255,180,120,0.12) 35%,
        rgba(255,160,100,0) 60%),
      linear-gradient(180deg,
        rgba(226,112,28,1) 0%,
        rgba(204,92,18,1) 45%,
        rgba(168,72,10,1) 100%);
    box-shadow:
      inset 0 2px 0 rgba(255,230,200,0.45),
      inset 0 -4px 12px rgba(120,48,6,0.5),
      0 6px 16px rgba(0,0,0,0.30);
    display: flex;
    align-items: center;
    justify-content: center;
    will-change: transform;
  }
  .need-block svg {
    width: 48px;
    height: 48px;
    display: block;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
  }
  /* pyramid pile: 3 bottom, 2 top */
  #nl1 { left: 102px; top: -78px; }
  #nl2 { left: 178px; top: -78px; }
  #nl3 { left: 254px; top: -78px; }
  #nl4 { left: 140px; top: -150px; }
  #nl5 { left: 216px; top: -150px; }

  /* OTHERS — white-outline people + speech bubble */
  .other {
    position: absolute;
    overflow: visible;
    will-change: transform;
  }
  .other svg {
    width: 100%;
    height: 100%;
    display: block;
    filter: drop-shadow(0 3px 8px rgba(0,0,0,0.30));
  }
  .other-person { width: 60px; height: 76px; margin-left: -30px; }
  #nr1 { left: 120px; top: -82px; }
  #nr2 { left: 180px; top: -82px; }
  #nr3 { left: 240px; top: -82px; }

  /* ---- Labels ---- */
  .label {
    position: absolute;
    width: 460px;
    margin-left: -230px;
    text-align: center;
    color: #FFFFFF;
    font-weight: 800;
    letter-spacing: 0.03em;
    text-shadow: 0 3px 10px rgba(0,0,0,0.5);
  }
  #label-left {
    left: 180px;
    top: 1110px;
    font-size: 52px;
  }
  #label-right {
    left: 900px;
    top: 1110px;
    font-size: 52px;
    width: 380px;
    margin-left: -190px;
  }
</style>
</head>
<body>
  <div id="root" data-composition-id="main" data-start="0" data-duration="4.5" data-width="1080" data-height="1920">

    <!-- SVG rig. The beam bar + both wires + both plates are recomputed every
         frame from a single beam angle (see render()), so the wires ALWAYS run
         from the beam tips straight down to the plates — they never disconnect. -->
    <svg class="rig-svg" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">
      <!-- Static post + base -->
      <g id="post">
        <line class="post" x1="540" y1="760" x2="540" y2="1290"
              stroke="#FFFFFF" stroke-width="20" stroke-linecap="round"/>
        <line class="post" x1="430" y1="1290" x2="650" y2="1290"
              stroke="#FFFFFF" stroke-width="20" stroke-linecap="round"/>
      </g>

      <!-- Wires hang straight down from the beam tips to the plates (driven by render) -->
      <line id="wire-left"  class="hang" x1="180" y1="760" x2="180" y2="1004"
            stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
      <line id="wire-right" class="hang" x1="900" y1="760" x2="900" y2="1004"
            stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>

      <!-- Beam bar (driven by render) -->
      <line id="beam-bar" class="beam-bar" x1="180" y1="760" x2="900" y2="760"
            stroke="#FFFFFF" stroke-width="18" stroke-linecap="round"/>

      <!-- Pivot cap on top -->
      <circle cx="540" cy="760" r="20" fill="#F28129" stroke="#FFFFFF" stroke-width="6"/>
    </svg>

    <!-- LEFT pan: MY NEEDS (orange-glass, heavy) -->
    <div class="pan" id="pan-left"></div>
    <!-- LEFT load: need-graphics that pile up -->
    <div class="load" id="load-left">
      <div class="need-block" id="nl1">
        <svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg"><text x="26" y="38" text-anchor="middle" font-family="Montserrat, sans-serif" font-weight="900" font-size="40" fill="#FFFFFF">$</text></svg>
      </div>
      <div class="need-block" id="nl2">
        <svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 28 L26 12 L42 28" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
          <path d="M14 26 V44 H38 V26" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linejoin="round"/>
          <rect x="23" y="33" width="6" height="11" fill="#FFFFFF"/>
        </svg>
      </div>
      <div class="need-block" id="nl3">
        <svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
          <path d="M26 43 C8 31 10 16 21 16 C25.5 16 26 21 26 23 C26 21 26.5 16 31 16 C42 16 44 31 26 43 Z" fill="#FFFFFF"/>
        </svg>
      </div>
      <div class="need-block" id="nl4">
        <svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
          <circle cx="26" cy="28" r="16" fill="none" stroke="#FFFFFF" stroke-width="5"/>
          <path d="M26 28 V18" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
          <path d="M26 28 L34 32" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="need-block" id="nl5">
        <svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
          <path d="M30 8 L14 30 H24 L20 44 L40 24 H29 Z" fill="#FFFFFF"/>
        </svg>
      </div>
    </div>

    <!-- RIGHT pan: OTHERS (light, white outline) -->
    <div class="pan" id="pan-right"></div>
    <!-- RIGHT load: other people + a speech bubble -->
    <div class="load" id="load-right">
      <div class="other other-person" id="nr1">
        <svg viewBox="0 0 60 76" xmlns="http://www.w3.org/2000/svg">
          <circle cx="30" cy="16" r="13" fill="#FFFFFF"/>
          <path d="M30 28 C16 28 11 46 11 60 L11 76 L49 76 L49 60 C49 46 44 28 30 28 Z" fill="#FFFFFF"/>
        </svg>
      </div>
      <div class="other other-person" id="nr2">
        <svg viewBox="0 0 60 76" xmlns="http://www.w3.org/2000/svg">
          <circle cx="30" cy="16" r="13" fill="#FFFFFF"/>
          <path d="M30 28 C16 28 11 46 11 60 L11 76 L49 76 L49 60 C49 46 44 28 30 28 Z" fill="#FFFFFF"/>
        </svg>
      </div>
      <div class="other other-person" id="nr3">
        <svg viewBox="0 0 60 76" xmlns="http://www.w3.org/2000/svg">
          <circle cx="30" cy="16" r="13" fill="#FFFFFF"/>
          <path d="M30 28 C16 28 11 46 11 60 L11 76 L49 76 L49 60 C49 46 44 28 30 28 Z" fill="#FFFFFF"/>
        </svg>
      </div>
    </div>

    <!-- Labels -->
    <div class="label" id="label-left">MY NEEDS</div>
    <div class="label" id="label-right">OTHERS</div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });

    // ---- Connected rig: everything derives from one beam angle ----
    const C = { x: 540, y: 760 }, HALF = 360, L = 244;   // pivot, half-beam, wire length
    const baseLx = 180, baseRx = 900, baseY = 1004;       // level positions of the plates
    const beamBar = document.getElementById("beam-bar");
    const wireL   = document.getElementById("wire-left");
    const wireR   = document.getElementById("wire-right");
    const panLeft   = document.getElementById("pan-left");
    const panRight  = document.getElementById("pan-right");
    const loadLeft  = document.getElementById("load-left");
    const loadRight = document.getElementById("load-right");
    const labelLeft  = document.getElementById("label-left");
    const labelRight = document.getElementById("label-right");

    const beam = { a: 0 };  // beam angle in degrees (+ = right side down)
    function render() {
      const r = beam.a * Math.PI / 180, c = Math.cos(r), s = Math.sin(r);
      // beam tips (rotate the half-beam about the pivot)
      const lx = C.x - HALF * c, ly = C.y - HALF * s;
      const rx = C.x + HALF * c, ry = C.y + HALF * s;
      // beam bar
      beamBar.setAttribute("x1", lx.toFixed(2)); beamBar.setAttribute("y1", ly.toFixed(2));
      beamBar.setAttribute("x2", rx.toFixed(2)); beamBar.setAttribute("y2", ry.toFixed(2));
      // wires hang straight down from each tip to its plate
      wireL.setAttribute("x1", lx.toFixed(2)); wireL.setAttribute("y1", ly.toFixed(2));
      wireL.setAttribute("x2", lx.toFixed(2)); wireL.setAttribute("y2", (ly + L).toFixed(2));
      wireR.setAttribute("x1", rx.toFixed(2)); wireR.setAttribute("y1", ry.toFixed(2));
      wireR.setAttribute("x2", rx.toFixed(2)); wireR.setAttribute("y2", (ry + L).toFixed(2));
      // plates (+ their loads + labels) hang at the bottom of the wires, staying level
      const lDX = lx - baseLx, lDY = (ly + L) - baseY;
      const rDX = rx - baseRx, rDY = (ry + L) - baseY;
      const ltf = "translate(" + lDX.toFixed(2) + "px," + lDY.toFixed(2) + "px)";
      const rtf = "translate(" + rDX.toFixed(2) + "px," + rDY.toFixed(2) + "px)";
      panLeft.style.transform = ltf;  loadLeft.style.transform = ltf;  labelLeft.style.transform = ltf;
      panRight.style.transform = rtf; loadRight.style.transform = rtf; labelRight.style.transform = rtf;
    }
    render();  // frame 0: already present, level, fully connected — no entrance

    // master driver — render() runs every frame so the rig stays connected throughout
    const driver = { t: 0 };
    tl.to(driver, { t: 1, duration: 4.5, ease: "none", onUpdate: render }, 0);

    // ---- PHASE A: OTHERS fall FIRST onto the right plate (fade in from the top) ----
    const rightIds = ["#nr1", "#nr2", "#nr3"];
    rightIds.forEach((id, i) => {
      tl.from(id, { y: -260, opacity: 0, duration: 0.5, ease: "sine.in" }, 0.40 + i * 0.16);
    });
    // The MOMENT they hit (first impact ~0.90s) the weight starts shifting RIGHT.
    // The whole connected rig — beam, wires, plates — swings together.
    tl.to(beam, { a: 13, duration: 0.95, ease: "back.out(1.4)", onUpdate: render }, 0.90);

    // ---- PHASE B: MY NEEDS fall SECOND onto the (raised) left plate — hard hits ----
    const leftIds = ["#nl1", "#nl2", "#nl3", "#nl4", "#nl5"];
    leftIds.forEach((id, i) => {
      const t = 2.25 + i * 0.16;
      tl.from(id, { y: -360, opacity: 0, duration: 0.40, ease: "power3.in" }, t);
      tl.to(id,   { scaleY: 0.84, duration: 0.07, ease: "power2.out", transformOrigin: "50% 100%" }, t + 0.40);
      tl.to(id,   { scaleY: 1,    duration: 0.16, ease: "back.out(2.2)", transformOrigin: "50% 100%" }, t + 0.47);
    });
    // The MOMENT they hit (first impact ~2.65s) the weight swings BACK to the LEFT
    // and settles with a damped pendulum shake (elastic.out = overshoot + oscillate).
    tl.to(beam, { a: -16, duration: 1.55, ease: "elastic.out(1, 0.5)", onUpdate: render }, 2.65);

    window.__timelines["main"] = tl;
  </script>
</body>
</html>
