<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: transparent; font-family: "Montserrat", system-ui, sans-serif;
      }
      .scene { position: relative; width: 100%; height: 100%; overflow: hidden; }

      /* ---------- SUN ---------- */
      #sunGlow {
        position: absolute; left: 726px; top: 360px; width: 660px; height: 660px;
        margin-left: -330px; margin-top: -330px; border-radius: 50%; z-index: 0;
        background: radial-gradient(circle, rgba(255,199,107,0.55) 0%, rgba(255,170,80,0.22) 40%, rgba(242,129,41,0) 70%);
        will-change: opacity, transform;
      }
      #sunDisc {
        position: absolute; left: 726px; top: 360px; width: 190px; height: 190px;
        margin-left: -95px; margin-top: -95px; z-index: 0; will-change: transform, opacity;
      }

      /* ---------- FLIGHT TRAIL ---------- */
      #trail { position: absolute; left: 0; top: 0; width: 1080px; height: 1920px; z-index: 1; overflow: visible; }
      .tdot { fill: #F28129; will-change: transform, opacity;
        filter: drop-shadow(0 0 7px rgba(242,129,41,0.7)); }

      /* ---------- ISLAND ---------- */
      #island {
        position: absolute; left: 130px; top: 1360px; width: 820px; height: 300px; z-index: 2;
        will-change: transform, opacity;
        filter: drop-shadow(0 14px 26px rgba(0,0,0,0.28));
      }
      #palm {
        position: absolute; left: 250px; top: 1140px; width: 300px; height: 360px; z-index: 3;
        will-change: transform, opacity;
        filter: drop-shadow(0 10px 18px rgba(0,0,0,0.26));
      }
      #umbrella {
        position: absolute; left: 640px; top: 1180px; width: 280px; height: 320px; z-index: 3;
        will-change: transform, opacity;
        filter: drop-shadow(0 10px 18px rgba(0,0,0,0.26));
      }

      /* ---------- PLANE ---------- */
      .plane {
        position: absolute; left: 0; top: 0; width: 250px; height: 130px; z-index: 5;
        will-change: transform, opacity;
        filter: drop-shadow(0 10px 16px rgba(0,0,0,0.30));
      }

      /* ---------- LABEL ---------- */
      #label {
        position: absolute; left: 140px; top: 1632px; width: 800px; z-index: 6;
        display: flex; flex-direction: column; align-items: center; gap: 6px;
        padding: 24px 36px 28px; border-radius: 38px; box-sizing: border-box;
        background: linear-gradient(150deg, #F0871F 0%, #DC6A14 48%, #C9560F 100%);
        border: 2px solid #ffffff;
        box-shadow:
          inset 0 2px 10px rgba(255,255,255,0.45),
          inset 0 -10px 22px rgba(120,50,8,0.35),
          0 0 24px rgba(242,129,41,0.55),
          0 8px 22px rgba(0,0,0,0.30);
        will-change: transform, opacity;
      }
      #label .kicker {
        font-size: 26px; font-weight: 800; letter-spacing: 0.32em; color: #FFFFFF;
        text-transform: uppercase; opacity: 0.92; padding-left: 0.32em;
        text-shadow: 0 2px 6px rgba(90,40,6,0.5);
      }
      #label .hero {
        font-size: 82px; font-weight: 900; letter-spacing: -0.01em; color: #FFFFFF;
        text-transform: uppercase; line-height: 0.98;
        text-shadow: 0 4px 14px rgba(80,34,4,0.55);
      }
      #label .sub {
        font-size: 34px; font-weight: 800; letter-spacing: 0.01em; color: #FFF1DE;
        text-shadow: 0 2px 8px rgba(80,34,4,0.5);
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="6.2" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="6.2" data-track-index="1" data-layout-allow-overflow>

        <!-- SUN -->
        <div id="sunGlow" data-layout-allow-overflow></div>
        <svg id="sunDisc" viewBox="0 0 190 190">
          <defs>
            <radialGradient id="sunFill" cx="0.42" cy="0.38" r="0.7">
              <stop offset="0" stop-color="#FFE6B0" />
              <stop offset="0.55" stop-color="#FFC76B" />
              <stop offset="1" stop-color="#F7A23C" />
            </radialGradient>
          </defs>
          <circle cx="95" cy="95" r="78" fill="url(#sunFill)" />
        </svg>

        <!-- FLIGHT TRAIL (dots generated in JS) -->
        <svg id="trail" viewBox="0 0 1080 1920" data-layout-ignore></svg>

        <!-- ISLAND MOUND + WATER -->
        <svg id="island" viewBox="0 0 820 300" data-layout-allow-overflow>
          <defs>
            <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#FFD79A" />
              <stop offset="0.5" stop-color="#F28129" />
              <stop offset="1" stop-color="#CF6014" />
            </linearGradient>
            <linearGradient id="sandTop" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="rgba(255,244,214,0.85)" />
              <stop offset="1" stop-color="rgba(255,244,214,0)" />
            </linearGradient>
          </defs>
          <!-- water hint: soft wave strokes flanking the island -->
          <g stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.55">
            <path d="M40 196 q34 -16 68 0 t68 0" />
            <path d="M150 232 q30 -14 60 0 t60 0" />
            <path d="M612 210 q34 -16 68 0 t68 0" />
            <path d="M650 246 q30 -14 60 0 t60 0" />
          </g>
          <!-- sandy mound -->
          <path d="M70 188 Q410 70 750 188 Q760 300 700 300 L120 300 Q60 300 70 188 Z" fill="url(#sand)" />
          <!-- top beach sheen -->
          <path d="M70 188 Q410 70 750 188 Q410 132 70 188 Z" fill="url(#sandTop)" />
          <!-- shoreline foam -->
          <path d="M86 196 Q410 92 734 196" stroke="#FFFFFF" stroke-width="7" fill="none" opacity="0.75" stroke-linecap="round" />
        </svg>

        <!-- PALM TREE -->
        <svg id="palm" viewBox="0 0 300 360" data-layout-allow-overflow>
          <defs>
            <linearGradient id="trunk" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0" stop-color="#D49A57" />
              <stop offset="0.5" stop-color="#B97E3C" />
              <stop offset="1" stop-color="#8F5E2A" />
            </linearGradient>
            <linearGradient id="frond" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#FFFFFF" />
              <stop offset="1" stop-color="#FFE6C2" />
            </linearGradient>
          </defs>
          <!-- trunk: curved, leaning slightly right, tapering up -->
          <path d="M150 360 C 138 270, 150 180, 138 120 L 168 116 C 178 182, 176 272, 184 360 Z" fill="url(#trunk)" />
          <!-- trunk segment lines -->
          <g stroke="#8F5E2A" stroke-width="3" opacity="0.5" stroke-linecap="round">
            <path d="M146 300 q15 -8 30 0" /><path d="M148 258 q14 -8 28 0" />
            <path d="M150 216 q14 -8 27 0" /><path d="M152 176 q13 -7 26 0" />
          </g>
          <!-- coconuts -->
          <circle cx="146" cy="120" r="11" fill="#8F5E2A" />
          <circle cx="170" cy="122" r="11" fill="#A06A30" />
          <!-- fronds radiating from crown (~153,112) -->
          <g fill="url(#frond)" stroke="#F0C996" stroke-width="2">
            <path d="M153 112 Q70 70 8 96 Q60 88 120 116 Q80 100 153 112 Z" />
            <path d="M153 112 Q92 36 36 18 Q86 46 124 104 Q104 70 153 112 Z" />
            <path d="M153 112 Q156 26 150 2 Q170 40 168 108 Q160 60 153 112 Z" />
            <path d="M153 112 Q214 36 272 22 Q220 50 182 106 Q204 66 153 112 Z" />
            <path d="M153 112 Q238 72 296 100 Q236 90 186 116 Q224 102 153 112 Z" />
            <path d="M153 112 Q210 116 256 156 Q206 128 176 124 Q210 130 153 112 Z" />
            <path d="M153 112 Q96 116 50 154 Q100 128 130 124 Q96 130 153 112 Z" />
          </g>
        </svg>

        <!-- BEACH UMBRELLA (pole + canopy; stripes generated in JS) -->
        <svg id="umbrella" viewBox="0 0 280 320" data-layout-allow-overflow>
          <!-- pole -->
          <rect x="134" y="96" width="10" height="216" rx="5" fill="#EFE2CC" />
          <rect x="134" y="96" width="5" height="216" rx="2.5" fill="#FFFFFF" opacity="0.6" />
          <!-- canopy wedges generated in JS into this group -->
          <g id="canopy"></g>
          <!-- finial -->
          <circle cx="139" cy="40" r="9" fill="#F28129" stroke="#fff" stroke-width="2" />
        </svg>

        <!-- PLANE -->
        <div class="plane" id="plane" data-layout-allow-overflow>
          <svg viewBox="0 0 250 130" width="250" height="130">
            <defs>
              <linearGradient id="planeBody" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="#FFFFFF" />
                <stop offset="0.6" stop-color="#FCFAF6" />
                <stop offset="1" stop-color="#E7DECF" />
              </linearGradient>
              <linearGradient id="planeWing" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#FFB877" />
                <stop offset="0.5" stop-color="#F28129" />
                <stop offset="1" stop-color="#CE6314" />
              </linearGradient>
            </defs>
            <!-- tail fin (up-left) -->
            <path d="M44 60 L22 16 Q20 11 27 14 L54 30 L66 60 Z" fill="url(#planeWing)" />
            <!-- horizontal stabiliser (down-left) -->
            <path d="M50 70 L20 90 Q15 92 21 86 L54 64 Z" fill="#D9691A" />
            <!-- main wing (swept down-left) -->
            <path d="M158 74 L120 120 Q116 124 126 121 L196 92 L202 70 Z" fill="url(#planeWing)" />
            <!-- engine nacelle -->
            <ellipse cx="156" cy="100" rx="17" ry="9" fill="#EEE7DB" stroke="#CE6314" stroke-width="2.5" />
            <!-- fuselage -->
            <rect x="36" y="42" width="190" height="38" rx="19" fill="url(#planeBody)" stroke="#E2D6C2" stroke-width="1.5" />
            <!-- nose tip highlight -->
            <path d="M214 46 Q226 50 226 61 Q226 72 214 76 Z" fill="#FFFFFF" opacity="0.9" />
            <!-- cockpit window -->
            <path d="M198 50 Q214 52 220 61 L202 61 Q200 54 198 50 Z" fill="#F28129" />
            <!-- passenger windows (generated in JS) -->
            <g id="planeWindows"></g>
          </svg>
        </div>

        <!-- LABEL -->
        <div id="label">
          <div class="kicker">Destination</div>
          <div class="hero">Retirement</div>
          <div class="sub">the forever vacation</div>
        </div>

      </div>
    </div>

    <script>
      (function () {
        const NS = "http://www.w3.org/2000/svg";

        // ---- passenger windows on the plane ----
        const pw = document.getElementById("planeWindows");
        for (let i = 0; i < 7; i++) {
          const r = document.createElementNS(NS, "rect");
          r.setAttribute("x", 74 + i * 17);
          r.setAttribute("y", 53);
          r.setAttribute("width", 9);
          r.setAttribute("height", 8);
          r.setAttribute("rx", 3);
          r.setAttribute("fill", "#F28129");
          pw.appendChild(r);
        }

        // ---- umbrella canopy: alternating orange / white scalloped wedges ----
        const canopy = document.getElementById("canopy");
        const apex = { x: 139, y: 46 };
        const baseY = 120, x0 = 28, x1 = 250, segs = 6;
        for (let i = 0; i < segs; i++) {
          const xa = x0 + (x1 - x0) * (i / segs);
          const xb = x0 + (x1 - x0) * ((i + 1) / segs);
          const mid = (xa + xb) / 2;
          const p = document.createElementNS(NS, "path");
          // apex -> left base -> scalloped dip -> right base -> apex
          p.setAttribute(
            "d",
            `M${apex.x} ${apex.y} L${xa} ${baseY} Q${mid} ${baseY + 16} ${xb} ${baseY} Z`
          );
          p.setAttribute("fill", i % 2 === 0 ? "#F28129" : "#FFFFFF");
          p.setAttribute("stroke", "#E4D8C4");
          p.setAttribute("stroke-width", "1.5");
          canopy.appendChild(p);
        }
        // canopy top sheen
        const sheen = document.createElementNS(NS, "path");
        sheen.setAttribute("d", `M${apex.x} ${apex.y} Q60 78 40 ${baseY} Q139 86 ${apex.x} ${apex.y} Z`);
        sheen.setAttribute("fill", "rgba(255,255,255,0.35)");
        canopy.appendChild(sheen);

        // ---- flight trail dots along the plane's visual arc ----
        const trail = document.getElementById("trail");
        const P0 = { x: -30, y: 672 }, P1 = { x: 520, y: 600 }, P2 = { x: 1300, y: 300 };
        const dots = 19;
        for (let i = 0; i < dots; i++) {
          const t = i / (dots - 1);
          const mt = 1 - t;
          const x = mt * mt * P0.x + 2 * mt * t * P1.x + t * t * P2.x;
          const y = mt * mt * P0.y + 2 * mt * t * P1.y + t * t * P2.y;
          if (x < 30 || x > 1052) continue;
          const c = document.createElementNS(NS, "circle");
          c.setAttribute("cx", x);
          c.setAttribute("cy", y);
          c.setAttribute("r", 8 - t * 2.5);
          c.setAttribute("class", "tdot");
          trail.appendChild(c);
        }

        // =================== TIMELINE ===================
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // ---- SUN: fade in early, gentle pulse ----
        tl.from("#sunGlow", { opacity: 0, scale: 0.7, duration: 0.9, ease: "power2.out", transformOrigin: "50% 50%" }, 0.15);
        tl.from("#sunDisc", { opacity: 0, scale: 0.5, duration: 0.7, ease: "back.out(1.7)", transformOrigin: "50% 50%" }, 0.2);
        tl.to("#sunDisc", { scale: 1.06, duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 1, transformOrigin: "50% 50%" }, 3.6);

        // ---- TRAIL dots pop in, trailing the plane, then persist ----
        tl.from(".tdot", { scale: 0, opacity: 0, duration: 0.4, ease: "back.out(1.6)", transformOrigin: "50% 50%", stagger: { each: 0.135, from: "start" } }, 0.45);

        // ---- PLANE FLIGHT ----
        // start: off-screen left, slightly nose-up
        tl.set("#plane", { xPercent: -50, yPercent: -50, x: -240, y: 662, rotation: -5, scale: 0.82, opacity: 1 }, 0);
        // enter: left -> center (gentle rising-then-settling arc)
        tl.to("#plane", { x: 540, duration: 1.6, ease: "power1.inOut" }, 0.15);
        tl.to("#plane", { y: 596, duration: 0.85, ease: "sine.out" }, 0.15);
        tl.to("#plane", { y: 632, duration: 0.75, ease: "sine.inOut" }, 1.0);
        tl.to("#plane", { rotation: 2, duration: 0.85, ease: "sine.inOut" }, 0.15);
        tl.to("#plane", { rotation: -2, duration: 0.75, ease: "sine.inOut" }, 1.0);
        // bank / turn at center
        tl.to("#plane", { rotation: -25, duration: 0.5, ease: "power2.inOut" }, 1.78);
        tl.to("#plane", { scale: 0.9, duration: 0.2, ease: "power1.out", yoyo: true, repeat: 1 }, 1.78);
        // climb off the top-right + fade at the edge
        tl.to("#plane", { x: 1360, duration: 1.25, ease: "power1.in" }, 2.22);
        tl.to("#plane", { y: 286, duration: 1.25, ease: "power1.in" }, 2.22);
        tl.to("#plane", { scale: 0.6, duration: 1.25, ease: "power1.in" }, 2.22);
        tl.to("#plane", { rotation: -16, duration: 0.6, ease: "sine.out" }, 2.32);
        tl.to("#plane", { opacity: 0, duration: 0.4, ease: "power1.in" }, 3.08);

        // ---- ISLAND reveal ----
        tl.from("#island", { y: 150, opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.4)", transformOrigin: "50% 100%" }, 3.4);
        tl.from("#palm", { scaleY: 0, opacity: 0, duration: 0.6, ease: "back.out(1.6)", transformOrigin: "55% 100%" }, 3.66);
        tl.from("#umbrella", { scale: 0, opacity: 0, duration: 0.55, ease: "back.out(1.7)", transformOrigin: "50% 100%" }, 3.92);
        // palm subtle sway (finite)
        tl.to("#palm", { rotation: 2.4, duration: 0.95, ease: "sine.inOut", yoyo: true, repeat: 1, transformOrigin: "55% 100%" }, 4.45);

        // ---- PLANE appears on the island (descends from top-right and parks) ----
        tl.set("#plane", { x: 884, y: 360, rotation: 11, scale: 0.5 }, 4.18);
        tl.to("#plane", { opacity: 1, duration: 0.3, ease: "power1.out" }, 4.18);
        tl.to("#plane", { x: 540, duration: 1.15, ease: "power2.inOut" }, 4.22);
        tl.to("#plane", { y: 1452, duration: 1.15, ease: "power2.in" }, 4.22);
        tl.to("#plane", { scale: 0.6, duration: 1.15, ease: "power1.inOut" }, 4.22);
        tl.to("#plane", { rotation: 0, duration: 0.7, ease: "power2.out" }, 4.6);
        // soft landing settle
        tl.to("#plane", { y: 1430, duration: 0.18, ease: "power1.inOut", yoyo: true, repeat: 1 }, 5.4);

        // ---- LABEL lands ----
        tl.from("#label", { y: 60, opacity: 0, scale: 0.86, duration: 0.55, ease: "back.out(1.5)", transformOrigin: "50% 50%" }, 5.5);
        tl.from("#label .kicker", { y: 18, opacity: 0, duration: 0.4, ease: "power2.out" }, 5.62);
        tl.from("#label .hero", { y: 26, opacity: 0, duration: 0.45, ease: "back.out(1.6)" }, 5.7);
        tl.from("#label .sub", { y: 16, opacity: 0, duration: 0.4, ease: "power2.out" }, 5.82);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
