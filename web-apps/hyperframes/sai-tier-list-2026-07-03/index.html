<!doctype html>
<html lang="en" data-composition-variables='[{"id":"itemsToShow","type":"number","label":"How many items animate (1 for review, 9 for full)","default":9},{"id":"boardTop","type":"number","label":"Board top (px)","default":70},{"id":"sideMargin","type":"number","label":"Board side margin (px)","default":50},{"id":"rowHeight","type":"number","label":"Tier row height (px)","default":76},{"id":"rowGap","type":"number","label":"Gap between rows (px)","default":5},{"id":"labelWidth","type":"number","label":"Tier letter chip width (px)","default":88},{"id":"cardSize","type":"number","label":"Item card size (px)","default":68},{"id":"cornerRadius","type":"number","label":"Corner radius (px)","default":12},{"id":"rowBg","type":"color","label":"Row background","default":"#191918"},{"id":"cardBg","type":"color","label":"Item card background","default":"#26262B"},{"id":"white","type":"color","label":"White","default":"#FFFFFF"},{"id":"tierS","type":"color","label":"S tier color","default":"#FF7F7E"},{"id":"tierA","type":"color","label":"A tier color","default":"#FFBF7F"},{"id":"tierB","type":"color","label":"B tier color","default":"#FFDF80"},{"id":"tierC","type":"color","label":"C tier color","default":"#FEFF7F"},{"id":"tierD","type":"color","label":"D tier color","default":"#BEFF7E"},{"id":"tierF","type":"color","label":"F tier color","default":"#7EFF80"},{"id":"introX","type":"number","label":"Intro pop — card center X","default":540},{"id":"introY","type":"number","label":"Intro pop — card center Y","default":1360},{"id":"introScale","type":"number","label":"Intro pop — card scale","default":3.4},{"id":"titleSize","type":"number","label":"Intro title font size (px)","default":58},{"id":"flyDuration","type":"number","label":"Fly-to-slot duration (s)","default":0.55},{"id":"item1IntroTime","type":"number","label":"Item 1 intro time (s)","default":0.3},{"id":"item1FlyTime","type":"number","label":"Item 1 fly time (s)","default":1.12}]'>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #00FF00; /* chroma key green */
        font-family: "Montserrat", system-ui, sans-serif;
      }
      .scene { position: relative; width: 100%; height: 100%; }

      /* === Tier board (above Sai's head) === */
      .board { position: absolute; z-index: 1; }
      .tier-row {
        display: flex;
        align-items: stretch;
        /* no overflow:hidden — the tier letter pulses past the row edge on land */
      }
      .tier-label {
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600; /* Montserrat SemiBold everywhere */
        color: #191918;
        flex-shrink: 0;
      }
      .tier-body { flex: 1; }

      /* === Item cards — one absolute layer over the whole frame.
         CSS left/top = the card's FINAL slot position (layout ground truth).
         The timeline offsets each card to the intro pop spot, then flies it home. === */
      .cards-layer {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 2;
        pointer-events: none;
      }
      .item-card {
        position: absolute;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
        will-change: transform, opacity;
      }
      .item-card svg {
        width: 68%;
        height: 68%;
        position: relative; /* stays above the glass highlight */
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
      }

      .item-title {
        position: absolute;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        text-align: center;
        opacity: 0;
        font-weight: 600;
        color: var(--white);
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.45);
        line-height: 1.15;
        z-index: 2;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="68" data-width="1080" data-height="1920">
      <div id="scene" class="scene clip" data-start="0" data-duration="68" data-track-index="1">
        <div id="board" class="board"></div>
        <div id="cards-layer" class="cards-layer" data-layout-allow-overflow></div>
      </div>
    </div>

    <script>
      (function () {
        const v = window.__hyperframes.getVariables();
        document.documentElement.style.setProperty("--white", v.white);

        const TIERS = ["S", "A", "B", "C", "D", "F"];
        const tierColors = { S: v.tierS, A: v.tierA, B: v.tierB, C: v.tierC, D: v.tierD, F: v.tierF };

        // Drawn white line icons (NO emojis — Sai brand rule)
        const IC = 'fill="none" stroke="' + v.white + '" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"';
        const ICONS = {
          hourglass: '<svg viewBox="0 0 48 48" ' + IC + '><line x1="10" y1="6" x2="38" y2="6"/><line x1="10" y1="42" x2="38" y2="42"/><path d="M14 6 C14 16 22 18 22 24 C22 30 14 32 14 42"/><path d="M34 6 C34 16 26 18 26 24 C26 30 34 32 34 42"/></svg>',
          heart: '<svg viewBox="0 0 48 48" ' + IC + '><path d="M24 41 C10 31 5 23 5 16.5 C5 11 9 7 14.5 7 C18.5 7 22 9.5 24 13 C26 9.5 29.5 7 33.5 7 C39 7 43 11 43 16.5 C43 23 38 31 24 41 Z"/></svg>',
          money: '<svg viewBox="0 0 48 48" ' + IC + '><rect x="4" y="12" width="40" height="24" rx="4"/><circle cx="24" cy="24" r="6.5"/><line x1="11" y1="24" x2="12.5" y2="24"/><line x1="35.5" y1="24" x2="37" y2="24"/></svg>',
          gear: '<svg viewBox="0 0 48 48" ' + IC + '><rect x="17" y="4" width="14" height="12" rx="3"/><rect x="4" y="32" width="14" height="12" rx="3"/><rect x="30" y="32" width="14" height="12" rx="3"/><line x1="24" y1="16" x2="24" y2="24"/><line x1="11" y1="32" x2="11" y2="24"/><line x1="37" y1="32" x2="37" y2="24"/><line x1="11" y1="24" x2="37" y2="24"/></svg>',
          sell: '<svg viewBox="0 0 48 48" ' + IC + '><path d="M6 10 h36 v22 h-22 l-8 8 v-8 h-6 Z"/><text x="24" y="27.5" text-anchor="middle" font-family="Montserrat, sans-serif" font-size="17" font-weight="600" fill="' + v.white + '" stroke="none">$</text></svg>',
          magnifier: '<svg viewBox="0 0 48 48" ' + IC + '><circle cx="20" cy="20" r="12"/><line x1="29" y1="29" x2="41" y2="41"/><circle cx="20" cy="20" r="3.5"/></svg>',
          crown: '<svg viewBox="0 0 48 48" ' + IC + '><path d="M8 36 L5 14 L16 23 L24 9 L32 23 L43 14 L40 36 Z"/><line x1="10" y1="42" x2="38" y2="42"/></svg>',
          star: '<svg viewBox="0 0 48 48" ' + IC + '><path d="M24 4 L30 17.5 L44 19 L33.5 28.5 L36.5 43 L24 35.5 L11.5 43 L14.5 28.5 L4 19 L18 17.5 Z"/></svg>',
          chip: '<svg viewBox="0 0 48 48" ' + IC + '><rect x="10" y="10" width="28" height="28" rx="5"/><line x1="18" y1="10" x2="18" y2="4"/><line x1="30" y1="10" x2="30" y2="4"/><line x1="18" y1="44" x2="18" y2="38"/><line x1="30" y1="44" x2="30" y2="38"/><line x1="10" y1="18" x2="4" y2="18"/><line x1="10" y1="30" x2="4" y2="30"/><line x1="44" y1="18" x2="38" y2="18"/><line x1="44" y1="30" x2="38" y2="30"/><text x="24" y="30" text-anchor="middle" font-family="Montserrat, sans-serif" font-size="13" font-weight="600" fill="' + v.white + '" stroke="none">AI</text></svg>',
        };

        // The 9 rankings — times from the raw-video transcript (design.md has the table).
        // Item 1's times come from Studio variables so Gray can nudge them live.
        // g = the tile's gradient pair (app-icon look, one distinct color per concept)
        const ITEMS = [
          { label: "Extend your time horizon", tier: "S", icon: "hourglass", g: ["#4F46E5", "#9333EA"], intro: v.item1IntroTime, fly: v.item1FlyTime },
          { label: "Obsess over customers",    tier: "S", icon: "heart",     g: ["#EC4899", "#EF4444"], intro: 3.25,  fly: 4.56 },
          { label: "Raising money",            tier: "C", icon: "money",     g: ["#059669", "#34D399"], intro: 10.25, fly: 10.9 },
          { label: "Systems first",            tier: "A", icon: "gear",      g: ["#2563EB", "#38BDF8"], intro: 17.45, fly: 18.26 },
          { label: "Learn how to sell",        tier: "D", icon: "sell",      g: ["#0D9488", "#2DD4BF"], intro: 22.7,  fly: 23.46 },
          { label: "Micromanagement",          tier: "F", icon: "magnifier", g: ["#F97316", "#DC2626"], intro: 34.8,  fly: 35.22 },
          { label: "Culture is king",          tier: "S", icon: "crown",     g: ["#F59E0B", "#FDE047"], intro: 40.25, fly: 41.08 },
          { label: "Personal brand",           tier: "B", icon: "star",      g: ["#A855F7", "#F472B6"], intro: 48.3,  fly: 48.92 },
          { label: "AI tools",                 tier: "B", icon: "chip",      g: ["#06B6D4", "#6366F1"], intro: 55.6,  fly: 56.24 },
        ];

        // === Build the board ===
        const boardWidth = 1080 - 2 * v.sideMargin;
        const board = document.getElementById("board");
        board.style.left = v.sideMargin + "px";
        board.style.top = v.boardTop + "px";
        board.style.width = boardWidth + "px";

        TIERS.forEach(function (t, i) {
          const row = document.createElement("div");
          row.className = "tier-row";
          row.id = "row-" + t;
          row.style.height = v.rowHeight + "px";
          row.style.marginBottom = (i < TIERS.length - 1 ? v.rowGap : 0) + "px";
          row.setAttribute("data-layout-allow-overflow", "");
          const r = Math.round(v.cornerRadius * 0.8) + "px";

          const label = document.createElement("div");
          label.className = "tier-label";
          label.id = "label-" + t;
          label.style.width = v.labelWidth + "px";
          label.style.background = tierColors[t];
          label.style.fontSize = Math.round(v.rowHeight * 0.55) + "px";
          label.style.borderRadius = r + " 0 0 " + r; /* rounded on the outer left only */
          label.textContent = t;

          const body = document.createElement("div");
          body.className = "tier-body";
          body.id = "body-" + t;
          body.style.background = v.rowBg;
          body.style.borderRadius = "0 " + r + " " + r + " 0"; /* rounded on the outer right only */

          row.appendChild(label);
          row.appendChild(body);
          board.appendChild(row);
        });

        // === Build item cards + intro titles ===
        const layer = document.getElementById("cards-layer");
        const slotCount = { S: 0, A: 0, B: 0, C: 0, D: 0, F: 0 };
        const active = ITEMS.slice(0, Math.max(1, Math.min(9, Math.round(v.itemsToShow))));

        active.forEach(function (item, i) {
          const slot = slotCount[item.tier]++;
          const rowIndex = TIERS.indexOf(item.tier);
          const slotLeft = v.sideMargin + v.labelWidth + 12 + slot * (v.cardSize + 10);
          const slotTop = v.boardTop + rowIndex * (v.rowHeight + v.rowGap) + (v.rowHeight - v.cardSize) / 2;

          const card = document.createElement("div");
          card.className = "item-card";
          card.id = "card-" + i;
          card.style.width = v.cardSize + "px";
          card.style.height = v.cardSize + "px";
          card.style.left = slotLeft + "px";
          card.style.top = slotTop + "px";
          card.style.background = "linear-gradient(135deg, " + item.g[0] + ", " + item.g[1] + ")";
          card.style.borderRadius = v.cornerRadius + "px";
          card.style.border = "2px solid rgba(255,255,255,0.9)";
          card.style.overflow = "hidden";
          // glass highlight over the gradient, icon on top
          card.innerHTML =
            '<div style="position:absolute;inset:0;border-radius:inherit;' +
            'background:radial-gradient(circle at 30% 18%, rgba(255,255,255,0.4), rgba(255,255,255,0) 62%);"></div>' +
            ICONS[item.icon];
          // Offset from the slot to the intro pop position (applied by the timeline)
          card.dataset.dx = v.introX - (slotLeft + v.cardSize / 2);
          card.dataset.dy = v.introY - (slotTop + v.cardSize / 2);
          layer.appendChild(card);

          // Name sits centered BELOW the logo card (card + name = one centered lockup)
          const title = document.createElement("div");
          title.className = "item-title";
          title.id = "title-" + i;
          title.style.left = v.introX - 490 + "px";
          title.style.width = "980px";
          title.style.top = v.introY + (v.cardSize * v.introScale) / 2 + 28 + "px";
          title.style.fontSize = v.titleSize + "px";
          title.textContent = item.label;
          layer.appendChild(title);
        });

        // === Timeline ===
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // Board entrance — rows drop in staggered, letter chips pop after
        tl.from(".tier-row", { y: -34, opacity: 0, duration: 0.5, ease: "power3.out", stagger: 0.07 }, 0.1);
        tl.from(".tier-label", { scale: 0, duration: 0.4, ease: "back.out(2.2)", stagger: 0.06 }, 0.32);

        active.forEach(function (item, i) {
          const card = "#card-" + i;
          const title = "#title-" + i;
          const el = document.getElementById("card-" + i);
          const dx = parseFloat(el.dataset.dx);
          const dy = parseFloat(el.dataset.dy);
          const land = item.fly + v.flyDuration;

          // Park the card at the intro spot (invisible) from t=0
          tl.set(card, { x: dx, y: dy, scale: v.introScale * 0.01, transformOrigin: "50% 50%" }, 0);

          // 1) POP — card scales up big at the intro spot, title slides in beside it
          tl.to(card, { opacity: 1, duration: 0.12, ease: "none" }, item.intro);
          tl.to(card, { scale: v.introScale, duration: 0.5, ease: "back.out(1.6)" }, item.intro);
          tl.to(title, { opacity: 1, duration: 0.35, ease: "power2.out" }, item.intro + 0.1);
          tl.from(title, { y: 30, duration: 0.45, ease: "power3.out" }, item.intro + 0.1);

          // 2) FLY — title drops away, card accelerates into its tier slot
          tl.to(title, { opacity: 0, duration: 0.22, ease: "power1.in" }, item.fly);
          tl.to(card, { x: 0, y: 0, scale: 1, duration: v.flyDuration, ease: "power3.in" }, item.fly);

          // 3) LAND — impact settle + tier letter pulse + row flash
          tl.to(card, { scale: 1.22, duration: 0.09, ease: "power2.out", overwrite: "auto" }, land);
          tl.to(card, { scale: 1, duration: 0.3, ease: "back.out(3)", overwrite: "auto" }, land + 0.09);
          tl.to("#label-" + item.tier, { scale: 1.22, duration: 0.1, ease: "power2.out", overwrite: "auto" }, land);
          tl.to("#label-" + item.tier, { scale: 1, duration: 0.28, ease: "back.out(2)", overwrite: "auto" }, land + 0.1);
          tl.to("#body-" + item.tier, { backgroundColor: "#33332F", duration: 0.1, ease: "none", overwrite: "auto" }, land);
          tl.to("#body-" + item.tier, { backgroundColor: v.rowBg, duration: 0.35, ease: "power1.out", overwrite: "auto" }, land + 0.1);
        });

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
