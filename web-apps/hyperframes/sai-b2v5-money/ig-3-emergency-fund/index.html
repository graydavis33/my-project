<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: transparent; font-family: "Montserrat", system-ui, sans-serif;
      }
      .scene { position: relative; width: 100%; height: 100%; overflow: hidden; }

      /* the camera — pan + zoom by transforming this world */
      .world { position: absolute; inset: 0; transform-origin: 0 0; will-change: transform; }

      .kicker { position: absolute; left: 0; width: 100%; text-align: center; top: 556px;
        font-weight: 900; font-size: 88px; color: #F28129; text-transform: uppercase;
        letter-spacing: -0.015em; text-shadow: 0 5px 14px rgba(0,0,0,0.45); will-change: transform, opacity; }

      /* vertical airport runway */
      .runwaywrap { position: absolute; left: 428px; top: 648px; width: 224px; height: 660px; will-change: transform, opacity; }
      .tarmac { position: absolute; inset: 0; border-radius: 16px;
        background: linear-gradient(100deg, #38322E 0%, #2A2522 55%, #201C19 100%);
        box-shadow: inset 0 2px 4px rgba(255,255,255,0.08), 0 12px 30px rgba(0,0,0,0.4); }
      .edge { position: absolute; top: 26px; bottom: 26px; width: 6px; border-radius: 3px;
        background: rgba(255,255,255,0.92); }
      .edge.l { left: 22px; } .edge.r { right: 22px; }
      .dashes { position: absolute; left: 50%; transform: translateX(-50%); width: 10px;
        top: 96px; bottom: 176px; border-radius: 4px;
        background: repeating-linear-gradient(180deg, #fff 0 34px, transparent 34px 64px); }
      .keys { position: absolute; top: 22px; left: 0; width: 100%; display: flex;
        justify-content: center; gap: 16px; }
      .key { width: 13px; height: 62px; border-radius: 3px; background: rgba(255,255,255,0.92);
        will-change: transform, opacity; }
      .rnum { position: absolute; bottom: 16px; left: 0; width: 100%; text-align: center;
        font-weight: 900; font-size: 118px; line-height: 1; color: rgba(255,255,255,0.96);
        letter-spacing: -0.02em; text-shadow: 0 3px 8px rgba(0,0,0,0.5); will-change: transform, opacity;
        font-variant-numeric: tabular-nums; }

      .plane { position: absolute; left: 50%; margin-left: -66px; top: 36px; width: 132px; height: 170px;
        opacity: 0; will-change: transform, opacity; filter: drop-shadow(0 8px 16px rgba(0,0,0,0.45)); }
      .plane .body { fill: url(#pg); stroke: #fff; stroke-width: 3; }
      .plane .wing { fill: url(#pg); stroke: #fff; stroke-width: 2.5; }
      .plane .glass { fill: rgba(255,245,230,0.92); }

      /* the word that pairs with the runway 6 -> "6 MONTHS" */
      .months { position: absolute; left: 660px; top: 1198px; opacity: 0;
        font-weight: 900; font-size: 70px; color: #F28129; text-transform: uppercase;
        letter-spacing: -0.01em; text-shadow: 0 4px 12px rgba(0,0,0,0.45); will-change: transform, opacity; }
    </style>
  </head>
  <body>
    <div data-hf-id="hf-yp4c" id="root" data-composition-id="main" data-start="0" data-duration="5.2" data-width="1080" data-height="1920">
      <div data-hf-id="hf-ks7r" id="scene" class="scene clip" data-start="0" data-duration="5.2" data-track-index="1">
        <div data-hf-id="hf-e6wx" id="world" class="world" data-layout-allow-overflow="">

          <div data-hf-id="hf-vli2" id="kicker" class="kicker">Emergency Fund</div>

          <div data-hf-id="hf-j5kf" id="runway" class="runwaywrap" data-layout-allow-overflow="">
            <div data-hf-id="hf-9f06" class="tarmac"></div>
            <div data-hf-id="hf-76k3" class="edge l"></div>
            <div data-hf-id="hf-e3xp" class="edge r"></div>
            <div data-hf-id="hf-o0l2" class="keys" id="keys">
              <div data-hf-id="hf-l8jp" class="key"></div><div data-hf-id="hf-k53t" class="key"></div><div data-hf-id="hf-lc0w" class="key"></div>
              <div data-hf-id="hf-kxpv" class="key"></div><div data-hf-id="hf-iy6q" class="key"></div>
            </div>
            <div data-hf-id="hf-nfge" class="dashes" id="dashes"></div>
            <div data-hf-id="hf-upkm" id="rnum" class="rnum">0</div>
            <svg data-hf-id="hf-74ek" id="plane" class="plane" viewBox="0 0 132 170">
              <defs data-hf-id="hf-mh0t">
                <lineargradient data-hf-id="hf-nw0k" id="pg" x1="0" y1="0" x2="1" y2="1">
                  <stop data-hf-id="hf-3x2k" offset="0" stop-color="#FFB877" /><stop data-hf-id="hf-831v" offset="0.5" stop-color="#F28129" />
                  <stop data-hf-id="hf-htv9" offset="1" stop-color="#C8631A" />
                </lineargradient>
              </defs>
              <path data-hf-id="hf-w3h6" class="wing" d="M70 64 L126 100 L126 116 L70 86 Z" />
              <path data-hf-id="hf-xemq" class="wing" d="M62 64 L6 100 L6 116 L62 86 Z" />
              <path data-hf-id="hf-q71v" class="wing" d="M69 130 L97 146 L97 156 L69 142 Z" />
              <path data-hf-id="hf-xmcf" class="wing" d="M63 130 L35 146 L35 156 L63 142 Z" />
              <path data-hf-id="hf-z00t" class="body" d="M66 8 C76 22 77 44 76 78 C75 112 74 144 66 164 C58 144 57 112 56 78 C55 44 56 22 66 8 Z" />
              <ellipse data-hf-id="hf-0x90" class="glass" cx="66" cy="40" rx="9" ry="13" />
            </svg>
          </div>

          <div data-hf-id="hf-l89l" id="months" class="months">Months</div>

        </div>
      </div>
    </div>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const rnumEl = document.getElementById("rnum");
        const counter = { v: 0 };

        // intro
        tl.from("#kicker", { y: -22, opacity: 0, duration: 0.45, ease: "power3.out" }, 0.1);
        tl.from("#runway", { scale: 0.9, opacity: 0, duration: 0.5, ease: "back.out(1.4)", transformOrigin: "50% 50%" }, 0.28);
        tl.from("#keys .key", { scaleY: 0, opacity: 0, duration: 0.32, ease: "back.out(1.7)", stagger: 0.05, transformOrigin: "50% 0%" }, 0.5);
        tl.from("#dashes", { opacity: 0, duration: 0.45, ease: "power1.out" }, 0.6);
        tl.from("#rnum", { scale: 0.5, opacity: 0, duration: 0.45, ease: "back.out(1.6)", transformOrigin: "50% 100%" }, 0.72);

        // plane appears at the bottom, then moves at CONSTANT speed up and off the track
        tl.fromTo("#plane", { y: 350, opacity: 0 }, { opacity: 1, duration: 0.3, ease: "power1.out" }, 0.95);
        tl.to("#plane", { y: -90, duration: 1.7, ease: "none" }, 1.15);
        // fades out as it leaves the track (no stop)
        tl.to("#plane", { opacity: 0, duration: 0.45, ease: "power1.in" }, 2.5);
        // runway number counts 0 -> 6 in lockstep with the plane crossing the runway
        tl.to(counter, { v: 6, duration: 1.35, ease: "none",
          onUpdate: () => { rnumEl.textContent = Math.round(counter.v); } }, 1.15);

        // MONTHS fades in on the right (-> reads "6 MONTHS")
        tl.fromTo("#months", { opacity: 0, x: 32 }, { opacity: 1, x: 0, duration: 0.6, ease: "power2.out" }, 2.9);
        // CAMERA: ONE continuous, blended move — the X pan carries its momentum straight into
        // the Y + Z (zoom), gliding into "6 MONTHS" with no stop (accelerate -> pass through -> ease out)
        tl.to("#world", { keyframes: [
          { x: -210, y: -150, scale: 1.14, duration: 0.9, ease: "power1.in" },
          { x: -664, y: -1136, scale: 1.7, duration: 1.3, ease: "power2.out" },
        ] }, 2.6);

        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
