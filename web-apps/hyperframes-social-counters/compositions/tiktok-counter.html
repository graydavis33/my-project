<template id="tiktok-counter-template">
  <div data-composition-id="tiktok-counter" data-width="1080" data-height="1080">
    <!-- ============================================================
      EDIT THESE VALUES TO CUSTOMIZE
      ============================================================ -->
    <div class="tt-content">
      <div class="tt-logo-wrap">
        <!-- Three-layer offset glyph: cyan back, magenta middle, white front -->
        <svg class="tt-logo tt-logo-cyan" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5.2 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1.24-.1z"/>
        </svg>
        <svg class="tt-logo tt-logo-magenta" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5.2 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1.24-.1z"/>
        </svg>
        <svg class="tt-logo tt-logo-white" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5.2 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1.24-.1z"/>
        </svg>
      </div>
      <div class="tt-count" id="tt-count">0</div>
      <div class="tt-label">Followers</div>
    </div>

    <style>
      [data-composition-id="tiktok-counter"] {
        width: 100%;
        height: 100%;
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Inter', system-ui, sans-serif;
      }
      [data-composition-id="tiktok-counter"] .tt-content {
        width: 100%;
        height: 100%;
        padding: 80px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 40px;
        box-sizing: border-box;
      }
      [data-composition-id="tiktok-counter"] .tt-logo-wrap {
        position: relative;
        width: 380px;
        height: 380px;
      }
      [data-composition-id="tiktok-counter"] .tt-logo {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      [data-composition-id="tiktok-counter"] .tt-logo-cyan path {
        fill: #25F4EE;
      }
      [data-composition-id="tiktok-counter"] .tt-logo-cyan {
        transform: translate(-12px, -8px);
      }
      [data-composition-id="tiktok-counter"] .tt-logo-magenta path {
        fill: #FE2C55;
      }
      [data-composition-id="tiktok-counter"] .tt-logo-magenta {
        transform: translate(12px, 8px);
      }
      [data-composition-id="tiktok-counter"] .tt-logo-white path {
        fill: #FFFFFF;
      }
      [data-composition-id="tiktok-counter"] .tt-count {
        font-size: 180px;
        font-weight: 800;
        color: #FFFFFF;
        font-variant-numeric: tabular-nums;
        line-height: 1;
        letter-spacing: -0.02em;
      }
      [data-composition-id="tiktok-counter"] .tt-label {
        font-size: 36px;
        font-weight: 600;
        color: #FFFFFF;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        opacity: 0.85;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        // ============================================================
        // EDIT THIS VALUE: target follower count to count up to
        // ============================================================
        const TARGET_COUNT = 47200;

        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // Logo entrance — 0.0s -> 0.5s, back-out for snap
        tl.from('[data-composition-id="tiktok-counter"] .tt-logo-wrap', {
          scale: 0.8,
          opacity: 0,
          duration: 0.5,
          ease: 'back.out(1.4)'
        }, 0.1);

        // Counter entrance — slide up + fade
        tl.from('[data-composition-id="tiktok-counter"] .tt-count', {
          y: 30,
          opacity: 0,
          duration: 0.4,
          ease: 'power3.out'
        }, 0.4);

        // Label entrance — softer fade
        tl.from('[data-composition-id="tiktok-counter"] .tt-label', {
          y: 20,
          opacity: 0,
          duration: 0.4,
          ease: 'power2.out'
        }, 0.55);

        // Number count tween — 0 to TARGET_COUNT, integer-snapped
        const counter = { val: 0 };
        tl.to(counter, {
          val: TARGET_COUNT,
          duration: 2.4,
          ease: 'power2.out',
          snap: { val: 1 },
          onUpdate: () => {
            const el = document.querySelector(
              '[data-composition-id="tiktok-counter"] #tt-count'
            );
            if (el) el.textContent = Math.round(counter.val).toLocaleString();
          }
        }, 0.6);

        window.__timelines["tiktok-counter"] = tl;
      })();
    </script>
  </div>
</template>
