<template id="instagram-counter-template">
  <div data-composition-id="instagram-counter" data-width="1080" data-height="1080">
    <div class="ig-content">
      <div class="ig-logo-wrap">
        <svg class="ig-logo" viewBox="0 0 24 24" aria-hidden="true">
          <defs>
            <linearGradient id="igGradient" x1="0%" y1="100%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#F58529"/>
              <stop offset="25%" stop-color="#FEDA77"/>
              <stop offset="55%" stop-color="#DD2A7B"/>
              <stop offset="80%" stop-color="#8134AF"/>
              <stop offset="100%" stop-color="#515BD4"/>
            </linearGradient>
          </defs>
          <path fill="url(#igGradient)" d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zm0 10.162a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/>
        </svg>
      </div>
      <div class="ig-count" id="ig-count">0</div>
      <div class="ig-label">Followers</div>
    </div>

    <style>
      [data-composition-id="instagram-counter"] {
        width: 100%;
        height: 100%;
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Inter', system-ui, sans-serif;
      }
      [data-composition-id="instagram-counter"] .ig-content {
        width: 100%;
        height: 100%;
        padding: 80px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 40px;
        box-sizing: border-box;
      }
      [data-composition-id="instagram-counter"] .ig-logo-wrap {
        width: 360px;
        height: 360px;
      }
      [data-composition-id="instagram-counter"] .ig-logo {
        width: 100%;
        height: 100%;
      }
      [data-composition-id="instagram-counter"] .ig-count {
        font-size: 180px;
        font-weight: 800;
        color: #FFFFFF;
        font-variant-numeric: tabular-nums;
        line-height: 1;
        letter-spacing: -0.02em;
      }
      [data-composition-id="instagram-counter"] .ig-label {
        font-size: 36px;
        font-weight: 600;
        color: #FFFFFF;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        opacity: 0.85;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        // ============================================================
        // EDIT THIS VALUE: target follower count to count up to
        // ============================================================
        const TARGET_COUNT = 12800;

        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        tl.from('[data-composition-id="instagram-counter"] .ig-logo-wrap', {
          scale: 0.8,
          opacity: 0,
          duration: 0.5,
          ease: 'back.out(1.4)'
        }, 0.1);

        tl.from('[data-composition-id="instagram-counter"] .ig-count', {
          y: 30,
          opacity: 0,
          duration: 0.4,
          ease: 'power3.out'
        }, 0.4);

        tl.from('[data-composition-id="instagram-counter"] .ig-label', {
          y: 20,
          opacity: 0,
          duration: 0.4,
          ease: 'power2.out'
        }, 0.55);

        const counter = { val: 0 };
        tl.to(counter, {
          val: TARGET_COUNT,
          duration: 2.4,
          ease: 'power2.out',
          snap: { val: 1 },
          onUpdate: () => {
            const el = document.querySelector(
              '[data-composition-id="instagram-counter"] #ig-count'
            );
            if (el) el.textContent = Math.round(counter.val).toLocaleString();
          }
        }, 0.6);

        window.__timelines["instagram-counter"] = tl;
      })();
    </script>
  </div>
</template>
