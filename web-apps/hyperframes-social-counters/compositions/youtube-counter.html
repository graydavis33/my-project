<template id="youtube-counter-template">
  <div data-composition-id="youtube-counter" data-width="1080" data-height="1080">
    <div class="yt-content">
      <div class="yt-logo-wrap">
        <svg class="yt-logo" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#FF0000" d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814z"/>
          <path fill="#FFFFFF" d="M9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
        </svg>
      </div>
      <div class="yt-count" id="yt-count">0</div>
      <div class="yt-label">Subscribers</div>
    </div>

    <style>
      [data-composition-id="youtube-counter"] {
        width: 100%;
        height: 100%;
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Inter', system-ui, sans-serif;
      }
      [data-composition-id="youtube-counter"] .yt-content {
        width: 100%;
        height: 100%;
        padding: 80px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 40px;
        box-sizing: border-box;
      }
      [data-composition-id="youtube-counter"] .yt-logo-wrap {
        width: 460px;
        height: 320px;
      }
      [data-composition-id="youtube-counter"] .yt-logo {
        width: 100%;
        height: 100%;
      }
      [data-composition-id="youtube-counter"] .yt-count {
        font-size: 180px;
        font-weight: 800;
        color: #FFFFFF;
        font-variant-numeric: tabular-nums;
        line-height: 1;
        letter-spacing: -0.02em;
      }
      [data-composition-id="youtube-counter"] .yt-label {
        font-size: 36px;
        font-weight: 600;
        color: #FFFFFF;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        opacity: 0.85;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        // ============================================================
        // EDIT THIS VALUE: target subscriber count to count up to
        // ============================================================
        const TARGET_COUNT = 8400;

        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        tl.from('[data-composition-id="youtube-counter"] .yt-logo-wrap', {
          scale: 0.8,
          opacity: 0,
          duration: 0.5,
          ease: 'back.out(1.4)'
        }, 0.1);

        tl.from('[data-composition-id="youtube-counter"] .yt-count', {
          y: 30,
          opacity: 0,
          duration: 0.4,
          ease: 'power3.out'
        }, 0.4);

        tl.from('[data-composition-id="youtube-counter"] .yt-label', {
          y: 20,
          opacity: 0,
          duration: 0.4,
          ease: 'power2.out'
        }, 0.55);

        const counter = { val: 0 };
        tl.to(counter, {
          val: TARGET_COUNT,
          duration: 2.4,
          ease: 'power2.out',
          snap: { val: 1 },
          onUpdate: () => {
            const el = document.querySelector(
              '[data-composition-id="youtube-counter"] #yt-count'
            );
            if (el) el.textContent = Math.round(counter.val).toLocaleString();
          }
        }, 0.6);

        window.__timelines["youtube-counter"] = tl;
      })();
    </script>
  </div>
</template>
