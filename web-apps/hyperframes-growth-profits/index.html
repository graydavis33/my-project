<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1080, height=1920">
    <title>Growth & Profits</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #00FF00; /* chroma key green */
        font-family: "Montserrat", system-ui, sans-serif;
      }

      #growth-profits {
        position: relative;
        width: 1080px;
        height: 1920px;
        background: #00FF00;
        overflow: hidden;
      }

      /* ===== Title ===== */
      .title {
        position: absolute;
        top: 230px;
        left: 0;
        right: 0;
        text-align: center;
        font-family: "Montserrat", sans-serif;
        font-weight: 800;
        font-size: 132px;
        letter-spacing: 0.05em;
        color: #FFFFFF;
        text-shadow: 0 4px 14px rgba(0, 0, 0, 0.30);
        will-change: transform, opacity;
      }

      /* ===== Chart ===== */
      .chart {
        position: absolute;
        top: 500px;
        left: 50%;
        transform: translateX(-50%);
        width: 800px;
        height: 720px;
        will-change: transform, opacity;
      }

      .bar {
        position: absolute;
        bottom: 0;
        width: 90px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 1) 0%,
          rgba(248, 248, 248, 1) 60%,
          rgba(228, 228, 228, 1) 100%
        );
        border-radius: 14px 14px 0 0;
        transform-origin: bottom center;
        box-shadow:
          inset 0 3px 0 rgba(255, 255, 255, 0.85),
          inset 0 -4px 14px rgba(0, 0, 0, 0.08),
          0 6px 18px rgba(0, 0, 0, 0.15);
        will-change: transform, opacity;
      }

      .bar.b1 { left:   0px; height: 200px; }
      .bar.b2 { left: 142px; height: 290px; }
      .bar.b3 { left: 284px; height: 380px; }
      .bar.b4 { left: 426px; height: 480px; }
      .bar.b5 { left: 568px; height: 590px; }
      .bar.b6 {
        left: 710px;
        height: 720px;
        background: linear-gradient(
          180deg,
          #FFB05A 0%,
          #F28129 55%,
          #D86610 100%
        );
        box-shadow:
          inset 0 3px 0 rgba(255, 220, 180, 0.75),
          inset 0 -4px 16px rgba(120, 50, 0, 0.25),
          0 8px 26px rgba(242, 129, 41, 0.45);
      }

      /* Baseline (white floor under all bars) */
      .baseline {
        position: absolute;
        left: -20px;
        right: -20px;
        bottom: -6px;
        height: 6px;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 3px;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
        transform-origin: left center;
        will-change: transform, opacity;
      }

      /* ===== Counter ===== */
      .counter-wrap {
        position: absolute;
        top: 1340px;
        left: 0;
        right: 0;
        text-align: center;
        will-change: transform, opacity;
      }

      .counter {
        font-family: "Montserrat", sans-serif;
        font-weight: 800;
        font-size: 154px;
        letter-spacing: -0.01em;
        color: #FFFFFF;
        font-variant-numeric: tabular-nums;
        line-height: 1;
        text-shadow: 0 6px 18px rgba(0, 0, 0, 0.30);
        display: inline-block;
        will-change: transform, color;
      }

      .counter-label {
        margin-top: 28px;
        font-family: "Montserrat", sans-serif;
        font-weight: 800;
        font-size: 56px;
        letter-spacing: 0.18em;
        color: #FFFFFF;
        text-transform: uppercase;
        text-shadow: 0 3px 10px rgba(0, 0, 0, 0.30);
        opacity: 0;
        will-change: opacity, transform;
      }

      /* Soft underline glow when counter lands */
      .counter-glow {
        display: block;
        margin: 18px auto 0 auto;
        width: 0px;
        height: 8px;
        background: linear-gradient(90deg,
          rgba(242, 129, 41, 0) 0%,
          rgba(242, 129, 41, 1) 50%,
          rgba(242, 129, 41, 0) 100%
        );
        border-radius: 4px;
        filter: blur(1px);
        will-change: width, opacity;
      }
    </style>
  </head>
  <body>
    <div id="growth-profits" data-composition-id="growth-profits" data-start="0" data-duration="7" data-width="1080" data-height="1920">

      <div class="title">PROFITS</div>

      <div class="chart" data-layout-allow-overflow>
        <div class="bar b1"></div>
        <div class="bar b2"></div>
        <div class="bar b3"></div>
        <div class="bar b4"></div>
        <div class="bar b5"></div>
        <div class="bar b6"></div>
        <div class="baseline"></div>
      </div>

      <div class="counter-wrap">
        <span class="counter" id="counter">$0</span>
        <span class="counter-glow" id="glow"></span>
        <div class="counter-label">PROFITS UP</div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // 1. Title slide up + fade
        tl.from(".title", {
          y: 70,
          opacity: 0,
          duration: 0.55,
          ease: "power3.out"
        }, 0.30);

        // 2. Baseline grows in from left
        tl.from(".baseline", {
          scaleX: 0,
          opacity: 0,
          duration: 0.50,
          ease: "power2.out"
        }, 0.70);

        // 3. Bars rise stagger (each grows from bottom)
        tl.from(".bar", {
          scaleY: 0,
          opacity: 0,
          duration: 0.48,
          ease: "back.out(1.7)",
          stagger: 0.13
        }, 0.95);

        // 4. Counter slot-machine $0 -> $1,500,000 — starts with the bars
        const counterEl = document.getElementById('counter');
        const counterState = { val: 0 };
        tl.to(counterState, {
          val: 1500000,
          duration: 2.00,
          ease: "power3.out",
          onUpdate: () => {
            counterEl.textContent = '$' + Math.floor(counterState.val).toLocaleString('en-US');
          }
        }, 0.95);

        // 5. Counter lands -> pulse + flash to orange
        tl.to(".counter", {
          scale: 1.10,
          color: "#F28129",
          duration: 0.22,
          ease: "power2.out"
        }, 2.95);

        tl.to(".counter", {
          scale: 1.00,
          duration: 0.32,
          ease: "power2.inOut",
          overwrite: "auto"
        }, 3.17);

        // 6. Color settles back to white
        tl.to(".counter", {
          color: "#FFFFFF",
          duration: 0.35,
          ease: "power2.inOut"
        }, 3.45);

        // 7. Orange underline glow sweeps in
        tl.fromTo("#glow",
          { width: 0, opacity: 0 },
          { width: 540, opacity: 1, duration: 0.55, ease: "power3.out" },
          3.00);

        // 8. "PROFITS UP" label fades up
        tl.fromTo(".counter-label",
          { y: 24, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.50, ease: "power3.out" },
          3.25);

        window.__timelines["growth-profits"] = tl;
      </script>
    </div>
  </body>
</html>
