<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #00b140;
      }
      #root {
        width: 1080px;
        height: 1920px;
        position: relative;
        background: #00b140;
        overflow: hidden;
      }

      svg { width: 100%; height: 100%; display: block; }

      /* Glow halo behind tile (CSS for soft radial gradient) */
      #glow {
        position: absolute;
        left: 200px;
        top: 660px;
        width: 680px;
        height: 600px;
        background: radial-gradient(ellipse at center,
          rgba(255, 200, 110, 0.70) 0%,
          rgba(255, 145, 50, 0.35) 28%,
          rgba(255, 145, 50, 0) 65%);
        z-index: 1;
        pointer-events: none;
        transform-origin: 50% 50%;
        filter: blur(6px);
      }

      /* HTML overlay text */
      #rating {
        position: absolute;
        left: 0;
        top: 1190px;
        width: 100%;
        text-align: center;
        font-family: 'Montserrat', sans-serif;
        font-weight: 800;
        font-size: 88px;
        line-height: 1;
        color: #ffffff;
        letter-spacing: 0.02em;
        z-index: 6;
        text-shadow: 0 6px 18px rgba(0, 0, 0, 0.18);
      }
      #rating .star {
        color: #FFD700;
        font-size: 96px;
      }
      #loved {
        position: absolute;
        left: 0;
        top: 1320px;
        width: 100%;
        text-align: center;
        font-family: 'Montserrat', sans-serif;
        font-weight: 900;
        font-size: 64px;
        line-height: 1;
        color: #ffffff;
        letter-spacing: 0.32em;
        z-index: 6;
        text-shadow: 0 6px 18px rgba(0, 0, 0, 0.22);
      }

      .heart { transform-origin: 50% 50%; }
      .sparkle { transform-origin: 50% 50%; }
      .rate-star { transform-origin: 50% 50%; }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="8"
      data-width="1080"
      data-height="1920"
    >
      <!-- Glow halo (behind tile, Phase 2) -->
      <div id="glow"></div>

      <!-- Main SVG: tile + icons + sparkles + stars + hearts -->
      <svg viewBox="0 0 1080 1920" data-layout-ignore
           style="position: absolute; left: 0; top: 0; z-index: 2;">
        <defs>
          <!-- Trendify orange gradient for tile fill -->
          <linearGradient id="tile-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#FFCB7A"/>
            <stop offset="0.5" stop-color="#F28129"/>
            <stop offset="1" stop-color="#D86A0F"/>
          </linearGradient>
          <!-- Diagonal shine gradient -->
          <linearGradient id="shine-grad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
            <stop offset="0.42" stop-color="#ffffff" stop-opacity="0.0"/>
            <stop offset="0.5"  stop-color="#ffffff" stop-opacity="0.85"/>
            <stop offset="0.58" stop-color="#ffffff" stop-opacity="0.0"/>
            <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
          </linearGradient>
          <!-- Drop shadow filter for tile depth -->
          <filter id="tile-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
            <feOffset dx="0" dy="10" result="off"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
            <feMerge>
              <feMergeNode/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <!-- Clip path for tile area (for shine sweep) -->
          <clipPath id="tile-clip">
            <rect x="320" y="810" width="440" height="300" rx="20"/>
          </clipPath>
        </defs>

        <!-- =================== TILE =================== -->
        <!-- Tile fill (orange gradient, fades in) -->
        <rect id="tile-fill" x="320" y="810" width="440" height="300" rx="20"
              fill="url(#tile-grad)" filter="url(#tile-shadow)" opacity="0"/>

        <!-- Inner "screen" — lighter highlighted area inside tile -->
        <rect id="tile-screen" x="360" y="850" width="360" height="220" rx="12"
              fill="rgba(255, 255, 255, 0.18)" opacity="0"/>

        <!-- Center icon: stylized sparkle/spark inside the screen -->
        <g id="tile-icon" transform="translate(540 960)" opacity="0">
          <path d="M 0 -54 L 14 -14 L 54 0 L 14 14 L 0 54 L -14 14 L -54 0 L -14 -14 Z"
                fill="#ffffff" opacity="0.95"/>
          <circle cx="0" cy="0" r="10" fill="#ffffff"/>
        </g>

        <!-- Tile wireframe outline (drawn in via stroke-dashoffset) -->
        <rect id="tile-wire" x="320" y="810" width="440" height="300" rx="20"
              fill="none" stroke="#ffffff" stroke-width="5"
              stroke-dasharray="1460" stroke-dashoffset="1460"/>

        <!-- Shine sweep (clipped to tile area) -->
        <g clip-path="url(#tile-clip)">
          <rect id="tile-shine" x="-250" y="700" width="300" height="500"
                transform="rotate(-18 540 960)" fill="url(#shine-grad)" opacity="0"/>
        </g>

        <!-- =================== SPARKLES (around tile) =================== -->
        <g class="sparkle" id="spk-1" transform="translate(265 780)" opacity="0">
          <path d="M 0 -25 L 5 -5 L 25 0 L 5 5 L 0 25 L -5 5 L -25 0 L -5 -5 Z"
                fill="#ffffff"/>
        </g>
        <g class="sparkle" id="spk-2" transform="translate(820 800)" opacity="0">
          <path d="M 0 -28 L 6 -6 L 28 0 L 6 6 L 0 28 L -6 6 L -28 0 L -6 -6 Z"
                fill="#ffffff"/>
        </g>
        <g class="sparkle" id="spk-3" transform="translate(240 1100)" opacity="0">
          <path d="M 0 -22 L 4 -4 L 22 0 L 4 4 L 0 22 L -4 4 L -22 0 L -4 -4 Z"
                fill="#ffffff"/>
        </g>
        <g class="sparkle" id="spk-4" transform="translate(850 1130)" opacity="0">
          <path d="M 0 -26 L 5 -5 L 26 0 L 5 5 L 0 26 L -5 5 L -26 0 L -5 -5 Z"
                fill="#ffffff"/>
        </g>

        <!-- =================== 5-STAR RATING (above tile) =================== -->
        <g class="rate-star" id="star-1" transform="translate(354 720)" opacity="0">
          <path d="M 0 -32 L 8 -10 L 32 -10 L 12 5 L 19 28 L 0 14 L -19 28 L -12 5 L -32 -10 L -8 -10 Z"
                fill="#FFD700"/>
        </g>
        <g class="rate-star" id="star-2" transform="translate(447 720)" opacity="0">
          <path d="M 0 -32 L 8 -10 L 32 -10 L 12 5 L 19 28 L 0 14 L -19 28 L -12 5 L -32 -10 L -8 -10 Z"
                fill="#FFD700"/>
        </g>
        <g class="rate-star" id="star-3" transform="translate(540 720)" opacity="0">
          <path d="M 0 -32 L 8 -10 L 32 -10 L 12 5 L 19 28 L 0 14 L -19 28 L -12 5 L -32 -10 L -8 -10 Z"
                fill="#FFD700"/>
        </g>
        <g class="rate-star" id="star-4" transform="translate(633 720)" opacity="0">
          <path d="M 0 -32 L 8 -10 L 32 -10 L 12 5 L 19 28 L 0 14 L -19 28 L -12 5 L -32 -10 L -8 -10 Z"
                fill="#FFD700"/>
        </g>
        <g class="rate-star" id="star-5" transform="translate(726 720)" opacity="0">
          <path d="M 0 -32 L 8 -10 L 32 -10 L 12 5 L 19 28 L 0 14 L -19 28 L -12 5 L -32 -10 L -8 -10 Z"
                fill="#FFD700"/>
        </g>

        <!-- =================== HEARTS (radiating outward) =================== -->
        <g class="heart" id="heart-1" transform="translate(340 960)" opacity="0">
          <path d="M 0 6 C -8 -6 -28 -4 -28 12 C -28 28 0 44 0 44 C 0 44 28 28 28 12 C 28 -4 8 -6 0 6 Z"
                fill="#FF4760"/>
        </g>
        <g class="heart" id="heart-2" transform="translate(740 960)" opacity="0">
          <path d="M 0 6 C -8 -6 -28 -4 -28 12 C -28 28 0 44 0 44 C 0 44 28 28 28 12 C 28 -4 8 -6 0 6 Z"
                fill="#FF4760"/>
        </g>
        <g class="heart" id="heart-3" transform="translate(540 820)" opacity="0">
          <path d="M 0 6 C -8 -6 -28 -4 -28 12 C -28 28 0 44 0 44 C 0 44 28 28 28 12 C 28 -4 8 -6 0 6 Z"
                fill="#FF4760"/>
        </g>
        <g class="heart" id="heart-4" transform="translate(420 1080)" opacity="0">
          <path d="M 0 6 C -8 -6 -28 -4 -28 12 C -28 28 0 44 0 44 C 0 44 28 28 28 12 C 28 -4 8 -6 0 6 Z"
                fill="#FF6088"/>
        </g>
        <g class="heart" id="heart-5" transform="translate(660 1080)" opacity="0">
          <path d="M 0 6 C -8 -6 -28 -4 -28 12 C -28 28 0 44 0 44 C 0 44 28 28 28 12 C 28 -4 8 -6 0 6 Z"
                fill="#FF6088"/>
        </g>
        <g class="heart" id="heart-6" transform="translate(280 880)" opacity="0">
          <path d="M 0 6 C -8 -6 -28 -4 -28 12 C -28 28 0 44 0 44 C 0 44 28 28 28 12 C 28 -4 8 -6 0 6 Z"
                fill="#FF3B5C"/>
        </g>
        <g class="heart" id="heart-7" transform="translate(800 880)" opacity="0">
          <path d="M 0 6 C -8 -6 -28 -4 -28 12 C -28 28 0 44 0 44 C 0 44 28 28 28 12 C 28 -4 8 -6 0 6 Z"
                fill="#FF3B5C"/>
        </g>
        <g class="heart" id="heart-8" transform="translate(540 1140)" opacity="0">
          <path d="M 0 6 C -8 -6 -28 -4 -28 12 C -28 28 0 44 0 44 C 0 44 28 28 28 12 C 28 -4 8 -6 0 6 Z"
                fill="#FF4760"/>
        </g>
      </svg>

      <!-- Text overlays -->
      <div id="rating"><span class="star">&#9733;</span> 4.9</div>
      <div id="loved">LOVED</div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // -------- Initial states --------
      gsap.set('#glow', { opacity: 0, scale: 0.55 });
      gsap.set('#rating', { y: 24, opacity: 0 });
      gsap.set('#loved',  { y: 24, opacity: 0, letterSpacing: '0.6em' });

      // ====================== PHASE 1: BUILDING (0.0 - 4.0s) ======================

      // 0.20 - 1.20: Wireframe draws in around tile perimeter (clockwise)
      tl.to('#tile-wire',
        { strokeDashoffset: 0, duration: 1.00, ease: 'power2.inOut' },
        0.20
      );

      // 1.10 - 1.85: Tile fill (orange gradient) fades in
      tl.to('#tile-fill',
        { opacity: 1, duration: 0.75, ease: 'power2.out' },
        1.10
      );

      // 1.40 - 1.95: Inner screen highlight fades in
      tl.to('#tile-screen',
        { opacity: 1, duration: 0.55, ease: 'power2.out' },
        1.40
      );

      // 1.80 - 2.40: Center icon pops in with back.out
      tl.to('#tile-icon',
        { opacity: 1, scale: 1, duration: 0.55, ease: 'back.out(2.2)' },
        1.80
      );
      // (Set the scale starting state)
      gsap.set('#tile-icon', { scale: 0.3, transformOrigin: '540px 960px' });

      // 2.45 - 3.20: Shine sweep crosses tile
      tl.fromTo('#tile-shine',
        { x: 0, opacity: 1 },
        { x: 800, duration: 0.75, ease: 'power2.inOut' },
        2.45
      );
      tl.to('#tile-shine',
        { opacity: 0, duration: 0.15, ease: 'power1.out', overwrite: 'auto' },
        3.05
      );

      // 3.10 - 3.80: Sparkles pop around tile (stagger)
      gsap.set('.sparkle', { scale: 0, transformOrigin: '50% 50%' });
      tl.to('.sparkle',
        { opacity: 1, scale: 1, duration: 0.40, ease: 'back.out(2.4)', stagger: 0.10 },
        3.10
      );

      // 3.40 - 3.80: Small celebration pulse on tile
      tl.to(['#tile-fill', '#tile-screen', '#tile-wire'],
        { transformOrigin: '540px 960px', scale: 1.04, duration: 0.20, ease: 'power2.out' },
        3.40
      );
      tl.to(['#tile-fill', '#tile-screen', '#tile-wire'],
        { scale: 1, duration: 0.25, ease: 'power2.inOut', overwrite: 'auto' },
        3.60
      );

      // ====================== PHASE 2: CUSTOMER LOVE (4.0 - 8.0s) ======================

      // 4.00 - 4.65: Glow halo blooms behind tile
      tl.to('#glow',
        { opacity: 1, scale: 1, duration: 0.65, ease: 'power2.out' },
        4.00
      );

      // 4.20 - 5.10: 5 stars pop in sequentially (gold)
      gsap.set('.rate-star', { scale: 0, transformOrigin: '50% 50%' });
      tl.to('.rate-star',
        { opacity: 1, scale: 1, duration: 0.35, ease: 'back.out(2.6)', stagger: 0.13 },
        4.20
      );

      // 5.00 - 5.60: Rating text "★ 4.9" rises into view
      tl.to('#rating',
        { y: 0, opacity: 1, duration: 0.55, ease: 'power3.out' },
        5.00
      );

      // 5.30 - 5.90: "LOVED" label slides up and tightens letter-spacing
      tl.to('#loved',
        { y: 0, opacity: 1, letterSpacing: '0.32em', duration: 0.60, ease: 'power3.out' },
        5.30
      );

      // ====================== HEARTS RADIATING ======================
      // Each heart starts near the tile and floats outward in a unique direction.
      // Wave 1 (5.50 - 6.50) — 4 hearts; Wave 2 (6.20 - 7.20) — 4 hearts.

      gsap.set('.heart', { scale: 0.4, transformOrigin: '50% 50%' });

      // Wave 1
      tl.to('#heart-1',
        { x: -180, y: -120, opacity: 1, scale: 1.1, duration: 1.10, ease: 'power2.out' },
        5.50
      );
      tl.to('#heart-1',
        { opacity: 0, scale: 0.9, duration: 0.40, ease: 'power2.in', overwrite: 'auto' },
        6.30
      );

      tl.to('#heart-2',
        { x: 180, y: -130, opacity: 1, scale: 1.05, duration: 1.10, ease: 'power2.out' },
        5.58
      );
      tl.to('#heart-2',
        { opacity: 0, scale: 0.9, duration: 0.40, ease: 'power2.in', overwrite: 'auto' },
        6.38
      );

      tl.to('#heart-3',
        { x: 0, y: -240, opacity: 1, scale: 1.15, duration: 1.10, ease: 'power2.out' },
        5.66
      );
      tl.to('#heart-3',
        { opacity: 0, scale: 0.9, duration: 0.40, ease: 'power2.in', overwrite: 'auto' },
        6.46
      );

      tl.to('#heart-4',
        { x: -80, y: 180, opacity: 1, scale: 0.95, duration: 1.10, ease: 'power2.out' },
        5.74
      );
      tl.to('#heart-4',
        { opacity: 0, scale: 0.85, duration: 0.40, ease: 'power2.in', overwrite: 'auto' },
        6.54
      );

      // Wave 2
      tl.to('#heart-5',
        { x: 120, y: 200, opacity: 1, scale: 1.05, duration: 1.10, ease: 'power2.out' },
        6.20
      );
      tl.to('#heart-5',
        { opacity: 0, scale: 0.85, duration: 0.40, ease: 'power2.in', overwrite: 'auto' },
        7.00
      );

      tl.to('#heart-6',
        { x: -240, y: -40, opacity: 1, scale: 1.15, duration: 1.10, ease: 'power2.out' },
        6.30
      );
      tl.to('#heart-6',
        { opacity: 0, scale: 0.9, duration: 0.40, ease: 'power2.in', overwrite: 'auto' },
        7.10
      );

      tl.to('#heart-7',
        { x: 240, y: 0, opacity: 1, scale: 1.0, duration: 1.10, ease: 'power2.out' },
        6.40
      );
      tl.to('#heart-7',
        { opacity: 0, scale: 0.9, duration: 0.40, ease: 'power2.in', overwrite: 'auto' },
        7.20
      );

      tl.to('#heart-8',
        { x: -40, y: 260, opacity: 1, scale: 1.1, duration: 1.10, ease: 'power2.out' },
        6.50
      );
      tl.to('#heart-8',
        { opacity: 0, scale: 0.9, duration: 0.40, ease: 'power2.in', overwrite: 'auto' },
        7.30
      );

      // ====================== BREATHING HOLD (5.50 - 8.0s) ======================
      // Tile gently pulses + glow softly modulates
      tl.to(['#tile-fill', '#tile-screen', '#tile-wire', '#tile-icon'],
        { scale: 1.025, duration: 1.10, ease: 'sine.inOut', yoyo: true, repeat: 1, transformOrigin: '540px 960px' },
        5.50
      );
      tl.to('#glow',
        { opacity: 0.78, scale: 1.04, duration: 1.10, ease: 'sine.inOut', yoyo: true, repeat: 1, overwrite: 'auto' },
        5.50
      );

      // Sparkles continue twinkling in the hold
      tl.to('.sparkle',
        { scale: 1.18, duration: 0.55, ease: 'sine.inOut', yoyo: true, repeat: 1, stagger: 0.08 },
        5.40
      );

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
