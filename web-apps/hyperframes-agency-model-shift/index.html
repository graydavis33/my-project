<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/MotionPathPlugin.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #00B140;
        font-family: "Montserrat", sans-serif;
      }
      #root {
        width: 1920px;
        height: 1080px;
        position: relative;
        background: #00B140;
        overflow: hidden;
      }

      /* ---- SCENE BASE ---- */
      .scene {
        position: absolute;
        inset: 0;
        opacity: 0;
        will-change: opacity;
      }

      /* ---- SHARED TYPE ---- */
      .scene-headline {
        position: absolute;
        top: 150px;
        left: 50%;
        font-weight: 700;
        font-size: 64px;
        color: #FFFFFF;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      /* ---- SHARED CARD ---- */
      .card {
        position: absolute;
        border: 4px solid #FFFFFF;
        border-radius: 28px;
        background: rgba(255,255,255,0.04);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 30px;
      }
      .card-icon {
        width: 120px;
        height: 120px;
      }
      .card-label {
        margin-top: 18px;
        font-weight: 700;
        font-size: 36px;
        color: #FFFFFF;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .card-sub {
        margin-top: 6px;
        font-weight: 600;
        font-size: 20px;
        color: #FFFFFF;
        opacity: 0.7;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      /* ---- KNOCKOUT PILL ----
         Solid white pill, text colored to match chroma BG so the
         BG "fills in" the letters (knockout effect). After chromakey,
         the letters become transparent — Sai's video shows through. */
      .pill {
        position: absolute;
        left: 50%;
        padding: 22px 56px;
        background: #FFFFFF;
        border: 4px solid #FFFFFF;
        border-radius: 999px;
        font-weight: 800;
        font-size: 42px;
        color: #00B140;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      /* ============ SCENE 1 ============ */
      #s1 .card {
        top: 320px;
        left: 50%;
        margin-left: -260px;
        width: 520px;
        height: 360px;
      }
      #s1-tag {
        position: absolute;
        bottom: 220px;
        left: 50%;
        font-weight: 600;
        font-size: 28px;
        color: #FFFFFF;
        opacity: 0.75;
        letter-spacing: 0.32em;
        text-transform: uppercase;
      }

      /* ============ SCENE 2 ============ */
      #s2 #s2-card-a { top: 340px; left: 200px; width: 520px; height: 360px; }
      #s2 #s2-card-b { top: 340px; left: 1200px; width: 520px; height: 360px; }
      #s2 .conn-line {
        position: absolute;
        top: 518px;
        left: 720px;
        width: 480px;
        height: 4px;
        background: #FFFFFF;
        opacity: 0.6;
        transform-origin: left center;
        transform: scaleX(0);
      }
      #s2 .arrow-head {
        position: absolute;
        top: 504px;
        left: 1188px;
        width: 0;
        height: 0;
        border-left: 18px solid #FFFFFF;
        border-top: 16px solid transparent;
        border-bottom: 16px solid transparent;
        opacity: 0;
      }
      #s2 .content-dot {
        position: absolute;
        top: 510px;
        left: 720px;
        width: 20px;
        height: 20px;
        border-radius: 4px;
        background: #FFFFFF;
        opacity: 0;
      }
      #s2 .pill { bottom: 220px; }

      /* ============ SCENE 3 ============ */
      #s3 .lightbulb-wrap {
        position: absolute;
        top: 280px;
        left: 50%;
        margin-left: -180px;
        width: 360px;
        height: 440px;
      }
      #s3 .pulse-ring {
        position: absolute;
        top: 380px;
        left: 50%;
        margin-left: -200px;
        width: 400px;
        height: 400px;
        border: 4px solid #FFFFFF;
        border-radius: 50%;
        opacity: 0;
      }
      #s3-tag {
        position: absolute;
        bottom: 220px;
        left: 50%;
        font-weight: 700;
        font-size: 38px;
        color: #FFFFFF;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      /* ============ SCENE 4 ============ */
      #s4 #s4-agency {
        top: 280px;
        left: 50%;
        margin-left: -240px;
        width: 480px;
        height: 240px;
        flex-direction: row;
        gap: 24px;
      }
      #s4 #s4-agency .card-icon { width: 90px; height: 90px; }
      #s4 #s4-agency .card-label { margin-top: 0; font-size: 36px; }
      #s4 .founder {
        position: absolute;
        top: 700px;
        width: 120px;
        height: 160px;
      }
      #s4 .founder svg { width: 100%; height: 100%; display: block; }
      #s4 #f-1 { left: 280px; }
      #s4 #f-2 { left: 720px; }
      #s4 #f-3 { left: 1160px; }
      #s4 #f-4 { left: 1520px; }
      #s4 .founder-label {
        position: absolute;
        top: 878px;
        width: 160px;
        margin-left: -20px;
        text-align: center;
        font-weight: 600;
        font-size: 18px;
        color: #FFFFFF;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        opacity: 0.85;
      }
      #s4-paths {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      /* ============ SCENE 5 ============ */
      #s5 #s5-card-a { top: 280px; left: 280px; width: 540px; height: 380px; }
      #s5 #s5-card-b { top: 280px; left: 1100px; width: 540px; height: 380px; }
      #s5 .dual-line {
        position: absolute;
        left: 820px;
        width: 280px;
        height: 4px;
        background: #FFFFFF;
        opacity: 0.7;
        transform: scaleX(0);
      }
      #s5 #line-top { top: 432px; transform-origin: left center; }
      #s5 #line-bot { top: 508px; transform-origin: right center; }
      #s5 .arrow-r {
        position: absolute;
        top: 418px;
        left: 1086px;
        width: 0;
        height: 0;
        border-left: 18px solid #FFFFFF;
        border-top: 14px solid transparent;
        border-bottom: 14px solid transparent;
        opacity: 0;
      }
      #s5 .arrow-l {
        position: absolute;
        top: 494px;
        left: 800px;
        width: 0;
        height: 0;
        border-right: 18px solid #FFFFFF;
        border-top: 14px solid transparent;
        border-bottom: 14px solid transparent;
        opacity: 0;
      }
      #s5 .flow-dot-r {
        position: absolute;
        top: 425px;
        left: 820px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #FFFFFF;
        opacity: 0;
      }
      #s5 .flow-dot-l {
        position: absolute;
        top: 501px;
        left: 1100px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #FFFFFF;
        opacity: 0;
      }
      #s5 .pill { bottom: 220px; }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="22"
      data-width="1920"
      data-height="1080"
    >

      <!-- =========== SCENE 1 — THE AGENCY MODEL =========== -->
      <div class="scene" id="s1">
        <div class="scene-headline" id="s1-head">THE AGENCY MODEL</div>
        <div class="card" id="s1-card">
          <svg class="card-icon" viewBox="0 0 120 120" fill="none" stroke="#FFFFFF" stroke-width="5">
            <rect x="22" y="20" width="76" height="92" rx="4"/>
            <rect x="34" y="34" width="14" height="14"/>
            <rect x="56" y="34" width="14" height="14"/>
            <rect x="78" y="34" width="14" height="14" stroke="none" fill="#FFFFFF"/>
            <rect x="34" y="56" width="14" height="14"/>
            <rect x="56" y="56" width="14" height="14" stroke="none" fill="#FFFFFF"/>
            <rect x="78" y="56" width="14" height="14"/>
            <rect x="34" y="78" width="14" height="14" stroke="none" fill="#FFFFFF"/>
            <rect x="56" y="78" width="14" height="14"/>
            <rect x="78" y="78" width="14" height="14"/>
            <rect x="50" y="96" width="20" height="16" stroke="none" fill="#FFFFFF"/>
          </svg>
          <div class="card-label">AGENCY</div>
          <div class="card-sub">Content shop</div>
        </div>
        <div id="s1-tag">— Where it all started</div>
      </div>

      <!-- =========== SCENE 2 — DONE-FOR-YOU =========== -->
      <div class="scene" id="s2">
        <div class="scene-headline" id="s2-head">CONTENT FOR COMPANIES</div>

        <div class="card" id="s2-card-a">
          <svg class="card-icon" viewBox="0 0 120 120" fill="none" stroke="#FFFFFF" stroke-width="5">
            <rect x="22" y="20" width="76" height="92" rx="4"/>
            <rect x="34" y="34" width="14" height="14"/>
            <rect x="56" y="34" width="14" height="14"/>
            <rect x="78" y="34" width="14" height="14"/>
            <rect x="34" y="56" width="14" height="14"/>
            <rect x="56" y="56" width="14" height="14"/>
            <rect x="78" y="56" width="14" height="14"/>
            <rect x="34" y="78" width="14" height="14"/>
            <rect x="56" y="78" width="14" height="14"/>
            <rect x="78" y="78" width="14" height="14"/>
            <rect x="50" y="96" width="20" height="16" stroke="none" fill="#FFFFFF"/>
          </svg>
          <div class="card-label">AGENCY</div>
        </div>

        <div class="conn-line" id="s2-line"></div>
        <div class="arrow-head" id="s2-arrow"></div>

        <div class="content-dot" id="dot-1"></div>
        <div class="content-dot" id="dot-2"></div>
        <div class="content-dot" id="dot-3"></div>
        <div class="content-dot" id="dot-4"></div>
        <div class="content-dot" id="dot-5"></div>

        <div class="card" id="s2-card-b">
          <svg class="card-icon" viewBox="0 0 120 120" fill="none" stroke="#FFFFFF" stroke-width="5">
            <rect x="22" y="42" width="76" height="62" rx="6"/>
            <path d="M 48 42 V 32 a 4 4 0 0 1 4 -4 h 16 a 4 4 0 0 1 4 4 V 42"/>
            <line x1="22" y1="68" x2="98" y2="68"/>
            <rect x="54" y="62" width="12" height="12" stroke="none" fill="#FFFFFF"/>
          </svg>
          <div class="card-label">CLIENT</div>
        </div>

        <div class="pill" id="s2-pill">DONE-FOR-YOU</div>
      </div>

      <!-- =========== SCENE 3 — GENIUS IDEA =========== -->
      <div class="scene" id="s3">
        <div class="scene-headline" id="s3-headline">THEN…</div>
        <div class="pulse-ring" id="ring-3a"></div>
        <div class="pulse-ring" id="ring-3b"></div>
        <div class="pulse-ring" id="ring-3c"></div>
        <div class="lightbulb-wrap" id="bulb">
          <svg viewBox="0 0 360 440" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
            <!-- bulb glass -->
            <path d="M 90 200 a 90 90 0 1 1 180 0 c 0 50 -36 70 -42 110 H 132 c -6 -40 -42 -60 -42 -110 Z"/>
            <!-- threading -->
            <line x1="138" y1="335" x2="222" y2="335"/>
            <line x1="142" y1="358" x2="218" y2="358"/>
            <line x1="146" y1="380" x2="214" y2="380"/>
            <!-- base tip -->
            <path d="M 158 400 H 202 V 410 a 8 8 0 0 1 -8 8 H 166 a 8 8 0 0 1 -8 -8 Z" fill="#FFFFFF" stroke="none"/>
            <!-- filament W -->
            <path d="M 140 200 L 160 240 L 180 200 L 200 240 L 220 200" stroke-width="6"/>
            <!-- shine rays -->
            <line x1="180" y1="40" x2="180" y2="20"/>
            <line x1="80" y1="80" x2="65" y2="65"/>
            <line x1="280" y1="80" x2="295" y2="65"/>
            <line x1="40" y1="180" x2="20" y2="180"/>
            <line x1="320" y1="180" x2="340" y2="180"/>
          </svg>
        </div>
        <div id="s3-tag">A GENIUS IDEA</div>
      </div>

      <!-- =========== SCENE 4 — TEACH FOUNDERS =========== -->
      <div class="scene" id="s4">
        <div class="scene-headline" id="s4-head">TEACH THE FOUNDERS</div>

        <div class="card" id="s4-agency">
          <svg class="card-icon" viewBox="0 0 120 120" fill="none" stroke="#FFFFFF" stroke-width="5">
            <rect x="22" y="20" width="76" height="92" rx="4"/>
            <rect x="34" y="34" width="14" height="14"/>
            <rect x="56" y="34" width="14" height="14"/>
            <rect x="78" y="34" width="14" height="14"/>
            <rect x="34" y="56" width="14" height="14"/>
            <rect x="56" y="56" width="14" height="14"/>
            <rect x="78" y="56" width="14" height="14"/>
            <rect x="34" y="78" width="14" height="14"/>
            <rect x="56" y="78" width="14" height="14"/>
            <rect x="78" y="78" width="14" height="14"/>
            <rect x="50" y="96" width="20" height="16" stroke="none" fill="#FFFFFF"/>
          </svg>
          <div class="card-label">AGENCY</div>
        </div>

        <!-- Curvy connector paths from agency bottom (960,460) to each founder top -->
        <svg id="s4-paths" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet">
          <g stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path id="path-1" d="M 960 520 L 960 615 Q 960 640 935 640 L 365 640 Q 340 640 340 665 L 340 700" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1" opacity="0"/>
            <path id="path-2" d="M 960 520 L 960 615 Q 960 640 935 640 L 805 640 Q 780 640 780 665 L 780 700" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1" opacity="0"/>
            <path id="path-3" d="M 960 520 L 960 615 Q 960 640 985 640 L 1195 640 Q 1220 640 1220 665 L 1220 700" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1" opacity="0"/>
            <path id="path-4" d="M 960 520 L 960 615 Q 960 640 985 640 L 1555 640 Q 1580 640 1580 665 L 1580 700" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1" opacity="0"/>
          </g>
          <circle id="know-1" r="9" fill="#FFFFFF" cx="960" cy="460" opacity="0"/>
          <circle id="know-2" r="9" fill="#FFFFFF" cx="960" cy="460" opacity="0"/>
          <circle id="know-3" r="9" fill="#FFFFFF" cx="960" cy="460" opacity="0"/>
          <circle id="know-4" r="9" fill="#FFFFFF" cx="960" cy="460" opacity="0"/>
        </svg>

        <div class="founder" id="f-1">
          <svg viewBox="0 0 120 160" fill="#FFFFFF" stroke="none">
            <circle cx="60" cy="34" r="22"/>
            <path d="M 14 160 Q 14 80, 60 80 Q 106 80, 106 160 Z"/>
          </svg>
        </div>
        <div class="founder" id="f-2">
          <svg viewBox="0 0 120 160" fill="#FFFFFF" stroke="none">
            <circle cx="60" cy="34" r="22"/>
            <path d="M 14 160 Q 14 80, 60 80 Q 106 80, 106 160 Z"/>
          </svg>
        </div>
        <div class="founder" id="f-3">
          <svg viewBox="0 0 120 160" fill="#FFFFFF" stroke="none">
            <circle cx="60" cy="34" r="22"/>
            <path d="M 14 160 Q 14 80, 60 80 Q 106 80, 106 160 Z"/>
          </svg>
        </div>
        <div class="founder" id="f-4">
          <svg viewBox="0 0 120 160" fill="#FFFFFF" stroke="none">
            <circle cx="60" cy="34" r="22"/>
            <path d="M 14 160 Q 14 80, 60 80 Q 106 80, 106 160 Z"/>
          </svg>
        </div>

        <div class="founder-label" style="left: 280px;">FOUNDER</div>
        <div class="founder-label" style="left: 720px;">FOUNDER</div>
        <div class="founder-label" style="left: 1160px;">FOUNDER</div>
        <div class="founder-label" style="left: 1520px;">FOUNDER</div>
      </div>

      <!-- =========== SCENE 5 — DONE-WITH-YOU =========== -->
      <div class="scene" id="s5">
        <div class="scene-headline" id="s5-head">A NEW MODEL</div>

        <div class="card" id="s5-card-a">
          <svg class="card-icon" viewBox="0 0 120 120" fill="none" stroke="#FFFFFF" stroke-width="5">
            <rect x="22" y="20" width="76" height="92" rx="4"/>
            <rect x="34" y="34" width="14" height="14"/>
            <rect x="56" y="34" width="14" height="14"/>
            <rect x="78" y="34" width="14" height="14"/>
            <rect x="34" y="56" width="14" height="14"/>
            <rect x="56" y="56" width="14" height="14"/>
            <rect x="78" y="56" width="14" height="14"/>
            <rect x="34" y="78" width="14" height="14"/>
            <rect x="56" y="78" width="14" height="14"/>
            <rect x="78" y="78" width="14" height="14"/>
            <rect x="50" y="96" width="20" height="16" stroke="none" fill="#FFFFFF"/>
          </svg>
          <div class="card-label">AGENCY</div>
          <div class="card-sub">Teach</div>
        </div>

        <div class="dual-line" id="line-top"></div>
        <div class="dual-line" id="line-bot"></div>
        <div class="arrow-r" id="arr-r"></div>
        <div class="arrow-l" id="arr-l"></div>
        <div class="flow-dot-r" id="fdr-1"></div>
        <div class="flow-dot-r" id="fdr-2"></div>
        <div class="flow-dot-l" id="fdl-1"></div>
        <div class="flow-dot-l" id="fdl-2"></div>

        <div class="card" id="s5-card-b">
          <svg class="card-icon" viewBox="0 0 120 120" fill="#FFFFFF" stroke="none">
            <circle cx="60" cy="34" r="22"/>
            <path d="M 10 120 Q 10 60, 60 60 Q 110 60, 110 120 Z"/>
          </svg>
          <div class="card-label">FOUNDER</div>
          <div class="card-sub">Builds with us</div>
        </div>

        <div class="pill" id="s5-pill">DONE-WITH-YOU</div>
      </div>

    </div>

    <script>
      gsap.registerPlugin(MotionPathPlugin);
      window.__timelines = window.__timelines || {};

      // Apply centering BEFORE building the timeline so tl.from() captures
      // xPercent:-50 as the end state and preserves it through y-tweens.
      gsap.set(".scene-headline, .pill, #s1-tag, #s3-tag", { xPercent: -50 });
      gsap.set(".scene", { opacity: 0 });

      // Belt-and-suspenders: force every initially-hidden small element invisible
      // before the timeline builds, so nothing flashes during scene crossfades.
      gsap.set("#s2 .content-dot", { opacity: 0, x: 0, scale: 0.4 });
      gsap.set("#s2 .conn-line", { opacity: 0, scaleX: 0 });
      gsap.set("#s2 .arrow-head", { opacity: 0 });
      gsap.set("#s5 .flow-dot-r, #s5 .flow-dot-l", { opacity: 0, x: 0 });
      gsap.set("#s5 .dual-line", { opacity: 0, scaleX: 0 });
      gsap.set("#s5 .arrow-r, #s5 .arrow-l", { opacity: 0 });
      gsap.set("#s4 #s4-paths circle", { opacity: 0 });
      gsap.set("#s3 .pulse-ring", { opacity: 0, scale: 0.4 });

      const tl = gsap.timeline({ paused: true });

      // ----- Scene crossfade settings -----
      const FADE = 0.55;

      // Reset baseline at t=0 (in case of seeking back)
      tl.set(".scene", { opacity: 0 }, 0);
      tl.set(".scene-headline, .pill, #s1-tag, #s3-tag", { xPercent: -50 }, 0);

      // ====================================================
      // SCENE 1 — THE AGENCY MODEL  (0.0 - 4.0s)
      // ====================================================
      const S1 = 0;
      tl.to("#s1", { opacity: 1, duration: FADE, ease: "sine.inOut" }, S1);
      tl.from("#s1-head", { y: -40, opacity: 0, duration: 0.7, ease: "power3.out" }, S1 + 0.15);
      tl.from("#s1-card", { scale: 0.85, opacity: 0, duration: 0.7, ease: "back.out(1.5)" }, S1 + 0.4);
      tl.from("#s1-tag", { y: 24, opacity: 0, duration: 0.6, ease: "power2.out" }, S1 + 1.0);

      // ====================================================
      // SCENE 2 — DONE-FOR-YOU  (3.5 - 9.0s)
      // ====================================================
      const S2 = 3.5;
      tl.to("#s1", { opacity: 0, duration: FADE, ease: "sine.inOut" }, S2);
      tl.to("#s2", { opacity: 1, duration: FADE, ease: "sine.inOut" }, S2);

      tl.from("#s2-head", { y: -40, opacity: 0, duration: 0.7, ease: "power3.out" }, S2 + 0.2);
      tl.from("#s2-card-a", { x: -120, opacity: 0, duration: 0.7, ease: "power3.out" }, S2 + 0.45);
      tl.from("#s2-card-b", { x: 120, opacity: 0, duration: 0.7, ease: "power3.out" }, S2 + 0.55);
      // line draws + fades in simultaneously (matches Scene 5 feel)
      tl.fromTo("#s2-line",
        { scaleX: 0, opacity: 0 },
        { scaleX: 1, opacity: 0.6, duration: 0.7, ease: "power2.inOut" }, S2 + 1.1);
      tl.fromTo("#s2-arrow",
        { opacity: 0 },
        { opacity: 1, duration: 0.5, ease: "sine.inOut" }, S2 + 1.55);

      // Continuous stream of content dots — 5 dots × 2 cycles, staggered for smooth flow.
      // Dots fade INTO the client box (continue moving through the card edge while fading out).
      const s2DotIds = ["#dot-1", "#dot-2", "#dot-3", "#dot-4", "#dot-5"];
      [0, 1].forEach((cycle) => {
        s2DotIds.forEach((id, i) => {
          const start = S2 + 1.7 + i * 0.32 + cycle * 1.6;
          tl.fromTo(id,
            { x: 0, opacity: 0, scale: 0.4 },
            { x: 540, opacity: 0, scale: 0.4, duration: 1.1, ease: "power1.inOut",
              keyframes: [
                { opacity: 0, scale: 0.4, x: 0, duration: 0 },
                { opacity: 1, scale: 1, duration: 0.18 },
                { opacity: 1, x: 440, scale: 1, duration: 0.62 },
                { opacity: 0, x: 540, scale: 0.5, duration: 0.3 }
              ] }, start);
        });
      });

      tl.from("#s2-pill", { y: 30, opacity: 0, duration: 0.6, ease: "power3.out" }, S2 + 2.0);

      // ====================================================
      // SCENE 3 — GENIUS IDEA  (8.5 - 12.0s)
      // ====================================================
      const S3 = 8.5;
      tl.to("#s2", { opacity: 0, duration: FADE, ease: "sine.inOut" }, S3);
      tl.to("#s3", { opacity: 1, duration: FADE, ease: "sine.inOut" }, S3);

      tl.from("#s3-headline", { y: -40, opacity: 0, duration: 0.6, ease: "power3.out" }, S3 + 0.2);
      tl.from("#bulb", { scale: 0.4, opacity: 0, duration: 0.65, ease: "back.out(1.8)" }, S3 + 0.45);
      tl.from("#s3-tag", { y: 24, opacity: 0, duration: 0.55, ease: "power2.out" }, S3 + 1.05);

      // 3 staggered white pulse rings emanating
      const ringIds = ["#ring-3a", "#ring-3b", "#ring-3c"];
      ringIds.forEach((id, i) => {
        tl.fromTo(id,
          { scale: 0.4, opacity: 0 },
          { scale: 1.4, opacity: 0, duration: 1.6, ease: "sine.out",
            keyframes: [
              { opacity: 0, scale: 0.4, duration: 0 },
              { opacity: 0.65, scale: 0.7, duration: 0.4 },
              { opacity: 0, scale: 1.4, duration: 1.2 }
            ] }, S3 + 0.9 + i * 0.5);
      });

      // ====================================================
      // SCENE 4 — TEACH FOUNDERS  (11.5 - 17.0s)
      // ====================================================
      const S4 = 11.5;
      tl.to("#s3", { opacity: 0, duration: FADE, ease: "sine.inOut" }, S4);
      tl.to("#s4", { opacity: 1, duration: FADE, ease: "sine.inOut" }, S4);

      tl.from("#s4-head", { y: -40, opacity: 0, duration: 0.6, ease: "power3.out" }, S4 + 0.2);
      tl.from("#s4-agency", { y: -40, opacity: 0, duration: 0.6, ease: "power3.out" }, S4 + 0.4);

      // founders pop in staggered
      ["#f-1", "#f-2", "#f-3", "#f-4"].forEach((id, i) => {
        tl.from(id, { scale: 0.5, opacity: 0, duration: 0.5, ease: "back.out(1.6)" }, S4 + 0.85 + i * 0.1);
      });
      tl.from("#s4 .founder-label", { opacity: 0, y: 10, duration: 0.4, stagger: 0.08, ease: "power2.out" }, S4 + 1.1);

      // 4 curvy connector paths draw in AND fade in simultaneously (matches Scene 5 line treatment)
      ["#path-1", "#path-2", "#path-3", "#path-4"].forEach((id, i) => {
        tl.to(id, { strokeDashoffset: 0, opacity: 0.7, duration: 0.85, ease: "power2.inOut" }, S4 + 1.35 + i * 0.06);
      });

      // Continuous stream of white knowledge-pulses down each curvy path
      // 4 dots × 3 cycles, staggered for smooth constant flow
      [0, 1, 2].forEach((cycle) => {
        ["#know-1", "#know-2", "#know-3", "#know-4"].forEach((id, i) => {
          const start = S4 + 2.1 + cycle * 1.05 + i * 0.07;
          tl.to(id, { opacity: 1, duration: 0.15, ease: "power2.out" }, start);
          tl.to(id, {
            motionPath: {
              path: `#path-${i + 1}`,
              align: `#path-${i + 1}`,
              alignOrigin: [0.5, 0.5]
            },
            duration: 1.0,
            ease: "power1.inOut"
          }, start);
          tl.to(id, { opacity: 0, duration: 0.18, ease: "power2.in" }, start + 0.92);
        });
      });

      // ====================================================
      // SCENE 5 — DONE-WITH-YOU  (16.5 - 22.0s)
      // ====================================================
      const S5 = 16.5;
      tl.to("#s4", { opacity: 0, duration: FADE, ease: "sine.inOut" }, S5);
      tl.to("#s5", { opacity: 1, duration: FADE, ease: "sine.inOut" }, S5);

      tl.from("#s5-head", { y: -40, opacity: 0, duration: 0.6, ease: "power3.out" }, S5 + 0.2);
      tl.from("#s5-card-a", { x: -100, opacity: 0, duration: 0.65, ease: "power3.out" }, S5 + 0.45);
      tl.from("#s5-card-b", { x: 100, opacity: 0, duration: 0.65, ease: "power3.out" }, S5 + 0.55);

      // Two white lines shoot box-to-box (top: agency→founder, bot: founder→agency)
      tl.to("#line-top", { scaleX: 1, opacity: 0.7, duration: 0.6, ease: "power2.inOut" }, S5 + 1.15);
      tl.to("#line-bot", { scaleX: 1, opacity: 0.7, duration: 0.6, ease: "power2.inOut" }, S5 + 1.25);
      tl.to("#arr-r", { opacity: 1, duration: 0.25, ease: "power2.out" }, S5 + 1.65);
      tl.to("#arr-l", { opacity: 1, duration: 0.25, ease: "power2.out" }, S5 + 1.75);

      // Bidirectional flow dots — 2 going right, 2 going left, 2 waves
      ["#fdr-1", "#fdr-2"].forEach((id, i) => {
        for (let k = 0; k < 2; k++) {
          const start = S5 + 1.8 + i * 0.6 + k * 1.4;
          tl.fromTo(id,
            { x: 0, opacity: 0 },
            { x: 260, duration: 1.2, ease: "power1.inOut",
              keyframes: [
                { opacity: 0, x: 0, duration: 0 },
                { opacity: 1, duration: 0.18 },
                { opacity: 1, x: 260, duration: 0.84 },
                { opacity: 0, duration: 0.18 }
              ] }, start);
        }
      });
      ["#fdl-1", "#fdl-2"].forEach((id, i) => {
        for (let k = 0; k < 2; k++) {
          const start = S5 + 2.1 + i * 0.6 + k * 1.4;
          tl.fromTo(id,
            { x: 0, opacity: 0 },
            { x: -260, duration: 1.2, ease: "power1.inOut",
              keyframes: [
                { opacity: 0, x: 0, duration: 0 },
                { opacity: 1, duration: 0.18 },
                { opacity: 1, x: -260, duration: 0.84 },
                { opacity: 0, duration: 0.18 }
              ] }, start);
        }
      });

      // Punchline pill — slight overshoot for emphasis
      tl.from("#s5-pill", { scale: 0.7, y: 40, opacity: 0, duration: 0.7, ease: "back.out(1.7)" }, S5 + 2.0);

      // Final scene fade out at end
      tl.to("#s5", { opacity: 0, duration: 0.6, ease: "sine.inOut" }, 21.4);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
