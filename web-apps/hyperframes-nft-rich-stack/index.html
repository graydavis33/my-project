<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>NFT Millionaire Article Mosaic</title>
<style>
  html, body { margin: 0; padding: 0; background: #00B140; overflow: hidden; font-family: 'Inter', sans-serif; }

  #nft-rich-mosaic {
    position: relative;
    width: 1920px;
    height: 1080px;
    background: #00B140;
    overflow: hidden;
  }

  /* 3x2 grid of articles. Slot positions baked into CSS so layout is the
     ground truth and GSAP only describes the entrance journey. */
  .article {
    position: absolute;
    width: 540px;
    height: 337px;
    background: transparent;
    opacity: 0;
    will-change: transform, opacity;
  }

  /* Inner card holds the image — separated from .article so the glow ring
     can sit on .article without clipping the corners of the screenshot. */
  .article .card-inner {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    overflow: hidden;
    box-shadow:
      0 14px 36px rgba(0, 0, 0, 0.30),
      0 4px 12px rgba(0, 0, 0, 0.22);
  }

  .article img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Gold accent ring — pulses once when the article lands to mark "money
     story arrived." Sits behind the image. */
  .article .gold-ring {
    position: absolute;
    inset: -10px;
    border-radius: 18px;
    box-shadow:
      0 0 0 4px rgba(255, 196, 60, 0.0),
      0 0 32px 6px rgba(255, 196, 60, 0.0);
    pointer-events: none;
    z-index: 0;
  }

  /* Grid slot positions: 3 cols x 2 rows. (1920 - 3*540 - 2*50) / 2 = 100px
     side margin. (1080 - 2*337 - 60) / 2 = 173px top/bottom margin. */
  #a1 { left: 100px;  top: 173px; }
  #a2 { left: 690px;  top: 173px; }
  #a3 { left: 1280px; top: 173px; }
  #a4 { left: 100px;  top: 570px; }
  #a5 { left: 690px;  top: 570px; }
  #a6 { left: 1280px; top: 570px; }

  /* Falling $ confetti — deterministic positions set in JS. */
  .confetti {
    position: absolute;
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    color: rgba(255, 220, 130, 0.55);
    pointer-events: none;
    user-select: none;
    z-index: 0;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
  }
</style>
</head>
<body>

<div id="nft-rich-mosaic" data-composition-id="nft-rich-mosaic" data-start="0" data-duration="6" data-width="1920" data-height="1080" data-track-index="0">

  <!-- Background confetti layer (rendered behind articles via z-index) -->
  <div id="confetti-layer" data-layout-allow-overflow style="position: absolute; inset: 0; z-index: 0; pointer-events: none; --hf-studio-offset-x: -10px; --hf-studio-offset-y: -5px; translate: var(--hf-studio-offset-x, 0px) var(--hf-studio-offset-y, 0px)" data-hf-studio-path-offset="true" data-hf-studio-original-translate="" data-hf-studio-original-inline-translate=""></div>

  <!-- 6 articles in row-major grid order -->
  <div class="article" id="a1" style="z-index: 10;"><div class="gold-ring" data-layout-allow-overflow></div><div class="card-inner"><img src="article-screenshots/article-01-the-verge.png" alt="" /></div></div>
  <div class="article" id="a2" style="z-index: 11;"><div class="gold-ring" data-layout-allow-overflow></div><div class="card-inner"><img src="article-screenshots/article-02-nytimes.png" alt="" /></div></div>
  <div class="article" id="a3" style="z-index: 12;"><div class="gold-ring" data-layout-allow-overflow></div><div class="card-inner"><img src="article-screenshots/article-03-forbes.png" alt="" /></div></div>
  <div class="article" id="a4" style="z-index: 13;"><div class="gold-ring" data-layout-allow-overflow></div><div class="card-inner"><img src="article-screenshots/article-04-businessinsider.png" alt="" /></div></div>
  <div class="article" id="a5" style="z-index: 14;"><div class="gold-ring" data-layout-allow-overflow></div><div class="card-inner"><img src="article-screenshots/article-05-bloomberg.png" alt="" /></div></div>
  <div class="article" id="a6" style="z-index: 15;"><div class="gold-ring" data-layout-allow-overflow></div><div class="card-inner"><img src="article-screenshots/article-06-cnbc.png" alt="" /></div></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
  window.__timelines = window.__timelines || {};

  // Mulberry32 seeded PRNG — keeps confetti positions deterministic across
  // every render. HyperFrames bans Math.random for this reason.
  function mulberry32(a) {
    return function () {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      let t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  const rand = mulberry32(42);

  // Build the confetti layer: ~14 $ glyphs at varied positions + sizes, each
  // falling slowly across the full composition duration to suggest ambient
  // wealth context behind the headlines.
  const COMP_DUR = 6.0;
  const confettiLayer = document.getElementById("confetti-layer");
  const confettiCount = 14;
  const confetti = [];
  for (let i = 0; i < confettiCount; i++) {
    const el = document.createElement("div");
    el.className = "confetti";
    el.textContent = "$";
    const size = 44 + Math.floor(rand() * 56);  // 44-100px
    const xStart = Math.floor(rand() * 1820) + 50;
    const yStart = -120 - Math.floor(rand() * 400);
    const rotStart = (rand() * 30) - 15;
    el.style.fontSize = size + "px";
    el.style.left = xStart + "px";
    el.style.top = yStart + "px";
    el.style.opacity = (0.18 + rand() * 0.22).toFixed(2);
    el.style.transform = `rotate(${rotStart}deg)`;
    confettiLayer.appendChild(el);
    confetti.push({ el, xStart, yStart, size, rotStart });
  }

  // Set article starting state — below grid, slightly small, fully invisible.
  // Grid rest position is the CSS left/top, so GSAP only tweens x/y offsets
  // relative to that.
  const articles = ["#a1", "#a2", "#a3", "#a4", "#a5", "#a6"];
  articles.forEach((sel) => {
    gsap.set(sel, { y: 380, scale: 0.88, opacity: 0 });
  });

  const tl = gsap.timeline({ paused: true });

  // 1. Ambient confetti — each $ drifts down + rotates gently across the full
  //    composition. Pure cosmetic motion, runs in parallel with everything.
  confetti.forEach((c, i) => {
    const driftDist = 1300 + rand() * 260;
    const rotEnd = c.rotStart + (rand() * 80 - 40);
    tl.to(c.el, {
      y: driftDist,
      rotation: rotEnd,
      duration: COMP_DUR,
      ease: "none",
    }, 0);
  });

  // 2. Article reveal — staggered rise from below into the grid. Each card
  //    eases in with back.out for a soft bounce when it settles into its slot.
  const RISE_DUR = 0.62;
  const RISE_GAP = 0.22;
  const FIRST_AT = 0.30;

  articles.forEach((sel, i) => {
    const startT = FIRST_AT + i * RISE_GAP;

    tl.to(sel, {
      y: 0,
      scale: 1.0,
      opacity: 1,
      duration: RISE_DUR,
      ease: "back.out(1.4)",
    }, startT);

    // 3. Gold ring flash — fires when the card lands. Builds the glow to peak
    //    in ~0.18s and fades over 0.55s. Reads as "money story arrived."
    const ringAt = startT + RISE_DUR * 0.7;
    const ringEl = sel + " .gold-ring";
    tl.to(ringEl, {
      boxShadow: "0 0 0 5px rgba(255, 196, 60, 0.95), 0 0 56px 14px rgba(255, 196, 60, 0.60)",
      duration: 0.18,
      ease: "power2.out",
    }, ringAt);
    tl.to(ringEl, {
      boxShadow: "0 0 0 0px rgba(255, 196, 60, 0.0), 0 0 0px 0px rgba(255, 196, 60, 0.0)",
      duration: 0.55,
      ease: "power2.in",
    }, ringAt + 0.20);
  });

  // 4. Final unison pulse — once all 6 are landed, every card scales up
  //    slightly and back in a diagonal stagger. Caps the reveal with a single
  //    "all together now" beat that the slam-pile composition doesn't have.
  const ALL_LANDED_AT = FIRST_AT + (articles.length - 1) * RISE_GAP + RISE_DUR + 0.10;
  const STAGGER_ORDER = ["#a1", "#a5", "#a3", "#a4", "#a2", "#a6"]; // diagonal
  STAGGER_ORDER.forEach((sel, i) => {
    const pulseAt = ALL_LANDED_AT + i * 0.06;
    tl.to(sel, {
      scale: 1.04,
      duration: 0.22,
      ease: "power2.out",
    }, pulseAt);
    tl.to(sel, {
      scale: 1.0,
      duration: 0.32,
      ease: "power2.inOut",
    }, pulseAt + 0.22);
  });

  // Note: NO background tint or full-screen overlay anywhere in this comp.
  // The composition will be chroma-keyed against #00B140 in Premiere — any
  // non-green wash on the canvas BG leaves a colored artifact in the final
  // composite over Sai's video. Gold pulses are kept inside the article rings
  // only; the falling $ confetti is non-green by design (it should survive
  // the key and appear over Sai's footage as ambient wealth context).

  window.__timelines["nft-rich-mosaic"] = tl;
</script>

</body>
</html>
