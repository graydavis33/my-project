<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — Analytical</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-box">

    <div class="auth-logo">
      <a href="index.html" class="logo-text">Analy<span>tical</span></a>
    </div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Log in to your account to see your analytics.</p>

    <div class="alert alert-error" id="error-alert"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;" id="submit-btn">
        Log in
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a href="signup.html">Sign up free</a>
    </p>

  </div>
</div>

<script src="app.js"></script>
<script>
  // If already logged in, go to dashboard
  if (getToken()) window.location.href = 'dashboard.html';

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const errorAlert = document.getElementById('error-alert');

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Logging in...';
    errorAlert.classList.remove('show');

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      const data = await apiCall('/api/auth/login', {
        method: 'POST',
        body: JSON.stringify({ email, password }),
      });
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = 'dashboard.html';
    } catch (err) {
      errorAlert.textContent = err.message || 'Invalid email or password.';
      errorAlert.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Log in';
    }
  });
</script>
</body>
</html>
