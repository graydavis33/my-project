<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0f1e; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
  .wrap { width:860px; background:rgba(255,255,255,0.025); border:1px solid rgba(255,255,255,0.08); border-radius:20px; padding:2rem 2.25rem; }
  .label { font-size:0.65rem; font-weight:700; text-transform:uppercase; letter-spacing:2.5px; color:rgba(148,163,184,0.45); margin-bottom:0.6rem; }
  .title { font-size:1.1rem; font-weight:700; color:rgba(240,248,255,0.9); margin-bottom:1.5rem; }
  .legend { display:flex; gap:1rem; margin-bottom:1.5rem; }
  .li { display:flex; align-items:center; gap:0.5rem; font-size:0.75rem; font-weight:600; color:rgba(148,163,184,0.75); }
  .ld { width:12px; height:12px; border-radius:3px; }
  canvas { display:block; }
</style>
</head>
<body>
<div class="wrap">
  <div class="label">Style 1 — Isometric 3D Blocks</div>
  <div class="title">Monthly Views by Platform</div>
  <div class="legend">
    <div class="li"><div class="ld" style="background:#FF0000;"></div>YouTube</div>
    <div class="li"><div class="ld" style="background:#69C9D0;"></div>TikTok</div>
    <div class="li"><div class="ld" style="background:#E1306C;"></div>Instagram</div>
  </div>
  <div style="position:relative;height:360px;">
    <canvas id="c"></canvas>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
  function hexAdj(hex, factor, a) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    const c = v => Math.max(0,Math.min(255,Math.round(v*factor)));
    return `rgba(${c(r)},${c(g)},${c(b)},${a??1})`;
  }

  const iso3D = {
    id:'iso3d',
    afterDraw(chart) {
      const ctx = chart.ctx;
      const DX = 13, DY = -7;
      chart.data.datasets.forEach((ds, di) => {
        const meta = chart.getDatasetMeta(di);
        if (meta.hidden) return;
        const col = ds.borderColor;
        meta.data.forEach(bar => {
          const { x, y, base } = bar;
          const w2 = bar.width / 2;
          if (base - y < 1) return;
          ctx.save();
          // Top face
          ctx.beginPath();
          ctx.moveTo(x-w2, y); ctx.lineTo(x-w2+DX, y+DY);
          ctx.lineTo(x+w2+DX, y+DY); ctx.lineTo(x+w2, y);
          ctx.closePath();
          ctx.fillStyle = hexAdj(col, 1.5, 0.95);
          ctx.fill();
          // Right face
          ctx.beginPath();
          ctx.moveTo(x+w2, y); ctx.lineTo(x+w2+DX, y+DY);
          ctx.lineTo(x+w2+DX, base+DY); ctx.lineTo(x+w2, base);
          ctx.closePath();
          ctx.fillStyle = hexAdj(col, 0.5, 0.9);
          ctx.fill();
          ctx.restore();
        });
      });
    }
  };
  Chart.register(iso3D);

  const labels = ["May '25","Jun '25","Jul '25","Nov '25","Feb '26","Mar '26"];
  const data = {
    youtube:   [0, 1215, 2698, 314, 2264, 262],
    tiktok:    [1176, 1818, 9195, 11006, 1195, 928],
    instagram: [0, 102, 49, 0, 76, 48],
  };

  Chart.defaults.color = '#8899aa';
  Chart.defaults.borderColor = 'rgba(255,255,255,0.05)';

  new Chart(document.getElementById('c'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label:'YouTube',   data:data.youtube,   backgroundColor:'rgba(255,0,0,0.82)',       borderColor:'#FF0000', borderWidth:0, borderRadius:0 },
        { label:'TikTok',    data:data.tiktok,    backgroundColor:'rgba(105,201,208,0.82)',    borderColor:'#69C9D0', borderWidth:0, borderRadius:0 },
        { label:'Instagram', data:data.instagram, backgroundColor:'rgba(225,48,108,0.82)',     borderColor:'#E1306C', borderWidth:0, borderRadius:0 },
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      animation:{ duration:0 },
      layout:{ padding:{ top:18, right:20 } },
      plugins:{ legend:{ display:false } },
      scales:{
        x:{ grid:{ color:'rgba(255,255,255,0.04)' }, ticks:{ color:'#8899aa', font:{ size:10 } } },
        y:{ grid:{ color:'rgba(255,255,255,0.04)' }, ticks:{ color:'#8899aa', font:{ size:10 },
          callback: v => v>=1000 ? (v/1000).toFixed(0)+'K' : v
        }}
      }
    }
  });
</script>
</body>
</html>
