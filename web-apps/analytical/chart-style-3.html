<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0d0f1a; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
  .wrap { width:860px; background:linear-gradient(160deg,rgba(30,40,80,0.5) 0%,rgba(10,12,25,0.9) 100%); border:1px solid rgba(100,130,255,0.12); border-radius:20px; padding:2rem 2.25rem; box-shadow:0 0 60px rgba(80,100,255,0.08); }
  .label { font-size:0.65rem; font-weight:700; text-transform:uppercase; letter-spacing:2.5px; color:rgba(148,163,184,0.4); margin-bottom:0.6rem; }
  .title { font-size:1.1rem; font-weight:700; color:rgba(240,248,255,0.9); margin-bottom:1.5rem; }
  .legend { display:flex; gap:1rem; margin-bottom:1.5rem; }
  .li { display:flex; align-items:center; gap:0.5rem; font-size:0.75rem; font-weight:600; color:rgba(148,163,184,0.75); }
  .ld { width:28px; height:6px; border-radius:3px; }
  canvas { display:block; }
</style>
</head>
<body>
<div class="wrap">
  <div class="label">Style 3 — Glossy Gradient + 3D Face</div>
  <div class="title">Monthly Views by Platform</div>
  <div class="legend">
    <div class="li"><div class="ld" style="background:linear-gradient(90deg,#FF6666,#FF0000);"></div>YouTube</div>
    <div class="li"><div class="ld" style="background:linear-gradient(90deg,#A8E8ED,#69C9D0);"></div>TikTok</div>
    <div class="li"><div class="ld" style="background:linear-gradient(90deg,#F06090,#E1306C);"></div>Instagram</div>
  </div>
  <div style="position:relative;height:360px;">
    <canvas id="c"></canvas>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
  const palettes = [
    { col:'#FF0000', bright:'#FF7777', dark:'#990000', rgb:'255,0,0' },
    { col:'#69C9D0', bright:'#B0EAEE', dark:'#2E8A90', rgb:'105,201,208' },
    { col:'#E1306C', bright:'#F07090', dark:'#8A1040', rgb:'225,48,108' },
  ];

  const glossy3D = {
    id:'glossy3d',
    beforeDatasetsDraw(chart) {
      const { ctx, chartArea:ca } = chart;
      if (!ca) return;
      chart.data.datasets.forEach((ds, di) => {
        const p = palettes[di];
        if (!p) return;
        const grad = ctx.createLinearGradient(0, ca.top, 0, ca.bottom);
        grad.addColorStop(0,   p.bright);
        grad.addColorStop(0.3, p.col);
        grad.addColorStop(1,   p.dark);
        ds.backgroundColor = grad;
      });
    },
    afterDraw(chart) {
      const ctx = chart.ctx;
      const DX = 10, DY = -6;
      chart.data.datasets.forEach((ds, di) => {
        const meta = chart.getDatasetMeta(di);
        if (meta.hidden) return;
        const p = palettes[di];
        if (!p) return;

        meta.data.forEach(bar => {
          const { x, y, base } = bar;
          const w2 = bar.width / 2;
          if (base - y < 2) return;

          ctx.save();

          // Drop shadow on ground
          ctx.beginPath();
          ctx.ellipse(x + DX/2, base + DY/2 + 4, w2 * 0.9, 4, 0, 0, Math.PI*2);
          ctx.fillStyle = `rgba(0,0,0,0.35)`;
          ctx.fill();

          // Right side face (darker)
          ctx.beginPath();
          ctx.moveTo(x+w2, y);
          ctx.lineTo(x+w2+DX, y+DY);
          ctx.lineTo(x+w2+DX, base+DY);
          ctx.lineTo(x+w2, base);
          ctx.closePath();
          const sideGrad = ctx.createLinearGradient(0, y, 0, base);
          sideGrad.addColorStop(0, `rgba(${p.rgb},0.55)`);
          sideGrad.addColorStop(1, `rgba(${p.rgb},0.25)`);
          ctx.fillStyle = sideGrad;
          ctx.fill();

          // Top face (bright)
          ctx.beginPath();
          ctx.moveTo(x-w2, y);
          ctx.lineTo(x-w2+DX, y+DY);
          ctx.lineTo(x+w2+DX, y+DY);
          ctx.lineTo(x+w2, y);
          ctx.closePath();
          ctx.fillStyle = p.bright;
          ctx.fill();

          // Glossy shine strip on top-left of bar
          const shineGrad = ctx.createLinearGradient(x-w2, y, x-w2 + w2*0.45, y);
          shineGrad.addColorStop(0,   'rgba(255,255,255,0.18)');
          shineGrad.addColorStop(1,   'rgba(255,255,255,0.0)');
          ctx.fillStyle = shineGrad;
          ctx.fillRect(x-w2, y, w2*0.45, base-y);

          ctx.restore();
        });
      });
    }
  };
  Chart.register(glossy3D);

  const labels = ["May '25","Jun '25","Jul '25","Nov '25","Feb '26","Mar '26"];

  Chart.defaults.color = '#667799';
  Chart.defaults.borderColor = 'rgba(100,130,255,0.07)';

  new Chart(document.getElementById('c'), {
    type:'bar',
    data:{
      labels,
      datasets:[
        { label:'YouTube',   data:[0,1215,2698,314,2264,262],     borderColor:'#FF0000', borderWidth:0, borderRadius:0 },
        { label:'TikTok',    data:[1176,1818,9195,11006,1195,928], borderColor:'#69C9D0', borderWidth:0, borderRadius:0 },
        { label:'Instagram', data:[0,102,49,0,76,48],             borderColor:'#E1306C', borderWidth:0, borderRadius:0 },
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      animation:{ duration:0 },
      layout:{ padding:{ top:18, right:18 } },
      plugins:{ legend:{ display:false } },
      scales:{
        x:{ grid:{ color:'rgba(100,130,255,0.06)' }, ticks:{ color:'#667799', font:{ size:10 } } },
        y:{ grid:{ color:'rgba(100,130,255,0.06)' }, ticks:{ color:'#667799', font:{ size:10 },
          callback: v => v>=1000 ? (v/1000).toFixed(0)+'K' : v
        }}
      }
    }
  });
</script>
</body>
</html>
