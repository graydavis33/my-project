<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
      }
      .clip-wrapper {
        position: absolute;
        overflow: hidden;
        transform-origin: top left;
      }
      .clip-wrapper video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="8"
      data-width="1920"
      data-height="1080"
    >
      <!-- Wrapper divs hold the GSAP transforms; <video class="clip" data-start=...> is the actual timed clip.
           Each wrapper is positioned at its FINAL grid cell (3 cols x 2 rows of 640x540).
           Inner clip box: 321x540 centered horizontally so vertical TikTok aspect (9:15) shows fully without cropping. -->
      <div id="w1" class="clip-wrapper" style="left: 159px; top: 0px; width: 321px; height: 540px;">
        <video id="v1" class="clip" data-start="0" data-duration="8" data-track-index="0"
               src="assets/clip1.mp4" muted playsinline></video>
      </div>
      <div id="w2" class="clip-wrapper" style="left: 799px; top: 0px; width: 321px; height: 540px;">
        <video id="v2" class="clip" data-start="2" data-duration="6" data-track-index="1"
               src="assets/clip2.mp4" muted playsinline></video>
      </div>
      <div id="w3" class="clip-wrapper" style="left: 1439px; top: 0px; width: 321px; height: 540px;">
        <video id="v3" class="clip" data-start="2" data-duration="6" data-track-index="2"
               src="assets/clip3.mp4" muted playsinline></video>
      </div>
      <div id="w4" class="clip-wrapper" style="left: 159px; top: 540px; width: 321px; height: 540px;">
        <video id="v4" class="clip" data-start="2" data-duration="6" data-track-index="3"
               src="assets/clip4.mp4" muted playsinline></video>
      </div>
      <div id="w5" class="clip-wrapper" style="left: 799px; top: 540px; width: 321px; height: 540px;">
        <video id="v5" class="clip" data-start="2" data-duration="6" data-track-index="4"
               src="assets/clip5.mp4" muted playsinline></video>
      </div>
      <div id="w6" class="clip-wrapper" style="left: 1439px; top: 540px; width: 321px; height: 540px;">
        <video id="v6" class="clip" data-start="2" data-duration="6" data-track-index="5"
               src="assets/clip6.mp4" muted playsinline></video>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // ── Phase 1: clip 1 starts FULL SCREEN (height-fit, vertical aspect, centered).
      // CSS position: top-left (159, 0), size 321x540. To make it fullscreen 643x1080 at (638, 0):
      //   scale = 2.0  (643/321 ≈ 2.0,  1080/540 = 2.0 — matches because vertical aspects match)
      //   x offset = 638 - 159 = 479,  y offset = 0
      tl.set("#w1", { x: 479, y: 0, scale: 2.0 }, 0);

      // ── Phase 2 (t=2.0s): clip 1 zooms back to its grid slot
      tl.to("#w1", { x: 0, y: 0, scale: 1, duration: 0.6, ease: "power3.inOut" }, 2.0);

      // ── Phase 2 (t=2.0s + small stagger): clips 2-6 shoot out from clip-1 center to their grid cells.
      // Canvas center: (960, 540). Each clip's grid-cell center:
      //   w2: (959, 270)   w3: (1599, 270)   w4: (319, 810)   w5: (959, 810)   w6: (1599, 810)
      // From-state delta = (canvas_center - css_center).
      const flyouts = [
        { id: "#w2", fromX:    1, fromY:  270 },
        { id: "#w3", fromX: -639, fromY:  270 },
        { id: "#w4", fromX:  641, fromY: -270 },
        { id: "#w5", fromX:    1, fromY: -270 },
        { id: "#w6", fromX: -639, fromY: -270 },
      ];
      flyouts.forEach((f, i) => {
        tl.from(f.id, {
          x: f.fromX, y: f.fromY,
          scale: 0.05,
          opacity: 0,
          duration: 0.6,
          ease: "back.out(1.4)",
        }, 2.0 + i * 0.05);
      });

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
