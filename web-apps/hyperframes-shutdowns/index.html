<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #00B140;
        font-family: "Montserrat", sans-serif;
      }
      #root {
        width: 1920px;
        height: 1080px;
        position: relative;
        background: #00B140;
        overflow: hidden;
      }

      .stage {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 80px;
      }

      .card-wrap {
        position: relative;
        width: 1100px;
        height: 180px;
      }

      .card {
        position: absolute;
        inset: 0;
        border: 5px solid #FFFFFF;
        border-radius: 22px;
        background: rgba(255,255,255,0.04);
        display: flex;
        align-items: center;
        justify-content: center;
        will-change: transform, opacity;
      }

      .card-label {
        font-weight: 800;
        font-size: 72px;
        color: #FFFFFF;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      /* Red rubber stamp */
      .stamp {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(-9deg) scale(0);
        opacity: 0;
        padding: 14px 44px;
        border: 6px solid #ff3b30;
        border-radius: 12px;
        background: rgba(255, 59, 48, 0.08);
        will-change: transform, opacity;
        z-index: 5;
      }

      .stamp-text {
        font-weight: 900;
        font-style: italic;
        font-size: 76px;
        color: #ff3b30;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        line-height: 1;
        white-space: nowrap;
      }

      /* Diagonal red line through the card, drawn left-to-right */
      .strike {
        position: absolute;
        top: 50%;
        left: 0;
        width: 100%;
        height: 8px;
        background: #ff3b30;
        transform-origin: left center;
        transform: translateY(-50%) rotate(-3deg) scaleX(0);
        will-change: transform;
        z-index: 4;
      }
    </style>
  </head>
  <body>
    <div
      id="root-comp"
      class="clip"
      data-composition-id="root"
      data-start="0"
      data-duration="7"
      data-width="1920"
      data-height="1080"
      data-track-index="0"
    >
      <div id="root">
        <div class="stage">
          <!-- Card 1: Coaching Program -->
          <div class="card-wrap" id="wrap1">
            <div class="card" id="card1">
              <div class="card-label">Coaching Program</div>
            </div>
            <div class="strike" id="strike1"></div>
            <div class="stamp" id="stamp1">
              <div class="stamp-text">Shut Down</div>
            </div>
          </div>

          <!-- Card 2: Done-For-You Model -->
          <div class="card-wrap" id="wrap2">
            <div class="card" id="card2">
              <div class="card-label">Done With You Model</div>
            </div>
            <div class="strike" id="strike2"></div>
            <div class="stamp" id="stamp2">
              <div class="stamp-text">Shut Down</div>
            </div>
          </div>
        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // --- Card entrances ---
        tl.from("#card1", {
          x: -140,
          opacity: 0,
          duration: 0.7,
          ease: "back.out(1.6)"
        }, 0.2);

        tl.from("#card2", {
          x: 140,
          opacity: 0,
          duration: 0.7,
          ease: "back.out(1.6)"
        }, 0.5);

        // --- Stamp 1 hits Coaching Program at t = 1.9s ---
        tl.to("#stamp1", {
          scale: 1,
          opacity: 1,
          duration: 0.25,
          ease: "back.out(2.6)"
        }, 1.9);

        tl.to("#strike1", {
          scaleX: 1,
          duration: 0.22,
          ease: "power3.out"
        }, 1.92);

        // Card 1 impact shake
        tl.to("#card1", {
          keyframes: [
            { x: -8, rotation: -1.2, duration: 0.05 },
            { x: 8, rotation: 1.2, duration: 0.06 },
            { x: -5, rotation: -0.6, duration: 0.05 },
            { x: 0, rotation: 0, duration: 0.05 }
          ],
          ease: "power1.inOut"
        }, 1.9);

        // Stamp 1 micro-settle
        tl.to("#stamp1", {
          rotation: -9,
          duration: 0.18,
          ease: "power2.out"
        }, 2.18);

        // --- Stamp 2 hits Done-For-You at t = 3.4s ---
        tl.to("#stamp2", {
          scale: 1,
          opacity: 1,
          duration: 0.25,
          ease: "back.out(2.6)"
        }, 3.4);

        tl.to("#strike2", {
          scaleX: 1,
          duration: 0.22,
          ease: "power3.out"
        }, 3.42);

        tl.to("#card2", {
          keyframes: [
            { x: -8, rotation: -1.2, duration: 0.05 },
            { x: 8, rotation: 1.2, duration: 0.06 },
            { x: -5, rotation: -0.6, duration: 0.05 },
            { x: 0, rotation: 0, duration: 0.05 }
          ],
          ease: "power1.inOut"
        }, 3.4);

        tl.to("#stamp2", {
          rotation: -9,
          duration: 0.18,
          ease: "power2.out"
        }, 3.68);

        window.__timelines["root"] = tl;
      </script>
    </div>
  </body>
</html>
