<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1080px;
        height: 1080px;
        overflow: hidden;
        background: #00b140;
      }
      #root {
        width: 1080px;
        height: 1080px;
        position: relative;
        background: #00b140;
        overflow: hidden;
      }
      .scene-content {
        position: absolute;
        inset: 0;
      }
      .headline {
        position: absolute;
        top: 70px;
        left: 50%;
        transform: translateX(-50%);
        font-family: "Montserrat", sans-serif;
        font-weight: 600;
        font-size: 86px;
        line-height: 1;
        color: #ffffff;
        letter-spacing: 0.04em;
        white-space: nowrap;
      }

      /* Three equity cards */
      .card {
        position: absolute;
        left: 130px;
        width: 820px;
        height: 140px;
        border: 4px solid #ffffff;
        border-radius: 26px;
        padding: 0 32px;
        display: flex;
        align-items: center;
        gap: 28px;
        background: transparent;
      }
      #card-1 { top: 220px; }
      #card-2 { top: 380px; }
      #card-3 { top: 540px; }

      .card-person {
        width: 76px;
        height: 100px;
        flex-shrink: 0;
      }
      .card-person svg {
        width: 100%;
        height: 100%;
        display: block;
      }
      .card-text {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 6px;
      }
      .card-name {
        font-family: "Montserrat", sans-serif;
        font-weight: 600;
        font-size: 38px;
        line-height: 1;
        color: #ffffff;
        letter-spacing: 0.05em;
      }
      .card-salary {
        font-family: "Montserrat", sans-serif;
        font-weight: 600;
        font-size: 26px;
        line-height: 1;
        color: #ffffff;
        letter-spacing: 0.06em;
        opacity: 0.85;
      }
      .card-pct-block {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        justify-content: center;
        gap: 4px;
      }
      .card-pct {
        font-family: "Montserrat", sans-serif;
        font-weight: 700;
        font-size: 80px;
        line-height: 1;
        color: #ffffff;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0;
      }
      .card-pct-label {
        font-family: "Montserrat", sans-serif;
        font-weight: 600;
        font-size: 22px;
        line-height: 1;
        color: #ffffff;
        letter-spacing: 0.12em;
      }

      /* Bottom total bar */
      .total-block {
        position: absolute;
        top: 740px;
        left: 130px;
        width: 820px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 22px;
      }
      .total-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
      }
      .total-label {
        font-family: "Montserrat", sans-serif;
        font-weight: 600;
        font-size: 44px;
        line-height: 1;
        color: #ffffff;
        letter-spacing: 0.06em;
      }
      .total-value {
        font-family: "Montserrat", sans-serif;
        font-weight: 700;
        font-size: 88px;
        line-height: 1;
        color: #ffffff;
        font-variant-numeric: tabular-nums;
      }
      .total-bar-track {
        width: 100%;
        height: 18px;
        border: 3px solid #ffffff;
        border-radius: 12px;
        position: relative;
        overflow: hidden;
      }
      .total-bar-fill {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 100%;
        background: #ffffff;
        transform-origin: left center;
        transform: scaleX(0);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="4.5"
      data-width="1080"
      data-height="1080"
    >
      <div class="scene-content">
        <div class="headline" id="headline">EQUITY SPLIT</div>

        <div class="card" id="card-1">
          <div class="card-person">
            <svg viewBox="0 0 76 100" fill="#ffffff" stroke="none">
              <circle cx="38" cy="26" r="16" />
              <path d="M 8 100 Q 8 52, 38 52 Q 68 52, 68 100 Z" />
            </svg>
          </div>
          <div class="card-text">
            <div class="card-name">FRIEND 01</div>
            <div class="card-salary">$0 / HR</div>
          </div>
          <div class="card-pct-block">
            <div class="card-pct" id="pct-1">0%</div>
            <div class="card-pct-label">EQUITY</div>
          </div>
        </div>

        <div class="card" id="card-2">
          <div class="card-person">
            <svg viewBox="0 0 76 100" fill="#ffffff" stroke="none">
              <circle cx="38" cy="26" r="16" />
              <path d="M 8 100 Q 8 52, 38 52 Q 68 52, 68 100 Z" />
            </svg>
          </div>
          <div class="card-text">
            <div class="card-name">FRIEND 02</div>
            <div class="card-salary">$0 / HR</div>
          </div>
          <div class="card-pct-block">
            <div class="card-pct" id="pct-2">0%</div>
            <div class="card-pct-label">EQUITY</div>
          </div>
        </div>

        <div class="card" id="card-3">
          <div class="card-person">
            <svg viewBox="0 0 76 100" fill="#ffffff" stroke="none">
              <circle cx="38" cy="26" r="16" />
              <path d="M 8 100 Q 8 52, 38 52 Q 68 52, 68 100 Z" />
            </svg>
          </div>
          <div class="card-text">
            <div class="card-name">FRIEND 03</div>
            <div class="card-salary">$0 / HR</div>
          </div>
          <div class="card-pct-block">
            <div class="card-pct" id="pct-3">0%</div>
            <div class="card-pct-label">EQUITY</div>
          </div>
        </div>

        <div class="total-block" id="total-block">
          <div class="total-row">
            <div class="total-label">TOTAL PROMISED</div>
            <div class="total-value" id="total-value">0%</div>
          </div>
          <div class="total-bar-track">
            <div class="total-bar-fill" id="total-bar"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Initial states
      tl.set("#headline", { y: -30, opacity: 0 }, 0);
      tl.set("#card-1, #card-2, #card-3", { x: -120, opacity: 0 }, 0);
      tl.set("#total-block", { y: 30, opacity: 0 }, 0);

      // Headline reveal
      tl.to(
        "#headline",
        { y: 0, opacity: 1, duration: 0.5, ease: "power3.out" },
        0.15
      );

      // Cards slide in from left, staggered
      const cardSlide = { x: 0, opacity: 1, duration: 0.5, ease: "power3.out" };
      tl.to("#card-1", cardSlide, 0.5);
      tl.to("#card-2", cardSlide, 0.75);
      tl.to("#card-3", cardSlide, 1.0);

      // Counter helper — animates a {val:0} object and writes to DOM
      function countUp(targetSelector, fromVal, toVal, time, duration = 0.55) {
        const el = document.querySelector(targetSelector);
        const counter = { v: fromVal };
        tl.to(
          counter,
          {
            v: toVal,
            duration,
            ease: "power2.out",
            onUpdate: () => {
              el.textContent = Math.round(counter.v) + "%";
            },
          },
          time
        );
      }

      countUp("#pct-1", 0, 5, 0.7);
      countUp("#pct-2", 0, 5, 0.95);
      countUp("#pct-3", 0, 5, 1.2);

      // Total block reveals
      tl.to(
        "#total-block",
        { y: 0, opacity: 1, duration: 0.5, ease: "power3.out" },
        1.7
      );

      // Total bar fills (visually full to 100% of track) + total counter counts up
      tl.to(
        "#total-bar",
        { scaleX: 1, duration: 0.85, ease: "power2.out" },
        1.95
      );
      countUp("#total-value", 0, 15, 1.95, 0.85);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
