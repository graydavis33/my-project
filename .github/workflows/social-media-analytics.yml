name: Social Media Analytics

on:
  schedule:
    - cron: '0 14 * * *'  # 9 AM EST (UTC-5) daily
  workflow_dispatch:       # allow manual runs from GitHub UI

jobs:
  run-analytics:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-scripts/social-media-analytics

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: python-scripts/social-media-analytics/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google credentials
        env:
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          GOOGLE_CLIENT_SECRET_JSON: ${{ secrets.GOOGLE_CLIENT_SECRET_JSON }}
        run: |
          echo "$GOOGLE_TOKEN_JSON" > token.json
          echo "$GOOGLE_CLIENT_SECRET_JSON" > client_secret.json

      - name: Run analytics
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python main.py
