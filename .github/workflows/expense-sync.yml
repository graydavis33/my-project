name: Expense Sync

on:
  schedule:
    - cron: "*/30 * * * *"  # every 30 min (GitHub delays cron under load; effective cadence ~30-90 min)
  workflow_dispatch:        # manual trigger from GitHub Actions UI

permissions:
  contents: write           # needed to commit expenses.json back to repo

concurrency:
  group: expense-sync
  cancel-in-progress: false

jobs:
  sync-expenses:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: python-scripts/expense-tracker/requirements.txt

      - name: Install dependencies
        run: pip install -r python-scripts/expense-tracker/requirements.txt

      # Persist scanned-IDs + extraction cache between runs — without this every
      # 30-min run would re-pay Haiku to re-scan the same ~100 emails.
      - name: Restore scanner cache
        uses: actions/cache/restore@v4
        with:
          path: |
            python-scripts/expense-tracker/.scanned_ids.json
            python-scripts/expense-tracker/.expense_cache.json
          key: expense-scanner-cache-${{ github.run_id }}
          restore-keys: |
            expense-scanner-cache-

      - name: Write Gmail credentials
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
        run: |
          echo "$GMAIL_TOKEN_JSON" > python-scripts/expense-tracker/token.json
          echo "$GMAIL_CREDENTIALS_JSON" > python-scripts/expense-tracker/credentials.json

      - name: Run expense scanner
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: cd python-scripts/expense-tracker && python main.py

      - name: Save scanner cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            python-scripts/expense-tracker/.scanned_ids.json
            python-scripts/expense-tracker/.expense_cache.json
          key: expense-scanner-cache-${{ github.run_id }}

      - name: Commit updated expenses.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web-apps/payday-checklist/expenses.json
          git diff --staged --quiet || git commit -m "chore: update expenses.json [skip ci]"
          # main can move mid-run (session auto-push hooks); rebase, keeping the
          # runner's expenses.json on conflict — it's always the freshest scan
          git pull --rebase -X theirs origin main
          git push
