name: Expense Sync

on:
  schedule:
    - cron: "*/30 * * * *"  # every 30 min (GitHub delays cron under load; effective cadence ~30-90 min)
  workflow_dispatch:        # manual trigger from GitHub Actions UI

permissions:
  contents: read            # nothing is committed — all data goes to private Firestore

concurrency:
  group: expense-sync
  cancel-in-progress: false

jobs:
  sync-expenses:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: python-scripts/expense-tracker/requirements.txt

      - name: Install dependencies
        run: pip install -r python-scripts/expense-tracker/requirements.txt

      # Persist scanned-IDs + extraction cache between runs — without this every
      # 30-min run would re-pay Haiku to re-scan the same ~100 emails.
      - name: Restore scanner cache
        uses: actions/cache/restore@v4
        with:
          path: |
            python-scripts/expense-tracker/.scanned_ids.json
            python-scripts/expense-tracker/.expense_cache.json
          key: expense-scanner-cache-${{ github.run_id }}
          restore-keys: |
            expense-scanner-cache-

      - name: Write Gmail credentials
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
        run: |
          echo "$GMAIL_TOKEN_JSON" > python-scripts/expense-tracker/token.json
          echo "$GMAIL_CREDENTIALS_JSON" > python-scripts/expense-tracker/credentials.json

      - name: Run expense scanner
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PLAID_CLIENT_ID: ${{ secrets.PLAID_CLIENT_ID }}
          PLAID_SECRET: ${{ secrets.PLAID_SECRET }}
          PLAID_ACCESS_TOKEN: ${{ secrets.PLAID_ACCESS_TOKEN }}
          PLAID_ENV: production
        run: cd python-scripts/expense-tracker && python main.py

      - name: Save scanner cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            python-scripts/expense-tracker/.scanned_ids.json
            python-scripts/expense-tracker/.expense_cache.json
          key: expense-scanner-cache-${{ github.run_id }}
