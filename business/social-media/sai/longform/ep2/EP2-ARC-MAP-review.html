<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EP2 — Story-Arc Map (the sticky-note board, flattened) — Synthesize</title>
<style>
:root{--bg:#0f1115;--panel:#171a21;--panel2:#1e222b;--line:#2a2f3a;--text:#e7e9ee;--muted:#8b93a4;--accent:#F28129;--bad:#cf5b5b}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5}
header{position:sticky;top:0;z-index:10;background:var(--panel);border-bottom:1px solid var(--line);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
header h1{font-size:18px;margin:0}header .sub{color:var(--muted);font-size:13px}
.bar{display:flex;gap:10px;align-items:center}
button{background:var(--panel2);border:1px solid var(--line);color:var(--text);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px}
button:hover{border-color:var(--accent)}button.primary{background:var(--accent);border-color:var(--accent);color:#11130f;font-weight:600}
.wrap{max-width:900px;margin:0 auto;padding:22px}
.hint{color:var(--muted);font-size:12.5px;margin-bottom:16px}
.beat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:14px}
.beat h2{margin:0 0 2px;font-size:15px}.beat .desc{color:var(--muted);font-size:12px;margin-bottom:10px}
.zone{min-height:30px;display:flex;flex-direction:column;gap:7px}
.zone.over{outline:2px dashed var(--accent);outline-offset:3px;border-radius:8px}
.card{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:7px 9px;display:flex;gap:8px;align-items:flex-start}
.card.dragging{opacity:.4}
.grip{cursor:grab;color:var(--muted);user-select:none;font-size:14px;padding-top:4px}
.ctext{flex:1;background:transparent;border:1px solid transparent;color:var(--text);border-radius:6px;padding:4px 6px;font-family:inherit;font-size:13.5px;line-height:1.45;resize:none;overflow:hidden;min-height:26px}
.ctext:hover{border-color:var(--line)}.ctext:focus{border-color:var(--accent);outline:none;background:var(--bg)}
.x{cursor:pointer;color:var(--muted);user-select:none;padding:2px 6px;border-radius:6px;font-size:13px}
.x:hover{color:var(--bad)}
.addc{margin-top:8px;font-size:12.5px;color:var(--accent);background:none;border:1px dashed var(--line);width:100%}
.cutinfo{font-size:12px;color:var(--muted);margin-top:6px}.cutinfo a{color:var(--accent);cursor:pointer;text-decoration:underline}
.beatdel{float:right;cursor:pointer;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:1px 9px;font-size:12px}
.beatdel:hover{color:var(--bad);border-color:var(--bad)}
.delbanner{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px 13px;margin-bottom:14px;color:var(--muted);font-size:13px}
.delbanner a{color:var(--accent);cursor:pointer;text-decoration:underline}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:20}
.modal.show{display:flex}.modal .inner{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:20px;max-width:700px;width:92%;max-height:82vh;overflow:auto}
.modal pre{white-space:pre-wrap;font-size:12.5px}
</style></head><body>
<header>
  <div><h1>EP2 — Story-Arc Map (the sticky-note board, flattened)</h1><div class="sub">Synthesize the arc — drag cards between beats, edit, cut, add. Saves in your browser.</div></div>
  <div class="bar"><button id="copyBtn" class="primary">Copy synthesized arc</button><button id="resetBtn">Reset</button></div>
</header>
<div class="wrap">
  <div class="hint">Grab the ⠿ handle to drag a clip into another beat · click any card to edit · ✕ to cut · <b>+ add</b> a beat note/clip.</div>
  <div id="board"></div>
</div>
<div class="modal" id="modal"><div class="inner"><h2 style="margin-top:0">Synthesized arc</h2><pre id="summary"></pre><div style="margin-top:12px"><button id="closeModal">Close</button></div></div></div>
<script>
const DATA={"title": "EP2 \u2014 Story-Arc Map (the sticky-note board, flattened)", "sections": [{"title": "\u2460 COLD OPEN \u2014 ~30s montage (fast hits, scored, captioned)", "desc": "Pulled from across the week, trailer-style: \u2192 smash to TITLE.", "cards": [{"id": "c0", "text": "\ud83c\udfac MacBook gift reaction (**C2654**) \u2014 a flash of the emotional peak"}, {"id": "c1", "text": "\ud83c\udf99\ufe0f a beat of the stress confession (**C2655**)"}, {"id": "c2", "text": "\ud83c\udfac Sai writing system pathways (**C2656**)"}, {"id": "c3", "text": "\ud83c\udfac the walk-and-talk (**C2669**) \u26a0\ufe0f source file not located"}, {"id": "c4", "text": "[A-ROLL] Ep1 callback line (VO): \"Last week the plan was to finally turn the ads back on\u2026 that's not what happened.\""}]}, {"title": "\u2462 WEEK-AHEAD \u2014 the intention (Setup)", "desc": "", "cards": [{"id": "c5", "text": "\ud83c\udf99\ufe0f **C2614** (1m25s) \u2014 the plan: launch site + ads, build the editor workflow (creators create / editors edit), revamp creator roster + recruiting, build the utilization dashboard, fewer calls \u2192 more deep work."}]}, {"title": "\u2463 THE THEME \u2014 name the lesson", "desc": "", "cards": [{"id": "c6", "text": "[A-ROLL] Block C cut-in: the epiphany \u2014 every stress is a missing system; structure is what frees his creativity. Plant it here, pay it off across the acts."}]}, {"title": "\u2464 ACT 1 \u2014 THE STRESS (Rising Action)", "desc": "", "cards": [{"id": "c7", "text": "\ud83c\udf99\ufe0f **C2655** (2m20s) \u2014 THE fixture mind-dump: worth tied to productivity, zero deep work, the Knicks-loss \u2192 skipped-nightly-routine spiral."}, {"id": "c8", "text": "\ud83c\udfac **C2644** (1m17s) \u2014 \"cooked with calls,\" the coffee-shop needle-mover planning."}, {"id": "c9", "text": "\ud83c\udfac **C2643** (0m51s) \u2014 delegation win: creator lead runs the onboarding call he used to run himself."}, {"id": "c10", "text": "[A-ROLL] Block B cut-in: why he ties worth to daily progress, and why it's a trap."}]}, {"title": "\u2465 ACT 2 \u2014 THE MACHINE / THE TURN (Conflict \u2192 the work)", "desc": "", "cards": [{"id": "c11", "text": "\ud83c\udf99\ufe0f **C2656** (1m21s) \u2014 the epiphany in real time: writing system pathways, presenting to the team at noon."}, {"id": "c12", "text": "\ud83c\udfac **C2657** (0m59s) \u2014 the SOP-building session (Rocio)."}, {"id": "c13", "text": "\ud83c\udfac **C2658** (0m23s) \u2014 heading to the co-working spot to build."}, {"id": "c14", "text": "\ud83c\udf99\ufe0f **C2668** (1m00s) \u2014 formats insight: the #1 creative lever after the creators themselves."}, {"id": "c15", "text": "\ud83c\udfac **C2678\u2013C2684** \u2014 Friday strategy page coming together (Erica / master Notion strategy page)."}, {"id": "c16", "text": "[A-ROLL] Block C/D cut-in: what \"building systems\" actually means, and why it's the opposite of Act 1's stress."}]}, {"title": "\u2466 MID-DOC REHOOK (~6:30)", "desc": "", "cards": [{"id": "c17", "text": "[A-ROLL] film explicitly: \"All of this \u2014 the systems, the SOPs \u2014 it's not really about org charts. It's about people.\" \u2192 cut to the walk-and-talk."}]}, {"title": "\u2467 ACT 3 \u2014 THE WHY (Character Arc) \u2014 the emotional core", "desc": "", "cards": [{"id": "c18", "text": "\ud83c\udf99\ufe0f **C2669** (the walk-and-talk) \u2014 agency = people; the UGA college-loneliness story; the office he dreams of = the social life he never had; \"I'm excited about you watching this, even if you're just one person.\" \u26a0\ufe0f source file not located \u2014 THIS is the heart, prioritize finding it."}, {"id": "c19", "text": "\ud83c\udfac **C2654** (3m42s) \u2014 the MacBook gift: generosity as the same build-the-people instinct."}, {"id": "c20", "text": "[A-ROLL] Block E cut-in: the UGA story, the office-he-dreams-of, \"why make videos with nothing to sell.\""}]}, {"title": "\u2468 FRIDAY WRAP + CLOSER (Resolution)", "desc": "---", "cards": [{"id": "c21", "text": "\ud83c\udf99\ufe0f **C2685** \u2014 Friday wrap: \"systems, systems, systems,\" the raw-not-clickbait ethos, the trillionaire/Elon bit for levity. \u26a0\ufe0f source file not located."}, {"id": "c22", "text": "[A-ROLL] Block F + G: the closer quotable line + the cliffhanger \u2014 the launch STILL hasn't happened (\"next week I find out if these systems finally let us go live\")."}]}, {"title": "Texture / B-roll pool (available, needs a vision pass to place)", "desc": "Short clips from the located folders, likely B-roll \u2014 slot these under the beats above once watched:", "cards": [{"id": "c23", "text": "**06/06:** C2615\u2013C2633 (incl. C2629 = the \"always ask for the sale\" sales nugget \ud83c\udf99\ufe0f)"}, {"id": "c24", "text": "**06/09:** C2634\u2013C2642 (C2642 = the Gusto/auto-pay nugget \ud83c\udf99\ufe0f), C2645\u2013C2653"}, {"id": "c25", "text": "**06/10:** C2659\u2013C2667"}]}, {"title": "Open items before assembly", "desc": "1. **Locate the back-half footage** (C2669\u2013C2686) \u2014 not in `01_ORGANIZED`. The walk-and-talk (C2669) is top priority. 2. **Vision pass** on the located clips to confirm shots + place the B-roll pool. 3. **Lock the title + thumbnail** (Sai's", "cards": []}]};
const KEY="arc-review-ep2-story-arc-map-the-sticky-note-board-flattened";
let state=JSON.parse(localStorage.getItem(KEY)||"null");
function save(){localStorage.setItem(KEY,JSON.stringify(state));}
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function init(){
  if(state&&state.cols)return;
  state={cols:[],card:{},next:0};
  DATA.sections.forEach((s,si)=>{state.cols[si]=[];s.cards.forEach(c=>{state.card[c.id]={text:c.text,cut:false};state.cols[si].push(c.id);state.next=Math.max(state.next,+c.id.slice(1)+1);});});
  save();
}
init();
if(!state.delSec)state.delSec={};
let drag=null;
const grow=el=>{el.style.height="auto";el.style.height=el.scrollHeight+"px";};

function render(){
  const board=document.getElementById("board");board.innerHTML="";
  const delBeats=DATA.sections.map((s,si)=>si).filter(si=>state.delSec[si]);
  if(delBeats.length){const b=document.createElement("div");b.className="delbanner";
    b.innerHTML=`${delBeats.length} beat${delBeats.length>1?'s':''} deleted · <a id="restoreBeats">restore all beats</a>`;board.appendChild(b);}
  DATA.sections.forEach((s,si)=>{
    if(state.delSec[si])return;
    const ids=state.cols[si]||[];
    let cut=0;
    const cards=ids.map(id=>{const c=state.card[id]||{};if(c.cut){cut++;return"";}
      return `<div class="card" draggable="true" data-id="${id}">
        <span class="grip">⠿</span>
        <textarea class="ctext" data-id="${id}" rows="1">${esc(c.text)}</textarea>
        <span class="x" data-id="${id}" title="cut">✕</span></div>`;}).join("");
    const el=document.createElement("div");el.className="beat";
    el.innerHTML=`<span class="beatdel" data-si="${si}" title="delete this whole beat box">🗑</span><h2>${esc(s.title)}</h2>${s.desc?`<div class="desc">${esc(s.desc)}</div>`:''}
      <div class="zone" data-si="${si}">${cards}</div>
      <button class="addc" data-si="${si}">+ add card</button>
      ${cut?`<div class="cutinfo">${cut} cut · <a class="restore" data-si="${si}">restore</a></div>`:''}`;
    board.appendChild(el);
  });
  // edit
  board.querySelectorAll(".ctext").forEach(t=>{grow(t);t.oninput=()=>{state.card[t.dataset.id].text=t.value;save();grow(t);};});
  // cut / restore / add
  board.querySelectorAll(".x").forEach(x=>x.onclick=()=>{state.card[x.dataset.id].cut=true;save();render();});
  board.querySelectorAll(".restore").forEach(r=>r.onclick=()=>{(state.cols[r.dataset.si]||[]).forEach(id=>{if(state.card[id])state.card[id].cut=false;});save();render();});
  board.querySelectorAll(".beatdel").forEach(d=>d.onclick=()=>{state.delSec[+d.dataset.si]=true;save();render();});
  const rb=document.getElementById("restoreBeats");if(rb)rb.onclick=()=>{state.delSec={};save();render();};
  board.querySelectorAll(".addc").forEach(a=>a.onclick=()=>{const id="c"+(state.next++);state.card[id]={text:"",cut:false};state.cols[+a.dataset.si].push(id);save();render();});
  // drag
  board.querySelectorAll(".card").forEach(c=>{
    c.addEventListener("dragstart",e=>{drag=c.dataset.id;c.classList.add("dragging");e.dataTransfer.effectAllowed="move";});
    c.addEventListener("dragend",()=>{c.classList.remove("dragging");drag=null;});
  });
  board.querySelectorAll(".zone").forEach(z=>{
    z.addEventListener("dragover",e=>{e.preventDefault();z.classList.add("over");});
    z.addEventListener("dragleave",()=>z.classList.remove("over"));
    z.addEventListener("drop",e=>{e.preventDefault();z.classList.remove("over");if(!drag)return;
      const si=+z.dataset.si;const after=e.target.closest(".card");
      for(const k in state.cols)state.cols[k]=state.cols[k].filter(x=>x!==drag);
      if(after&&after.dataset.id!==drag){const idx=state.cols[si].indexOf(after.dataset.id);state.cols[si].splice(idx,0,drag);}
      else state.cols[si].push(drag);
      save();render();});
  });
}
document.getElementById("copyBtn").onclick=()=>{
  let out=DATA.title.toUpperCase()+"\n\n";
  DATA.sections.forEach((s,si)=>{if(state.delSec[si])return;out+=s.title+"\n";
    (state.cols[si]||[]).forEach(id=>{const c=state.card[id]||{};if(c.cut||!(c.text||"").trim())return;out+="  - "+c.text+"\n";});
    out+="\n";});
  document.getElementById("summary").textContent=out;
  document.getElementById("modal").classList.add("show");
  if(navigator.clipboard)navigator.clipboard.writeText(out);
};
document.getElementById("closeModal").onclick=()=>document.getElementById("modal").classList.remove("show");
document.getElementById("resetBtn").onclick=()=>{if(confirm("Reset to the original arc map? Clears your edits.")){state=null;localStorage.removeItem(KEY);init();render();}};
render();
</script></body></html>
